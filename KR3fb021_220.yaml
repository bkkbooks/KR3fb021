body:
  text: 日徑六百四十三里八十八步即太陽天度實之半月徑四百一十里二百四十三步即太陰天度實之半自地上至月八萬一千六百一十一里二百八十一步置九重天內天地相距之數一百三度五二八二七九九加半重厚徑之數六度一六二三九七八真象里實秉之自地上至日十萬九千一百二十一里一百七十四步置九重天內天地相距之數加三重半厚徑之數四十三度一三六七八四六三以真象里實秉之月道下於日道二萬七千五百四里一百九十二步月之出沒距地中五萬九千六百四里六十七步月出沒之處距地面中心弦七十三度九四八七七三加厚徑半重以真象里實秉之日在卯酉距地中八萬七千一百一十三里二百六十三步日出泛之豦距地面中心哀弦之度同上加厚三重半徑以真象里實秉之此天地日月周徑遠近之數也
