body:
  text: 歲在星紀以下六條傳文並評超得歲緯在襄二十八年丙辰當進一歲作丁已推距第八紀之五十一章三歲歲積一千百九十五日七二七九歲差日躔在古赤道牛四度三三淂步斗積戾九十七萬三三置前歲積加章首木應一百九日九二五五纍除合率餘九萬二六九用減步斗積度存八十八萬二六七一查表淂古赤道斗二十一度二六為丁已前合度距元枵女五度凡一十八度二六木率合後應行九十日弱於驚蟄五日入元枵之次而朱鄭之饑政在定已春夏之交也歲在訾𡜯之口襄三十年戊午歲差日躔牛四度三一得步斗虗度九十七萬三一置上丁已前應加一歲策通三百七十四萬三五五反減原率淂二十四日五五八用加步斗虗度通一百二十一萬八六查表淂古赤道虗八度八六為戊午至後合伏度距𡜯訾之口一十九度一三木率合
