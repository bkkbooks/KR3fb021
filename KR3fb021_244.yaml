body:
  text: 西說五大洲曰甌羅巴日利未亞曰亞細亞曰南北亞墨利加日墨瓦臘泥加吾不知海外別有天地邪抑同此天地也今以天道觀之日月星辰其變占多應于中國而春秋冬夏四氣和均亦僅太行以南衡嶽以北耳則九州之內嶺南多暑朔地多寒其氣候且不能盡得天地之正又何論乎海故海國雖多而與萬古神聖相傳廣土眔民聲名文物之天下必不可同年而語也彼為是說者徒以耳目之所不及世亦無徒致詰耳今中國南交北朔東海西域固可致而知若南逾瘴海至蘇吉丹澎湖島蘇吉丹闍黎之支國于泉州為丙已方東至海水勢漸低愈東則尾闍之所泄非人世矣澎湖島在台灣西海水漸低謂之落漈舟行悮入百無一回北至骨刺幹鐵勒朱子曰蔡伯靜言地有絶處唐太宗妝至骨利幹置堅昆都督府其地夜易曉夜亦不甚俺蓋當地
