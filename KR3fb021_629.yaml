body:
  text: 二十一紀至丙子八三二七五三二日一六六二六一八朔庚戍八三二七五九日三五一八一九七二九五減四朔二十二紀至壬子八七四三九八日七七四五七四一三四朔辛卯八七四三八九日七二五五二九四九二減四朔二十三紀至已丑九一六二八五日三八二八八七一八八朔癸酉九一六二七二日九九二三九二五四五減四朔二十四紀至乙丑九五七六六六一日九九一二二四二朔甲寅九五七六六五三日四七二九四九一七減四朔末紀至壬寅九九九三三八日五九九五一四四三一九九九三三四日八四六六五八七七九五減四朔天道參差必有餘分如歲有歲餘朔有朔餘以至章蔀紀元莫不有奇零之數此天道自然固不能使之完整而恰無餘分是以先王之正時也履端於始舉正於中歸餘於終因其自然以為法也今推一元之數淂二十四紀而餘奇三十有半歲將所謂歸餘於終者非邪敬唯知順天以求合而已𠰥疑其元法之不能完整則固二千年來之習見也又何怪焉第七紀氣朔蔀應表七紀以前朔無考載籍於黃帝以來始有甲子然世紀諸書所載大都失實未敢深信且固以考古者少故以蔀法紀之一蔀黃帝六十二年甲子至癸卯六四九八七八三二四朔已亥七一一六六四六九八七五二蔀少吳三十八年庚辰至壬午九四三二五二七六朔戊寅四六九九一二一二三七五三蔀顓頊三十年丙申至庚申五三九八六七三一二朔丁已二二八一五九三二九八七五
