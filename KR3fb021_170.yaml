body:
  text: 秀水張雍敬著測量天地辨治曆必先明天象天象不明而於以治曆是猶人未謀靣而欲悉其情性也然所謂天象者亦祗貴明其高下遠近之理斯已耳非必欲淂其里實也土圭之制雖創自聖人要不遏求地中致日月所以建王國驗氣序初非為測量周徑設也周禮大司徒以土圭之法測土深正日景以求地中典端以土圭致日月四時玉人土圭尺有五寸以致日月以土地馮相氏冬夏致日春秋致月以耕四時之序周禮所載上此初與所謂測量法也自周髀家始創其說而託之于周公於是謂天地高深可測而淂其里實蓋借古術以售其妄誕耳而世方沾沾焉執其景之短長較其里之多寡無論不淂其實也即使真得其圍綜之數亦何與於曆術之踈密哉今考古來測候者其晷之尺寸多殊周禮注以玉為圭其長尺有五寸夏至立八尺之表於陽盛景與坐等是為地中
