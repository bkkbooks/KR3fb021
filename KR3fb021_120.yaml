body:
  text: 秀水張雍敬著曆原日月星辰象也春秋寒暑氣也合氣與象而數生焉象昭于天氣運于地數成于人而三才之理統於曆矣是以聖人尚之仰觀俯察而著之數迹其推行之利以為化栽之宜履端立極必體其元禮動樂舉必循其候五刑九伐必順其氣三農百工必因其時庶政有為無不各從其月今用能協于上下億寧百神時育庶類而柔和萬民故曆者王政之首務也粵稽往古三正之建肇自二靈至宓義造甲子作蓋天軒轅綜六術作調曆顓帝垂三統立渾儀中星置閏詳於帝典弦弧勾股傳自周髀古聖人本知天之學著為曆法數從理出理以數明妙合自然不勞意計以故時正氣和休嘉修至歲功以成庶績以熙而化理隆于千古也竊意古人神靈天亶首出萬物於以尋造化之迹究陰陽之變立
