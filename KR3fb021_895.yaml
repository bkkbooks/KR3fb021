body:
  text: 歲差辨治曆之大端二歲法周天是也歲法定然後太陰五緯之朔伏真周天定然後太陰五緯之度率正故二者諸步之本也步日之要在乎晷景步天之要在于歲差晷景歲差相為表衷使有毫釐不協即不足以言曆況可昧昧邪今西士於歲差之理不能深考而但指為偶差蓋昧乎治曆之要矣夫所謂偶者必其或差而左或差而右無有順序者也又必其有時差多有時差少絶無定數者也更必其時而有差時而無差不可推測者也果其如是則謂之偶差也可乃今推之如三正三統皇古之法其理淵徵赤易舉似而磨虞以來四千餘年之天象其粗迹固可知也以言乎宫則自子而丑而寅以言乎宿則自豦而女而牛而斗而箕必差而左則非偶也一曆有一曆之差一代有一代之差因其距年以求距度其差分確有漸級則非偶也天漸差而左躔漸差而右漢法無差常致後天則非偶也然而為此言者亦從來自中曆辨晰未精有以悮之耳秦曆已在斗而漢世云在牽
