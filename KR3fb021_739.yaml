body:
  text: 冬至歲星所躔度歲在火辨用之伐殷歲在火此國語所載伶州鴆之言也自漢以來曆家多信之今考周初歲星所在書傳不同有言束面而迎太歲者束者晨見于束也荀子是也有言魚辛之諫武王曰歲在北方不利北征者尸子是也一歲星而國語以為南尸子以為北荀子以為束其參差𠰥此將誰通從乎如謂國語所載必較二子為信則即伶州鳩之言觀之抑更有火謬焉者尚書紀武王伐敗之時繫以一月以夏正言之則是寅之月也癸疏作夏正用初冬至歲差日躔在女四度正月當在娵訾之次安得曰日在析木之津乎即以殷正言之則建丑之月也亦嘗在元枵之次而不淂在析本𠰥以為周正則韋昭之解可以牽合矣國語韋昭注曰昔武王伐殷歲在火武王始發師束行時殷之十一月二十八日戊子於夏為十月是時歲星在張十三度月在夫駟戊子日月宿房五度辰在斗柄戊子後三日淂周正月半卯朔於殷為十二月夏為十一月是日月合辰于斗一度星在天黿周正月半卯朔二日壬辰辰星始見三日癸已武王發行
