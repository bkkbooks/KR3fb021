body:
  text: 中言耳若俱就午中觀之則冬至午中之日與夏至午中之日雖極高卑又何嘗形為大小而有眺胸之見乎此不可通者三且日月既以高卑而形為大小則度分亦必以高卑而形為潤狹高則見狹卑則見潤以大躔潤以小躔狹仍適相符又安得有眺胸乎此不可通者四今且不必以吾說窮之也第即據其所謂眺胸者而辨之彼立定氣之術自冬至至春分凡八十九日弱而行九十度則先三日非有漸積之盈分而然乎自夏至至秋分九十三日半強而亦行九十度則圖後三日非有漸積之縮分而然乎若眺胸則無漸積之分者也何以明之合試設徑尺之娵橫畫三線以擬黃赤道縱畫十寸以寸擬度取大中小三錢大錢徑一寸五釐擬視行之眺小錢徑九分五釐擬視行之胸中錢恰徑一寸擬視行之平度以三錢分置于第一寸從右而起其孔正對縱橫二線十字交豦擬日月之自行則
