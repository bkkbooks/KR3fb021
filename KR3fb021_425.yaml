body:
  text: 二萬九千六百年當復混沌後人如羅長源趙緑習楊升菴輩皆疑之謂未見其的然今子既原其始復要其終以定元數夫已往者可憑而將来者難必豈自由的然之説乎曰始終有無理之相為對待者也既有始必有終既自無而之有亦必自有而之無天地之有終窮理固然也天下之理始終一貫未有能知其始而不能知其終者昔人但言已往不言將来因其後之無可推即見其前之非足據矣是以上元之數説者紛紛而皆不得其實也若雍敬所推于天地循環之運陰陽消息之機固未之有得而亦不可以言傳至其顯而易見之處則有可得而言者今夫日之數出沒一周月之數盈虗一周歲之數春夏秋冬一周則天地之數亦上于日月星辰炁朔甲子一周從可知矣日月星辰炁朔甲子既皆一周則天地始終之定數也既已周矣而謂天地之數猶未終是歲之四序周而猶未成一歲月之盈虗周而猶未成一月日之出沒周而猶未成一日也豈其然乎夫章往可以察来見近可以知遠日如是月如是歲亦如
