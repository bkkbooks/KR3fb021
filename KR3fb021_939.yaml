body:
  text: 交食説日食為月之相掩月食為閣虗此亦理之易見而數之可知者也乃古無預知日食法豈真聖人有所不知哉非也蓋日月之行其交會雖有常數而當其薄食則即為天象之變異人事之咎徵𠰥世主因而警省則𢯂回固昭感應之機補救猶為淂半之策矣使揭其理而著之數則後之人主將有視為天道之固然而謂天變為不足畏者此聖人之所大懸也故隱其理數于不言而第曰日有食之若不知其所以然者庶足示天象之大變而動人主修省之思此聖人之徵意也後世曆家以曆之疏密徵而難察唯交食之法為顯然可驗於是專精其術以求信于世而於置閏授時治曆大旨反視為第二義失聖人之意矣按自黃初曆始以日食課曆之疏密亦僅追考從前而猶未能預知也至張子信劉焯賈曾元輩始謂日食可以密率求張胄元又知食分多少遠近不同一行因而精之以窮九服之變及即徫西征作里差法而交食之法殆無遺譏矣然法雖備而分秒益損之
