body:
  text: 暦代正朔攷暦以䯪帝為宗顓帝之法立春為先生明為朔唐虞夏皆不改正譚謀之際必以月正元日正月朔旦是不改正也而改朔以合辰為朔此滿不知剏於何時當是義和之法商改正建丑為正即位護位時在丑月之朔改朔朔用合辰于夏似為不故而於顓帝暦為改而不改月丑月仍為十二月周初改正以子月為正歲典商之以十一月為元貢周法似不淂為改而於顓帝暦則為改也而不改朔朔用生明於商暦似為改而於顓帝暦則為復舊也其時與月亦不改正月之言仍用定寅至暦月則陰去十字但樓一月至幽王而後則改正直以建子之月為正月改朔以合辰為朔併改時月此制之改不知始于何王而見于經文唯幽王時日食為可攷詩十月辛夘竹書作冬十月辛夘朔而法淂猶月朔合交食限實差兩日盖直以子月為春正月也春秋隐公而後以建丑之月為春正月僖公而後以建子之月為春正月秦人改正建亥改朔朔用合辰於顓帝暦為改而時與月則不改亥月仍為冬十月漢初仍之漢武帝定以建寅之月為孟春正月以合辰為朔至今從之曹明帝當政建丑磨武氏當政建子肅宗上元亦政建子皆不乆而復要不足論也
