body:
  text: 秀水張雍敬著星圖說蓋天之法其來最遠而世咸斥其非豈聖人之於曆象有未盡善者邪抑後人之智反足以察聖人之非邪亦未之思矣昔宓義氏始作蓋天即今之星圖凡可以鋟水動石者是也自漢以來世皆宗渾天矣而至於作圖則必仍蓋天之舊蓋以渾天止可為儀而不可為圖也試思欲圖天象舍蓋天之法更無别法則聖人制作圖已立於不易矣隋畫圓蓋志曰昔者正曆明時作圖蓋以圖列宿極在其中回之以觀天象分三百六十五度四分度之一以定日數日行星紀轉回右行故圓規之以為日行道欲明其四時所在故於春以青為道於夏以赤為道於秋以白為道於冬以黑為道四時之末各十八日則以黃為道第古聖人於天地之理多著以象而不垂其文如先天易亦但有爻象而無其辭所以藏諸用而使後人
  hash: sha256:5f51cbcd7ab7d90296765e85726d56055f398981878aaf66ad66c298833db7c4
