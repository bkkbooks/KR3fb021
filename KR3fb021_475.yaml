body:
  text: 弊所謂故人有一定之法者其在斯乎爰著上元終元軋象圓以明日月星辰始終之定理則定數由此可信矣而又證以經史微言及二氏餘說見古人已有先我而明其理者原非雍故所獨得而一家之私言若夫漫言天地之數問其理而不能言也求其證據而不可得也是亦自誣以誣人而已矣圖
