body:
  text: 移獨七星常為冬至昏中而不變中星不變則歲差之理未著故造一元之數始于上元甲子而天運一周之數始于平初甲子也三皇三一等經曰天皇氏以平初元年出治地皇氏以太始元年出治人皇氏以太平元年出治夫紀號改元近起漢代太古之世竊恐未然茲用其年號者特取太初之義以別于上元甲子使一元之始與一周之始不相蒙混耳夫星張易位為曆家至精至微之理而不知者但目為古書之錯簡已耳觜參易位説古宿觜在參前西法易參在前而觜在後世或鷺為天象之變或詫為西法之祕要之不足異也考古赤道觜距參二度宋赤道距一度元赤道距五分其來有漸非明季忽然而變也又考古法參宿以中三星之西星為距而西法以右有為距故愈形其差其實與授時所測今原不甚相遠西法以參為一度二一觜為十一度三夫參右肩之東為觜觜三星所占不
  hash: sha256:3d2937128c5b1196a27426255bbe709c7651e1bddda49cf9321d6097587443b5
