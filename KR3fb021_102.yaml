body:
  text: 數而理居其至則數自在其中矣後人學問得入朱子之門者或寡則無以見其理之真自不足以知其數之確而但即暦家之庸術以椎測其言則必形其枘鑒矣此庸術之數自不合于朱子而反謂朱子之理不符于數悮已此説一與妄相傳誦於是學者莫為闡明暦家莫能宗信使真理真數不獲大著于天下後世而異端邪説遂得以矯誣天道誑惑人心豈天運尚當吾塞道統或應中絕乎由朱子而来至于今五百有餘歲否極者泰塞極者通此其時矣因理立數因數闡理放斥異端廓清天道上馬者纘義軒之盛軌下焉者紹孔孟子真傳是誠深有望于今日也夫暦辨語云步暦甚雖辨暦甚易盖以象緯可証理數可推是者不容巧詆非者有難附和也然吾謂斯道之難政莫難于辨暦耳苟使胃無真是則所執之理僅為臆見所信之數皆為庸術即騐諸象緯亦或有偶合之端要未免似近而實疎矣又何以辨古今暦術之
  hash: sha256:f87dc851ee60c91ccef2645fdf54d2e3e4fde2b26d47f200e1b9ba2a44f4b4dc
