body:
  text: 圖五天氣十四按素問岐伯曰臣覽太始天元册文丹天之氣經于牛女戊分黅天之氣經于心尾已分蒼天之氣經于危室栁鬼素天之氣經于元氐昴畢元天之氣經于張翼婁胃所謂戊已分者奎壁角軫則天地之門戶也戊與丙同位于已已與丁同位于午戊已本在中宮而已午為其寄位末句之意是明戊已屬王而已為地戶故戊已在已午間非戊分在已而已分
