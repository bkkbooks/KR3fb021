body:
  text: 刾增五百一十分故夏至後一畫夜止應九十五刾矣減四百八十四分故試問曆家然乎否也即古人言冬夏刻漏亦有徽異然所爭僅在刺許之間豈至長短相懸十刺乎沈括言冬至漏稍長夏至漏稍短乃冬至日行速天運已期而日未至表故百刺有餘夏至日行遲天運未期而日未至表故不及百刺按此亦是水性有流滯輕重之別併所云微差刻許者亦非闢日之遲速也世又謂日行北道當中而寬日行南道斜斂而窄故赤道度多黃道度少日之疾遲增減因度有多少而然至于刺則仍無增減也夫天之有度譬輪之有輻其會於轂三十其附於郭者亦三十輪一周則轂與郭均一周轂不以窄而轉速郭不以寬而轉遲也日安有因黃赤道而異其行哉然而黃赤道實有不同日行果有盈曆縮曆之異何也曰此非日之有盈縮乃經星之盈縮耳詳經星行率及黃赤道説世因不明左旋之理謂經星不動故以經星之盈為日之盈經星之縮為日之縮也
