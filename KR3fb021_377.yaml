body:
  text: 蔡邑月令章句起危宿而首娵訾按堪輿家有三百六十天星穴法政用其分度相傳為顓頊遺法夫冬至日躔起危政顓頊時歲差度也蔡氏所傳非無自矣若漢志所載以星紀為首則本漢人謬術而託之於黃帝耳改其分度即古黃道惟子午二宮俱增一度已交二宮俱減一度夫分野當從赤道其度當平分均等而乃用黃道入宮度數多寡不同其𧨾如此而猶謂黃帝之遺乎且次首星紀即七夭同起牽牛之説其為劉歆所撰無疑若費直説周易其星度入宮淺深多寡譌謬益甚直不足辨大衍曆以元枵為首則其法以上元日度發自虛一也所分入宮宿度其淺深頗與步斗法近似得古法而未甚精密耳夫四象以蒼龍為首而列宿又從斗杓而分故分次必首壽星今用步斗法及歲差度推得上元中星七星七度為午正其星度遇宮之分秒皆從此起算其法似乎新定而實古人之遺秘也
