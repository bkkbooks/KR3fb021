body:
  text: 黃道比赤道進二度者蓋經星入盈曆之故應進二度四零而止進二度者古法但計整度未詳分秒也此上元開闢中星之真數而步斗分宮之綱領也蓋星七張二之為午正猶羅盤之針必指南午正既定則周天皆定矣雖然星象變異古今不同安必星七張二終為一定乎然二宿之實度即變而午正之虗位必不變是以步斗之法特重分宮也凡欲考古今星躔之歲差黃赤道之暌合及更定周天星法非是不可誠考步天衢之金科玉律而三代以下失傳之祕也彼宋元術士何足以知之考步斗表宋赤道午正亦為星七蓋猶用整度故與古法相合元赤道午正為星六度五度七二五則以星之度止有六度三而不滿七度也其黃道宋為張四度三度三七五與古午正張一度三七五差二度元為張三度二度七五五與古午正差八十七分五十九秒太所以不同者古法俱用整度而彼所測之度俱有零分也詳考舊曆
  hash: sha256:0b68fc647e579756a1c6dee7bdeadb34cae94e0b06f39766f5162593a83614c7
