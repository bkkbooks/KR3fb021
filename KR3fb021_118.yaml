body:
  text: 法之氣盈朔虛悖矣謬三十九古聖作曆之意全在置閏正時世因定朔而閏或先後一月此亦無礙若因入氣差而改置其閏則所閏非其月矣謬四十章法者古法所以節度氣朔使閏法有程而不亂也漢法氣朔分齊固失其之疏後人因其難齊而又必欲求其齊遂破亂章法移閏欺人謬四十一以上論氣朔閏法五星曆率當從歲周為數而從天周謬四十二太陰五緯皆當紀以緯度則淩歷鬪杞可以預知而不立之法豈黃道一法真足以盡七政之躔離乎謬四十三歲星古應春秋內外傳所載率皆有紀年而無月日有次舍而無宿度惟漢書高祖著紀之初與太初改曆之始次舍宿度年月至朔已未歲酋前十月猶丁丑冬至日紀甚詳悉此政定率者之所當求也而不從此以起率其乙未丁丑之歲後天幾至一舍謬四十四
