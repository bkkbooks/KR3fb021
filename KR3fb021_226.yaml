body:
  text: 彌山其下環大海水有金輪火輪水輪為之恃載而不墜即風輪之説然第言輪而不及樞則赤若子華子為能訞軋動坤靜之理也天道尚右陽就陰也地道尚左陰趍傷也一左一右而勢適相迎故軋以健動而坤以順靜也天道尚右日月西移地道尚左水潦東流其在地下正復相反惟勢適相迎故地不為天昕欇動也彼謂地有四遊又有升降周髀家言地有四遊春遊過東萬五千里夏遊過南萬五千里秋遊過西萬五千里冬遊過北萬五千里又曰春秋分時地適當天之中日出所入酉且行中陸故長短勻由春分而夏至陽曰升地日降而下其日出寅入戌且行北陸故永由秋分而冬至陽日降地日升而上其日出辰入申且行南陸故短按渾義虛象北極出地三十六度今冬遊過北而極不為高夏遊過南而極不為隱
  hash: sha256:cd158c1be65bccf7a1514cd99431e5c3d22f2a45487b1edfb7679a0c4d9f9e2c
