body:
  text: 黃道六度黃道一周退前所交六十分度之一是謂歲差月道一周退前所交一度八萬九千七百七十三分度之四萬三千五百三秒半積二萬一千九百一十五年而歲差周積二百二十一月及分一千七百五十三而交道周矣李研國史補曰裴胃之問董生曰日常右轉星常左轉大約不滿三萬年日行周二十八舍三百六十五度然必有差約八十年差一度自漢文帝三年甲子冬至日在斗二十二度至磨與元甲子冬至日在斗九度九百六十一年差十三度矣按此則歲差周法先儒固已發明之其數雖未真而其理自居于不易矣今推得四百三十二甲子而星躔一周範圍既定天運自齊於是由周法以分宮由宮以分度秉流赴源由本邊末天道雖微一元雖久可坐而致也推三正歲差之必立周法固已然天運之周如環之無端茍不能知其所由始則亦莫知所以終而求之前後二
