body:
  text: 丑朔甲午一七寅朔癸亥七夘朔癸已二三辰朔壬戍七六已朔壬辰二九午朔辛酉辛夘八二四六未朔三六閏朔庚申八九申朔庚寅四二酉朔已未九五戍朔已丑四八亥朔已未一授時交分二十六日四千四百七十三分又傳有五月辛酉六月戊戍亦皆先一月經又書四月丁已十月丁未依鲁曆作閏三月閏應二十二日八應閏未月鲁曆先五月鲁曆貫閏多在歲終是年先閏交氏誤之以定法攷之辰朔壬辰有丁已戍朔已丑有丁未皆先一月盖自僖公三十二年年多置一閏故也僖三十二年經書四月已丑十有二月已夘定法推淂天正朔為乙亥冬至為丙子其已丑在辰月其已夘在次年天正月顯屬丑正可見其多置一閏亥十五年已酉六月辛丑朔日有食之定法已酉歲天正朔癸酉四三三九定炁庚子一二四六已有經朔辛丑八六九定朔在書合交食限宣八年庚申秋七月甲子日有食之既杜預以上月甲子晦食姜岌云十月甲子朔食大衍授時皆謂十月至疎授時十月甲子朔加時在書食九分八十一秒與經書既合定法庚申歲天正朔已已五九四七定炁丁酉七九五一酉月經朔甲子九六定朔在婁合交食限
