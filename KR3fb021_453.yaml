body:
  text: 上元必不起甲子辨日月星辰象之昭也春秋冬夏炁之運也甲子幹枝數之紀也天以象炁示人人以數合天數雖成于人而究其極㢭則天且不能違何者惟數不違天故天亦不能違乎數天人交定于理而已矣是以象雖運旋不息炁雖屈伸不常二者無定而以一定之數範圍之而有餘理本乎自然而數則理之寄也然則古聖人之相剛建配陰陽以造甲子有不上窮下訖原始要終以為數者乎故開闢之初歲月日時皆起甲子非天之必始于甲子乃造甲子之必本于天也是以求上元者亦必始于甲子而一行之推上元也謂七曜起于赤道虗四度積距開元甲子九千六百九十六萬一千七百有四十日今據其術推之年不起于甲子而起于癸已炁不始于冬至而始于季秋其術以三千四十為日法七百四十三為歲餘歸得二十六萬五千四百七十年又三百零九日有奇夫子為辰首虛為子中此祖沖之之説也然不曰日
