body:
  text: 差日躔古黃道牛四度三度三一順數二十四度六五六八淂虗十度末為至後合伏度距𡜯訾之口即宣宿初十七度強查木星行率合伏後八十三日行十七度始抵營室為戊午清明節後則是歲夏五月周秋七月為夏正夏五月歲星正在室五度也歲在火考證國語魯僖公十六年晋文公時出亡過五鹿子犯曰千有二年歲在火必獲此王至僖公二十八年已丑春文公侵曹取五鹿置襄公丙辰天正冬至上距僖公已丑八十七歲歲積三萬一千七百七十五日一九五加丙辰後合應三百五十五日七一五以新定木周率纍除之餘二百二十二日二四五太陽入縮曆二十九日四應減一度五五九三從歲差日躔古黃道牛五度四度五八三順數二百二十度六六淂張十七度十六度四為至後合伏度則是天正月政在火之次也
