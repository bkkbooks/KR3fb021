body:
  text: 月食辨月明為借光本於周髀周髀曰曰愧月月光乃出成明月月食為蔽于地原于靈憲靈憲曰當日之術光常不合者蔽于地也是謂虗雖皆古人餘論然其是非得失亦政有辨矣今西術兼取二説而求通之請光與之論黃赤道夫天大而在外地小而在內日月之道即地觀之將如輻之輳轂乎抑不然乎彼謂天有黃赤道地亦同之故上下有三图相對則輻輳之説也既如輻輳則日月南北道相去極遠不過五十三度有奇而地徑一百十八度少以一百十八度之地障五十三度之道將遇望無不蔽而亦當無不食矣如以日輪甚大地不能蔽則地小于日即不是以蔽日而地大于月終能蔽月夫既能蔽月即所以蔽日矣而猶曰不能蔽乎即曰不必如輻輳然度之潤狹相當則在所必論也月道出入黃道凡五度半而地球當輪天凡得三度半是地球常蔽其十一分之七也則九十有一月之間當相食七次乎必欲求通其説吾猶恨月尚未甚大而地尚未甚小也且日月之為借為蔽當以日月之自相望為準
