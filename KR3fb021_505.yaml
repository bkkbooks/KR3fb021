body:
  text: 在亥也舊圖並謬茲特正之今推上元五唯實各躔其氣之所經自牛至張為丹天之氣則火星躔于其間自尾之栁為黅天之氣則土星躔于其間自尾之鬼為蒼天之氣則木星躔于其間自堯至昴為素天之氣則全星躔焉自婁至翼為元天之氣則水星躔焉五天之氣從橫交錯皆從虗宿左右而分而虗宿獨不為天氣之所經者則以下潛黃泉之故故命其宿曰虛命其次曰元枵皆取天氣不經為義試以是圖與上元乾象參觀之則五行之定理上元之定象皆可見矣宿起畢昴十五曆家于二十八宿多起于角從斗杓而分以東方蒼龍為之首也律書起東𨐫以乾位不周風為之首也蔡邕月令起危一行大衍曆起斗以日躔所在為之首也要未有以畢昴為首者今攷儒家則有曰天左迴而起牽牛地右闢而起畢昴于老氏則蔡地亦起畢昴于釋氏則有曰初置星宿昴為先首出法苑珠林非的有所本何三教之言𠰥合符莭乎今推上元之初
