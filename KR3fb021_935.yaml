body:
  text: 律琯候氣辨曆者歷也所以歷天之象猶人之形體也律者凖也所以準天之氣猶人之聲音也形聲雖鈞厲是人然必先有形而後有聲非先有聲而後有形而昔黃帝命伶倫造十二律榮後鑄十二鐘以協月䇶前志曰至治之世天地合以生風天地之風氣正而十二律定後志曰宓義作易紀陽氣之初以為律法則是律生于曆也而漢人乃欲執律以定曆蓋倒施之矣故雖有律琯候氣之説大抵在當時亦未必果驗不然則何獨效于漢而不效于後哉昔隨嘗候氣矣或初入月而即應或至中下旬而始應夫曆之疏密僅爭分秒之間而氣之應也或差以旬日計則其説之不足據也審矣隨志高祖令毛爽等候氣律或初入月其氣即應武至中下旬閏氣始應者殷或三五夜而蓋或終日讒盡飛少許者牛弘謂所半出為和氣其政平全云為猛氣其臣總不云為哀氣其君暴高祖數日臣縱君暴其政不平距日劉而月異今十二律于一歲內應不同安淂暴君縱臣𠰥斯之甚也又宋嘗造曆矣鄧寶信尺纍百恭阮逸胡瑗尺橫纍百恭和峴則用表景天丁度等則謂當依漢錢分寸競不能決而當日不聞用候氣法以辨其是
