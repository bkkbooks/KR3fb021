body:
  text: 暦法微妙僅在秒忽之閒盖以積乆則其差必多也而歲差攷古演紀止以整度論而不知其分秒年限止以整歲斷而不悉其奇零謬三十五古之歲差實度或在古黄道或在古赤道宋元及今又在宋元之黄道與今之黄道而椎者皆以今度承古度黄道承赤道莫能分別其實謬三十六以上論歲差太初暦至朔同日本在癸亥因借用陽暦故進一日詳漢書而世但知太初之應為甲子日逐悮執此以為折中增減之數故歴代之歲實雖遲相少損而終不免于過强也謬三十七歲實有消有長是謂氣差非術士入氣差之謂楊氏郭氏有消無長則察来之智誠未易及也至大統暦知消分之不可復用而不知其為常長迄于明季猶用授時之舊謬三十八漢法以天周為歲終故象差之理不著至北齊張子信立入氣差法唐宋諸暦家皆因之象差之理錐著而節氣有長短則常有朔盈于氣之時與古
