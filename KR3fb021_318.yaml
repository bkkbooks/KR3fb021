body:
  text: 百萬里之遠矣其然乎中國對待之豦人若向明而立則南北二極必互易其位亦互易其名而光道通在天頂之南然後長線變為短線短線變為長線而冬夏始為相反然日月星宿勢比為西出而東沒矣若曰南極仍為南極北極仍為北極則人當背明而豦其長線亦變為短線短線亦變為長線而冬夏相反然以光道觀之則夏至日道當在天頂北十二度冬至日道當在天頂北六十度而南至為夏北至為冬矣若仍以南至為冬北至為夏則冬夏不能相反而又冬畫長而熱夏畫短而寒矣吾蓋為之反覆推求深奧其言之一當於理而終不可得也凡為渾圓之圖則南北中三道應作三規或作黃赤二道則當形如連環始得渾圓之理若衡畫三線則止為半面球形此最易辨者也今按其圖橫畫三線則大浪山與中國俱在半球之內初非對待而六大州亦俱在半球之內則非全園是則地球之為謬妄彼已親口自供左證具在即欲為之平反而不得也
