body:
  text: 經傳晦朔考附日食共四十三條夏書季秋月朔辰弗集于房曆指云唐云術曆作仲康五年癸已歲九月庚戍朔日食五房度元搜時曆宋稱是年庚戍朔交定二十六日五千四百二十一分依此得太陽尚距交前約九度新法亦推淂九度二十三分然皆中會時平行𠰥現會時實行則交常度為五宮一十八度一十七分因淂實距一度餘在陰曆木食距加減時限即黃平象限東甚遠必淂時蓋多氣曆差及少因氣差止一十六分為實距分所減餘視距四十四分乃并日月兩半徑淂三十一分三十三妙以較視距分尚不及則月不能掩日而癸已年九月庚戍朔絻無食定法癸已歲天正朔甲寅七九七一定氣甲二三二五戍月經朔庚戍一三定朔在書合交食限辰在古赤道房初度按夏書朔日不紀甲子亦不詳其年歲虞𠠎一行郭守敬等皆謂仲康五年癸已歲九月庚戍朔合交食限蓋本諸竹書也詩小雅十月之交朔日辛卯有食之用正十月朔曆指云辛卯日食令以法依本去順天曆西約減二刻考之是日定朔巳初三刻內一十分太陽實躔尾宮四度三十九分算以時差淂減一時三十六分乃淂食甚在辰初刻四分投時淂辰正四刻未推地經加減故于視會時淂實交周宮八度五十九分查表淂實距四十六分三十六秒減氣差一十五分一十六妙餘太陰視距在黃道北三十一分二十秒與內㬬半徑并相減
