body:
  text: 圖天中地中説古所謂天中地者不一其所有大地質中即天中也合水土之體言之自陸地之中專以圖石之體言之有與地之中以中國九州之地言之以天地真形觀之大地之體其形中規地包天內天圖則地亦圜猶孟圜則水圖也然亦四周際天處乃圖耳非如西衡地球之説易曰直方大又曰靜而德方疏家謂成大成小賦形有定蓋方以言兵德非言其形體也又淮南子曰天道曰圓地道曰方呂氏春秋曰精氣周復無所稽留故曰圜萬物類殊
  hash: sha256:bc039ed02eb30ea0d3b21efb63ed3a3ef906928432eb063d6730b6f1d3616b88
