body:
  text: 其虗度也邪即西曆初入中國之時其同整度亦云取其便捷而已何嘗謂是天道之固然乎今其全書具在可樂而稽何併其師說而昧之也是尚淂諉其過於九執乎或又曰古來曆家於四分之一咸有增損入宮戾數各有淺深自昔已然非為擾子何過之深也曰漢世不立歲差以星度係于莭氣故適莭氣過宮漢法乃是初氣通宮元枵之次或起女八此西京承載國之法或起女二此東都之法後人既明歲差之理知其弊必將有併宮次而差移者故魏晋以來第用其宿度古黃道赤道二法而不從其入氣也豈以精研曆術如西士者反鐘漢人之謬而識見乃出魏晋以來諸曆家下哉四分之一漢世以天周為歲終謂之斗分晋後以天與歲為二謂之虗分日躔有歲差歲實有消長則周度隨之故自漢造元互有增損然虗分可以增損而五度之全數必不可減也入宮即有淺深而丑寅之定次必不可易也
