body:
  text: 舊朔遲一分七六舊氣遲五刻四分六四乾元曆吳昭素造以五百八十八為日法一百四十四為歲餘三百一十二為朔餘起太宗太平興國六年辛已天正朔庚子三十五刻九十七分冬至丙午三十二刻二十五分定法經朔庚子三十五刻九十四分八六經氣丙午二十七刻四十六分七五舊朔遲二分一四舊氣遲四刻七十八分二五儀天曆史序造以一萬一百為日法二千四百七十為歲餘五千三百五十為朔餘起真宗盛平四年辛丑天正朔甲戍四十一刻六十四分冬至辛卯一十七刻二十五分定法經朔甲戍四十一刻六十一分七四經氣辛卯一十二刻七十四分五三舊朔遲二分二六舊氣遲四刻五十分四七崇天曆宋行古造以一萬五百九十為日法二千五百九十為歲餘五千六百一十九為朔餘起仁宗天聖二年甲子天正朔庚寅六十三刻五十六分冬至辛卯七十五刻定法經朔庚寅六十三刻五十四分三經氣辛卯七十刻八十一分四六舊朔遲一分七舊氣遲四刻一十八分五四明天曆周琮造以三萬九千為日法九千五百為歲餘二萬六百九十三為朔餘起英宗治平元年
