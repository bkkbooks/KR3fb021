body:
  text: 宿度分秒辨古法周天但分三百六十五度每宿分度各得整數並無奇零即四分度之一或附于斗或附于虛或附于尾而不併入于全數內者取其整而易算也宋之黃道始詳分秒然赤道猶用整度也至授時曆而黃赤道俱用零分矣凡曆家布算光用虗度算既定然後以宿度命之謂之實度夫以宿命度聊取記其位耳其布算之當深析毫釐者全在虗度若實度固無閞于算法之疏密也元初西域有扎馬魯丁者獻萬年曆其法但用十二宮分為三百六十五度併五度亦減之蓋就整之法此本非正理不過借以相形耳至于二十八宿之說皆若所不聞及推日月薄蝕願典天合則周天之度且有減其零數而就整併實度亦不之用者而用以推步又未嘗不合則星宿分度亦安用零分為哉合考其術或前宿餘分侵入後宿之初或後宿初分侵入前宿之度用以入算反多齟齬吾不知其和取于此邪若曰星象分列疏密不齊其分度安得一一就整故必詳其分秒始可得天象之真吾恐天象之真亦政未
