body:
  text: 趙緣皆曰物遠視則微近視則大當午之日如盛孟出沒之日如車輪豈非午日爲遠邪或疑午日熱爲近珠不知日久照則熱不可以遠近諭也至扵星度高升則密低垂則疎則天頂遠而四旁近固可知矣天體圓如彈丸地平不當天半地上天多地下天少然地平既在天丰之下而仰視止見用度之丰者天遠似乎低地平與之相妨人目不可盡見也按地居上下之中此説久錮人心而能獨出真解可謂力闢鴻蒙矣大地圖外圓爲天周每格極橫各于度四分太是爲真象之度內圓爲地周每格蜓摃各二十度弱是爲虛象之度圖
