body:
  text: 年之久而又謂茨扉始于有巣火食始于遂人榖食始于神農衣冠宮室始于黃帝夫之初生也織網以捕食蠶蛹之將化也吐絲以為衣蠭則有房螘則有垤以彼微蟲豈有所知識哉豈有所訓化傳習哉而各具其能者則得于性者然也曾是人為萬物之靈而二百七十餘萬年間從無一人焉其性能與微蟲相若者而必俟聖人焉以教之又十紀之中神聖代作亦無一聖人焉能光得後聖之所同然以教其民而必俟巣遂農黃始出而教之則太古之時民皆不火食五穀無衣冠宮室將饑寒露處何以聊生旦夕且不能自存其能度此二百七十餘萬之歲月乎吾恐生人之種子絕矣善乎崑山方氏之論曰義農去上古之世必不遠其年可千計而不可以萬計堯舜去義農之世必甚近其年可百計而不可以千計蓋深有見于衣食宮室之類為民生日用所以須斷不可遲之又久于二百七十餘萬年之後而巣遂農黃之前亦斷不容有如是之久也聖人復起不易其言矣
