body:
  text: 體甚大而目力短也請以雲喻之陰而之候重雲綿布仰視正高而平望數十里而外則低𡸁天末矣其數十里外之人仰觀亦復正高而還望此處則又低𡸁天末矣然雲之平布空中其去地遠近彼此相似初無高低亦非正圓而人目所見在在皆圓如覆釜上穹而四𡸁者是豈雲之真象哉遠不可極則似乎低目不可窮則似乎圓也此所謂虛象者是已若謂此即地球正圓之騐則數十里外之人便應橫立更遠數十里外之人便應倒立推而至於數百里數千里而外將何以通其説乎然人之目力既為有限而半周天內日月星宿又無不盡見者何與此三光之及人而非人力之所及也盖天體渾渝其日月星宿之光皆輻輳於虗圓之中人目所見乃空中吸入之象而非能實察其真象也汪子周載甞謂有一戲術可悟虗象之理貯一錢於空碗中置地上去人數尺以望之不見為度隨滿注以水則其錢究見矣盖為水所吸起而碗體正圓之故耳然所見者乃錢之光而究非錢之體也由此觀
