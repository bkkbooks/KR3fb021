body:
  text: 杜云月三十日食是也經又書六月辛已壬午戊子十月已丑庚寅以是法考之閏應二十八日而應閏丑月已朔淂丙寅有辛已壬午戍子酉月有已丑庚寅蓋七月乃九月之悮不書朔者失之後而食在九月之晦且明其有悮也𠰥必執為七月之朔則六月中安淂有辛已壬午戊子十月中又安淂有已丑庚寅乎本年經文自有明證非可誣也十年壬戍夏四月丙辰日有食之授時交分十四日九百六十八分入食限定法壬戍歲天正朔丁海八五九五定氣戊申二八六卯月經朔丙辰四五一三定朔在午前合交食限不書朔者宮失之也十七年已已六月癸卯日有食之已已歲已朔淂甲辰六七既不淂竄上癸卯且不入交限大衍授時曆謂經文有悮是矣然謂辰月合交限則又滿也失辰為子正五月月既不合而朔淂乙亥從與經書癸卯不合其疏甚矣今以定法長曆考之蓋七年六月錯簡于此而十字乃術文耳故聖人不書朔明其有悮也定法七年已未歲天正朔乙亥二二七無定氣壬辰五五二五已月經朔壬
