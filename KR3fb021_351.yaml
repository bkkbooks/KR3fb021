body:
  text: 即歲行率而四分之蓋盈縮在乎日而度則盡一也每氣中限度一十五度二一七八六一九四二五即歲行率而二十四分之盈中曆限自冬至至春分舊為盈初八十八日九九三六四二三一七縮初曆限自春分至夏至舊為盈末九十三日七一二二四六五三八縮中曆限自夏至至秋分舊為初同縮初盈初曆限自秋分至冬至舊為縮末同盈中入氣盈縮日冬至一十四日五二四七二七一八五九大雪同小寒一十四日六三二一五二二七一四小雪大寒一十四日七四四五九五九八九一立冬立春一十四日八六七九四二四八一一霜降雨水一十四日九九九二九六八七四四寒露驚蟄一十五日一四六四九四二九八秋分春分一十五日二八九五七四六一五八白露清明一十五日四二五一五七四一六九處暑
