body:
  text: 測經度説欲明黃赤道古今不同之故當於燕京閏陝同時測候取二地所得較其異同若何又求閏陝所測以驗古法燕京所測以驗元法則其果為視差之理或天象之變與測候之疏距星之異所以古今不同者乃可得一一而見非可空言懸斷也至于測候之法昔人論之已悉特未詳其時夫經星冬至為盈而夏至為縮如以二至候之則盈縮不齊必難得其當須於二分測之則行度均平庶可得其真更於四立之時參互考之以求其密是為得之此測赤道度之法也若夫黃道則因歲差日躔而移自不得必求合於古通其意而無泥其迹可矣
