body:
  text: 即髀徑而臧去天地相距之數其徑七十九度有奇四四七六八前圓圈內之弦徑八十三度四四六七八自天心下至弦折半得四十一度五二二三八四令地既下於天心四十三度五九八五三則下於弦二度七六一一九以之為法歸全弦之徑恰減四度天之覆於地上者二百七十八度弦四三載於地下者八十七度弱弦度一當弧度一度九九五五七故地徑七十九度而天之在地下者省八十六度八二也天上半為湯下半為滄東西二極適平兮上下之半出地四十八度弱乃陰陽之交果而日月所徒出入者也南北二極亦分天之半而北高南下北極出於交線之上二十四度出於地七十二度弱南極入於交線之下二十四度出於地下二十四度弱乃陰陽之樞管而經緯所徒旋轉者也唐史諸州測景林邑國北極高七十度安南都護
  hash: sha256:74f5df821b953999acd7ab3a6d1c75a71c8fa9f7b01b648f16273bcd00b32db9
