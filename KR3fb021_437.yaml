body:
  text: 亦不過二百八十餘世則年世遼遠𤁐自不得不增三皇之壽以實之三皇之壽既如是之美永而上元之年數無多則將無地以實簠之也又不得不增開闢之年以容之是二者交相為蔽也按三皇之號昉于周禮而不指其名史記載秦丞相綰有天皇地皇泰皇之議則先秦以前三皇之説猶未著也至漢儒始實指其名有以為遂人宓義神農者春秋甄曜度禮含文嘉風俗也通有以為宓義祝融神農者禮號諡記白虎通也有以為宓義女媧神農者春秋運斗樞也淮南于稱太古二黃蓋指義農而其間所敘事實則女媧亦在焉卻不云三皇而云二皇此不可解其所稱三皇者如是未聞義農壽有萬八千歲之永也於是洞神部謂開闢之後有初三皇中三皇而宓義女媧神農為後三皇三皇化而為九益汗漫而不可質矣又以人事言之飢之必求食也寒之必求衣也居處之必於宮室也凡屬有生即咸有是理性亦即當咸有是能乃説者既謂開闢以來十紀有二百七十餘萬
