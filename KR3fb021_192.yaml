body:
  text: 真象圖說天圖用三百六十五度四分度之一髀徑一百一十六度弦二六二六七六古說徑一周三不過其大略漢劉歆張衡陸續皆立新率求之未臻精密惟宋祖沖之以勾股法桑之謂徑一百一十五而周三百五十五其率最密今用此推之折半得五十八度強一三一三三八是為天心上下四旁相距均等乃六合之的也地包天內而渟于下距天心四十三度強五九八五三此以卧矩法望日月得之天心距東西極各五十八度強即用以為股減其四分之一以為勾則知地下於天心四十三度半強也增其四分之一以為弦則如日月出入之處去地面中心七十二度六六四一七二也天地相距一百有一度強七二九八四一即上地距天心之數又加半徑地厚一十四度強
  hash: sha256:3efda7ef0899359c05f54c2e68bd5c9bfbb48570c6971800a6f25f8b51040c6c
