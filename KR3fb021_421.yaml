body:
  text: 一周始終二萬五千九百二十歲天地開闢要必非一旦忽然而始也及其混沌亦必非一旦忽然而終也其始其終固當有其漸矣不見夫畫夜之道乎日出而盡而有前二刻半為旦日入而夜而有後二刻半為昏蓋陰陽之消息必以其漸也如是故一元之數四百五十六甲子有奇其初之十二甲子則造化之旦也末之十二甲子則造化之昏也其四百三十二甲子是為一周之數星躔之歲差氣策之消長皆從此為終始軋元同九故象四其九三百六十度而星躔亦三十六甲子而差移一宮詳歲差定法坤元用六故氣其六二十四氣此天地自然之運而一定之數而消長一變詳氣差定法此天地自然之運而一定之數也朱子語録間自開闢以來至今未萬年不知以前如何曰以前亦須如此一番明白來又問天地會環否曰不會壞只是相將人無道極了便一齊打合混沌一番人物都盡又從新起按朱子歲差用數為二萬一千九百十五年詳歲差用
