body:
  text: 止為半球而上面既有半球則下面亦有半球此又可意度而知則六大洲既全聚於上面將下面不復有山川疆域而生幽安從𨀉足乎下面既無人物而上面獨有人物則亦惟有上面之物之重心入於地心而下面無人物之重心以相距吾恐地球必將下墜矣若曰下面亦必有山川疆域但人迹不至不可得而知耳則彼國好遊何以經歷之豦所見所聞僅在半球之內而半球之外非特不可得而見并不可得而聞乎是則地形止有半球而半球之外必非人人之所能至可知矣非人之所能至即必非人之所能居又可知矣上下相為對待豦必須遠距半周天令中國見北極出地三十六度大浪山見南極出地三十六度按圖考之止距七十二度鳥得云上下相為對待作此欺人之語乎若論中國對待之豦勢必北極變為南極而入地三十六度南極變為北極而出地三十六度不識南北二極果否反易其位乎即曰南北不妨易位而日月又將出於右而沒於左矣可若何
