body:
  text: 甲午夏至有四百五十三日二七查火星行率應行二百四度二七從星二度順推得亥宮赤道危十五度十四度二八為終元夏至熒惑所躔度填星置前歲積加庚午土合應五十五日六二一五以土周率纍除之三百七十八日九一六餘三百日六三九三置原策反減之得七十七日四五二三為甲子驚蟄後四日合伏太陽入盈曆七十七日半弱應加二度三五六從古赤道歲差日躔胃九度順推七十九度八八三得鬼四度三度三八合伏自合伏至夏至有一百五日二四七查土星行率應行一十度一二從鬼四度順推得午宮赤道柳十度九度四一為終元夏至填星所躔度太白置前歲積加庚午金合應四百九十六草八六六以金周率三百八十三日九二六纍除之餘一百四十五日八九二二置歲策反減之得二百一十九日三五四為癸已歲大暑後五日合伏太陽入縮曆三十六日七二九應減一度四七七四從古赤道歲差日躔胃九度順推二百一十七度八七三得尾十七度十六度一一合
