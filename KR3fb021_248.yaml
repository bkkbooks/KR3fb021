body:
  text: 日遠近辨一日之氣猶一歲之運也冬月隂盛故涼夏月陽盛故熱春秋隂陽平故和一日之四正時即一歲之四仲月故日于出入時涼而正中則熱由氣非由遠近也或疑冬夏涼熱由日近人遠人之故夏日近人故熱冬日遠人故涼然夏日朝暮亦涼冬日午中亦熱又何解乎是以日之遠近必于大小斷之列子之説古今若聚訟然列子言小兒爭日之遠近一曰日初出大如車輪及中繞如盤盂此不為遠者小而近者大乎一曰日初出滄滄涼涼及其中如探湯此不為近者熱而遠者涼乎其是涼熱而非大小者固為偏見王充曰日中光明故小其出入時光暗故大猶書察火光小夜察火光大也至于論蓋天則曰今觀日入非入也以遠耳何以明之試把炬火夜行十里滅矣遠使然耳夫炬火近則見遠則且至于滅則近大而遠小更不待言矣充説多矛盾類如此
