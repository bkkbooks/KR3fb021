body:
  text: 月聚井實在四月因當時五步尚疎故又失先一月今即舊術推水土金水四星皆以殼雨後芒種前先後入躔于東井既巳不爽而歲星躔井乃在一歲之後可見其術之謬矣舊術甲午歲尚未能及井而竟諉為天象之變何以上攷春秋下攷太初反覆相求而確見甲午之夏實當在實沈不當在大梁乎舊術甲午四月在大梁之次幸而漢史之文昔人已曾辨明不然則必將執為十月即金水二星歲何不疑其亦為變形也邪今以新定率推淂甲午夏四月十八日丙午五星聚于東井凡五日火㝡先入土次之金又次之水又次之木㝡後至漢史謂從歲星而聚政以左旋言之也又歷志曰歲在大棣之東井二十一度首之六度也次盖指乙未歲首十月朔歲星所在之度而言夫十月朔在井二十一度則四月之躔井初確矣此皆本年之明證而具載於漢史者也彼為差合術之説者其能逭擾紀之罪乎漢元年前一歲甲午在第九紀之八章距章十七歲借次章推之天正朔淂辛酉冬至淂癸亥巳月朔淂已丑七日為小滿得乙未二十二日
