body:
  text: 中星為古赤道申正罰七度參七度之半日躔在古赤道亥正營室十二度十一度一八八七二六八五四帝堯八十一年甲子天正冬至當卯會之中上距平初一百八甲子星躔俱差過三宮當周天四分之一積差九十一度三一六五九七一七中星為古赤道酉正昴六度五度六二五日躔在古赤道子正虗八度七度七五一八四二八二二商王武乙二年甲子天正冬至初入辰會上距平初一百二十六甲子星躔俱差過三宮有半積差一百有六度五二九一三三二九中星為酉戊之交古赤道胃四度三度八四三七五日躔在子丑之交古赤道女五度四度五三三三九六九九五九漢武帝元狩六年甲子天正冬至當辰會之中上距平初一百四十四甲子星躔俱差過四宮積差一百二十一度七四七五四六二八九五九中星為古赤道戍正婁一度初度六二五日躔在古赤道丑正斗二十四度二十三度三一四九五三七九六宋太祖乾德元年甲子天正冬至初入已會
