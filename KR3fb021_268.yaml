body:
  text: 之定位陰陽之定候而惑亂之則其害豈但中於曆術而已哉然以其㒀傀而新奇也既足以供好事者之談資操觚者之動說而又當斯道幾絶之候尤足以欺人所不見微人所不知其不胥一泄而惑其說也幾希此天道人心明晦絶續之所開凡有志於斯者所不能已于辭也故敢不揣謭陋略舉其說以辨之亦彂墨起廢為西法之功臣非趟求疾樹中州之赤幟也或者問曰西士之至于中國也梯航之遠以數萬里計其所見之廣子孰與彼童而習之牡而行之羣萃而講求者唯此設科而取士者唯此其知之之熟子孰與彼而顧欲紏其失乎曰裕經綸之猷略者豈必取試于廟廊知稼穡之艱難者豈必從事于猷是故君子不出戶庭而道天下之故道通以理耳雍敬雖非其人哉然終不以彼之所見奪吾之所不見彼之所知易吾之所不知也
