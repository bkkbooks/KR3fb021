body:
  text: 不書者則皆其可以者也夫魯史相傳二百四十餘年之久其年月甲子錯簡誤文應亦不少聖人蓋明知其故而修史之體無追改當時年月之例故但削其日朔以示可超而待後人之推求也不然則何以凡書日朔者法多諧合凡不書日朔者法多齟齬哉𠰥或超定法之有未密非必經有錯悮則令之所推固不以定法律春秋而即以春秋證春秋試取經之前後年月上下推考則其錯簡悮文一一可見而聖人所以筆削之意乃悅然于百世之下矣是知曆之為道兼可以羽翼六經而經生家皆所當究心者也
  hash: sha256:93cd2fa6ea1e5155a7e411bc9a43be3a32893e9dd9d38ddee1b03e7ac6b85696
