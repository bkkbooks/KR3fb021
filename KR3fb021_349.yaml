body:
  text: 周太難虗度同于歲實加歲差分即經星周率也舊術以經星為天故今茲周率即舊術所謂周天度也消率三百六十五日二五六五九一一二二一減一分三八九蓋歲實有消長則經星與為消長故當以消長分加減之長率三百六十五日二五六八六八九二二一加長分一分三八九歲行率三百六十五度二二八五四七七二一此為一歲實行之數即周天虗度而減去歲差蓋分周率為經星之日率而歲行率為經星之度率也歲行消率三百六十五度二二八四八八二一減消分歲行長率三百六十五度二二八六八六六二一加長分今在長時故以下止就長率算冬至後其行疾比太陽日超遏一度強至春分積盈二度四零春分後以行遲而消其積盈日超過一度弱至夏至而適平夏至後其行遲比太陽日超過一度弱至秋分積縮亦二度四零秋分後又以行疾而消其積縮日超過一度強至冬至而復平此其歲行之大率也歲行盈縮限度九十一度三七一七一六五五
