  text: 張雍敬字簡庵秀水也善宣秝玉衡博綜秝法五十六家正秝術之謬四十有四成書一十八卷其說主中術為多裹糧走千里位見梅文鼎僞館授餐逾年於辨論考數百條去異就同歸宇不疑之地惟西人地圖如球之說則不合與梅氏兄弟及汪喬年輩往後辨難三四美善宣城遊學記
