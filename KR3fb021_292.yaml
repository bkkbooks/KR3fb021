body:
  text: 而不當以人母之所望為準今試訯身處於月之中以望日則日雖大而相去甚遠勢必杳乎其不可見矣日大于地一百六十五餘而從地望日以遞極而其小僅如盤孟若從月望日則更違四十八萬里將僅如盤孟之日兼已減而不見矣從日望月則月既小而相去愈遠更必渺乎其無所見矣日小于地三十八以遠四十八萬里而其小亦僅如盤孟若從日望月則更遠一千六百五萬餘里其僅如盤孟之月猶有可見否乎日月既兩相望而兩不相見則光將何從而借乎如曰日月之體小而至于盤孟則已為定體雖更極遠不復見小此于理數俱不可通亦始為之轉辭耳然地在中間則又在所必論也日月視徑皆約四寸月小于地三十八倍從地望之約徑四寸則天大于月三十八倍從月望地當大徑一丈五尺餘以一丈五尺餘之地在于中間而蔽四寸之日又安往而不蔽也邪此通于月食必不可通于借光者也日大于地一百六十五倍從地望之亦約徑四寸則地小于日一百六十五倍從日望地將不啻如織塵矣夫織塵之地又何足以蔽四寸之月乎此通于借光又不可通于月食者也故借光蔽地二者亦不可相通正不必傳會古人而曲為之解也
