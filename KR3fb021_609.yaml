body:
  text: 帝王年世術家之言歲差者必據古來帝王年世與當日所躔之實度孟非實度則歲差之分秒無由悉非年世則歲差之年限不可定也然則年世不實則所定之年限必謬而所推之實度亦不得其真斷斷如也夫帝王年世書傳各異必不可得實則古今之言歲差而從堯時為演紀之端者皆妄焉已矣是以歲差要道在乎立周法源三正也斯要既得則但以虗度算之而分秒自恚其當時之實度可以弗拘古今黃赤道不用亦改不可拘也但以甲子紀之而年限自定其古來之年世可以弗泥故前表止據通鑑前編取世所習知者以紀其數通鑑本諸劉外紀邵子經世書而二書又本謂皇甫譃帝王世紀其源繼出于漢志與世本也而春秋以上年世之未必真確者不復為之辨正以既得其要可無事于此也然猶懸或者執他書之年世為膠柱之見故略為拈破如左三皇天非無故而生聖人故聖人必應運而與然三皇代作未必適各距三十六甲子其元祀亦未必適
