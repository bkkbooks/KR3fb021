body:
  text: 云云乃用鄧平所造八十一分律曆復使淳于陵渠覆太初曆晦朔弦望皆𡪯密日月如和壁五星如連珠云云按鄉遂等言日月在建星原未嘗言在牽牛也古宿本用建星後易之以斗則建星即斗也詳古宿名自五康李奇妄謂古以建星為宿今以牽牛為宿外是七曜起牽牛之說與矣又言太歲在子則歲星自在元枵日月自在星紀原未嘗言七曜同起牽牛也考汲家書用日月起于牽牛之語乃周初天正合朔之度歲差日躔在女則合朔在牛矣然亦無五星字不得後以為據也淳于陵渠之覆謂日月如合璧五星如連珠蓋形容太初曆法之密耳原未嘗言丁丑之歲如是與上元甲寅如是也其謂上元十一月甲子朔旦夜半冬至日月如合璧五星如連珠同起牽牛之初者則書考靈曜禮合文嘉劉歆桓談應劭之徒誤看漢史之文耳何乃執此以為推上元之定理哉今試以歲差法考之凡四千六百一十七年日躔當差兩次則自太
