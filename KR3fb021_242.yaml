body:
  text: 亦有謂為天中者則銀漢自坤抵艮覆羃帝庭而黃河自星宿發源至直沽入海環抱古豫豫州實應上紫宮而十二次分野亦應于州國則渾天家之目嵩高為天中者要不為無所見矣一行曰天下山河之象在乎兩戒北戒則自三危積石負終南地絡之隂東及于太華北抵于常山乃東徇塞而至于朝鮮是謂北紀所以限戎狄也南戒則自岷山嶓冢負地絡之陽東及太華南逾江漢乃東徇嶺而至于閩中是謂南紀所以限蠻夷也河源自北紀之首北與地絡相會分而東流與涇渭濟瀆相為表裹謂之北河河源自南紀之首南與地脈相會分而東流與漢水淮瀆相為表裹謂之南河觀兩河之象與雲溧之始終而分野可知矣一行諸議非傳會古人矯誣天道此卓有真見絞固精于青鳥之術者也或又謂四海之外更有方域其大與中國埒者如神州赤縣四洲五洲之説地理志言四海之外有赤縣神州者九即鄒衍齊州之説釋氏四大洲詳地球辨
  hash: sha256:1fc7ffe79dd72e93c5a20f031eef2a8492c3e96d947cc2c0e5eb0221262442ca
