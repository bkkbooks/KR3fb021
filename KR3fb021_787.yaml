body:
  text: 伏度通一百一十一度三八查表淂女十一度三八為丁丑天正冬至歲星所躔度又推得土前應三十日二二一三合伏箕初度冬至箕五度火復應四十五日六五八合伏九十五度冬至女三度金前應一百五十一日五六九八合伏張二度冬至盧四度水前應二十五日三四三五合伏箕六度冬至虛二度五星皆近在五十度內唯火星尚伏其餘皆見此漢書所以有連珠之說而緯書七㬬同起之謬所自來也歲星率策分為古今之異且無論考之春秋其術之難嬌合也即據今率之起于太初其合應已先差矣丁丑之歲歲星在子漢書自有明文而世不淂其解則曷不即以漢書證之考漢初甲午四月聚于沈實之次至丁丑百有三歲除八十三年為超一次餘二十年從首順推政應在元枵夫甲午聚井丁丑在子其率本合而舊術合應乃在星紀據舊術推今庚午上距太初丁丑淂三百九十五日七六三為至後合應及減原率淂丁丑天正冬至前三日合伏于黃道斗十九度則七㬬同起之說有以深中乎其心故從星紀起率也歲星考證說
