body:
  text: 初三刻一百分正三刻一百分初四刻一十六分不盡六正四刻一十六分不盡六歲策三百六十五日二四二六三八八七一一消分策三百六十五日二四二四九九九七一一減氣差分一分三八九按授時曆正在消分中故其歲餘定為二四二五與新法久合可見授時法此諸曆中為密近也長分策三百六十五日二四二七七七七七一一加氣差分一分三八九今在長時故以下四條俱就長分算至策一百八十二日六二一三八八八八五五五時限九十一日三一六九四四四二七七節氣三十日四三六八九八一四七五九中氣一十五日二一八四四九七三七九五一元二萬七千三百九十有半歲歲積一千百十萬四千一百七十八日五千分
