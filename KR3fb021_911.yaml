body:
  text: 焉歲作解由未知九執立法之意也而右旋以立十二宮名首白羊次金牛次陰陰陽次巨解餘皆以次右旋冬至起摩羯大寒起寶瓶亦右旋而定十二月之日躔其過宮皆從中起歲凡十二月每月過一宮法無進退此互古不變者也故名為不動的月若夫月離合朔之度則有進退者也故名為動的月一指每月莭氣吉一指每月合朔言故皆名之以月九執分宮之意蓋如是何西士併月字之義亦未之能解而悮以為不動的辰次邪其實摩羯即冬至至大寒一月之名寶瓶即大寒至雨水一月之名但中曆冬至大寒等名指每月莭氣而言九執摩羯寶瓶等名指每月日度而言耳與中曆辰次之法蓋決不相䝉者也其摩羯與中曆星紀之次所以相合者因當時冬至日行政發自丑宮斗十二度也可見九執立法既本當時天魯又必求合於古人辰宿之法法不殊理實無悖使作於今日則必以摩羯當斷木可知矣然中曆之次從列象而分九執之宮從莭氣而定從莭氣者雖萬古不變從列象者因歲差而移中曆以實度為紀九執以虗度為用用虗度者宮無典于宿紀實度者宿必係于宮次取左旋宮位右轉立法不同故其名各異而其實亦殊不淂
