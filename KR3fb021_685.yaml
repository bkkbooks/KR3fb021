body:
  text: 朔餘起寧宗開禧三年丁卯天正朔戊寅三十六刻九十八分冬至辛卯一十二刻七十五分定法經朔戊寅三十六刻九十三分八經氣辛卯一十一刻一十分五九舊朔遲四分二舊氣遲一刻六十四分四一淳祜曆李德卿造以三千五百三十為日法八百五十七為歲餘一千八百七十三為朔餘起理宗淳祜十年辛亥天正朔癸亥一刻二十九分冬至辛已七十九刻七十五分定法經朔癸亥一刻二十四分五一經氣辛已七十八刻七十一分七舊朔遲四分四九舊氣遲一刻三分三會天曆談玉造以九千七百四十為日法二千三百六十六為歲餘五千一百六十八為朔餘起寶祜元年癸丑天正朔辛已二十七刻十二分九八冬至壬辰二十八刻二十五分定法經朔辛已二十七刻七十二分九八經氣壬辰二十七刻二十四分四八舊朔遲四分二舊氣遲一刻分五二成天曆陳造以七千四百二十為日法一千八百一為歲餘三千九百三十七為朔餘起慶宗咸淳七年辛未天正朔丙寅六十刻二分冬至丙寅六十四刻七十五分定法經朔丙寅五十九刻九十七分三四經氣丙寅六十三刻九十九分四七
