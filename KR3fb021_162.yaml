body:
  text: 日行恰得其正臨川吳氏曰天與七政八者皆動今人只將天做硬盤卻以七政之動在天盤上行古來曆家蓋非不知七政亦左行但順行不可算只得將其逆退與天度相值豦算之因此後遂謂日月五星逆行也譬如兩船使風皆趨北其一船行緩者見前船之快但覺自己之船如倒退南行然其實只是行緩趕前船不著故也今當以太虛中作一空盤部以八者之行較其遲速天行最速一日過了太虛空盤一度鎮星之行比天稍遲於太虛盤中雖略過了些子而不及於天積二十八箇月則不及天三十度歲星之行比鎮星尤遲其不及於天積十二箇與天爭差三十度螢惑之行比歲星更遲其不及於天積六十日爭差三十度太陽之行比營惑又遲但在太虛之盤中一日行一周匝無餘無欠比天之行一日不及一度積一月則不及天三十度太白之行稍遲於太陽但有疾時遲疾相凖則與太陽同辰星之行又稍遲於太白但有疾時
