body:
  text: 古今十二次分野不同表漢書淮南子史記壽星龍角角元氐韓角元鄭角元氐兖州大火大辰房心宋氐房心宋房心豫州析木龍尾龍尾箕燕尾箕燕尾箕幽州星紀斗吳斗牽牛越斗江湖牽牛須女越須女吳牽牛婺女揚州元枵天鼀虗危齊虛危齊虛危青州娵訾豕韋承𡛺營室東壁衛營室東壁衛營室東壁并州降婁奎婁魯奎婁魯奎婁胃徐州大梁胃昴畢趙胃昴畢魏昴畢冀州實沈觜觽參魏觜觽參趙觜觽參益州鶉首東井輿鬼秦東井輿鬼秦東井輿鬼雍州鶉火島帑桞七星張周桞七星張周桞七星張三河鶉尾翼軫楚翼軫楚翼軫荊州按上表陰尾箕分屬幽燕雖有小異亦不甚遠他如倲卓分度學浮風晋志俱初昏之象配入蓋舛錯矣惟一行以河山兩戒為言其理賴近然亦未醇故不具贅古今分野宿度入宮不同表圖
