body:
  text: 木在焉杓所建之右火土在焉衡所建之宿是為中星天運始終之所由著也而周天度數則首從斗杓而分日月星辰恚為斗綱所管攝故書曰在璇璣玉衡以齊七政天官書曰斗為帝車運乎中央臨制四鄉分陰陽定四時均五行移莭度定諸紀皆擊於斗也三垣五三垣之分上中下舉世所習間也抑知名之所自分由於上元天象乎今推上元太微在上紫微在中天市在下一一自有定位信而可微亦顯而易見何古今之求元者即三垣定象亦未之似及也邪四象六蒼龍朱鳥白虎元武四象世謂甘石所分然堯典已云日中星鳥則是上古之遺法矣夫天體旋運無一息之停安得有東西南北之可分今推上元而見四象確有定位是知古聖立法無不本於先天也辰次七子丑寅卯辰已午未申酉戍亥在地之方位一定而
  hash: sha256:2c125968398a493f1d0fb6d4ddb45c484cff2cca520a4126e1128931a05c067d
