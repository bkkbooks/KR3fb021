body:
  text: 日光盛衰説月之光有盈虗日之光有盛衰月之盈虗以晦朔弦望而遷日之盛衰以畫夜朝暮而變蓋陰陽之屈信消長其理一也若謂月有盈虛而日無盛衰是陰則有屈信消長而陽則常信無屈常長無消也豈理也哉今觀日之初出其光甚微漸升漸盛至午而極及其吳也復漸微如日之初由地上所見而推之則出前入後光必更微至于子中光必倍開蓋可知矣先儒曰終古不易光景常新此之謂也終古不易是言其魄光景常新則盈虗盛衰之謂也或超日入地而暗則月將何所資以為光邪此月明為借光之説曰此正月之所以能曜其光也試觀上下弦前後日月並麗于天而月不甚明者奪于日也逮日沒而月始明馬則月之明正日暗之驗矣蓋日月迭為明暗正陰陽之互為屈信消長耳此非空言懸解也請再以日光驗之未沒以前半周天內皆明使其光不減則日雖汲而午位以西之天猶當如日中之明蓋
