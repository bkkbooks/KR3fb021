body:
  text: 表淂元黃道室十度七七於驚蟄七日合伏則癸未之歲已先在室也金星置歲策減章首金應三百五十三日七三九一餘一十一日五三六加步斗虛度通七十八萬八三查表淂元黃道斗八度七一於至後合伏距室初五十八度七三應行四十六日強於立春十四日入室而水十四日入壁水星置歲策減章首水應八十日六三六餘五十二日八八七一加步斗虗度通一百二十萬二一查表淂元黃道虗八度六於立春九日合伏距室初一十七度三五應行八日半強於而水三日入室雨水十三日入壁按此條正月甲戍後乙酉前聚九十餘日乃近騐之最確者
