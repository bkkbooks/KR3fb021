body:
  text: 全一日則子亥者又一日之定界而始終之全數也若越其定界而推之則子之前復有亥亥之後復有子上下百千億萬日而無終窮矣由此觀之則推一日之數且不可越其定界況推上元而可不知定界乎夫日月星辰炁朔甲子一周此造化始終之定界也舍此而侈言其數其亦知旦昏子亥之為一日定界否邪且彼既能遠遡上元于千百萬年之上則元遠而差分必細其所定之法將永垂而無弊矣乃其法酉立而騐之天行皆不數年而輙差夫不效于數年之後而所云千百萬年之前反足信乎此其誕妄有不待辨而決者若或疑今茲所推其數太近則試自今遡而上之五帝之事若覺若夢盖已遙遙矣又遡而上之三皇之事若存若亡益更遙遙矣則前此有萬餘年之乆固不得疑其太近今在已會之中于一元之數纔過十分之四則後此之日月方長何尚存乎見少邪且夭造化始終有一元之乆而吾人寄身宇宙盖不啻蜉蝣之於龜莫也而有田地之不永不亦過乎
