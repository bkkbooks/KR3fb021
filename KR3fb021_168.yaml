body:
  text: 三日九十刻二十六分而與太陽同周五百八十四次弱水又遲於金亦每日左旋而常或不及一周然有疾時疾遲想準亦與太陽同積一百一十五日八十七刻六十分而與太陽同周一百一十五次弱太陰之行最遲亦每日左旋而不及太陽一十二度有奇三六八二積二十九日五十三刻五分太九三八八而比太陽少周一次此其大率也若夫同為左旋而其行有疾有遲者以天行甚緊近於天則氣之相攝也急故疾遠於天則氣之相攝也緩故遲此經緯之疾遲所以遞相殊者因乎九重之高下也至於五星之遲留伏逆則又因太陽之遠近衡合耳然蓋經緯之各有疾遲者本於氣而疾遲之中又别有疾遲者感各於太陽也是以三合而留者得陽光而氣盛故與經星同疾對照而逆者得陽氣之極盛故疾遏於經星蓋𤲢為次疾逆為𡪯疾遲正是疾疾正是遲與算法實相反也大槩金水二星遲於太陽是其本率而因太陽以為疾土木火三星疾於太陽亦是其本率而因太陽則更疾矣實皆有順而無逆有進而無退也
