body:
  text: 非在角七八度之間何以斗分從此而起則亦本諸上元天象也法推得上元七政日最在前躔參旗二度而北斗魁枕參醫所以包其前一度餘火最在後躔角六度二杓搗龍角所以包其後角六度至七八之交亦一度餘故斗分從此起也若必泥杓所建之度如舊經元四度大衍角十二度授時角九度則魁亦何能枕參哉按天宮書所言北斗之象乃東西橫列平看故能色攝七政若主入慶言也且夫天之數九為老陽七為少陰故其用常以七大衍之數四十有九此以七自乗也載攷厭象文曜麗乎天其動者七斗運于中其數七四象布于方亦各七南斗為中星其數七而占度亦七是以斗分所起其前亦剩七度也若然則斗分似宜順布而右矣何以逆布而左乎盖自角七而角六以右為順者乃天道之本然自角八而角九以左為順者則暦家之起算也從角八度初分起辰中順布三百有四度三七五得星七度六度三七五為古赤道之午正得張二度一度三七五為古黃道之午正
