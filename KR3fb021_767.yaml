body:
  text: 虛度五十度水起亦盈虛度二百三十一度雖上下千萬年皆一定而不移土木雖與歲差俱移而又不得盡合于法木星約八百四十二年而差一度八百四十二年歆歲差一十一度八六度命為日是於木星庚率為差一度也土星約二千八十九年而差一度二千八十九年該歲差二十九度四二度命為日是於土星度率為差一度也至於火星舛戾彌甚則以其度率過強也火星周率七百七十九日九二九除一歲策餘四百一十四日六八六五即為行率而盈縮總度乃作四百一十四度六九四差三十九秒又不得與本土同例故益覺舛也夫五星經緯行度必皆有其所以然如經度之疾徐㽜逆皆由距日之遠近而然此定理之可見者也至於綿度之盈縮起當既不從日又不從天既與可指之位又無可程之候或定或移或遠或近反覆推求總不能得其所以然之故天道雖自不齊亦何至散𠃶無紀𠰥此哉盖法數不真則定理自無從見也於是改定新率一皆即日為度而曆率則用歲周使七政均同一例則盈縮起皆隨歲差而移法數既真定理自見雖其起霥或遠或近各不相謀而皆得其所以然之故定理既得則曆率又為筌號而易簡之法出焉爰敢著為定數以為五步之㨗法云
