body:
  text: 日應加二度三七從上元日躔參旗二度順推三百五十五度九一得𤲢六度古赤道昴五度九二為合伏度查火星行率合伏前三百五十六日弱應行二百一十五度二從𤲢六度反減得辰宮赤道角六度五度七二為上元冬至熒惑所躔度填星置前歲積減去庚午土合應五十五日六二一五以土周率三百七十八日九一六累除之餘一百四十七日六八六四得甲子歲立夏後一十二日半弱合伏太陽入盈末五十八日七八應減二度四從上元日躔參旗二度順推一百四十八度四九得尤初度末為合伏度查土星行率合伏前一百四十七日半強應行九度二五從尤初度末反減得辰宮赤道角四度三度二四位數上元冬至填星所躔度太白置前歲積減去庚午金合應四百七十六日八六六以金周率五百八十三日九二六累除之餘四百三十日六四三一減一歲策存六十五日四五得乙丑歲雨水後七日合伏太陽入盈曆六十五日半弱應加二度二一從參旗二度當退去歲差分順推六十七度六得注
