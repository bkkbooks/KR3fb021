body:
  text: 歲星星率用考春秋諸傳及太初合應更遠而盡于六千四百餘年之前無不竒合至于五星聚井先後入躔之間為尤密矣彼謂太初前當列用古率者視此為何如哉其自漢迄今歲星之迹將不勝考故但考五星同聚數條以略證新率且土火金水之率亦可從此消息焉而淂其真若夫博稽前史新率亦有不能盡協者非史氏傳訛則木緯之變行也即如班焉為古之良史而星聚猶訛為十月況後代之史乎變行之説術家恆借以自欺雍敬雖不敢效尤然不可謂其必無變行也故考古但以合多見密更以合其所可信者為密固不能求其畢合亦政不可求其畢合也若夫孰為可信孰為可疑孰者必當求合孰者不必求合此又存乎其人之識矣五星聚東升五星聚升漢史係于冬十月蓋以此為高祖入之應故係于乙未歲首秦正建亥故以甲午之冬十月係于乙未也其實非十月也北魏高允謂金水二星附日而行十月日躔尾箕金水何得背日而馳於是崔浩推之謂在前三
