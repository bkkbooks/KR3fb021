body:
  text: 秀水張雍敬著經氣說天運微妙非可一法求故曆中震條莫不先立經法以淂其大槩而復為加減之以求其精密如月法之平行度既立矣而必以疾遲加減之然後晦朔弦望之法始定五星之段目既立矣而必以盈縮加減之然後運留伏逆之率始真薄食之交限既立矣而必以時差里差定限定度加減然後食分之多寡加時之早晚始密然則治曆未有不同加減法者矣即以日法論之節氣有入氣差黃道有盈縮差凡於推步何者可以一法求而獨於氣策欲以一法盡之乎夫日法為曆事首要而歲實先不淂其真則屢修屢變而終失之疏也又何怪焉茲于日法先立經氣猶月法之有經朔也後用消長差以為定氣猶月法之用加減差以為定朔也定氣非經氣不淂猶定朔非經朔不淂也於是上窮開闢下究終元中取證于古今諸曆以定歲實歲實真而曆之要領淂矣
