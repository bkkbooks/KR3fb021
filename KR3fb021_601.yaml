body:
  text: 前表第五層交纏甲子者所以紀虛度也不與實度同如九十一度下紀庚寅蓋自平初至帝嚳庚寅凡六千三百八十六歲其前差過九十度至此初起第九十一度也蓋虗度從整起算而實度則從零分起算也如衆星起星七度之三七五日躔起昴六度之六二五故退入實度之年恆與虗度參差不一因分紀于上下如九十一度下中星戊午年退入昴六度日躔乙未年退入虗九度自晉以前用古赤道元嘉以後用古黃道過度之年黃道與赤道同唯南渡後當用朱赤道以考古用者少故不之載下簡明表乃詳列之至元而後則接以授時黃道表中固已詳明矣下復作簡明表揭而出之以便考古之用凡四千餘年歲差之度古今黃赤道暌合之端可一覽而悉矣歲差實度簡明表若赤道而欲以改作黃道以推交食合伏查步斗表即得帝堯前九年乙未丙申古赤道虗九度九九一八帝堯六十三年丙午丁未古赤道虗八度九九一三夏禹攝位元年丁已戊午古赤道虛七度九九九仲康七年戊辰已已古赤道虛六度九九四少康前三年已卯庚辰古赤道虗五度九八九九帝芒思念庚寅辛卯古赤道虛四度九八九五
