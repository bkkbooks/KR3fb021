body:
  text: 三里三十六步此地之徑數也以勾股法乘之得一十八萬四千九百一十八里九十六步此地之周數也陸地之徑未可臆測自中國東南傳海西北主昆侖大約徑七千餘里自昆侖以盡西北濱海當亦如之自昆侖以窮坤艮二隅又當倍之其大勢固可約略而得然無確據不敢強為之說與地之徑六千七百二十里古帝王所治南交北朔東嵎彝即朝鮮西昧谷昧谷未詳其地當即三危積石之處孟三代以上甘肅滇黔俱未入版圖也縱橫當虛象二十四度故古有地體徑二十四度之說張衡乃混引為大地之徑則地徑豈僅六七千里乎其真象差一度則差七百四十四里大地之體當真象髀徑八十半度強見前用歸地徑五萬九千九百三里大得七百四十四里一九八此真象每度之里實也九重以內其徑即髀往八萬八千三十里周二十七萬一千七百四十七里
