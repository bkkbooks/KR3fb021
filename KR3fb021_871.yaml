body:
  text: 明白是必以建寅之月為春正月矣此政與周官月令相表襄祭享之用夏時即春秋時猶守其制固非與徵之說且自漢以来皆誣謂周正建子而此言猶用夏時其說獨異可見泛書必為古文而非王隱之所能偽楧矣春秋所書則不特改月而併改時此騐以曆術而見其信然盖交食為天道至信之理毫釐不容假借非可以旁引曲喻強詞取勝者也然則周初之與春秋其制固不同矣而説者乃欲比而同之則其言必多背謬而不可通夫周世三十五王歷年八百其間豈無更變而竟執一説而槩之乎故欲攷周初之制必以周初之文之事証之欲考春秋之制必以春秋時之文之事証之始各淂其實援春秋而謂周初為周正據詩禮而謂春秋為夏正皆未免于疎矣然春秋又非全屬周正也莊閔以前凡所書正月者皆為冬至後一月乃建丑之月僖文以後凡所書正月者即冬至之月則建于子月也此非特論説家所未甞知即曆家亦未之覺者唯姜岌有言曰因春秋日食而攷其晦朔不知當用何曆歷序曰孔子為治春秋欲退修殷曆而不遂則春秋宜用殷曆而考其交食與
