body:
  text: 用減平段入氣為一百一十一日一四五三用三倍減平度積為七十六度三二六從合伏平縮斗二十一度末順推淂古黃道奎二度之一五六於清明七日入晨伏殷轂雨而次日入婁按火星于轂雨十四日入奎而土星已于春分十一日入婁土去火來先後差三十五日即用曆率推之水去火來尚差八日此豈五星之率有未密哉抑亦竇氏所言有未確也須知竇氏非有別術可以前知要不過即曆家率策推之耳五季諸曆術原未得密宜乎其不效矣或疑星有變行未可執常法而論殊不知所謂變行者乃天象既變于上而後人淂而知之耳若夫逆推將來則但知能其常豈能預知其變哉故曰竇氏之言未確也然至丁卯之戚從無人議其不效者何也世方以五星之聚為開國之禎祥將傳會之不暇又孰肯指破其謬邪五星聚于軫宋史孝宗淳熙十三年丙午歲八月乙亥朔五星聚于軫距第十紀之二十二章三年歲積一千九十五
