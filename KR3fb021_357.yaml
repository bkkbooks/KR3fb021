body:
  text: 周天度説天本無度度法由日法而立者也故周天歲實二者自應齊一漢法蓋然於理非謬但患在不知歲差以天周為歲終故法常後天至晉虞喜始分天自為天歲自為歲蓋取其易見歲差之數後人從之皆增周天而損歲餘其增損所差之分秒即歲差之分秒也此唯以天左旋日右轉算之謂是日不及天故周天之度增于日度若明乎日亦左旋則非惟不當增而且當減矣故前篇所著經星定法一以左旋步之使天與歲為一度法日法用而天與經星為二周天為虗度即臨川吳氏所謂空盤者也法無盈縮而經星為實度則當以盈縮法求之則庶乎理得而數真然左旋右轉之術沿蟄已久一旦欲去其宿習則於勢為難而自以考古則又舊術為便古曆既皆右轉則考古自應即以其法求之是周天實度之法亦未可廢也爰仍舊術以度周天二法並列唯明智者擇焉
