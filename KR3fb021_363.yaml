body:
  text: 易得也天行甚健凡一刻而西移三度半強流鈞弩矢莫喻其疾而區區測候之術謂信足以定其分秒哉古黃赤道傳用千百餘年至一行始改其四宿乃自宋至元法凡六改詳黃赤道不同説此就雍敬所知者言耳大抵宋法屢變不止于五也豈磨以前之天象不甚變至宋元而屢變邪即曰建都之地不同每因視差而變則宋之都汴固吳於漢唐之都閞陝矣此為東西視差而慶曆元豐同焉都汴何以亦不同與南宋都杬同異於前之都汴矣此為南北視而統天開禧會天同焉都杬何以又不同與良由求詳分秒則測難真而差訛易見故人任私智屢多紛更先儒謂古人法疏而得密後人法密而反疏此類是也斗建説開闢之始于為地中而斗杓指辰其魁枕參蓋三合成象也天道運行有歲差之理中星日躔移則斗杓亦與之俱移故上元冬至之昏指辰漸退而左則指邜指寅指丑指子令則指亥歷十二辰而一周之運終焉若夫十一月為子此干支所以紀月陰與紀歲日時用
