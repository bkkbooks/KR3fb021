body:
  text: 天皇氏平初元年甲子至秦莊襄王元年壬子天正冬至積距八千五百八年以歲差法七十歲九六六五二二六三八五歸之應退一百一十九度八八七五一四置步斗法午正起算虛度三百四度三七五減去象限九十一度三一二五係古赤道象限蓋步斗法午正乃平初之冬至中星星躔相距四分之一故應減去一象限也又減去上歲差數餘九十三度一七四九八六查步斗表得古赤道斗二十六度查表中積度為斗草五其不全度為斗草六即歲差度也下俱放此西漢太初曆冬至日躔在古赤道斗二十四度漢書言太初曆日月在建星則故明其為斗矣建星即斗詳漢書辨其謂起于牽牛者則緯書之謬而後人因而誣之耳平初甲子至漢武帝太初元年丁丑天正冬至積距八千六百五十三歲應差一百二十一度九三七三一置步斗虛度如前法減去象限及上歲差數餘九十一度一三一七六九查步斗表得赤道斗二十四度東漢元和曆冬至日躔在古赤道斗二十一度
