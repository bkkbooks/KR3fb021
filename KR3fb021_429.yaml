body:
  text: 三億八千三百七十六萬八千五百三年岌大倫曰授時曆法雖起至元辛已而不以辛已為暦元其法以七千二百五十七萬六千為一元之終平分天地人三元每元計二千四百一十九萬二千自太乙甲子至嘉靖四十三年甲子已五千二百九十五萬八百四十年矣是天地二元已過今在人元後此止有一千九百六十一萬七千六百年是以太乙甲子為暦元也今辛已為暦元者暦家以世遠難竞故截去始元而用之耳今舉造化始終僅止二萬七千三百九十餘年多寡懸絕夫物莫壽于天地而果如是之易量乎曰雍敬非不知昔人所推動以千百萬年計也但因象以起數因數以騐象象數合而理出乎其中則天地始終之界限昭然矣昔人推之自多雍敬推之自少非求為異實不敢同今夫日出于夘莫不知為旦沒于酉莫不知為昏自旦至昏而成一畫則夘酉者旦昏之定界而一畫之終始也自夘以前推而上之至于子而止自酉以後推而極之至于亥而窮自子至亥而
