body:
  text: 持此觀月則千倍大於常視金星大似月其光亦或消或長無異於月利氏所言似乎從數而得然數起于象必見真象而後有真數如天體九重外寬內窄日月星宿近大遠小雖理所固然而要必遠近先有定憑然後大小可以數測彼謂地球正圓無分上下則天地定象且顛倒莫辨矣更何以言束若舍象而僅言數則數亦何定之有假令引而近之謂地心至月天二十四萬餘里則九天皆可使之倍遠而日可使之倍大或推而遠之謂地心至月天九十六萬餘里則九天皆可使之倍近而日又可使之倍小此以天合我之數而非以數合天者也原其意祗因月之借光疑地在中間有所障礙故推日月而遠之隘地球而小之使月小于地地小于日而又計其道里遠近使大者遠而見小小者近而見大於是日月雖大小懸絶而視之則齊一矣地雖在中間而日大于地一百六十餘倍則不能障礙矣以此通借光之理亦誠費盡心思而抑知其不必然也夫陰陽之理一氣妙合相感以神豈
