body:
  text: 間猶未真也授時承明備之後似應淂其密矣而行之未二十年日食已有不效者歲宗大德三年八月朔應食而不食況三百餘年後乎蓋盈縮過強交限未的故加時恆失之後食分恆患其多也今以西術較之蓋稍近矣然司曆以來四五十年間其合者幾何事不合者幾何事在西士必歷歷于曾中也使于此而益精之有不難掩唐宋元明諸術家而上之矣戴銂曰春秋二百四十年日食止三十六漢四百二十六年而日食一百二十五唐二百八十九年而日食九十三昔人謂古時日食少後世日食多其信然與曰天貞恆古今不爽前何以少後何以多哉蓋春秋之世法無預知則陰晦之天有不及覺者矣交分無多有不能察者矣晨昏帶食有不及候者矣而又視差有遠近不同則他見食而魯國不見者又在所不書是以少也即如南北朝之時南自宋武帝永初九年至練後主禎明二年北自魏明帝秦常五年至隋文帝開皇八年此一百六十九年之間南史所當日食僅三十六而北史
  hash: sha256:9d95258f9ce0f7f130b87f9032b89a41bfe8604db5884c4d6d596f2a71729734
