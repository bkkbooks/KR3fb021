body:
  text: 日七二七九天正朔淂庚辰冬至淂辛丑八月朔淂乙亥是年經國應為六月故遲十朔而淂八月朔三十日丁丑為秋分歲差日躔在宋黃道斗三度二九淂步斗虗度七十二萬九七歲星置前歲積加章首木應二百一十三日五二七七纍除木率餘一百一十二日六六五一反減原率得二百八十六日一九八四用加步斗虗度通三百五十九萬一六查表淂宋黃道角初度九一於秋分十日合伏上距乙亥朔一十二日應反減二度七五淂軫十七度為乙亥所躔度火星置前歲積加章首火應一百三十九日七九九除一火率餘四百五十五日五八八反減原率淂三百二十四日四二二用加步斗虛度減一周策存三十二萬一四查表淂宋黃道房初度七六於立冬四日合伏上距乙亥朔五十日弱應反減三十六度淂角四度初為乙亥所躔度土星置前歲積加章首土應一百四十二日四八七七纍除土率餘一百三日九四八反減原率淂二百七十
