body:
  text: 日冬至日月同元故古法步月始于三日不起于夜中而起于初昏從所見也若夜半則月已沒矣若夫月法之始于朔者乃後人之曆術安得執此而致疑天之定理哉夫月之合朔猶五星之合伏也試觀五星合伏之率于開闢時必不能皆適周其率而無餘分如木星前合應在癸亥天正大雪前三日火星前合應在壬戍霜降莭土星前合應在癸亥立夏前一日金星前合應在癸亥大暑前三日水星前合應在癸亥霜降後七日則五星周策何一不出于開闢之前而説策之起于前三日又何足異邪且天地開闢必以其漸非甲子冬至以前並無日月星辰必至是始一旦忽然而有也𠰥謂六甲當始于甲子以前不應有零日要知聖人之作甲子亦不過於此主一箇果限耳所謂以前必無歲月日時可紀也則甲子天正冬至實為癸亥之仲冬甲子歲前何以有零年零時乎步斗四北斗之象杓橋龍角衡殷南斗魁桃參首此上元之象東西授列平看主入度言今推開闢之昏魁所建之左日月金水
