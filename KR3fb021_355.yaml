body:
  text: 一百九十七萬八三九八三七九五九三夏至一百九十八日五五一百九十七度八三罰八度七一二八六七二三二九九八二二五二五二五二四四五二百一十三萬五八二八七三三一小暑二百一十四日三七二百一十三度五井一十三度六五二四五一三六二一六七一九五七二七三八七五二百二十八萬二七六七三六一六九大暑二百三十日六二百二十八度二六井二十八度八六八八一五六六八七九二九一三七五五八六三三二百四十三萬四九五一八五一九七立秋二百四十五日六一二百四十三度四八栁一十度九四六八六八一三六四五七九一八四四八二七二五二百五十八萬七一三六三四二五四五處暑二百六十一日四二百五十八度七張六度八五四三一三八三八九二三二三六五三二二五二一五二百七十三萬九三二八三三二八三白露二百七十六日三三二百七十三度九二翼四度二八二一七三四一三五三九一五一四九六五二一五七五二百八十九萬一五五三二四二一秋分二百九十一日四七二百八十九度一三軫一十九度五四六二九六八八九三七六九七五三四一三百四萬三六八九八一四七五九寒露三百六日四七三三百四度三五七軫一十四度六二七三五九八四三二二三八八五八九六四二五三百一十九萬五八七四三五四九七霜降三百二十一日三四三百一十九度五七角十一度一二九一三二三二四三五一七九二五八二一三九三百三十四萬八五八七九六二三五立冬三百三十六日八三百三十四度七九氐三度八九八四五八九八三一三四二九六二七三五二一五六四三百五十萬二四三二八六九七三小雪三百五十日七一三百五十度一露二度七八七八五五八四八八二四六七七五四一三百六十五萬二四二七七七七七一一大雪三百六十五日二四三百六十五度二二尾六度一七六五六二七七七七一一八六八六六二一六四二五次耳冬至加時初分次年冬至起度初分箕三度四四四四二九八五虗度積者一歲平分二十四氣蓋古法也入氣盈縮積者乃隋唐以來之法在舊術為日行度而此為經星行率也歲行虗度積者在舊術為辰次分而此為中星日躔真數也實度積例者日躔歲差之度歲有差分法不可執故名之曰例云
