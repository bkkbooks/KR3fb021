body:
  text: 之有當者如九重高下之說又何為而亟取之也其說曰地與海本是圓形而全為一球居天球之中彼此相應故天有南北二查地亦有之天分三百六十度地亦同之天中有赤道自赤道而北二十三度半為北道據中國在北道之北日行赤道則畫夜平行南道則畫短行北道則畫長故天球有畫夜平圖列於中畫短畫長二圈列于南北以著日行之界地球亦有三圈對于下但天包地外為甚大其度廣地處天中為甚小其度猛地每度廣二百五十里則地之東西南北各一周有九萬里厚二萬八千六百三十六里零三十六丈上下四旁皆生齒所居渾淪一球原無上下蓋在天之內何瞻非天總六合內凡足所𨀉即為下凡首所向即為上不專以身之所居分上下也又曰以地勢分與地為六大洲曰甌邏巴曰剩未亞曰亞細亞曰北亞墨利加曰南亞墨利加曰墨瓦臘泥加又曰豫自春西浮海入中國至畫夜平線已見南
