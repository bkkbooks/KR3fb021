body:
  text: 古法凡三十有六有理數一定而萬古不易者渾天法辰次四象四時節炁甲子九章算法圭表壺漏是也有法不無損益而大綱不能出其範圍者日法朔法斗分即周天度盖天即星圖宿度星紀元法章法閏法刻法旦昏法小正時訓九道法五步法是也有理一而數則變者歲差實度中星是也有最為治曆之要而千古不傳者步月始于出庚步斗是月也有法不行于今而其理斷不知者古三正古三統是也有傳乆失真而在所當求者分野五德終始是也有為曆之法用而在于法數之外者明堂明令是也有於古為合而在今不可拘者斗建是也
  hash: sha256:95a52818fb99eb632b97a6b463ecc9c700d7860a4c9e82792b918ebca6855bd8
