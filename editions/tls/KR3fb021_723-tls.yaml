body:
  text: 歲星差合術辨五星之行自周以前未定其率盖聖人作曆袛以斂𠰥軋象敬授人時所重在炁而不在于推騐吉凶也春秋以絳列國紛爭始以察祥候星氣為急於是甘石纔覺次星有畱逆之變然于木土金水猶未察也史記天官書載五星行車其術尚疎以攝提㭲之嵅嵅陰左行在寅歲星右轉居丑盖以十二歲一周天為定率焉至劉歆三統曆始據春秋傳謂歲星一百四十年而超一次又謂歲有空行言多謬妄夫歆之考騐春秋日食于經書朔者如莊二十六年文十五年咸十六年襄十四年二十三年昭十七年二十一年三十一年定五年十二年衷十四年皆謂食在二日也史記天官書載五星行車其術尚疎以攝提㭲之歆曆追考春秋所書三十六食僅淂其一故杜預攷言今十曆以騐春秋知三統之家疎則其術已不合於經矣而所謂合于傳者又獨足信乎其炁朔之策亦既疎謬矣而嵅星之率又獨精密乎何承天謂三統法方於四分三百年輙盈一日今
