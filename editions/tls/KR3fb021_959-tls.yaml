body:
  text: 之行跡長圖如鵞卵盖因水星之見恒在地平旁近其占度潤故成此象也暦書言彼中暦家亦謂有天行長圖如夘者夫天體不圓不運以為長圃固非然其於潤狹之象則見之甚明矣是可見天頂度狹近地度潤乃中西所共見而近大違小尤中西之公論彼特地圖之説者即欲抹殺之而不淂也
