body:
  text: 二十章高宗始興十五年乙丑至丙寅六七四四九九五三一四三八七四八六三七五二十一章孝宗淳熙十年癸夘至乙酉二八七七二七五四九七八二九九八五一九一二五二十二章寧宗嘉泰二年壬戍至甲子八九七八六五六五八朔丁未四七二五六三四八五二十三章寧宗嘉泰二年壬戍至甲子八九七八六五六五八朔丁未四七二五六三四八五二十四章寧宗嘉定十四年辛巳至甲辰一一八一四二七七六朔丁亥一六二一二二一七七八七五二十五章理宗嘉熙四年庚子至甲申一一八一四二七七六朔丙寅八五一六八四七二五二十六章理宗開慶元年已未至癸亥七二八二一二五八五朔丙午五四一二四五八三六六二五二十七章宋帝祥興元年戊寅至癸夘三三八四一九八九四朔丙戍二三八七六六六二十八章元成宗大德元年丁酉至壬午九四八五五八三六三湘乙丑九二三六九四九五三七五二十九章仁宗定佑三年丙辰至壬戍五五八六九六九一一二朔乙巳六九九三一三二四七五三十章順帝至元元年乙亥至壬寅一六八八三五四六二一二九九四九三一五四一二五三十一章順帝至正十四年甲午至辛巳七七八九七四一三朔甲子九八九五四九八三五三十二章明太祖洪武六年癸丑至辛酉三八九一一二五六三九朔甲辰六七八六一六八一二八七五三十三章太祖洪武二十五年壬申至庚子九九九二五一一一四八朔甲申三六八一七八六六四二二五三十四章成祖永樂九年辛夘至庚辰六九三八九六六五七朔甲子五七七四四七一六二五三十五章宣宗宣德五年庚戍至庚申二一九五二八二一六六朔癸夘七四七三二三一三十六章英宗正統十四年巳已至巳亥八二九六六六七六七五朔癸未四三六八六四一三三七五三十七章寭宗成化四年戊子至已夘四三九八五三一八四朔癸亥一二六四二五九五九七五
