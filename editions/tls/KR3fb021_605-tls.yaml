body:
  text: 惠王十五年已未古赤道牛五度九九四六定王十六年庚午古赤道牛四度九九四一景王二十五年辛已古赤道牛三度九九三六貞定王二十年壬辰古赤道牛二度九九三二安王二十四年癸夘古赤道牛一度九九二七赧王八年甲寅古赤道斗二十六度九九二二秦始皇十一年甲子乙丑古赤道斗二十五度九九一八漢文帝十四年乙亥丙子古赤道斗二十四度九九一三武帝太始二年丙戍丁亥古赤道斗二十三度九九八成帝陽朔元年丁酉戊戍古赤道斗二十二度九九三光武建武廿四年戊申已酉古赤道斗二十一度九八九九安帝元初六年已未庚申古赤道斗二十度獻帝初平元年庚午辛未古赤道斗十九度九八八四蜀漢後王景耀思念辛已壬午古赤道斗十八度九八八四晋成帝成和七年壬辰癸已古赤道斗十七度九八八安帝元與二年癸夘甲辰古赤道斗十六度之九八七宋文帝元嘉二十年癸未改用古黃道斗十四度之四二八蒼梧王元徵二年甲寅乙卯古黃道斗十三度九八七梁武帝中大同元年乙丑丙寅古黃道斗十二度九八六六
  hash: sha256:8501c1d9708676ce8ed2a121cc50c9696d5adced3705bfc3936e3e4abba3a58a
