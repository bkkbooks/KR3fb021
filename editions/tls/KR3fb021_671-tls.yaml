body:
  text: 舊朔先二分二三舊無遲九刻九十六分二四唐戊寅曆傳仁造以九千四百六十四分日之二千三百一十五為歲餘起高祖武德九年丙戍天正朔辛卯五十二刻一十五分冬至乙已二十三刻五十分定法經朔辛夘五十二刻一十七分五八經無乙已一十三刻七十八分七五舊朔先二分五八舊無遲九刻七十一分二五麟德曆李淳鳳造以一千三百四十為日法三百二十八偉為歲餘七百一十一為朔餘起高祖麟德元年甲子天正朔庚戍九十刻七分冬至甲子四十五刻定法經朔庚戍九十刻八分八二經無甲子三十五刻八十一分五二舊朔先一分八二舊無遲九刻一十八分四八經緝曆蕓羅所上與麟德曆燦行乙已曆南雲記造以百分為日法二十四分四十八秒為歲餘五十三分六秒為朔餘起中宗神龍元年乙已天正朔壬午九十一刻一十九分冬至已亥三十九刻二十五分定法經朔壬午九十一刻一十九分七八經無已亥三十刻六十三分四六舊朔先分七九舊無遲八刻六十一分五四大衍利僧張一行造以三千四十為日法七百四十三為歲餘一千六百十三為朔餘
