body:
  text: 此周書謂夏數得天百王所同者是已至于商湯用師于夏順天革命改正朔變服殊號一文一質示不相沿以建丑之月為正易氏視聽此又借三正舊法以示𪔂革之象盖襲其文而殊其實者也今攷堯時冬至日短星昴以歲差法推而上之距三十六甲子中星在申天象中於申則地氣中於寅故於時建寅是謂人正而其君爲人皇氏又前三十六甲子中星在未天象中於未則地氣中於丑故於時建丑是謂地正而其君為地皇氏又前三十六甲子中星在午天象中於午則地氣中於子故於時建子是謂天正而其君為天皇氏質諸天道攷諸年世參諸傳記無不符恊是知三正之建古聖人本天立法所以欽若乾象敬授民時理本乎自然法居其至當也或疑曆法始于義黃未必剏于三皇之世則將謂太古聖人不知天道乎抑太古聖人承天子民無所事于欽𠰥授時乎曆紀等書言天皇氏始制干支以定歲之所在干支紀歲曆中要事故史記曆書備載之世謂宓
