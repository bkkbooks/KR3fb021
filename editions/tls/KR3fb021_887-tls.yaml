body:
  text: 二十九日少強而朔法乃有二十九日半強是氣反虗而朔反盈矣朔盈于氣則必有一月而淂三氣者此不可者一也古法月凡二氣初氣可以入前月而中氣必在其本月是謂正月所謂舉正于中也今一月而有三氣其淂兩初氣者猶可弗論若淂兩中氣將舉朔日之中氣以正名其月乎抑舉晦日之中氣以正名其月乎此不可者二也古法合氣盈朔虗而閏生焉三年一閏之間其閏前十七月此舉平朔言之若用定朔則常有先後一月者矣必有一月無初氣者仍為正月其應閏之年必有一月無中氣者斯為閏月盖閏前之月中氣比在晦閏後之月中氣比在朔是故閏無中氣也今一月而有兩中氣則前後必有兩無中氣之月而一歲且有兩應閏之月矣此不可者三也原古聖作暦之意要在置閏正時而已今其閏法既錯𠃶無章如是吾不知其治暦之意又安邪雖然此猶據古法以辨西暦耳我摘其非彼將自以為是我指其失彼將自以為淂是爭辨無已時也則請即以辛丑歲之暦質之辛丑冬十一月朔為冬至晦為大寒彼知冬
