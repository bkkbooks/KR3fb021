body:
  text: 一元炁朔章紀策數章歲十九一元章數一千四百四十一章零一十一年有半紀歲一千一百四十一元二十四紀零一章又一十一年有半章朔二百三十五一元正月三十二萬八千六百八十六閏月一萬千百八十七正閏共三十三萬八千七百七十三月紀朔一萬四千一百章歲積六千九百三十九日六一一三八五五九章朔積六千九百三十九日六八九五六一八二九三七五紀歲積四十一萬六千三百七十六日六八三一三五四紀朔積四十一萬六千三百八十一日三七三七九七六二五一元歲積朔積並見前一元紀法炁朔積應表初紀至甲子初分朔辛酉初分二紀至庚子四一六三七六日六八三一三五四朔壬申四一六三五一日八四三一一五八八二三七減一朔
