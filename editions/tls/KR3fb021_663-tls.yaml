body:
  text: 古曆無朔攷漢太初曆鄞平造以八十一分為日法起武帝太初元年丁丑天正朔甲子冬至甲子定法經朔甲午一十五刻六十七分九經無癸亥二十五刻四十一分三八舊朔移閏差一月蓋其法亟無朔分齊也舊無遲七十四刻五十九分三統曆刻歆造無分齊畧同太初東漢四分曆編訢李梵造盖古曆也起章帝元和二年乙酉天正朔壬午四十九刻八十七分冬至庚寅二十五刻定法經朔壬午三十一刻入十一分六經無戊子八十七克二分四六舊朔遲一十六刻五分九四舊無遲一日三十七刻九十七分五四乾象曆劉漢造以五百八十九為統法一百四十五為半分起獻帝建安十一年丙戍天正朔庚子八刻五十九分冬至癸亥三十六刻五十分定法經朔庚子八刻六十五分五一經無癸亥二十二刻九十五分四九舊朔先六分五一舊無遲一十三刻五十四分五一魏黃初曆韓翊造以四千八百八十三為統法千二百五為斗分即用軋象法惟小益斗分耳景初曆楊傳造以一千八百四十三分日之四百五十五為歲餘起明帝景初元年丁已天正朔已亥八十三刻四十分冬至乙巳九十刻二十五分
