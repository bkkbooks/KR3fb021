body:
  text: 史之言妄矣或超星有變行此盖水星獨盈而躁故淂聚于尾箕夫盈縮變行雖有之然水星時日而行極遠不過二十三度太陽白露莭躔軫十二度距尾初凡五十七度寒露莭躔角八度距尾初凡四十二度水星亦安能離太陽如是之遠而與諸星聚哉且木星即據舊術推之已于去年合伏于尾舊術淂二十九日八八為至前合伏于尾八度而乃去熒惑先至則史之虛妄顯見矣直不足信可也五星聚于金宋史太祖軋德五年丁夘歲三月五星聚于奎距第十紀之十章十二年歲積四千三百八十二日九一一六天正朔淂辛夘冬至淂壬辰二月朔淂已未六日甲子為春分三月朔淂已丑四月壬辰為轂雨歲差日躔在古黃道斗七度五淂步斗虗度七十六萬五歲星置前歲積加章首木應三百日六七七五累除木率餘二百九十六日九六反減原率淂一百二日七七二九用加步斗虗度通一百七十八萬八
