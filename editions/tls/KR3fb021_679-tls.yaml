body:
  text: 甲辰天正朔戊戍七十四刻九十一分冬至辛酉四十五刻定法經朔戊戍七十四刻八十八分七經炁辛酉四十一刻三十一分七四舊朔遲二分九三舊炁遲三刻六十八分二六奉天曆衙朴造以二萬三千七百分為日法五千七百七十三為歲餘一萬二千五百七十五為朔餘起神宋寧七年甲寅天正朔庚子五十四刻二十七分冬至癸丑八十七刻五十分定法經朔庚子五十四刻二十四分四八經炁癸丑八十四刻分九舊朔遲二分五二舊炁遲三刻四十九分九一觀天曆靈居鄉造以一萬二千三十為日法二千九百三十為歲餘六千三百八十三為朔餘起哲宗元祜七年壬申天正朔乙酉八十六刻五十二分冬至戊子二十四刻定法經朔乙酉八十六刻四十八分八三經炁戊子二千刻七十五分八九舊朔遲三分一七舊炁遲三刻二十四分一一紀元曆姚舜輔造以七千二百九十為日法一千七百七十六為歲餘三千八百六十八為朔餘起元符三年庚辰天正朔已已三十九刻四十分冬至庚午一十八刻定法經朔已已三十九刻三十六分七七經炁庚午一十四刻八十七分舊朔遲三八二三舊炁遲三刻一十八分
