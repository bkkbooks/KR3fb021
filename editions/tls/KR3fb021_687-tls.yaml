body:
  text: 舊朔遲四分六六舊炁遲七十五分五三元庚午曆即律楚材造日法歲餘仔全大明曆之舊起太祖十五年庚辰天正朔壬辰七十七刻五十四分冬至乙已亥二十八刻定法經朔壬辰七十九刻四十九分九五經炁已亥二刻四刻五十三分六五舊朔遲四分五舊炁遲一刻四十六分三三授時曆郭守駝造以萬分為日法二千四百二十五分為歲餘五千三百五分九三為朔餘起世祖至元十七年辛已天正朔戊戍八十七刻五十分冬至已未六刻定法經朔戊戍八十六刻二十七分八一經炁已未六刻六十三分三六舊朔遲一刻二十二分舊炁先六千三分三六明大統曆元統造其法同授時但稍增閏應起太祖洪武十七年甲子天正朔庚子八十四刻十三分八四經炁已未三刻七十五分定法經朔庚子八十四刻九十三分八四經炁已未五刻八十一分舊朔先一刻八十八分一八舊炁先二刻六分回回曆西城馬麻所作之九執曆也元世始東明初置回回料博士其後或廢或用起萬曆三年乙亥天正朔壬申九刻九十二分冬至庚子三十五刻二十八分定法經朔壬申一十刻二十一分二九經炁庚子四十刻二十一分六四
