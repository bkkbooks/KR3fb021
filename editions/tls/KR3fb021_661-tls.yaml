body:
  text: 百年之後曆省定法歲幾其是乎自漢至元曆經六十餘改而舊法遞見為後天於是術家亦遞指舊法為疎使果疎也則或出於先天或出於後天必當参差相襟者今曥攷古曆其前後遞減漸級顯然則天運日消與諸曆之數率以從天皆缺油可信然無有屈伸無一往不復之理故自元至今又進而加長知元之前為消元之後為長則由近察遞見往知来而一周消長之數無不可淂矣
  hash: sha256:a9e8a64e4963477fa73b5f6e10fd612f22244d181c813288faee557e30f54c98
