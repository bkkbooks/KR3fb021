body:
  text: 以真象每度里實乗髀徑見前得八萬八千三十里八五七六以勾股法乗之得二十七萬一千七百四十七里五二一天每重厚徑九千一百六十九里天每重厚一十二度三二四七九五六一以真象每度里實乗之得九千一百六十九里八八九太隂天徑九萬七千二百里七三八六周三十萬五十四里四五四一歸為度度潯八百二十一里一百五十三步分為度者以便栓見太隂之栏也下放此天每重既厚九千餘里則近內之周徑興傅外之周徑又有濶狭之兮故當折取其中以九重天徑之數加九千一百六十九里太即天隂天之徑數往當用倍加此不用倍者盖折取其中數乃兩箘半重也勾股法乗之即潯周數以周天度除之即潯每度里實下俱放此大陽天徑一十五萬二千二百二十里二四六周四十六萬九千八百九十六里六七二一歸為度度潯一千二百八十六里一百五十九步太陽天距太隂天凡三重法當加倍徑有兩端故用倍加以
