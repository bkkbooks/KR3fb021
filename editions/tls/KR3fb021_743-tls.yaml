body:
  text: 在合朔前後月當躔于西陸安淂曰月在天駟乎夫其言日月所在皆夘謬如此而歲在火之言獨不夘謬乎即其言一一可信而歲星果在火然歲陰之為已夘與否則經傳兩無明文即一行亦未之敢信也一行亦曰伐商之歲非是已夘置大初丁丑上距周初已夘一千十八歲歲積三十七萬一千八百十七日六三加太初後合應見前以古木周率累除之餘一百六十三日一五一四從歲差日躔女四度順數淂井水十九度為至後合伏度則已夘之春尚在實沈之次而未及火可見一行之術後謬執歲在星紀而於國語原不能合也徐國臣從行書以伐商之歲為辛夘而武成一月為十月之悮辨甚詳具見本言歲在星紀辨歲星之行劉歆之所據以起率者專在史墨越淂歲而吳伐之一語一行之所以傳會而證成之者亦全在此一語然史墨但言越淂歲初未甞言歲在星紀也攷古分野尾箕為越斗牛為吳吳越原分屬兩舍以星紀為吳越者漢人之謬也使同屬星紀則淂歲
