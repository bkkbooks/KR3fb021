body:
  text: 道書九霄曰神霄青霄碧霄且霄景霄玉霄琅霄紫霄天霄按此以色為別其青丹玉紫即九重蒼丹素元之序雖未一一符合而大意則不甚相遠也晋書漢郗萌傳宣夜之説云天了無質仰而瞻之高遠無極眼瞀精絕故蒼蒼然也譬之遠望黄山而皆青俯察深谷而窈黑夫青非真色而黑非有體也日月眾星自然浮生虗空之中其行其止皆須氣焉是以七曜或逝或住或順或逆伏見無常進退不同由乎無所根擊故各異也按宣夜之學漢末已絕然猶與盖渾並稱三家亦其論説自有足傳者在也今晋書所載雖寥寥數語而於七曜運行之理實淂其真但古今言天家各有成見主盖天則非宣渾主渾天則非宣盖故遺説雖存而往往為苣所抹殺大約耳食者多而具眼者尠也夫壁或省瑕而沙亦生金渾天豈必皆是宣盖豈必皆非乎
