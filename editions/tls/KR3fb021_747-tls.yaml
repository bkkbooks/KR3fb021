body:
  text: 三十五年間傳之言歲星者七除越淂歲外餘皆言次昭八年丁夘冬十月史趙謂在析本則歲陰在夘歲星當在析本其一證矣左傳昭八年冬十月楚師滅東晋史趙曰涷顓項之族也歲在火是以卒滅令在析本之津涷將復與若在星紀則自丁卯冬以至辛夘夏止二十三歲半豈遽超一次乎按歆謂百四十四年而超一次一行謂百二十年而超一次乃同焉歲陰在夘而歲星前在析木後在星紀未及二周已超一次何背謬𠰥斯之甚邪囊二十八年丙辰梓慎曰歲在星紀淫于元枵禆竃曰歲棄其次而旅于明年之次皆明乎丙辰之歲當在星紀而過于元枵所以為變也夫辰年在星紀則夘年當在析木其二證矣丙辰正月傳梓慎曰今茲宗鄭其饑乎歲在星紀淫于元枵元枵虗中也枵耗名也虗中而耗不饑何待又秋八月傳餑竃曰歲棄其次而旅于明年之次以害鳥帑周楚惡之
