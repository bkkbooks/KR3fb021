body:
  text: 秀水張雍敬著地理地也者合水土而爲言者也原夫胚渾肇形陰陽之氣旋轉不息則其渣滓搏而爲地土峙西北水歸東南西北爲陰故土結馬東南爲陽故水融爲氣克於地土載扵水人但言地爲氣昕載要須知地之內皆氣之昕克蓋氣者體物而不可還凡有形即有氣以克之試歡粟大之土入水必沈地內無氣爲克則水亦安能載之水秉扵氣氣即是天蓋涂形質天馀八重皆剛氣耳朱子曰地却是有空闞處天却四方上下都周匝無空閥逼塞溝皆是天地之四向底下却靠着那天天包地其氣無不通恁地看来渾只是天了氣却從地中迸出又見地廣處又曰康節言天依形地附氣昕以重椱而言不出
