body:
  text: 暦理一氣渾淪理涵於中是名太極朱子曰所謂太極者便只在陰陽裏所謂陰陽者便只在太極裏今人説是陰陽上別省一箇無形無影底是太極非也北溪陳氏曰理不外乎氣若説截然在陰陽五行之先便成理與氣為二物矣其動也陽其靜也陰纔動即是陽纔靜即是陰周子動而生陽靜而生陰二生字須善會各具體用互為屈信太極之體兼動靜至其為動為靜處便俱是用若就陰陽看則陰陽又各自有體用體用之不可兮屬於動靜猶不可分屬於陰陽也陽變陰合五生主焉其動靜也無待而變合也有候太極只在動靜處見得故先儒曰一動一靜之閒天地人之至妙非不動不靜亦非無動無靜若陰陽與五行則有後先本末之分矣故陰陽者一氣而異名
  hash: sha256:96cdaf3b5b270119844ee0aba24a873a30c7647c5c78f86c20a7117490a34e2e
