body:
  text: 三易周官太卜掌三易之法一曰連山二曰歸藏三曰周易答人掌三易以辨九答之名而不詳所自作杜子春以為宓義連山黃帝歸藏鄭康成以為夏曰連山殷曰歸歲周曰周易皇甫曰夏人因笑帝曰連山商人因黃帝曰歸藏文王廣六十四卦著九六之交謂之周易夫易之作于古帝雖不易知而宓義之易其卦首軋則人所盡知也子春乃曰連山宓義謬矣皇甫知連山之不可以坐宓義也於是移連山于㞺帝夫三易之先後即不易攷而三正之次序則理所可推也先儒曰三易之作合于三正則天正必首軋地正必首坤人正必首艮為可知矣𠰥連山作于笑帝將地正反在人正之後邪盖㞺帝一號烈山連烈聲相𠃶故因而誣之耳甞攷諸傳說烈山一作到山又載作應山賴山一作無作連山者於是世譜遂以連山歸歲並為之代號邪先儒又言周易氏連山氏盖悮信其說也則周易亦將為宓義之代號邪先儒又十周易取周吾義之義則并周字本並文王之國觀也夫三正三易天道之至微也先後之序不明則聖人所以更改之義不可淂而
