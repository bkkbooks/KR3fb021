body:
  text: 帝座十微垣帝座正指心宿故心為明堂布政之宮初昏向夘易曰帝出乎震是也戍亥則向辰已之間而斗杓則在丙已之位自此而右則七政序列焉故曰齊乎巺也至于子時則大火正當午位帝座向南為聖人南𦣽而聽天下之象故曰相見乎離也子時冬至地炁始聞故分野定于此時為聖人南面而聽天下之象天以午為中心故宿以二名而世人但以為象蒼龍之心者知其一未知其二也及寅丑之時移向未申為一陽既復之後則萬物資生矣故曰政役于坤夘時向酉則周歷半周天氣機已足赦曰説言乎兌辰已時則西沒于地離陽入陰故曰戰乎軋也午時向子正下潛地中休息無為故曰勞手坎也至未申向艮則一周運終終則復始故曰成乎言艮也然易之言帝但為天之主宰初未甞實有所指而據以為上元軋象者易之數虗故以神言暦之數實故以象言也天之有北極猶人之有心人之神藏于心則天之主宰何必不寄于象邪但不可執象而以為神專在是耳
