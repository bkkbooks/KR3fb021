body:
  text: 夫孔子則銂竊有疑焉雖不敢謂聖人之於天道猶或有所未知而古今儒者之於孔子則固已備極椎崇矣而要之不聞以知暦稱何也曰古聖作暦凡立法倚數悉本天元然傳以法而不傳以言也至夫子繁易明八卦之用即後天方位天象定位氣運流還真探造化之始使百世而下求上元者得于此取徵焉而悟暦道之真原則聖人贊易之功即治暦之能事也至如讀夏禮而取小正論為邦而首夏時月離畢而占晴雨之殊大西流而知司暦之過以此為聖人之知暦則猶其淺為者爾曰敢問孟子之於暦何如曰暦之數主于革暦之理存乎故日月代明四時錯行象有歲差氣有消長今日之暦必不同于前此之暦所謂革也日月有經四時不忒象差氣差推移通復而皆有一定之數今日之暦又未始不通乎前此之暦所謂故也盖就其已然之迹而言之則若見為革而求其本然不易之理則要之不出乎故也是以治暦之道可以一言蔽之曰求其故而已矣而孟子特言之則古今来得治暦
