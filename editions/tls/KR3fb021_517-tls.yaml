body:
  text: 旬周累除之餘四百八八五五一五八六六得戊辰日亥初初刻五十五分為中元甲午五月經朔應求終元日躔平初甲子日躔起留六度積四百三十二甲子歲差一周而復于其所下距元甲午尚有七百五十歲以歲差法見前推而進之應差一十度五六八三得酉宮赤道胃九度胃八度四九為甲午天正冬至日躔度加半周策得夘宮赤道氐六度五度八六為終元甲午夏至太陽所躔度求終元月離終元夏至壬午初昏刻距前經朔戊辰日八十八刻五分五一太凡一十三日九四四四四八太從夏至日躔氐六度反減一十三度三入盈末曆故應得元二度一度五六為五月朔旦合朔度再置前夏至距朔日之數為實以月平行度策見前為法秉之得一百八十六度四一從五月合朔元二度順推之得戍宮古赤道婁十一度十度九五為終元甲午夏至昏時太陰所躔度
