body:
  text: 法倚數必灼其始終欖其綱紀有一定之法可以垂之萬世而無弊者而故府典章散佚于東遷再厄于秦火精微之蕰蕩不復存自漢而降雖有哲王欲以正暦明時為敬天勤民之本而疇人子弟流為術數宴於本原其數日密其理日疎故旋改旋差而終不得其一定之法今聖明御極欽翼皇象法天地自然這運昭節宣贊化之功德栛軋元學符前聖是以徽緯應理鬼神效職和氣翔洽民杨阜昌化理之𨺚登三咸五此政天道昭明暦法將定之日也故敢述欺所學以俻葛蕘總以發明經史遺文與先儒緒論言必衷乎理數必合於天務求一定之法期為經遠之規庶幾於學士修明之責儒生考古之資或不甚相倍若天講求星氣推度機祥則術士之所為而刑綱之所禁固非所宜言而亦未之學也
