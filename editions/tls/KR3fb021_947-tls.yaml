body:
  text: 左行陰陽相錯而變化生也二十八宿為火水木金土法從四正之宮首日次月次五行一陰一陽相間為序日火木土為陽月水令為陰世但從角元起數觀之故無人能知其次序之義西術為土木火金水則以五天之高下為序也祿命以日月五行分屬十二宮即其序耳䘵命之術子丑属土寅亥属本夘戍属火辰酉属金已申属水從来觧者類多牽合不知即天象高卑之序也五星各占一重天土星最在上次木次火次金次水而人説體于地在渾天之下半截𠰥從地下之層次觀之則土星天最在下耳木火金水以次而上矣故其分属如此𠰥夫午未為日月之宮者午為先天之乾天為陽而主日未為後天之坤地為陰而主月也其世俗相傳但稱金木水火土者則以形體之大小為序也
  hash: sha256:1953d5550e7003f916765d81c4d566e05320cb1fad1f5f5a05842a9e52268988
