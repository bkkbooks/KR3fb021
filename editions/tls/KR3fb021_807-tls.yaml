  text: 合伏入曆分五十二日一三六一距合日分距晨疾初段四百四十三日九入炁分一百一十三日五四八七平度積四百七度九二六限度積四百一十四度五一二六合伏入曆入分併入限度積通淂四百六十六度六一二九六一除一周策餘一百一度三五六二二一截去六限餘十度四一五秉減分淂五百二七八分減積淂二度七七二為盈差分用加平段入炁為一百一十五日六二五九倍加平度積為四百一十二度五七從合伙平宿女十二度末除一周策順瑞淂古黃道壁二度之七四於清明十二日初入晨疾初段距奎初八強度強應行六日太於轂雨三日入奎水星置前歲積加章首水應五日五九四累除水率餘一百一日九反減原率淂一十四日七八六用加步斗積度通九十萬八三查表淂古黃道斗二十一度為後合度距奎初七十五度強水率合後應行九十四日於清明五日入奎清明十四日入婁合伏入曆分二百二十五日五三五七四七距合日分距長伏段九十八日一二六入炁分一百一十二日九一二平度積八十一度六二六限度積八十六度七九六合伏入曆日分併入限度積通淂三百一十二度三三一七四七除半周策存一百二十九度七三三八二截去八限餘七度九五五乘減分淂一千九三二分減積淂一度七六六七為縮差分
