body:
  text: 二十七年乙夘冬十有二月乙亥朔日有食之姜岌大衍授時皆以為十一月授時交分初日八百二十五分曆指交食考曰十一月夏之九月也新法惟淂定朔在已初一刻一十分食甚在辰初四刻內一十二分實交周庚五宮二十八度二十三分在陰曆實距分八分三十四秒與氣差一十六分五十三秒相減餘視距八分十九秒減兩半往并數查表淂食分七分六十三秒杜氏謂自文公十一年三月甲子至年七十一歲應有二十六閏今長曆推淂二十四閏通計少再閏按此年淂合周正初非失閏而謂再失閏者以夏正言之也文公以泰矣為周正矣若再失閏必當以戊月為正月矣然自文十一以来經傳之月日具在未甞有以戍為正月者非可誣也若又失閏以亥為正月則閏有焉然於次年必補之無七十一年內少二閏之事故大樂謂壯閏以前恒失一閏僖文以後恒失二閏則固然矣若謂文十一至襄廿七之閏失二閏乃時會左傳而言之耳又謂斗當戍是矣而猶在申四字部大悮盖在氏之言原與天象不合正不必為之觧也定法乙卯歲天正朔已夘九二九二定炁丙戍一四七九戍月經朔乙亥二三五一定朔在書合交食限經又秋七月辛已傳有五月甲辰丙午六月丁未朔戊申甲寅丙辰壬戍丁夘戊辰庚午壬申秋七月戊寅庚辰辛已壬午乙酉九月庚辰辛已今推辰朔淂戊寅已朔淂丁未五八二一午朔淂丁丑申朔淂丙子書合周正經書十二月左傳作十一月曰辰在申司曆過也再失閏矣劉歆以為辰在申而司曆以為在戍史
