body:
  text: 永元中冬至日躔在古黃道斗十九度四分之一漢書曰三統法至章帝時後天益甚晦或見月元和二年日月宿度皆覺寢移候者皆知冬至之日在斗二十一度未至牽牛五度晦朔強望差天一日永元中賈達始以石氏黃道規測冬至日在斗十九度四分之一按歲日躔有赤道黃道之別漢書原極分明而攷古者多未之審何也平初甲子至漢章帝元和二年乙酉天正冬至積距八千八百四十一歲應差一百二十四度五七九八六七置步斗虛度如前法減去象限及歲差數餘八十八度四八二六三三查步斗表得赤道斗二十一度至和帝永元十四年壬寅又越一十七歲應差二十三分九十五秒四九太置前虗度所餘零分四八二六三三減去上之歲差數餘八十八度二四三八四查步斗表得黃道斗十九度之二四三八四與所謂四分之一微差六十九秒者漢書袛舉其大畧也然亦可謂確合矣
