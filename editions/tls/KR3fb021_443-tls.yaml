body:
  text: 一十七年乾象以七千三百七十八年章蔀紀元有條有貫盖亦知以周法求天地之數者矣但共為數少而不足以該之且又謂炁朔分齊故未免于踈耳他如王朔之姜岌張賓劉焯等書俱詳暦家上元間則又兼推上元在內而元法始流于荒誕矣上元者上窮開闢之始以為起暦之端也有以七曜起牽牛者漢人是也而魏晋南北朝皆因其説有以七曜起赤道虗四度者一行是也而唐宋皆因其説有以上元為必始于甲子者王朔之是也而後此之推上元者皆因其説夫暦之所貴乎元者求日月星辰之所起以為積筭之權與譬之欲計百千萬億者其數必始于一也治暦而不知有元譬之欲計百千萬億而不知數之始于一者也故建暦之本必光求元元法得而後定日法日法正而後度周天盖求元所以定日法也若世之所推上元者吾惑焉日法既定而後推之則上元僅為暦中之餘事而非暦中之要事矣然且治治于此則意謂元愈遠而差分愈細庶幾可以乆行而無弊夫彼所定之日法其果無一
