body:
  text: 不易故可得以正名之𠰥天之辰次運轉不常何以亦有方位之分乎今推上元昏象則元枵在子星紀在丑析木在寅大火在夘壽星在辰尾在已火在午首在未實沈在申大樑在酉降婁在戍娵訾在亥天地合象自有一定是知辰次之分為古聖道法妙合先天朱子所謂惟天之火加于地之午位乃與地合而得失運之正者是也夫先天有定象古聖有定法而世乃有移易宮次者不幾誣天畔聖矣乎雲藻八雲漢之象從七星而起至于箕斗之間而沒黃河自星宿海發源至直沽入海皆自坤抵艮上下相應方但不爽故雲漢曰天河名提乎地也以地有黃河故河源曰星宿名從乎天也以雲漢起七星南故即古人之正名百物而在天成象在地成形之理著焉舊經謂起箕尾而沒于七星之南蓋不知天地相應之理故倒言之耳又騐之于象自天津而下復分一泒入天市吳越二星之間此則應于江者也盖行地莫如江河固當並著于天矣
