body:
  text: 辰次辨十二辰次為古聖道法自有曆道以来智者守焉愚者安焉莫之敢紊也西術自冬至行癸箕三度即為丑宮星即之次彼徒見虛而無定即以寅為丑以丑為子似亦無從質証者豈知古聖立法本諸天元乾象天之十二辰次配地之十二支辰上下桐應自有一定之理妙合天道自然而非漫為之名數者乎天元昏象虗危在北當地之子位命之曰元枵即天之子位兒由元枵為子而左旋定之則斗牛為星紀之次地支為丑尾箕為析木之次於地支為寅餘皆放此皆上下相應此天象之固然誠有不可淂而茶者也夫同一方隅而天應地殊其名者猶同一支辰而歲之子為困郭丑為赤奪若寅為攝提格月之子為辜丑為涂寅為陬也所以細為區別者乃聖人正名百物之精意使天地歲月各有所紀而不相𠃶法至詳而義至悉也孰意後人反因名之各殊致生督𠃶邪此盖出于聖人智慮之外者矣約畧言之其謬有四古昔命名盖有取義如亥之所以為娵訾者訾爾雅作
