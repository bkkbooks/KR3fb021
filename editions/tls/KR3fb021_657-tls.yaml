body:
  text: 九分相懸一十七刻二十七分盖自漢遠元皆當之消時已往者易見而之長時在泰定甲子以後將来者難察郭氏雖智亦袛能晰其已然而豈能見其未然哉故謂其下騐消一之非則可𠰥併上攷長一之説而非之則不可至于消一長一其數亦未能確合則曆理深微原未易遽淂其真數故曆諸法自漢迄今幾經修改而後宻近其剏立之初多未免于踈也故謂其消長之數未真則可君研消長之理而疑之則不可今因郭説而為之闡明使無差之法與象差之法並立則歲實淂其真而一定之法於是乎在矣
  hash: sha256:b847d3c0203e647c4191c129958febb723af15bd8917a8030c13af60dbc6ebb1
