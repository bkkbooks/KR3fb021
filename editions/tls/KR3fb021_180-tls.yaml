body:
  text: 以天之周度四分之每九十一度三一二五為弧度其圖中方徑每徑八十三度四四七六八為弦度是弧度一度一分弱當弦度之一也天頂之弧度又與北極之弧度異北極弧度九十一度三一二五折半得四十五度六五六二五而僅當矢度一十六度六八九五三是北極之弧度二度七分半當徑度之一也園度與徑度異以天之周度中分之得一百八十二度六二五為園度其園中髀徑即天徑也為一百一十六度二六二六是園度一度半強當徑度之一也髀徑之度又與地徑之度異地徑七十九度四四六七八而隐見常見天周之半則地徑一度當天之園度二度三一三九九也若以真象出地之二百四十八度四三筭之則地徑一度當天至園度三度一四二九二也而其間遠近盈縮更有不同則其數亦甚微矣而世之測晷候極者皆以天之髀徑誤為地之弦徑以天
