body:
  text: 生長日近故也秋冬零落日遠故也據黃赤道上下有三圈相對則上下東西固皆太陽所照臨者也若北面則惟夏至前後見日南面則惟冬至前後見日一歲之中而半歲殆知長夜將萬物何由仰坐而口上下四旁皆生幽所居理之所難道者也夫人畫而動夜而息彼將半年動而半年息乎一不食則飢再不食則應彼將半年食而半年蟄乎四則據地球周九萬里四分之則自地上面之中至西面之中為二萬二千五百里彼西士也赦即以中國至西面為例地厚二萬八千六百餘里其地心距地之四面各一萬四千三百餘里西面之中當平地對心橫看上面之中當高出地心正看則自上面至西面為路二萬二千五百里而高下乃差一萬四千三百餘里由此推之則凡行二百二十五便應低下一百四十三里行二十二步便應低下十四步矣此李潘風所謂直似梯級更無平地者也彼將曰地以漸而低下則人亦漸而斜立故地雖若有上下四旁而其實則但以人之所戴為上所履為下豦豦皆自以為地之上面亦處處袛覺
