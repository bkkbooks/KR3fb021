body:
  text: 上下無定形寒暑無定候矣夫金必指南水必歸下物之性也物之性即物之理物之理即天地之理也而謂上下無定形將謂天地無定理乎據其地與海圖有東泽西洋南海北海之名則四方且有定矣奚為上下反無定乎南為陽而主夏北為陰而主冬天道之本然也據圖北有水海則可知南海之為炎矣若曰此夏彼冬則極南之豦又當極寒乎一則據天下有六大州而仍別其孰為東西孰為南北則是地之平面而非圓之謂矣如謂之圓則必甌邏巴之西境即為南北亞来利加之東境而豦水海之北又為墨瓦泥加之南而後圖也然乎否二則人必響明而豦地球既圓則赤道以南之人必將以北為南矣南北阮已相及則東西亦必互易而彼處日月將見為出于西而沒于東乎彼將應之曰東西固無定鄉也然東西即無定鄉而左右必有定理則請易一辭以語之曰彼豦日月將見為出于右而沒于左乎三則太陽照而後萬物生草木向陽則菀背陰則枯春夏
