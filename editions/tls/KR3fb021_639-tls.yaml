body:
  text: 二十七章順帝永和三年戊寅至丙寅七三一六七五五四朔甲辰八五七九七九三五二十八章桓帝永壽三年丁酉至丙午三四二四五三六三朔甲申五四六六五九七三二八七五二十九章靈帝熹平五年丙辰至乙酉九五三八三八五七二朔甲子二三六二二一五六二二五三十章歡帝興平二年乙亥至乙丑五六五二二四八一朔甲辰九二五七八三三九一六二五三十一章歡帝建安十九年甲午至乙巳一七六六九五九朔癸未六一五三四五二二一三十二章蜀漢後主建興十一年癸丑至甲申七八七九九五九九朔癸亥三四九七五三七五三十三章後主延禧十五年壬申至甲子三九九三八六八朔壬寅九九四四六八八七九七五三十四章晋武帝始七年辛夘至甲辰一七六六一一七朔壬午六八四三七九一二五三十五章惠帝永熙元年庚戍至癸未六一一二一五一六二六朔壬戍三七三五九二五三八五三十六章懷帝永春二年巳巳至癸亥二二一三五三七一三五朔壬寅六三一五四三六七八七五三十七章成帝延和三年戊子至壬寅八三一四九二二六四四朔辛巳七五二七一六一九七二五三十八章移帝永和二年丁未至壬午四四一六三八一五三朔辛酉四四二二七八二六六二五三十九章海西公太和元年丙寅至壬戍五一七六八三六六二朔辛丑一三一八三九八五六四十章孝武帝太元十年乙酉至辛丑六六一九七九一七一朔庚辰八二一四一六八五三七五四十一章安帝元興三年甲辰至辛巳二七二四六四六八朔庚申五一九六三五一四七五四十二章宋蒙王景平元年癸亥至庚申八八二一八五一八九朔庚子二五二五三四四一二五四十三章文帝元嘉十九年壬午至庚子四九二三二三五六九八朔巳夘八九八七一七三五四十四章孝武帝大明五年辛丑至庚未一二四六二二七朔巳未五七九六四九二八七五
