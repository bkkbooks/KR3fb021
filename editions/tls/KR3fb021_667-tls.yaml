body:
  text: 舊朔先三分九六舊無遲一十一刻九十七分六一北魏正光曆李業與造以六千六百分日之一千四百七十七為歲餘起孝明帝正光二年辛丑天正朔辛未二十八刻冬至甲午七十七刻二十五分定法經朔辛未二十八刻三分七經無甲午六千六刻七分九三舊朔先三分七舊無遲十一刻一十七分七與和曆亦李業與造起東魏與和元年北齊天保曆宋昱業造以二萬三千六百六十分日之五千七百八十七為歲餘起顯祖天保元年庚午天正朔壬子七十六刻三十二分冬至丙寅八十刻五十分定法經朔壬子七十八刻三十五分一一經無丙寅六十九刻七十三分七六舊朔先三分一一舊無遲一十刻七十六分七九後周天和曆劉驚造以二萬三千四百六十分日之五千七百三十一為歲餘起武帝天和元年丙戍天正朔已夘八十二刻八分冬至庚寅六十八刻五十分定法經朔已夘八十二刻一十分九九經無庚寅五十七刻九十五分四三舊朔先二分九九舊無遲一十刻五十四分五七大象曆馮顯造以一萬二千九百九十二分日之三千一百六十七為歲餘起靜帝大
