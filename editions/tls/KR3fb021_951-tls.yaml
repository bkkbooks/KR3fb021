body:
  text: 見今從曆法推之易之作也必于平初甲子之世盖子會之中天正建子昏午中先天之軋位也故天皇之卦首軋歸歲之作必于太始甲子之世盖丑會之中地正建丑昏未中後天之坤位也故地皇之卦首坤連山之作必於太平甲子之世盖寅會之中人正建寅昏申中申亦坤位不可復襲乃取諸寅後天之艮位也故人皇之卦首艮其後夏承人正則連山是因夏之正易皆循前法商政地正則歸藏是因周用天正則易是因盖古聖之書卦作曆皆本天立法而理相符合後王之改正演易則剏制顯庸而文相附麗已耳連山歸藏二書不傳世所傳者宋儒以為司馬霄劉光伯之文此不必辨昔人又謂歸藏之易數用七八亦未足信要之三易其卦必同為六十四其爻必同為三百八十四其所以占玩吉凶者亦必同主乎奇耦剛柔動變特首軋首坤首艮之不同則隨三正而變盖天運用推移而聖人立法與時偕行也𠰥夫斯道之實則終古猶是矣
