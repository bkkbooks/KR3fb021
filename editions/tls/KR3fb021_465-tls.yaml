body:
  text: 周顯王二十二年甲戍立春三陽初運始于甲戍雨水终于将来二百四十六年之后丙子白露自是以往訖于甲午夏至六陽極而十二炁周則一元之運終矣具法以六陽之十二運為經以六陰之十二炁為緯中炁則始陽而終陰節炁則始陰而終陽盖推天地之數雖用其半而究陰陽之理自具其全也聖人作暦以明時無非順天以立法故時當一元之冬至則即以冬至為炁首時當一元之立春則即以立春為炁首與為推移與為通復不必改時亦不必改月而天運歲差已寓于曆法之中義甚精而用甚徵也今攷顓帝之時當二陽中運故其曆法以立春為元顓帝暦術曰天元正月乙已朔旦立春日月起于天廊營室五度漢董巴議曰昔宓義始造八卦作三畫以象二十四炁黃帝因之初作調暦歷代十一更年五千凡有七歷顓頊以今之孟春正月為元其時正月朔
