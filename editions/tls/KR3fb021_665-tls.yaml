body:
  text: 定法經朔已亥八十三刻四十六分經無乙已七十五刻一十三分五四舊朔先六分一舊無遲一十五刻一十一分四六晋太始曆劉智造即景初曆而改其名曰正曆起泰始十年太元曆姜岌造以二千四百五十一分日之六百五十為歲餘起孝武帝太元九年一日三紀甲子元曆甲申天正朔丙戍四十五刻三十八分冬至丙申五十五刻定法經朔丙戍四十五刻四十二分七五經無丙申四十一刻九十二分六九舊朔先四分七五舊無遲一十三刻七分三一宋永初曆永初元年改即泰始曆元嘉曆何承天造以六百八分日之一百五為歲餘起文帝元嘉二十年以而水為無有癸未兩水丙午七十三刻一十二分朔壬寅八十四刻八十六分定法兩水丙午六十刻八十七分朔壬寅八十四刻八十九分九五舊無遲一十二刻二十四分六五舊朔先三分九五大明曆祖沖之造以三萬九千四百九十一分日之九千五百八十九萬歲餘起孝武帝大明七年又名甲子元曆癸夘天正朔丁丑八十四刻四十一分冬至庚寅七十刻七十五分定法經朔丁丑八十四刻四十四分九六經無庚寅五十八刻七十七分三九
