body:
  text: 云云乃用鄧平所造八十一分律暦復使湻于陵渠覆太初暦晦朔弦望皆𡪯宻日月如和壁五星如連珠云云按鄉遂等言日月在建星原未甞言在牽牛也古宿本用建星後易之以斗則建星即斗也詳古宿名自五康李奇妄謂古以建星為宿今以牽牛為宿外是七曜起牽牛之説與矣又言太歲在子則歲星自在元枵日月自在星紀原未甞言七曜同起牽牛也攷汲家書用日月起于牽牛之語乃周初天正合朔之度歲差日躔在女則合朔在牛矣然亦無五星字不得後以為據也湻于陵渠之覆謂日月如合璧五星如連珠盖形容太初曆法之宻耳原未甞言丁丑之歲如是與上元甲寅如是也其謂上元十一月甲子朔旦夜半冬至日月如合璧五星如連珠同起牽牛之初者則書攷靈曜禮合文嘉劉歆桓譚應劭之徒誤看漢史之文耳何乃執此以為推上元之定理哉今試以歲差法攷之凡四千六百一十七年日躔當差兩次則自太
  hash: sha256:6881dd9bc1e9999b36d9c92191f8a405e3f2b3db9affecaf6ca72386b7c76a64
