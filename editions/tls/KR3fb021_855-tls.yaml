body:
  text: 五一二九定朔在午前合交食限定五年丙申春王三月辛亥朔日有食之授時交分十四日三百三十四分入食限定法丙甲歲天正朔辛亥九四三定炁辛酉一一八寅月經朔辛亥一五定朔在書合交食限十二年癸夘十有一月丙寅朔日有食之授時作十月朔丙寅交分十四日二千六百二十二分盖以定閏法擊之也故邊千經文定法癸夘歲天正朔辛未五七一四定炁丁酉八一二戍月經朔丙寅八七七三定朔在書合交食限閏應二十六日二二應閏寅月魯曆置在入交後也十五年丙午八月庚辰朔日有食之授時交分十三日七千六百八十五分入食限定法丙午歲天正朔癸丑七三四定炁癸丑五二九六未月經朔庚辰四四八一定朔在午前合食交限哀十四年庚申五月庚申朔日有食之授時交分二十六日九千二百一分入食限定法庚申歲天正朔壬戍五二六七定炁丙寅九二八五辰月經朔庚申六四九一定朔在午後合交食限
