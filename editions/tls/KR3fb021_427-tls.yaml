body:
  text: 是何獨至于天地之始終而遠之萬載而下所推或騐吾猶旦暮見之矣暦家上元問或曰上元之數暦家推之雖各不同而其為數則皆甚遠其多者至千百萬餘年最少者亦不下八九萬餘年漢劉歆三統暦上元十四萬三千一百二十七年典律暦上元至伐之歲十四萬一千四百八十年同晋王朔之通暦甲子元法九萬七千年典劉智正層元法同姚秦姜岌三紀甲子元暦元法八萬三千八百四十一年隋張賓甲子元法四百萬餘年劉焯甲子元法一百萬餘筭唐李湻風推自麟德元甲子上距上元甲子二十六萬九千八百八十年僧一行以大衍數推上元甲子積距開元十二年甲子得九千六百九十六萬一千七百有四十日金楊級大明暦上元至金太宗天會丁未歲積距
  hash: sha256:7ec7623acc2378a0fb43b3b71a0cb7cf882182059d52d25c595276f2c0d2064c
