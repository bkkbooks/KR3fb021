body:
  text: 木合應三百二十一日九五四火合應四百七十四日五五四七土合應五十五日六二一五金合應四百七十六日八六六水合應八十日五九一三五星聚井攷先查火土金水四星以明同聚時日今康熙庚午天正冬至上距漢元年前一歲甲子天正冬至一千八百九十六歲歲積六十九萬二千五百日四三二置前歲積減去庚午火合應見前以火周率累除之餘二百二十八日四六五五為甲午至後合伏日太陽入縮曆四十七日弱應減一度七七二九太從古黄道歲差日躔斗二十三度順數二百二十六度半強淂張十七度初為至後合伏度查火星行率合伏前二百二十八日有竒慮行一百六十三度半強從張十七度反減淂室十八度為冬至火躔度自至㣪順行九十二度半一百四十日方躔井宿為立夏後五
