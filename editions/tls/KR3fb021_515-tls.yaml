body:
  text: 八度古赤道柳七度八為合伏差金星行率合伏前四百三十日半強應行三百九十一度三二除一周策存二十六度七從注八度反減得朱宮赤道弧五度古赤道井十八度七三為上元冬至太白所躔度辰星置前歲積減去庚午水合應八十日五九一三以水周率一百一十五日八七六累除之餘七十八日七七二得驚蟄後五日合伏太陽入盈曆七十九日弱應加二度三二從上元日躔參旗二度順推八十一度九得星七度三為合伏度查水星行率合伏前七十九日弱應行五十六度六從星七度反減得申宮赤道罰十一度古赤道井一度七為上元冬至辰星所躔度求終元經炁應置一元歲積一千百十萬四千一百七十八日五十刻以旬周累除之餘一十八日有半得甲午年庚午月壬午日丙午時初四刻末分為終元夏至求終元經朔應置一元朔積一千百十萬四千一百六十七日八八五五一五八六六減去上元閏應三日以
