body:
  text: 分野九十二辰次省始元枵終娵訾天之定位也十二方隅者始予終亥地之定位也十二分野者天地相應之定位也天之體著乎象象從其務見故辰次定于初昏地之運顯于炁炁始于冬至故分野定于夜半分野古有二法以元枵為顓頊之墟壽星為太吳之墟火為軒轅祝融之墟上元昏象軒轅正當天頂故張衡曰黃帝軒轅于中一行曰七星係軒轅得土行正位中岳象也降婁為少吳之墟者此從乎初昏者也𠰥十二國分配則從乎夜半者也餘詳分野說從初昏則析木屬燕從夜半則析木屬越二者當分別觀之漢人不知其理以初昏之象混入夜半故以析木為燕分而越則反無其次則不得不併入星紀而分野之理遂不可復問矣今圖以上元日躔畢五度移入于宮則十二此與十二國東西南北一一相配理自不易而從来舛譌之説可得而正矣
