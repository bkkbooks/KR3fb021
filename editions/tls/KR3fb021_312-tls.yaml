body:
  text: 學及諸餘藝其用心亦頗入細譚理似不應至此豈獨識者為之胡盧哉十一則圖地與海彼自有全圖強畧具大槩以便来騐據地與海圖橫盡三線滿刺伽國當畫夜平線大浪山在畫短線之南自此而南則窮于鸚鵡地中國在畫長線之北自此而北則窮于冰海僅得半面球形而所謂天下有六大洲者已盡在於是鳥得渾圓如球乎即便甌邏巴之西可接境於大東泽而冰海必不可接境於鸚鵡地盖既畫三線即非全圖也而附和者必且為之觧曰地雖如球而圓體難圖可以意會而不可跡泥即如星圖北極居中則南極亦當斂聚而為之圖者近南極豦必反散潤同一理耳信如斯言則星圖亦將衡盡三線以當黃赤道可乎不可不可如知其不可也則地圖亦應將黃赤道畫如兩環相交而後地始得如球此又可乎不可若曰圖雖
  hash: sha256:6f394dfad8836169a7d13f25fee13919ef1827478df2a789e52d7a0046f7d3bf
