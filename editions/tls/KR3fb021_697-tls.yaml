body:
  text: 第一層為舊法舊起曆之歲第二層為舊法應第三層為新法炁應泰定積距者泰定甲子冬冬至漸積而上之年也加分者即每歲炁差之分在昔為遞減而此表用逆推故反遞加也加合者以加分併入新法炁應則與舊法適合也其表皆係消分𠰥泰定長分則僅有明之大統曆回回曆反今之時憲曆而已故不復另作長分表
