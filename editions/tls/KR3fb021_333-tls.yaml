body:
  text: 胃七十四度七十六度距西南星六十度半昴七十四度七十六度距西南星七十度畢七十八度七十六度距右跃第一星七十五度觜八十四度八十二度距西南星八十二度參九十四度九十三度距中星西第一星九十二度半井七十度六十八度距西扇北第一星六十九度鬼六十八度六十八度距西南星六十九度半栁七十七度八十度半距西第三星八十二度半星九十一度九十三度半距大星九十六度張九十七度一百度距西第二星一百二度半翼九十七度一百三度距中央西第二星一百四度軫九十八度一百度距西北星一百三度半距極之數古今不同盖或天象之變或測騐之疎與所用距星之異建都南北之殊四者俱有之未可執一端而論也其建星參旗狼弧四古宿距度別載於左建星距西星去極一百十三度狼去極一百七度半參旗距南第一大星去極八十七度弧距矢星去極一百十四度
