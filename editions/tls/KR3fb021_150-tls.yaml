body:
  text: 也金水月三重為陰第一重曰形質天所以固此氣也晋虞喜安天論曰天確乎在上有常安之形地魄焉在下有居靜之體方則俱方員則俱員無方員不同之義其光曜布列各自運行猶江湖之有潮汐萬品之有行藏也西洋利瑪竇曰第一重天曰宗動轉帶動八重天一日一周自東而西按二説一言動一言不動大約西説為近之第二重曰一氣天圜周之氣陰陽五行未離者也其精之結而成光者為垣宿諸星因其未離故名一氣第三重曰黅氣天圜周之氣皆屬於土其精之結而成光者曰填星五天氣名見素問第四重曰蒼氣天圜周之氣皆屬於木其精之結而成光者曰歲星第五重曰丹氣天圜周之氣皆屬於火其精之結而成光者曰熒惑第六重曰陽氣天圜周之氣亦屬於火其精之結而
  hash: sha256:4bb1cc3f4a839d4e9a1051d25b425b43a11edaa26d3ce1275455cc64e7080f4e
