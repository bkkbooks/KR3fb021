body:
  text: 𠰥夘年在星紀則丙辰正當在元枵何足為異而一則曰淫一則曰旅邪昭十年已已禆竃曰歲在顓項之墟即元枵此明乎已年當在元枵也已年在元枵則夘年當在析木其三證矣昭十年春王正月有星出于婺女禆竃曰今茲歲在顓頊之墟姜氏任氏實守其地居其維首而有妖星焉囊三十年戊午禆竃曰歲在娵訾之口爾雅注云營室東壁四星方似口改名昭十一年庚午萇弘曰歲在豕韋即娵訾皆明乎午年當在𡜯訾也午年在𡜯訾則夘年當在析木其四證矣戊午秋七月傳禆竃過伯有之門於是降婁中而旦禆竃指之曰猶可以終歲歲不及此次也已及其亾也歲在𡜯訾之口其明年乃及降婁昭十一年庚午夏四月楚子䖍誘殺蔡候敗傳周景王問于萇弘曰今茲諸侯何實吉何實凶對四蔡凶此蔡候敗弒其君之歲也歲在豕韋弗過此矣楚將有之然壅也歲在大梁蔡復楚凶天之道
