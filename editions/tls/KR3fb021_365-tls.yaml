body:
  text: 則正北為子此地辰所以定方隅二者皆一定亦各為一理與斗之斡旋不定者原不相蒙其子月建子丑月建丑月徒一辰周而復始此人統一時之象非古今不變之象也以歲差法推之自商武乙二年甲子至宋太祖建𨺚二年甲子凡二千一百六十年雖皆子月指子而商末周初十月已指子自漢迄宋十二月猶指子唯周顯王之時交大雪即指子末冬至正指子中交小寒始移而指丑盡一月莭炁皆指於子盖是時歲差日躔在牛一度距丑正斗廿四度首尾凡四度右進而數至角十一度距辰正角八度亦首尾四度適為周天四分之一而斗杓入角十二度少條大衍法天盤丑宮牛一度加于地盤之酉中則天盤辰宮之角十一度正加地盤之子中矣故人統之紀始于周顯王二十二年甲戍也百家之言感于春秋而後故書傳多斗建之説盖一時天象之實然而要不可以概古今之天象也若今日之指亥則又天象之當然稍知歲差之理自弗泥于其説矣
