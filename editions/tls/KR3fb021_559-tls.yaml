body:
  text: 今為女十實度之不可為據也明矣而執定實度有同膠柱五謬也緑此五謬故年限不得其真而所推演紀之端須女虛危皆為強坐無惑乎屢變而屢差也爰萃舊説而辨之如左賈逵曰天道參差必有餘餘又有長短不可以等齊治暦者方以七十六歲斷之則餘分稍長得一日七十六歲差一日即是差一度也可見歲差之漢世暦家已有成法但所定年限仍拘定四章為蔀之數故未真確故易金火相革之卦曰君子以治暦明時又曰湯武革命順乎天而應乎人言聖人必暦日月星辰明數不可貫數千萬歲其間必改更先矩求度數取合日月星辰所在故有異世之術太初不能下通于今猶新曆不能上得也宋元嘉二十年何承天𢰅元嘉新曆以月食之衡知日所在又以中星騐之知堯時冬至日在須女十度信如所推則冬至中星當在胃度與日短星昴不合矣此係赤道度孟襲太元舊法而未之變也又測景以授二至差三日有餘知今之南至日應在斗十四度此係黃道度黃道斗十四準赤道斗十六僅差一日不得謂差三日餘按太元甲申至元嘉癸未凡五十九歲政應差一度弱天承
