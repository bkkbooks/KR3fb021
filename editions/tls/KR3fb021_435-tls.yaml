body:
  text: 唐虞五千年而為義農古今相距政復有限而草野唘為文明渾樸化為琱琢帝王升降世運污𨺚已大可見而動稱百千萬年的母傷于茫䀛乎且以三皇之壽言之夫古今之炁運固有厚薄之殊生人之年壽固有修短之異然攷五帝之世上壽不過逾百故黃帝三百年賢者猶疑之大戴禮宰我問於孔子曰昔者予聞諸榮伊今黃帝三百年請問黃帝者人邪抑非人邪何以至于三百年乎孔子曰黃帝少典之子也曰軒轅云口生而民得其利百年死而民畏其神百年亾而民用其教百年故曰三百年寧有人焉而壽萬八千歲者乎盖説者于開闢之年既如是其久而十紀所載有天下者僅百有餘君按緯書以開闢之年分為十紀自九頭紀至敘命紀凡六紀八十六君自循蜚至禪通凡三紀五十二姓通曆云十紀通一百八十有七代其數如斯而已若丹壺記所云因提紀十有三姓傳六十有八世禪通紀十有九姓凡一百有七世通而計之
