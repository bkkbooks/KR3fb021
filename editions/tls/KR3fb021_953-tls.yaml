body:
  text: 先天後天辨天地定位山澤通氣雷風相薄水火不相䠶世以此為先天宓義之易帝出乎震齊乎巺相見乎离政役乎坤説言乎兌戰乎軋勞乎坎成言乎艮世以此為後天文王之易按易傳原無先天後天之文殆漢儒之所分目而古今皆訛以傳訛耳于今开羅泌又以後天之卦為連山氏之易謂夏得人統故歲首建寅而卦首震夫連山首艮而非首震寅亦配艮而非配震盖益加謬矣夫先天後天理一貫而數相因先天無後天則理為不備後天非先天則數為無因故先天者聖人書卦之序乾坤二象既立矣變其上爻則為艮變其下爻則為震吳變其中爻則為坎离而八卦成矣變先上爻次下爻次中爻則三才之序也而後天則交易取用之象也先天之卦陽盡多者居上陰盡多者居下軋兌居南坤震艮居北此陰陽之定體後天之卦陽卦降而下陰卦
