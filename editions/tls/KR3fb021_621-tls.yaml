body:
  text: 經朔定法説曆法最重在于炁朔古来諸曆唯朔稍近盖曆家專以交蝕取騐要必朔望之數真而後交蝕可程也然猶有分秒之未合者則莫能窮造化之始終以為數耳夫應炁始于子而終于午陰陽死生之理分太極之半數朔應始于子而終于亥日月盡夜之道包支辰之全數朔策所以定日月之交會非獨為月說也此本乎天道之自然非意智所能參也今究天地之始終以定其策又傳籍古曆無不𠯳合古曆諸朔應陰漢曆外餘所差歲遠者不過萬分日之三四分而已則令茲朔策可自信其不遠矣經朔策數朔策二十九日五三五九三八八一二五望策一十四日七六五二九六九四六二五月平行策一十三度三六八七五六六六九九四長率平行策一十三度三六八七六一三七三五三七此為今時長分中所用攷春秋日食同此𠰥考太初以下當用消率為十三度三六八七五一九六一元三十三萬八千七百七十三朔朔積一千百十萬四千一百六十七日八八五五一五八六五
