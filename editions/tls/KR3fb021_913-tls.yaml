body:
  text: 混而一之也今使西士仍其師説但以冬至日躔發自摩羯初度而不牽令于中曆辰次之名夫誰淂而議之乃因九執而但有成法而不言立法之故遂混以摩羯為星紀西士執冬至之次而不變漢説執冬至之宿而不移千古一轍皆由不明歲差之理故也夫歲差日躔自磨至今已差二十度許度之在斗者既移為箕則次之在星紀者亦移為析木析木之不可仍為星紀猶箕三之不可仍為斗十二也而以箕三為星紀之初非特不明中曆辰次之義實由不知九執立法之意也至于九執度之為三百六十整雖不合于天道而止用虛度則不妨彼自為彼法也是以元初回回曆宗之亦止用虛度其二十八宿若在所不聞者非真不知也政以實度之不可僅為三百六十也盖用虗度者既無定名斯可無定數即如西術鍥度有二度一鍥者是止淂一百八十度矣有五度一鍥者是止淂七十二度矣然化而道之則先無悖于彼法此所謂虗度可無定數者也而用實度者既有定名斯必有定數矣虗度無関于列宿之名實度不便于測之筭二者猶衲鑒之不相入若之何借中曆之實度以紀
