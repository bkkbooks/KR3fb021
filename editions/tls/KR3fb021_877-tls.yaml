body:
  text: 春秋正月考桓二年辛未春王正月戊申定法天正朔壬寅三五四丑月朔辛未無戊申經又書四月戊申定法辰月朔庚子有戊申則丑月自應無戊申矣一歲之中而有合有否則必有悮文可知有本原作春王二月五年甲戍春王正月甲戍已丑定法天正朔甲寅九八七五丑月朔甲申有已丑其甲戍在前月傳謂涷俣以甲戍日亾已丑日淂故書從得之之月日也八年丁丑春王正月已夘定法天正朔丁酉一五一丑月朔丁夘有乙夘十年乙夘春王正月庚申定法天正朔乙酉八八四四丑月朔乙夘有庚申十七年丙戊春王正月丙辰定法詳晦朔攷丑月朔甲辰有丙辰莊八年乙未春王正月甲午定法天正朔壬子九五二丑月朔壬午有甲午
