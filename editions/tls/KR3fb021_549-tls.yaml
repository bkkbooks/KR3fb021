body:
  text: 晋太元曆冬至日躔在古赤道斗十七度平初甲子至晋孝武帝太元九年甲申天正冬至九千一百四十歲應差一百二十八度七九三一二置步斗虗度如前法減去象限及上歲差數餘八十四度二六九三八查表斗表得赤道斗十七度宋元嘉曆冬至日躔在古黃道斗十四度平初甲子至宋文帝元嘉二十年癸未天正冬至九千一百九十九歲應差一百二十九度六三四一置步斗虛度如前法減去象限及上歲差數餘八十三度四二八四查步斗表得黃道斗十四度按太元所測赤道之度也元嘉所測莫道之度也而世皆混引莫辨夫太元至元嘉僅六十年豈遂差三四度乎亦弗思甚也唐大術曆冬至日躔在古黃道斗十度九度半平初甲子至唐元宗開元十二年甲子天正冬至九千四百八十歲應差一百三十三度五八四一一三置步斗虗度如前法減去象限及上歲差數
