body:
  text: 乾坤定位十一天地方位以盖天法觀之則午南子北以渾天法觀之則午上子下盖天體渾淪縱橫觀之而皆得也先天易乾南坤北即乾上坤下故曰乾坤定位今推上元之象午為火而在上子為元枵而在下徵諸易而其理葢信矣奇門三白十二術家三白法本即遁甲三奇以洛書之數為法故從故宮一白起算上元甲子起一白中元甲子起七赤下元甲子起四緑逆行九年一周三甲子一大周令從康熙二十三年甲子起一白逆推之上元開闢正起一白禽星十三術家值年禽星以上元起氐宿凡七甲子而一周故氐為七甲符頭氐為天根在斗杓帝座所指之間敬法從此起盖亦有所取義云今置上元至康熙二十三年甲子距算一萬一千一百六十一年以宿數二十八累除之餘十有六宿從氐宿順數得畢月鳥為今元甲子禽星與時憲曆元合
  hash: sha256:ab23cae766a7b0f47bf6cab9868b3675f6efe4a1437a861bf5e77c3384e461ef
