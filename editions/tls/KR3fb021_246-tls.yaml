body:
  text: 絕豦至鐵勒則又北矣極北之地人甚少所傳有二千里松木禁人砍伐此外龍蛇交襍不可去按唐書言骨利幹高車部落名居瀚海北其地書長夜短日方沒後天色正曛煮羊脾適熟日復出矣攎此則渾儀真象圖夏至黃道之徑不入地中益信而有徵矣此外則不可窮夫其不可窮處即其窮處也獻則大地南北之垠堮亦約畧可見矣惟西域人跡稍遠要之亦為地有限盖天體渾淪南北既有可窮則東西不當獨遠其動稱去中國幾萬里者或以水陸䊸回之故或故為夸誕之辭殆未足信也
  hash: sha256:f312118c270aec9ccf57a2f32ee41100cb5d61af404e40ba94ea2a3499ab8142
