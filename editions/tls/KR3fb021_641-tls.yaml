  text: 四十五章齊太祖建元二年庚申至巳未七一二六六七六朔巳亥二六九二一八三二二五四十六章東昏候永元元年巳夘至巳亥三二二七三九二二二五朔戊寅九五八七七二六六一六二五四十七章梁武帝田健十七年戊戍至戊寅九三二八七七七七三四朔戊午六四八三三四四九一四十八章武帝大同三年丁巳至戊午五四三一六三二四三朔戊戍三三七八九六三二三七五四十九章敖帝太平元年丙午至戊戍一五三一五四八七五二朔戊寅二七四五八一四九七五五十章陳宣帝大建七年乙未至丁丑七六三二九三四二六一朔丁巳七一七一九九七九一二五五十一章後主至德十二年甲寅至丁已三七三四三一九七七朔丁酉四六五八一八八五五十二章隋陽大業九年癸酉至丙申九八三五七五二七九朔丁丑九六一四三六三七八七五五十三章唐太宗貞觀六年壬辰至丙子五九三七九七八八朔丙辰七八五七五四六七二五五十四章高宗永癥二年辛亥至丙辰二三八四七六二九七朔丙申四七五二六七二九六六二五五十五章高宗咸亨元年庚午至乙未八一三九八六一八六朔丙子一六四八二九一二六五十六章武氏永昌元年己丑至乙亥四二四一二四七三一五朔乙夘八五四三九九五五三七五五十七章中宗景龍二年戊申至乙夘三四二六三二八二四朔乙未五四三九五二七八四七五五十八章元宗開元十五年丁夘至甲午六四四四一八三三三朔乙亥二三三五一四六一四一二五五十九章元宗天寶五年丙戍至甲戍二五四五四三八四二朔甲寅九二三七六四四三五六十章代宗永泰元年乙巳至癸丑八六四六七八九三五一朔甲午六一二六三八二七五八七五第十紀無朔章應表一章唐德宗興元元年甲子至癸巳四七四八一七四八六朔甲戍三二二一二二五
