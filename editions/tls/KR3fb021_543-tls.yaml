body:
  text: 之可也於此言曆則已疎矣夫星火星鳥後人所解或有不同而星昴星虗則聖人之言固昭于日月也學者攷古亦惟尊其可信而無穿其所疑斯已矣乃古今曆家所推以為演紀之端者女十危五虗一虗六安為意度背謬聖言夫冬至在女十虛一則日短星胃而不得為昴冬至在危五則宵中星危而不得為虛諸術中惟起虗六者於法為近所據者經而先已乖舛則昧其源矣又安問其流乎攷舊曆周法立而元起平初則源遠流潔舉千萬歲之星躔皆不出我之範圍固無候稽諸舊曆矣然而遠有可據者又貴乎近有可微也今以步斗法推太初以来諸曆其測騐宻近而世所宗信者皆往往而合益信元起平初之非誣其當日所測之日躔或係黃道或係赤道世所蒙混莫辨者又一一分別之益信步斗定法之不可易其詳證如左秦曆冬至日躔在古赤道斗二十六度月令曰仲冬之月日在斗是也
