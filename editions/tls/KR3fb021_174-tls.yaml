body:
  text: 北距天中九度餘每度約二百五十里夫方城遠近晷景短長似有可憑而先無定説則四表之際又何從而得其里實邪於是圖經之數人一其説矣用髀云四極徑八十一萬里周二百四十三萬里分為度度得六千六百五十二里二百九十三步千四百六十一分步之三百二十七天離地八萬里書攷靈曜春秋考異郵皆云天周三百六十五度四分度之一每度二千九百三十二里七十一步有奇圓周一百七萬一千里直徑三十五萬七千里續博物志同按此本周髀冬至日行道圖經之數而緯書又誤以為天之圖經也靈憲曰八極之維徑二億三萬二千三百里南北則短減千里東西則增廣千里自地至天半於八極則地之深亦如之按此以二千里為一度又云地廣當天周二百四十二分之一按此地止當一度半則其廣僅為三千里二說不應矛盾如此當即古説地體徑二十四度其厚
