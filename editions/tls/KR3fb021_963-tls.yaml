body:
  text: 歲差之理生于經度消長之理生於緯度盖恒星但有左旋之盈縮世所謂盈縮暦者乃星行非日行也而無南北進退故歲差在經太陽但有南北進退之疾遲近二至則進退遠近二分則進退運而無左旋之盈縮一日一用終古平行故消長在緯今以高卑之均數求歲實之消長諺所謂張冠而李戴者也然此乃左旋之理固術家之所未喻試即以西學言之彼夫穆尼閔亦西士也真原亦西法也乃冬至加時暦書之均數用加真原之均數用減暦書冣高在夏至後真原最高在夏至前即同為西學已彼此相反則最高移度必非公論而用求消長定為偶中可知已
