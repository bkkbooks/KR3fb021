body:
  text: 減甲戍後天一刻十二分餘五十七分是較諸玉衡定氣每年又多一分其氣策淂三百六十五日二四二八七七令新法經炁曆甲子日二七六一九一八七距泰定乙丑夏至三百六十八年半應淂長分五百一一分七七二八并淂定炁日三二八一六七四六七西法較見六十八分二二三六六九即加日差筭先一十二分六六八一一四及查是年時憲曆為辰正一刻二分較曆書實遲一刻十一分強盖自庚申年南懷仁所改之準分以甲戍時憲曆冬至諸應備記于左天正朔庚子亥正初刻三分冬至甲子辰正一刻二分家高過夏至七度二十分家卑過冬至七度二十一分冬至根筭三度二十二分夏至很十度三十分日驢箕三度一分月難異十三度三十七分緝南五度十二分土尾十五度十四分北初度五九木井二十一度十九分北初度一八火柳初度四十九分北三度二四全女五度十分南二度五分水斗十三度二十分南初度四分西法定冬至戊辰已已未初一刻五分半未子正後三刻十三分二十秒
