body:
  text: 秀水張雍敬著天地終始暦之所以無定法者不知天地始終之有定數也知其定數則凡日月之炁朔交轉五星之伏見周合象之歲差炁之消長皆從天地之始以為始天地之終以為終範圍既定自見有不可過不可不及之理而日月星宿之運行無不得其一定之法矣朱子曰古之暦書必有一定之法而今亡矣三代而下造暦有紛紛莫有定議愈精愈宻而差愈多由不得古人一定之法也蔡季通常言天之運無常日月星辰積氣皆動物也其行度遲速或過不及自是不齊使我之法能運乎天而不為天之所運則其疎宻遲速或過不及之間不出乎我此虗寬之大數縱有差忒皆可推而不失矣何者以我法之有定而律彼之無定自無差也又曰古今無人考得精細所以數差若考得有箇定數永不會差古今曆法疎宻不同看来都不曾
