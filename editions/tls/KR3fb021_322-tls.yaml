body:
  text: 自得之也若夫北極為天地之中日行平轉不出入於地則後人線圖起意按為穿鍳耳於聖人乎何尤若之何以末流之謬妄而并誣始法之舉非邪惟是盖天之圖南方之度當狹而反潤其星當宻而反疎則以渾體難圖其勢不得不爾世有以二分二至列為四圖者謂之𠂢瓣度亦有以辰次列為十二圖者謂之栁葉度其於潤狹疎宻之象雖若有合而零星割裂反不如盖天之歸一矣今仍舊法總作一圖而則為南極圖使便於南面仰觀是則盖天而兼渾天之象庻為得之但限于幅若全載中外諸星則細密厭觀而距星入度易為他星所迫窄而不得其真數故止列三垣二十八宿一始渾儀之法非特取其簡明亦以暦家所重在此而不在彼也若欲全載天文當用此法而別為大圖可也又舊圖黃赤二道如兩環相交與渾儀同舍煩就簡於法為得而非天象之真太陽之行冬至後以漸而北夏至後以漸而男其進退之度雖止四十八度弱而日換一道一歲實
