body:
  text: 升而上軋坎艮居北离坤居南此陰陽之互易先天卦之中純居四正卦之偏親居四隅後天卦之交者居四正卦不交者居四隅盖後天列象全是著其交易之妙此易之所由名也先天為天地之定象天地之體也而即為易之體後天為天地之氣運天地之用也而即為易之用用非體不立體非用不行聖人見理必終始咸該中邊俱徹寧有越數中載更數聖人至文王而易理始大成乎且歸藏之坤已在于未連山之艮已在于寅則美里未演以前已皆為後天之象豈淂以之專屬於文王文唐邱亞夫進理氣心印表以帝出乎震為先天之易盖必有所見矣
  hash: sha256:9ddef915ea3237f328baad4d34142b44e4bc1b7c7e5e4b51cdc0c31764a26b58
