body:
  text: 秀水張雍敬著星圖説盖天之法其来最遠而世咸斥其非豈聖人之於暦象有未盡善者邪抑後人之智反足以察聖人之非邪亦未之思矣昔宓義氏始作盖天即今之星圖凡可以鋟水動石者是也自漢以来世皆宗渾天矣而至於作圖則必仍盖天之舊盖以渾天止可為儀而不可為圖也試思欲圖天象舍盖天之法更無别法則聖人制作圖已立於不易矣隋畫圓盖志曰昔者正暦明時作圖盖以圖列宿極在其中廻之以觀天象分三百六十五度四分度之一以定日數日行星紀轉廻右行故圓規之以為日行道欲明其四時所在故於春以青為道於夏以赤為道於秋以白為道於冬以黑為道四時之末各十八日則以黃為道第古聖人於天地之理多著以象而不垂其文如先天易亦但有爻象而無其辭所以藏諸用而使後人
  hash: sha256:3a6e7f41a50b865806baf874431352c72e12b13c35635a1fe430886dc5a1bbce
