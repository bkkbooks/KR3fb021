body:
  text: 泰定已復又當減一筭也應加長分八十二分三舊法失先二刻八十八分三回回曆萬曆三年乙亥天正冬至庚子三十五刻二十八分新法庚子四十刻二十一分六四上距泰定甲子二百五十年應加長分三刻四十七分六舊法失先八刻四十一分二四今時寭曆順治四年丁亥天正冬至淂丁已亥正初刻以萬分法準之爲九十一刻六十六分太新法經炁淂五十三日八七二一六三二四五三上距泰定甲子三百二十二年應加長分四百四七分七八八併入經炁得五十三日九一六九三四一二五三為丁已亥正初刻三分太強其法允恊其徽有零分未恊者新法日分細而西法日分粗其分秒有不能盡也丁亥年根一八一一用誠平日為分七一九加本年高衡六度一四一四淂六度五五二一一九為引數入加減表比倒淂加均一十五分七共淂五十六分一四二六變時淂二十二小時二十四秒四十九徽為亥正初刻分二四四九通中法為九千一百六十六分九四八九長分四百四十六分四九九二淂五十三日九一六八一三一六五三此乃一分三八八八八起乙丑夏至之法西法較徽先天一分十八秒二七五三原定冬至須
