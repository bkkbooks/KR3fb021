body:
  text: 象元年已亥天正朔甲午二十四刻六十五分冬至戊戍八十三刻七十五分定法經朔甲午二十四刻六十七分一四經無戊戍七十三刻三十八分四八舊朔先二分一四舊無遲一十刻三十六分五二隨開皇曆張寶造以千萬二千九百六十分日之二萬五千六百三為歲餘起開皇四年甲辰天正朔乙丑一十二刻六十分冬至乙丑五刻定法經朔乙未六十一刻二十九分三四經無甲子九十四刻七十分四三舊朔依消長法則當一朔而至朔同為乙丑也舊無遲一十刻二十五分七皇極曆劉燀造以四萬六千六百四十四分日之一萬一千四百六十五為歲餘起仁壽四年甲子天正朔巳亥二十刻冬至已酉九十刻定法經朔已亥二十刻二分二三經無已酉七十九刻九十八分二舊朔先二分二三舊無遲一十刻一分八大業莉張曾元造以四萬二千六百四十分日之一萬三百六十三為歲餘起大四年戊辰天正朔丙午一十九刻九十一分冬至庚午八十七刻定法經朔丙午一十九刻九十三分二三經無庚午七十七刻三分七六
