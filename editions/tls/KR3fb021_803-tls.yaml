body:
  text: 二查表淂古黃道奎十三度八二於春分十四日合伏轂雨二日入婁曆應四千一百五十九日九八四七入炁即後合日曆應饼入後合日分通四千二百六十一日八七九四七以度率歸淂三百六十九度四一五九減半周策餘一百七十六度七七三二二五截去十一限餘八度三六三乘減分淂八千七三七分減積淂七千一六三分為縮差分用減平合入炁日為一百二日五六六用減平合宿度為奎十三度之一六六距奎末四度八九少木率應行二十一日六於轂雨五日入婁火星置前歲積加章首火應三百一十六日七九一二累除火率餘二十日一二八八用減步斗虗度存五十五萬九二查表淂古黃道尾十四度九二為前合度距奎初一百一十度強火率應行一百五十四日少強於轂雨十四日入奎合伏入曆分五百六十三日三一六八五五距合入曆分合後距晨疾末段一百二十八日入炁一百七日八七一二平度積九十一度八限度積八十五度三七置合伏入曆分以度率歸淂二百九十九度五一七一三六併很度積通三百八十四度八八七一三六餘一周策餘一十九度六三四六哉去一限餘四日四一二三乘加分淂二度三一一併積淂一十三度八九一用加平段入炁為一百二十一日七六一四用加平度積為一百五
