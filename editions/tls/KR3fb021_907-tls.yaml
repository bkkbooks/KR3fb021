body:
  text: 天度辨西術分周天為三百六十度整以六十分為一度其宿度潤狹之數亦多與舊法不同今攷其宿度之異於舊法者則或以所用距星之異或因天象變移固於曆理無碍其度法為六十分則曆家筭術随人立法亦於曆理無碍也若夫周天止為三百六十度整則亦知度字之義當作何觧宿度之法何由而立乎盖天行健日行信天之於日每日必有右進相距之段是名曰度度者分寸丈尺之總名天不可以分寸丈尺量也故但名之以度舉一日之所距而言則為一度積三百六十五日有奇而天與日復會則其相距之段亦必積為三百六十五度有奇而相距之段無可紀也爰取二十八宿以記之盖周天之度由周歲日行而立者也度既緣日而立則度與日其數必相等度有盈縮斷以平行此天道本然無客減損者也西術能減天周之五度有奇亦能減歲周之五日有奇矣夫歲周之三百六十五日有奇必不可減而減天周為三百六十五度整騐之於天揆之於數衷
