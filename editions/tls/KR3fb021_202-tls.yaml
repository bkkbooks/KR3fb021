body:
  text: 極南五十五度當嵩高之上又其南十二度爲夏至之日道又其南二十四度爲春秋分之日道又其南二十四度爲冬至之日道南下去地三十一度而已據舊説笑之置北極出地之数三十六度以天徑之半五十八度一三一三三八歸之得六一九二八七三一爲實黄道之交於北極徑處正當其半距天心二十四度又斜界於地平處距天心三十度以交於北極徑處至天心爲股以交於地平處至天心爲弦以交於北極徑處至交於地平爲併而折算之得一十七度用乘上所歸之数得一十六度七二七五七加黄道半徑五十三度二八七五九共得七十度七八一七爲夏至地平上之徑数則地平下止有三十六度五六六三二興畫六十刻夜四十刻之数不合矣冬至亦及是而推之可是舊説又云夏至日行地上度多二百一十九度行地下度少一百四十六度故畫長夜短冬至日行地上度少一百四十六度行地下度多二百一十九度故畫短夜長以此合長刻六十短刻四十固是然今以徑度
