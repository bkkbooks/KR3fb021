body:
  text: 姜岌五三月朔交不應食在悮條其五月庚午朔去交分入食限大衍同授時云五月庚午朔加時在書未交分二十六日五千一百九十二入食限盖悮五為三定法癸酉歲天正月壬申三一九六定炁辛夘三八四六辰月經朔庚午四四二定朔在午後合交食限辰於子正應為五月而為三月者文之悮也故不書朔以示傳疑曆家皆謂此合夏正非也攷僖公之世經之書甲子者四十六條皆合子正其偶有一二條不合者亦袛先後一月要無失先兩月者此以經證經耳絕其為悞文也十五年丙子夏五月日有食之大衍推四月癸丑朔去交分入食限差一閏教時交分一日一千二百一十六定法丙子歲天正說甲申九五一六定炁丁未一一二九經無甲子可攷且不入交限往来曆家推之皆不入限是以日朔俱不場明其有悮也徐圃臣謂即前十二年五月而悮出兩條其説疑是九月已夘晦定法閏應二十二日一六應閏未月故申朔淂庚戍七二六九申月淂已夘晦成十六年六月甲申晦觀左傳那至曰倲不邊晦期古其為晦日也傳有十一月丁丑戊姜淂已
