body:
  text: 秀水張雍敬著五步曆率説五步古無其法而剏自後人有周率即合率有曆率周率者所以求其經而曆率者所以求其緯也其法當置周率而除去歲周以所餘為行率如土星舊法周率三百七十八日九一六除去歲策三百六十五日二四二五餘一十二日八四九一命為度故一周行率為一十二度八四九一也餘放此置歲周為實以行率為法歸之即得度率以度率東嵅周即得曆率而舊法乃悮以度率秉天周為曆率夫五星周率既從日為法日行自有歲差則天周之法已寓於日行之中而周率之中已寓有歲差之數矣如土星弘治已酉天正後九日戊寅合伏于斗五度七今熙甲戍十一月冬至後九日戊寅合伏于斗二度四二同為冬至後九日而合伏之度凡差三度許則周率之中已自有歲差之數矣今曆率復用天周不亦謬乎且法中名數凡指日而言者謂之曆如日躔盈縮曆則以歲策為法太陰疾遲曆則以朔策為法皆所以求其緯也而五星曆率何以不用歲周而用天周哉由是推筭古今則盈縮其金水常一定不移而無歲差之變金起盈于
