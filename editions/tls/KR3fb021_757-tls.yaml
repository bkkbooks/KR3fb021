body:
  text: 越得歲攷證昭三十二年置漢元年前一歲甲午天正冬至上距鲁昭公三十二年辛夘三百三歲歲積一十一萬千六百六十八日五一九五加甲午後合應一百五十一日四四三二以新定木周率累除之餘三百三十五日七四二七為至後合應太陽入縮末曆五十九日四應加二度從歲差日躔古黃道牛三度二度八三順數三百三十五度三四淂箕七度六度九五為合伏度則辛夘之夏歲星政迴留於尾三度至十二度之閒尾箕本越分故曰淂歲也歲淫元枵攷證表二十八年春王正月傳又歲棄其次即是年秋八月傳置鲁昭公辛夘天正冬至上距襄公二十八年丙辰三十五歲歲積一萬二千七百八十三日四九二三加辛夘後合應三百三十五日七四二七以新定木周率累除之餘三百五十五日七一五為至後合應太陽入縮末曆八十日弱應加二度三七從歲差日躔古黃道牛四度三度三四順數三百五十五度六八淂斗十八度十七度七八為合伙度距元枵女五度五三一二過宮凡一十七度七五意歲星行車合伏後應行八十七日八六始
