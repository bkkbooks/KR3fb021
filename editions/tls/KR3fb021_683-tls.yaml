body:
  text: 定法金朔庚子七十二刻五十四分一經炁辛酉四十刻五十五分五舊朔遲三分九舊炁遲二刻一十九分九五淳熙曆亦劉孝榮造以五千六百四十為日法一千三百七十四為歲餘二千九百九十二為朔餘起淳熙三年丙申天正朔戊申一十五刻二十三分冬至戊申六十一刻定法經朔戊申一十五刻一十九分二五經炁戊申五十八刻九十二分五四舊朔遲三分七五舊炁遲二刻七分四六會元曆亦劉孝榮造以三萬八千七百為日法九千四百三十二為歲餘二萬五百三十四為朔餘起光宗紹熙二年辛亥天正朔辛亥三十一刻二十二分冬至丁夘二十四刻七十五分定法經朔辛亥三十一刻一十七分九二經炁丁丣二十二刻八十八分三八舊朔遲四分八舊炁遲一刻八十六分六二統天曆楊忠輔造以一萬二千為日法二千九百一十為歲餘六千三百六十八為朔餘起紹熙五年甲寅天正朔癸亥九十四刻四十二分冬至壬午九十七刻五十分定法經朔癸亥九十四刻三十七分六六經炁壬午九十五刻六十七分五四舊朔遲四分三四舊炁遲一刻八十二分四六開禧曆鮑造以一萬六千九百為日法四千一百八為歲餘八千九百六十七為
