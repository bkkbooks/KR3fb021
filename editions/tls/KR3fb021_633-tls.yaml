body:
  text: 六部周武王六年甲申至壬辰四六九六二三九六朔乙丑三四六一七一六四七五七部昭王十二年庚子至庚午九一五一六五九九六朔甲辰一四二六四四八二二五八部穆王三十七年丙辰至巳酉三四二七八三二朔壬午八六二五一一七九九七五九部夷王六年壬申至丁亥四八二六二五六八朔辛酉六二七五九一一七二五十部宣王十五年戊子至丙寅二二三一七九二一四朔庚子三七九六四三四七五以上十部几四十章其下起第四十一章以至十紀之終則以章法紀之盖赤秋紀得之至朔交食治曆者在所必考啟始扵此且編年得實亦始自麟經耳四十一章周平王三十四年甲辰至甲辰六六三七三三四一四朔巳夘一三七二五三七五二二五四十二章桓王二年鲁隐公五年癸亥至甲申二七三八七一九六四九朔戊午八二六八一五五八一六二五四十三章桓王廿一年桓公十三年壬午至癸亥八八四一五一五八朔戊戍五一六三七七四一一四十四章釐王二年莊公十四年辛丑至癸卯四九四一四九六六七朔戊寅二五九三九二四三七五四十五章惠王十六年閡公元年庚申至癸未一四二八七六一七六朔丁巳八九五五一六九七五四十六章袁王十年僖公十八年巳夘至壬寅三二四五六四七一九四朔丁酉五八五六二八九九一二五四十七章棄王廿九年史公四年戊戍至壬寅三二四五六四七一九四朔丁丑二七四六二四七二八五四十八章定王三年宣公五年丁巳至辛巳九三四七三二七三朔丙辰九六四一八六五五七八七五四十九章籣王元年盛公六年丙子至辛酉五四四八四一八二一二朔丙申六五三七四把三八七二五五十章靈王六年类公七年乙未至辛丑一五四九八三七二一朔丙子三四三三一二一六六二五五十一章靈王廿五年袁公廿六年甲寅至庚辰七六五一一八九二三朔丙辰三二八七二四六
