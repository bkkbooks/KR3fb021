body:
  text: 是古法然不過謂景極長則知為南至景極短則知為北至可以得二至之日而不淂淂二至之時即取至前至後一二十日之景法分寸同者折筭取其中數可以得近畧之分秒而必不可通古今之消長天運微妙在消長不齊之間其可以天畧之法僅求之耳目之近哉中星與日躔適距周天四分之一中星正則日躔之所在可知而歲差之度可見是以古法重之夫中星日躔既適距四分之一則日沃于酉星當中于午乃不以午為中而以未為中者盖日沒而星中于午惟冬至為然若夏至書長則星已中而日尚未沒逮日沒而星之中于午者已移而在未矣故冬至之昏中一凖夏至之候于未則可淂而夏至之昏中欲凖冬至之候于午則不可得是以候中星者必于未非天以未為中也世謂天之午位在昆侖之角而昆侖為天中者盖誤執天以未為中也星中在未則于時為戌故戌為黄昏而星曰昏中盖所候之星典候之之時皆有一定因天為法義固當為而古今術家但以日
  hash: sha256:e93e01874f97e24b118995d20ad189f9965f3e3ab0fd9f4ef7fcb183bfe4c0ee
