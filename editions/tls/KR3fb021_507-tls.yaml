body:
  text: 日躔起畢天皇之世日躔在昴從開闢之象則以畢為首從命名之始則以昴為首也命名必在曆法始與之際曰初置星宿者謂初立星宿之名耳先天列象十六道家符録要法在取天罡祖炁祖炁者在人先天之炁也天罡者在天先天之炁也其取天罡氣法曰行法之時將身正立存神默想左有青龍右有白虎前有南斗一座七星之為南斗世鮮知者而道家能言即此是檢其術之必有所從来矣後有北斗一座覺斗杓指在吾前眼角辰巺之位旁有小紅星即天罡也云云今推上元蒼龍七宿在左白虎七宿在右南斗在前北斗在後斗杓指辰其象畢合符録之説儒者多不之信然往往有騐以至真之理出于其中也
