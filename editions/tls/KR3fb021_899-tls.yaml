body:
  text: 後可謂精密今偶差既難預期則將来設遇偶差其術即必疎潤而不效矣無弊之謂何此不可觧者四也據其歲差一周而為四萬九千年是一百三十六年而差一度也彼信以周天之虗分果定為四分度之一乎一百三十六年淂歲積四萬九千六百七十三日強淂周度四萬九千六百七十四度是多出一度也此不可觧者五也又據其歲差紀年起自帝嚳四十年甲子日在虛六度至宋度宗戊辰退入箕宿凡三千七百二十四年而退四十九度十三分是七十六年差一度也則歲差一周執談二萬七千三百六十年與所謂四萬九千者又不相符此不可觧者六也又曰夏王不降乙未退入女宿是四百五十一年退六度也此政合七十六年之限商武乙丙辰退入牛宿是七百五十一年而退十一度三十九分則太速矣周簡王丁亥退入斗宿是六百八十一年而退七度四十一分又太遲矣遲速參差莫可致詰而考之太初以来諸曆之日躔亦俱不淂其合此不可觧者七也雖然西術於周天併五度有奇減去矣而況于分秒之徵差乎則其謂之偶也固宜
