body:
  text: 止舉六甲之半以紀一年始終之運而不及乎混沌者聖人道其顯不索其隐也然而太全數已不外于斯矣甲子之法包括天地始終全數甲子甲戍甲申統開闢之歲月甲午甲辰甲寅統混沌之歲月今推三統之法其分為六氣又分為十二運其紀年皆在上三旬中詳復表並無一年錯出于下三旬者盖止用半甲子而已盡開闢之歲月矣真是聖人制作包含天地摶挄陰陽數為定數理為定理世于甲子干支以為但紀歲時月日而已豈知有如是之精蘊哉盖太極始終猶一歲之運而一元始終猶一歲之半故三統分為六氣自冬至一陽生至夏至為六陽之極運自冬至至𦬆種合莭氣中氣共十二氣每運二千二百八十二年零六月有半一陽初運始于上元甲子冬至終于地皇之前丙寅夏至一陽中運始于丙寅小暑終于人皇之前乙已小寒二陽初運始于乙已大寒終于黃帝六十九年辛未大暑二陽中運始于辛未立秋終于
  hash: sha256:a8c9940433d05e7be3aec66ae4a420bd5ffe7a89f26b28e4ec2dba1aeffe8721
