body:
  text: 殷曆又不相符云盖盡以周正推之固不效于莊閔而前而盡以殷曆考之又不效于僖文而後也然則春秋前用殷正乎非也失閏故也周初改正以建子之月為歲首乃治曆之法始于此耳故曰是謂權與日月周正歲道其建寅之月仍為春正月故曰敬授民時巡狩祭李猶自夏焉而周禮所謂正月之吉者政建寅之月也夫以建寅為春正月此本夏制十一月冬至為元首此本殷制而周參用之盖監于二代也夫周既云改正矣而正歲仍從殷正月仍從夏者所謂聖人有改制之名無變道之實也至于叔世聖王不作天道不明司曆者往往有失閏之悮是故一失閏則以丑月為春正矣再失閏則以子月為春正月矣古人言魯曆不正以閏餘一之歲為蔀首則必有應閏不閏不應閏而閏者置閏失序而失閏所由来也徐圃臣曰攷商周改正非正月至幽厲之世矣曆失閏因循謬悮冬春上竄遂以改月傳會改正彌縫一時至僖文之世遂為成法斯真定論矣
