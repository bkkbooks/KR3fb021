body:
  text: 恒星七政同為左旋故曰順地方於內不逆不交方以言其德地氣自下而升故曰逆順而運所以生物逆而交物之所以生也其變化流動行始終合散莫渄氣之所為即莫非理之所在是故善會道者觀之於有象之後也宓義氏仰觀俯察而作易暦亦政是從有象中得来而况於學道者乎氣者象之充也數者理之表也象者數之所由會也理者氣之所以然也四者終始相因交互相成而不可離此天之所以為天也氣是元象是亨數是利理是貞遺一不得拆開不得理不可見而寄之於數由是易與曆作焉易職其神曆諦其人也人之一身象也呼吸氣也官骸數也德性理也易寫天地之理辟如照真曆指天地之體辟如風鑑易之數圓而虛曆之數方以實易道如天曆道如地
