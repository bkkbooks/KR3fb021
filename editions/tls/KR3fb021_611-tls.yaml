body:
  text: 當甲子之歲而歲差定法作如此分泒者不過假義以紀太古之歲月耳即所云天皇地皇人皇者亦是後人追目之詞併不必求其人以實之若執此而過信焉則無異説夢于廢人之前矣五帝三五之說襍見數傳言人人殊三皇之珠詳書傳上元間以宓義神農黃帝少吳顓頊言者則禮記月令呂春秋家語也以黃帝顓頊帝嚳堯舜言者則大載禮史記也以少吳顓頊帝嚳堯舜言者則孔安國皇甫證鄭樵也以黃帝少吳顓頊帝嚳帝堯言者梁武帝也舜又弗與謂舜非三王不非五帝特與三代通為四代說尤無據其名號已無定論矣至於年世則列子云宓義至今三十餘萬歲董已云黃帝作調曆歷代十一更年五千曆志云太史令張壽王等治黃帝調曆謂黃帝至元鳳三年六千餘歲單女國栝育等治終始言黃帝至元鳳三千六百二十九歲與近代曆家積年甲子之僅據鑑紀者遠近懸絕其果孰是而孰非乎要皆存而不論可也
