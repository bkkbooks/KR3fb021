body:
  text: 秀水張雍敬著地理地也者合水土而為言者也原夫胚渾肇形陰陽之氣旋轉不息則其渣滓搏而為地土峙西北水歸東南西北為陰故土結馬東南為陽故水融為氣克於地土載于水人但言地為氣昕載要須知地之內皆氣之昕克蓋氣者體物而不可還凡有形即有氣以克之試歡粟大之土入水必沈地內無氣為克則水亦安能載之水秉于氣氣即是天蓋涂形質天馀八重皆剛氣耳朱子曰地却是有空闞處天却四方上下都周匝無空閥逼塞溝皆是天地之四向底下却靠著那天天包地其氣無不通恁地看來渾只是天了氣却從地中迸出又見地廣處又曰康節言天依形地附氣昕以重椱而言不出
  hash: sha256:99301886ad261faae79f2218f2d1c692a1991a2a0854656a21bedd0d402a3e66
