body:
  text: 太陽躔大火之次古赤道氐六度太陰躔降婁之次古赤道婁十二度歲星躔星紀之次古赤道斗二十四度熒惑躔娵訾之次古赤道危十五度填星躔火之次古赤道栁十度太白躔尾之次古赤道軫三度辰星躔大火之次古赤道氐二度以上為終元七政所躔度圖説天地開聞在上元甲子子半陽生初三夜子冬至其初昏之象炁始于夜半而象定于初昏者天象先開地炁後闢序固如是且步月步斗必於昏時從初見以為始也太徵在上紫微在中天市在下而三垣定矣元枵在子火在午大火在夘大梁在酉舉四正以該其餘而十二次定矣角元氐房心尾箕在東是成蒼龍之象井鬼
