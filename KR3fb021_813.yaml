body:
  text: 四日一五八用加步斗虛度通三百四十七萬一二查表淂宋黃道軫八度八七於白露十四日合伏即為乙亥所躔度金星置前歲積加章首金應三百九十五日九一三除二金率餘三百二十三日八三五七反減原率淂二百六十日六六九用加步斗虗度道三百三十三萬三查表淂宋黃道翼十五度一七於白露前一日合伏下距乙亥朔一十五日應進一十九度淂軫十四度為乙亥所躔度水星置前歲積加章首水應八十一日九四九一纍除水率餘一十八日九一七反減原率得九十六日九五九用加步斗虗度又加一率策通二百八十五萬八查表淂宋黃道柳五度八於大暑十五日合伏下距乙亥朔六十二日應進五十五度得軫二度五為乙亥所躔度按此條唯火星稍盈然秋分之節經星入縮曆則政在角軫之交也其時五星皆當合伏前後太陽躔軫六度非實徽諸天象蓋但從測算而淂亦可謂密近
