body:
  text: 以魏晋以来諸曆攷之實未及百二十年而盈一日且其所據以起率謂昭三十二年歲陰在夘歲星在星紀其實非是詳後而一行乃傳會之為差合術一行日歲星自商周迄春秋之季率百餘年而起一次至戰國其行爰急及漢哀平間八十四年而超一次因以爲常此其與餘星異也姬氏出於靈威卻之精受木行正炁歲星主農祥后稷憑焉故周人常閱其禨祥而觀善敗其始王葉次于親父以達天鼋及其哀也滛于元枵以害鳥帑又其後也歲星失行于上而王侯不寧于下則木緯失行之勢宜極于火運之中理數然也唐開元十二年上距西漢河平三年七百五十年考其行度猶未甚盈縮則哀平後不復歲星漸差也春秋僖公六年歲陰在夘歲星在析本昭公三十二年亦歲陰在夘歲星在星紀三統曆因以為起一次之率攷實猶百二十餘年超一次近代諸曆以八十年齊之或行速而用緩率故於古或差三次
