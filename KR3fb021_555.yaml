body:
  text: 之又為張三見步斗表其法抵牾良由黃赤道宿度求詳分秒愈生乖舛也今時憲曆庚午天正冬至日躔在箕三度二十五分西法周天止三百六十度故三度當加四百三十六分八九四一三七其度法止六十分故二十五分當作四千一百六十六分不盡六準諸授時法為箕三度四六三五六八今考庚午上距至元辛已四百九歲應差五度七六三二八八六五從箕九度二十二分一十八秒推而進之當在箕三度四十五分八十五秒一九一三五僅差一十八秒太蓋亦久合矣要之黃赤道自授時變法後實度孟不可為據今且紀以虛度其實度必當以步斗法考定周天然後命之平初甲子至今龍飛康熙二十九年庚午天正冬至積距一萬四百四十六歲應差一百四十七度一九六一六五三四一一減去平初至宋乾德元年甲子歲差度四宮有半今入寅宮凡十度二三一七五七
