body:
  text: 人定之出于舛謬而不自覺後人驗之見其差訛而不敢非者變行超次之說沈蔽於中而凡於考驗違失者即指為天象之變故任其術之疏謬而不知務求精密也今據舊率遠考漢初契差一次近驗監曆亦差六辰則舊率之過贏可知舊法庚午前合應三百二十一日九五四為已已立春日合伏在女七度時憲曆庚午前合應三百二十六日半強五十三三六為已已立春前六日合伏在女一度又上推開聞五星皆當懸象而木星獨伏而不見下究一終五星皆當背吃而木星獨分于金水之閒則舊率之過贏會可見亥凡推日月星辰必究其始終而後定法可得此法曆所以貴求元也今據時憲曆以定庚午之合應監曆較舊術未免矯枉過正今始從監曆立法以候潤候積久之君王壬為訂正但將合應日那趙便是其性法率策則不可加損也而推源于上元要歸于才元詳第四卷求上元終元五絳躔度取證于史謨及春秋由外傳歸嬌誣之舊說運天運之本然定為新率以著真數斯亦天道不容終晦也餘四星舊率雖未必毫釐意協而相去不遠始仍其舊
