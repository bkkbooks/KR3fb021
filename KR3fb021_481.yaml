body:
  text: 栁星張翼軫在南是成朱鳥之象奎婁胃昴畢參罰在西是成白虎之象斗牛女虛危室壁在北是成元武之象而二十八宿定矣日晨出于夘而昏沒于酉故躔畢而藏鳥月魄蘓於庚而望盈於夘故離房而腹兎二十八宿分禽酉中為畢月鳥夘中為房日兎故日鳥月兎之説古書如山海經屈子皆有之鳥係以月而藏于日兎係以日而藏于月此政所謂陰陽之精互藏其宅者也盖亦假象取義云爾𠰥謂真有是象則非矣北極為韋𩄇之主大帝之神臨明堂以出震明當心星也北斗為列象之綱元氣之宰齊七政以建杓一元終始擊於南斗五炁順布長則歲星木為五德之長故木星最在前次水次金次土次火皆從後相生日亦屬火故在木前月即屬水故在金前五行順序而相生此誠定理定數也天道貴右眾曜隧陽月與五星皆隧太陽之後天道貴明三光間列
