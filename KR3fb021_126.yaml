body:
  text: 互為屈伸陽長一分即是陰消一分陽消一分即是陰長一分若云陰長一分即是陽消一分便非矣陽變陰合五行生焉變合二字先儒𡪯說得的確政是看得屈伸二字分明耳其動靜也無傳而變合也有候動靜之界其機甚微中間更無積漸若五行之理雖具於太一之中而由變合以生自有積漸矣是故陰陽者一氣而異迹譬之於水熱遇為湯寒則為水而其為水一也五行者一理而異德譬之於木枝業花實形巴具味各別而其為木一也陰陽言氣五行言理各就重一邊說貞元不息天地位焉化育流焉一日如是一歲亦如是近而一息遠而一元亦無不如是天圖於外不順不運
  hash: sha256:7f89f392d494709884339c431daa61fdb534d3a8a54b1ec78116d2d96085e0d2
