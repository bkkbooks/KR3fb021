body:
  text: 秀水張雍敬著三統説造化之數有始終自始至終必漸為推移漸為通復此三正三統之所由建而歲差之所由著也三正之法建自三皇子會建子為天正其中星起于午丑會建丑為地正其中星差于未寅會建寅為人正其中星差于申盖率天蹊人一本乎自然之運而已詳三正說至于五帝之世運當夘位中星在酉若承前法似應建夘而三才之義既備則不可復尚四始之理既得則不可復更故人正之建遂為百王所同然天運已移而正朔不改則歲將無由而著於是聖人建三統之法以立春為炁首顯從建寅之舊而默寓歲差之理于不見行跡之中既有合乎天運之差移復不馱夫愚民之耳目盖三正之改從乎象而三統之立從乎炁也三正是改月三統是紀年原為兩事漢人所以悮合為一者則以義取三才彼此相同故易致蒙混
  hash: sha256:1c3af2681badc697c8d7280bd6d3497dc1e0ff4a572a5e9b9b156ad05efcbdd3
