body:
  text: 日置前歲積減去庚午土合應見前以土周率纍除之餘一百五十八日七二一為甲午至後合伏日太陽入盈末七十日應減二度二三三九太從古黃道歲差日躔斗二十三度中順數一百五十九度弱淂井四度初為至後合伏度查土星行率合伏前三度有應行三十日則殼雨後七日已躔井宿置前歲積減去庚午金合應見前以周率纍除之餘九十八日六五五六為甲午至後合伏日太陽入盈末一十日應減四千六四六分太從古黃道歲差日躔斗二十三度中順數一百零半度強得婁十一度初為至後合伏度查金星行率合伏後順行五十五度四十三日方躔井宿為立夏後五日置前歲積減去庚午水合應見前以水周率纍除之餘六十日三五二九為甲午至後合伏日太陽入盈曆六十日應加二度一二七三太從古黃道歲差日躔斗二十三度中順數六十二度半弱淂室十七度末為至後合伏度查水星行率合伏後順行九十三
