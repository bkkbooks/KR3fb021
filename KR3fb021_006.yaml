body:
  text: 序鳴呼居今之世讀古人之書而欲得其意之真者以釋千古之大疑豈不甚難哉蓋自秦火之後羣言煽亂而經書大義巳晦蝕久矣然其殘潘餘瀝存精華於渣滓之中者猶足以咀而辨之以得其真味之所在自後世妄作者多有書而不善讀即能讀矣而未必刻苦冥思以求其當於是或自生意見牢不可破或信耳隨聲一唱百和師以授弟父以語子世世相習遂名專家天下從風而靡者蓋千百年于此矣於斯時也乃突馬起而疑之欲盡關其説而從我則必羣吠所怪以為不根即産古人於今日亦安見斯人之即為古人而不環詬而交詈之乎況乎所闈發者又為古今集疑之藪聚訟之門則尤非淺見寡聞者所及信也余嘗見前人論易之書充斥汗浸而竊疑其説之未純旨之不一因為論著一二并椎其餘意以求世間大疑之端則莫過於歷學地理醫道之三事謂其書太繁傳太雜而侜張舛錯莫此為甚也夫凡事貴有師而惟此三者可以無師凡事貴有書而
  hash: sha256:fe7d7dc98aae0dafa0673b415b13a0763c7368cc6af88fd360ddbb1c1495f864
