body:
  text: 又六分之一其二等各星大於地球八十九倍又八分之一其三等各星六七十一倍又三分之一其四等星大五十三倍又十二分之一其五等星大三十五倍又八分之一其六等大十一倍又十分之一此六等皆在第二重天也土星大於地球九十四倍又八分之一木星大於地球九十四倍又一半分火星大於地球半倍日輪大於地球一百六十五倍又八分之三地球大於金星三十六倍又二十七分之一大於水星二萬一千九百五十一倍大於月輪三十八倍又三分之一則日太於月六千五百三十八倍又五分之一問月借日光光有消長乃諸星之光恆見圓滿而無消長何也曰諸星與月其借日光不同也月天在日天之下月手其光近遠一異消長不同諸星之天居日天之上日光照星恆照其下面雖或近或遠于日而其下面恆有光故居地上者視星恆有光也近世西洋一名士創造一巧器持此器觀六十里遠一尺大之物明視之無異在目前也
