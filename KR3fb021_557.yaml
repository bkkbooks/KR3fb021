body:
  text: 六四五也辨疏謬古今之言歲差者其謬有五凡在彼當日所測候而得者多為黃道而自謂之赤道一謬也詳上萬黃赤道不同而以當日所測之黃道承古時之赤道為言二謬也古今黃赤道之度又不同故考古當用古度驗今當用今度而後據今度前承古度三謬也古赤道午正星七度古黃道午正張二度差二度數至箕一又差三度古赤道與宋元赤道數至箕一差四度餘古黃道與宋元黃道起張三數至箕一約差二度古赤道與宋元黃道數至箕一約差七度其不同也如是即如慶曆甲申在斗五度至元辛已在箕十度未盈四甲子而首尾相去六度豈真歲差如是指速哉政以黃道更改有不同耳夫同為黃道而前承古度後據今度則差訛已違況後據今黃道前承古赤道其舛謬又可勝言邪古曆日躔有或係赤道或係黃道之別而考古者亂引為據四謬也詳前篇今之箕末古為斗五古之虛一
