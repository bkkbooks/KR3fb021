body:
  text: 至今時憲曆冬至元應凡四十八事朔策自夏書季秋月玢詩小雅十月辛卯春秋之晦相交食及太初曆至今時憲曆諸朔應凡八十有八事至朔除三統元和法用四分其術最疏交食除文十五年經無日朔可考及襄公時兩日連食此曆法術無不必求合外此政以不合為密至朔惟授時大統回回三曆加時僅先後刻許授時至先一刻餘朔運一刻餘大統朔先一刻弱回回曆祖先三分刻之一蓋亦可謂密近矣若大統之至先三刻弱回回曆之至光八刻餘則不知氣差之書長此又以不合為密也交食惟昭十七年合經朔而不合于定朔而已餘皆吻合分秒不爽若曰今茲之法必可萬世無弊所不敢知而通之于古則固四千餘年如一日六十餘家之曆如出之一手矣經史具在可按而稽所不容誣者也曆統戴銂問曰曆之所自始可得聞乎曰無象之先曆理具馬有象之後曆數著馬故自有天地即有絶天出治之聖斯即有本天敷治之學古聖人具明天察地之智備窮神知化之能於陰陽之通通復化育之流行妙契無間而著其迹于曆用之朝廷布之草野經國室民開物成務悉本於此是故曆也者古帝王之大
