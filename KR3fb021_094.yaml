body:
  text: 至今時憲暦冬至元應凡四十八事朔策自夏書季秋月玢詩小雅十月辛卯春秋之晦相交食及太初暦至今時憲暦諸朔應凡八十有八事至朔除三統元和法用四分其術冣疎交食除文十五年經無日朔可考及襄公時兩日連食此暦法術無不必求合外此政以不合為密至朔惟授時大統回回三暦加時僅先後刻許授時至先一刻餘朔運一刻餘大統朔先一刻弱回回暦祖先三分刻之一盖亦可謂密近矣若大統之至先三刻弱回回暦之至光八刻餘則不知氣差之書長此又以不合為密也交食惟昭十七年合經朔而不合于定朔而已餘皆吻合分秒不爽若曰今茲之法必可萬世無弊所不敢知而通之于古則固四千餘年如一日六十餘家之暦如出之一手矣經史具在可按而稽所不容誣者也暦統戴銂問曰暦之所自始可得聞乎曰無象之先暦理具馬有象之後暦數著馬故自有天地即有絕天出治之聖斯即有本天敷治之學古聖人具明天察地之智備窮神知化之能於陰陽之通通復化育之流行妙契無間而著其迹于暦用之朝廷布之草野經國室民開物成務悉本於此是故暦也者古帝王之大
