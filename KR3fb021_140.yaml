body:
  text: 功效可知盖數出於理而理寄於象也彼世之言天者指七政為東行執經星為不動立歲法為一定於象炁之顯者且冥然莫知則無論深與言理亦且淺與方數矣是以求上元則争為荒誕而不數其實論歲差則囿於見聞而不探其源步三辰則唯有加減折中之法而不知有變移通復之理無他先於天體有未明也夫天有九重高下相次左旋為順緩急以分此天之形氣也日誠出誠入月信死信生經星有盈縮五緯有遲疾此天之性情也星躔省象差歲實有炁差積日成歲積歲成元此天之功效也三者既明然後因象起數而步日以定炁步月以定朔步斗以定星辰而上元之真數可得矣既明其始自悉其終而後合天地之始終以定所步之策數則日法月法度法象差炁差五星行率無一不有周法以統之界限以書之而皆無過不及之弊則古人一定之法可坐而致矣又奚籍攷璇璣之制飛緹室之灰測畧景候中星榷土炭騐交食而區區馬求諸器數之末哉
