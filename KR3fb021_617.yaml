body:
  text: 炁策定法日法德萬萬分朱子曰曆法以分秒細者為宻堯天曆用十二萬九千六百分故密今曆家所用只是萬分曆已是多了他如何肖用十二萬分云云夫曆法之要在於歲差歲差淂其真則歲餘定矣由是範之以元綱之以統分之以紀析之以章則累限井然自無差戍其微妙處正在絲忽之間固有不可得而簡者授時曆日法度法均為萬分算便易無發斂折併之煩而亦無日度參差之患其法最善然日法雖止用四柱故名萬分而盈縮疾遲等曆已多至八柱則是萬萬分也今定策多至十柱故為億萬萬分𠰥以第五柱作釐則仍為之萬分亦可時鈐八百三三不盡三刻鈐每時八大刻二小刻每大刻一百分每小刻一十六分不盡六初初刻一百分正初刻一百分初一刻一百分正一刻一百分初二刻一百分正二刻一百分
