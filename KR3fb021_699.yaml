body:
  text: 炁應加合説前表所證諸曆以加分和之分秒不爽則天運之消長舊曆之密近與新法之確合俱可見矣其不合者惟授時過於先天元和太初過於後天三曆而已盖漢人未知歲差以天周為歲終故法常後天新法之于漢曆正以不合見其善矣至於授時之先天則因信統天曆消長之説為是而不知統天之歲策詳酌密近已為消率𠰥用之于消時上攷不必用長下騐不必用消者也今試取其歲策以攷表中前後諸曆無不曶合可見而郭氏又悞從統天起消故致先天也外如明之大統曆回回曆皆失之先者則泰定甲子後當長而悮仍授時舊術不知用加猶漢世當消而謬沿古曆不知用減也盖消長之交徽而難察非積就而至于甚差則不能知故漢後當消至魏晋而始覺元後當長至今日而始定也明大統曆洪武十七年甲子天正冬至已未三刻七十五分新法已未五刻八十一分上距泰定甲子五十九年凡消分長分漢從甲子本年冬至起筭故前表春定積距增一筭此惟
  hash: sha256:313c01cb568bc0f2ba52c27f447560300a281ae54456ea00a7c91d951cb6e81a
