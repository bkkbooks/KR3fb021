body:
  text: 過北萬五千里以地差二百五十里而極差一度算之則極當高出地九十六度若南遊時又當隱入地二十四度寧有是理哉天半覆地上常見者一百八十二度半強今夏至地降而度不加多冬至地升二度不加少則甚矣其妄也此無他良由不明渾儀真象黃道畫夜長短之理故移地使動以就其說耳亦知地道順靜乎閒當置孟水于恭畜小金魚及水草于中偶移動閒孟數轉旋而水則凝然不動蓋諦親水草知之孟之旋轉天也水之不動地也即此可惜地在天中之理又謂地包天內適居六合之中而古今之測候者見南北二極俱出地上則地之渟于下可知也地既渟下而所見日月星漢其出沒適分天之半者遠使然也蓋天之所親近則高遠則半更遠則沒不見夫飛鳥乎仰而視之則高一二里外則平數里而外則沒矣然而飛鳥之高奪自若也飛鳥自若而視之者三變遠近之分也
