body:
  text: 初推而進之日月當會于娵訾之次而不當在牽牛若更推而進之至歲差一周之前則當有二萬七千餘年而亦非四千六百餘年之所能該總之漢人不知歲差誤執牽牛為冬至常宿是以其説舛謬如此後人亦既知有歲差之理矣而推上元猶必襲其謬説若以為不刊之典何哉七曜同起辨寒暑遞謝日月代明此天道以流行為德者也四象分列五精錯行此天道以布散為體者也故日月五星之流星布散者其常聚而在于一宿者其變今推上元不揆其常而獨取其變何與且既云合璧自當以並明為義既云連珠亦當以共見為辭竊考開闢之始陰陽五行之精無不輝曜于天此懸象著明之理也若七曜同起則月方合朔五星皆當合伏旦昏之際日月五星一無可見夫豈開闢之象乎朔旦冬至辨氣因乎日朔因乎月冬至為氣首朔旦為月初二者理殊而數異不可以等齊故曰步日必始冬至子半
