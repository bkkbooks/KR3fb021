body:
  text: 圖圖説積氣為天大其體穆穆其色蒼蒼盈天地間皆生氣也蒼者生氣之本色遠望黃山而皆青亦是生氣之積其命不已其機不息色倉編覆之謂天無為而成之謂神過而不留之謂化信而有恆之謂貞圜則九重陽以包陰經星土木火日五重為陽春秋説題辨曰星者陽之榮也陽精為日日分為星故宇從日生來子曰經星卻是陽氣之蝕凝結者蓋經星雖陰陽五行相禮而大段則屬於陽
