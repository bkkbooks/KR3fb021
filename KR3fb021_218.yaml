body:
  text: 六乘每重厚徑潯五萬五千一十九里二八五九併太隂天徑之數即太陽天之徑數也經星天徑二十二萬五千五百七十九里七五一周六十九萬六千三百五十二里七九七歸為度度得一千九百六里一百六十七步自太隂天至經星天凡七重法當倍加置每重厚徑以十四乘之潯十二萬八千三百七十八里三三併太隂天徑即星經天之數也其外四薄柃形質天之際則為徑二十三萬四千七百四十八里九五六一為周七十二萬四千六百五十九里八二一歸為度度潯一千九百五十八里二百八步外薄形質天尚距半重法應倍加兩箘半重即上經星天徑而加一重天厚之數按淮南子云禹使大章豎亥步四極之往二億三萬三千五百里張衡震憲徙之故古法每度為二千里詳測量天地辨此本古聖所測得往度里實之真今以新法測之其數久合彼離畔古法恣為萬唐者可以知返矣
