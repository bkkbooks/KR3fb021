body:
  text: 遲疾相凖則與太白同太陰之行𡪯遲一日所行比天為差十二三四度其行遲故退度最多令人不曉以為逆行則謂太陰之行𡪯疾也今次其行之遲疾天一土二木三火四日五金六水七月八天土木火其行之速過於日金水月其行之遲又不及日此其太率也夫謂五緯右轉猶可以惑下愚之人若夫日則出于東極入于西極信而有常終古不忒指為東行則雖三尺童子必以為不然竊憶雍敬兒時清夜踏月東風作浮雲西去如駛訝曰月何東行至疾邪先嚴教之曰此非月之東行乃雲之西去急而於是曉然今左旋之説則是經星之西去急而非七政之東行此亦何難曉然之有茍明經星之速遂謂天左旋而七政右轉則月不及日又將謂日左旋而月右轉乎天體不明則理數俱昧暦術之疎全由於此故首為辨之
