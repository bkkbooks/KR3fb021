body:
  text: 其平而不可以上面西面較量其高下也夫隨人所豦皆自以為地之上面則亦當皆自以為地之極中凡圓體必中高而四向隤下今試以杭郡驗之人在杭郡則杭郡為中而環繞之嘉湖嚴紹徽寧諸郡皆當見為隤下今嘉湖自低徽寧自高恐于圓體有所難通也彼將曰所謂圓者論其全體則然耳若就一省一郡觀之則山川高下不無變形而究其全體則仍無礙其為圖者也且圖豈真如鏡球之類哉然全體雖不可見而大段則可見自吳越北至朔方數千里而遠西至甘肅亦數千里而遠已約得地徑三分之一而西北自高東南自下地之高下雖有定形於圖體終有所不能通也如曰㞾崘為大地之中故西北高而東南下則中阮有定斯上下亦當有定將無分上下之說既不可通而自崑崙以遠八隅且必仍如梯級矣五則凡物近視則大遠視則小西術所推日月星宿之大小全憑此理乃論眺胸則但以高卑為大小猶可曰中線之豦遠近無殊也至于日之出沒大而午中小
