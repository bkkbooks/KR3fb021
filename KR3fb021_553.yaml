body:
  text: 平初甲子至元世祖至元十七年辛已天正冬至一萬零三十七歲應差一百四十一度四三二八八四置步斗虗度如前法減去授時象限九十一度三一四三七五及上歲差數餘七十一度六二七七四一查步斗表得授時赤道箕九度八二七七四一其黃道得斗初度五七三四一皆與授時當日所推不合赤道相應六十分六十九秒黃道相懸八十七分五十九秒考郭氏測候宋為精密其日躔所在要當無悮或失之先天冬至加時先天則日躔亦先天矣亦必不至相懸如此之甚蓋其大端在建都之地不同為南北視差至故而其謬處又在黃赤道更改不得古人步斗之法耳今以歲差度從箕九度二十二分一十八秒逆推之其赤道起午正星六度之七六八一而以步斗法齊之則為星六度之七二五差四分三十一秒而其黃道得張一度八七九五九四七與古黃道午正為張二度者亦不甚遠可見天道自有至信之理而步斗法誠為不易之規矣及考其分宮則以星六度二一九三為黃道之午正既非張二而以步斗法齊
