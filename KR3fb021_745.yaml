body:
  text: 何以獨屬於越乎即曰次同宿異自有分別則漢書以斗為吳牽牛須女為越淮南子以斗牽牛為越須女為吳已互相矛盾莫可適從矣天元曆理曰按昭公三十二年夏吳伐越史墨謂越淂歲而吳伐之吳越本屬兩舍法推得是年辛夘夏歲星正在析本之津尾箕之分則尾箕本屬越確矣𠰥蔗者齊魯之右臂晋趙之束天官書曰燕齊之疆候在辰星占于虛危辰星為北方主宿而燕與齊接壤故同占虛危則燕固自有在矣夫天象至圓房隅定位以至圓配定方亦不過左左右右東西南北不失其次耳吳趙之右為蔣鲁齊鲁之右為燕趙何以燕別居吳越之左此理之不能通者𠰥謂古聖人別有其理原不可觧則趙之右為晋晋之右為春春之右為周為楚為正為宗為吳又皆不紊十一次皆不紊而獨一燕趙之相借豈神靈聖人之理固𠰥是乎尾箕為燕分陰于攷證右今極其詳具見本書且彼之所據者春秋也今即以春秋證之襄昭之際
