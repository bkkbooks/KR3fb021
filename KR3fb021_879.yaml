body:
  text: 二十二年已酉春王正月癸丑定法天正朔辛酉七三三三丑月朔辛卯有癸丑以上七條俱為丑正僖九年庚午春王正月丁丑有本作三月定法天正月朔已未六八七六有丁丑十六年丁丑春王正月戊申朔定法天正月詳晦朔考經朔戊申二十五年丙戍春王正月丙午定法天正月朔丙戍七四五三有丙午二十六年丁亥春王正月乙未定法天正月朔辛已一一二三無已未經于上年書十有二月癸亥無法相合夫十二月既有癸亥則正月自應無已未矣蓋亦有悮文也宣十七年已已春王正月庚子定法天正月朔丁丑二一二有庚子成三年癸酉春王正月辛亥定法天正月朔甲申二三有辛亥十八年戊子春王正月庚申定法天正月朔丙辰七一八
