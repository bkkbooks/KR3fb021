body:
  text: 一十三度八四木率合後應行六十四日強於已已立春十五日入元枵之次按此傳之附于正月者以妖星出于婺女為正月事非歲星正月已在元枵也斗牛女虗危室壁為北維之宿皆顓頊所建按國語云日在析木之津辰在斗柄星在天𪓣日與星辰皆在北雉顓頊之所遠也云云可見顓頊之墟不專指元枵此次也而斗為首故曰歲在顓頊之墟居其維首蓋言歲星正月為在斗也歲在豕韋昭十一年庚午歲星日躔在牛四度一四淂步斗虗度九十七萬一四置上已已前應加一歲策通三百六十九萬七一八七反減原率淂二十九萬一四五用加步斗虗度道一百二十六萬二九查表得古赤道危三度二九為庚午至後合伏度距𡜯訾危十三度九六過宮凡十度六六木率合後應行四十八日強於驚蟄二日入𡜯訾之次後二歲壬申清明後躔大梁之次其年夏楚弒其君䖍秋蔡候盧歸國所謂蔡復楚凶又無不畢慮
