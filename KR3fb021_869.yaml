body:
  text: 言月朔必起于時是當從蓋春起殺也自一至十則數終矣故仲冬為次一而治曆者當從此為始也此解前所稱雅一月之義蓋後人悮以此為建寅之月也按武城亦書惟一月幽風稱一之日與此政同亦可見其考同時之大矣凡四時成歲省春夏秋冬各有蓋仲季以名十有二月中氣以著時應春三月中氣雨水春分轂雨夏三月中氣小滿夏至大暑秋三月中氣雩暑秋分霜降冬三月中氣小雪冬至大寒此明四時之序蓋懸復人悮以一月而名之為春也閏無中氣此置閏之定法斗柄兩辰之間此當時閏月之象萬物春王夏長秋收冬藏此明四時之義可見于月加春斷流聖人之制矣天地之正四時之極不易之道夏數淂天百王所同此即夫子行夏時之意先聖從聖見理要無不同也其在商湯用師于夏除民之災順天革命改正朔改正者顓頂建寅而殷建丑也改朔者顓頊以生明為月首而殷以合朔為月首也變服珠號一文一質示不相沿夏之建寅宗三統之法省實義焉故曰質𠰥酉之建丑乃徒襲首三正之名而已故曰文以建丑之月為正易氏之視𠰥天時大變亦一代之事亦越我周正改正異械獨言改正不言改朔者用之正歲以冬至為元自異于顓項之以立春為元而步月始于生明則仍從古滿也異械者即上文變珠號之謂以垂三統三統者顓頊之法而虞夏所家焉者也至于敬授民時巡狩祭享猶自夏焉縷語尤為
