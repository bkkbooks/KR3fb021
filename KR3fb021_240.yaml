body:
  text: 十洲拾遺等記形容悠渺幾非人也總緣元以前未審昆侖之實耳若夫古聖人以土圭測土深正日景以求地中則在豫州之境周公所測為陽城宋朝所測為嶽臺歷家所指為嵩高皆豫州境也乃天地之所合四時之所交風雨之所會隂陽之旴和此與地之中太和元氣旴鐘而堪與之結穴也陸地左艮右坤中國負乾面巺指地形言氣始西南坤道資生也天秦等地龍脉之祖也利寶謂西南詳有天浪山天下惟此山叢高蓋此維之首萬脈皆由此起其東北有微徑與中國相連此過峽也昆侖其幹龍也黃河回折則龍徒水行也朝鮮龍峙沙也江南虎抱案也地氣始于西南折西北又折面東以入中國凡江河諸水雖大勢東流而入海必灣抱向北蓋地氣自右旋繞回抱而左始坤終艮乃自然之理觀國可見祖龍自申入酉而節節轉㭥其枝分而入中國者大約庚辛交三龍也而辛龍為多自河以北為北龍自河以南為南龍唐虞以前運在北方自天聖起于會至唐雲在郊會之中故聖人多與于北而南龍間發焉唐虞以後運在南方商武乙二年入展會宋太祖德二年入己會故聖人多與于南而北龍閒叢焉
