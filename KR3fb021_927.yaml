body:
  text: 五德終始五德之說雖不見于六經然氣運循環歲衷遞禪天道人事應感相符故聖人之與必秉德而王此理之可信者也且禮傳有之曰夏曰嘉平殷曰清祀周曰大蠟蓋言蠟也風俗通以為夏曰清祀數曰嘉平非是夫祖蠟必本於行之盛終王者各以其行之盛為祖行之終為蠟如寅午戍則午為聖戍為終三代既各有臘日則亦必各有所秉之德運又可知也故其說雖與于戰國之際而法所從來蓋已久矣今考太吳以木炎帝以火黃帝以土少吳以金顓頊以水五人帝見月令亦見載禮帝嚳以木帝堯以火帝舜以土夏以金商以水周以本世鮮異議然五帝之世祖孫父子各秉一德三代皆歷年數百傳世數十而袛周一德豈黃帝少吳顓頊帝嚳未必及身相繼而帝擊譜世本之說有不足信邪抑受命易姓始易一行與廢以德而年之遠近族之同異有所弗論邪至秦人採鄒衍之論顓推五勝自以為水德彼以力征而踞天下其從所不勝也固宜漢與諸儒益多異議為相勝之說則不淂不變周之木為火而秦以水勝之主相勝者賈誼公孫弘司
