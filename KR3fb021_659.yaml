body:
  text: 考古無差説天道之無運有變移而曆家之策數唯一定是以久則必差差則改之以求合此固在昔研當然吾獨性夫治曆者苐見舊法之差而不思舊法初定之時未未嘗差苐見舊法之也不可施于今而不思夫舊法之何以不可施于今也古來語曆其定曆之年凡無慮朔慮無不與天近所以行久則差者因歲餘朔發之數有未真耳故其策數雖不可而無朔諸慮則必當求合也一經更改軌棄舊法自矜新奚不復求合但曰古曆不能下通于今獨新曆之不可止得一君古今天道截然各異者而考驗交蝕則遞推春秋之世亦無不合是可見古今天道未嘗或變而古今曆法亦未嘗不相通亥何獨無朔之策古今不可相通宇夫後之視今猶今之視昔古法既不可行于今則今法何獨可行于後今既不能上通宇前此之法則又豈能下合于復此之天何從來曆家莫此思及邪今麗無差之法欲定將來先考已往取千八百年六十餘家之曆以經無考之使一一見其所差又以消長法推之使一一見其相合則既可上通于千百年之前自能下合于千
