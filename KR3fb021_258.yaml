body:
  text: 其光景即不復照及于地猶當照及于天也乃何以日汲才二刻半而通天遽昏黑乎又以星驗之日之出後汲前半周天內無一星可見而沒後距十二三度外星即可見豈非光衰之明驗哉且不獨光有盛衰又𠔥以出陽入陰之故蓋天之為體上半屬陽下半屬陰陰陽各半正太極之務東西二極為陰陽合縫之豦故日出于陽中而明入于陰中而開也周髀家舊有此說夫畫陽而夜陰上陽而下陰陽為昭融陰為窮𡨋此理至平初非奇論此理至確亦非臆度但世方排斥蓋天故莫宗其說其亦將不信有陰陽之理乎周髀家言日朝出陽中暮入陰中陰氣暗𡨋故沒不見夏時陽氣多陰氣少陽氣光明與日同輝故日出即見無蔽之者故日長冬天陰氣多陽氣少陰氣暗冥掩日之光雖出猶隱而不見故日短按所言出陽入陰豈理極真但不應為日行麗天平轉不出入地中作解而日長日短之說亦由未明渾天真象黃道畫夜長短之故此立論之有謲非理之有謬也
