body:
  text: 易道假象取義數主乎動如乾可變坤坤可變乾而初無定體故曰圓曆道切合天行數主乎靜如歲實自為歲實朔實自為朔實而不相假易故曰方二者為數不同而原於天則一先一易乾為天天位乎上故乾正乎南坤為地地位乎下故坤正乎北離為日日生乎東故離正乎東坎為月月生乎西故坎正乎西良為山地勢高於西北故艮位之兌為澤四瀆輳於東南故兌位之震為雷雷出於地故附於坤之右異為風風薄於天故附於乾之左此天地之體曆之渾象也其圍當立晋後天易帝出乎震震屬木於時為春木生炎故離次之於時為夏火生土故坤次之於時為季夏土生金故兌乾次之於時為秋金生水故坎次之於時為冬水非土不能生木故艮次之於時為臘終始以成此天地之運曆之氣序也共圖當平看其於察天道前氏用詔吉凶未修悖亦一也聖人即理以主世數學者因數以契理其歸亦一也先若子曰
