body:
  text: 秀水張雍敬著器數考辨治曆者知天之事也知天者聖非夫人之所能而從器數以深求其理則下學上達之事夫人之所能也乃古今之治曆者習其器焉耳矣而所以制作之故不知也考其數焉耳矣而所以立法之意不知也密者為近疏者為遠則知之而密者亦遠則不知也可施于今者為是不可施于今者為非則知之而不可施于今者之未始不是則不知也夫古今器數疏密雜陳是非淆亂茍不能深求其理則疑信皆非從遠必謬而異端邪説皆足以搖之如是而欲從事於知天之學也難已是唯精于求知者不徒安已然之迹而遊心于未有器數之先不徒驗此日之天而究觀于上下古今之遠則其疏密是非自洞𠰥觀火而天道雖徵可以與知矣今略舉古今器數條列而辨之如左
  hash: sha256:5b33e2c38b0bd65aceb4ae9778d7dc4e4c634a6bcb0e062fcf7118bd1b9d2701
