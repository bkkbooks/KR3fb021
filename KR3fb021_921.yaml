body:
  text: 秀水張雍敬著器數考辨治曆者知天之事也知天者聖非夫人之所能而從器數以深求其理則下學上達之事夫人之所能也乃古今之治曆者習其器焉耳矣而所以制作之故不知也攷其數焉耳矣而所以立法之意不知也宻者為近疎者為遠則知之而宻者亦遠則不知也可施于今者為是不可施于今者為非則知之而不可施于今者之未始不是則不知也夫古今噐數疎密襍陳是非淆𠃶茍不能深求其理則疑信皆非從遠必謬而異端邪説皆足以搖之如是而欲從事於知天之學也難已是唯精于求知者不徒安已然之跡而游心于未有噐數之先不徒騐此日之天而究觀于上下古今之遠則其疎密是非自洞𠰥觀火而天道雖徵可以與知矣今畧舉古今噐數條列而辨之如左
  hash: sha256:ad2c0f898f663c74acb158db2517ac5cc039d3135cec1d52f76f1999a175c0f7
