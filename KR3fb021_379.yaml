body:
  text: 古今黃赤道不同說黃赤二道不同周天三百六十五度四分度之一赤道平分十二次多寡盡一每次三十度四三七五至於黃道分宮相去或差五度詳前表說者謂赤道當天腹而寬黃道以旁斂而窄故然詳日無盈縮說又古赤道與今赤道不同古黃道與今黃道亦不用說者謂建都之地不一其所由於視差而已漢唐都閏陝宋都汴南宋都杬元明都燕千古曆家莫能辨析其理總坐不知經緯同為左旋而經星之行有盈縮與天象之運有變移也蓋赤道之度為經星之定位黃道之度實經星之行率赤道為周天分列之象黃道乃術家起算之法太陽盈縮曆成于隋唐間以前但知用黃道惟西漢不用蓋黃道即盈縮曆立成之大略而盈縮曆即黃道綴術之細數皆以求日躔真度本一法而立術有異耳赤道所以古今不同者天運以積久而或變分野以異術而不齊也經星乘氣而旋原非一定之物積久不無少變故
