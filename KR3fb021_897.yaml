body:
  text: 牛開皇在斗十二而麟德在斗十三則見為或差而左又或差而右矣太元至元嘉六十年而差四度崇禎距至元三百五十年而差五度則見為有時差多又有時差少矣漢世曆四百年而緯書謂皆在牛初距陶磨三千歲而李淳風猶牽合堯典則見為時而有差又時而無差矣夫是以謂之偶也顧有所不可解有步斗之法三代而下失傳故黃赤之古今不同實度之不可執泥世鮮有晞其理者西士自詡數千百年傳人不乏何以不能闡明其理權究其徵而但以偶差二字欲抹殺天運之定理曆道之至要乎此不可解者一也天道參差原無極法故曆中諸數多以差名是有差必有法也則既有偶差斯必有偶差之理亦即有偶差之數豈真無理可推無數可測者乎茍其可推而可測也斯即一定之理數而不淂謂之偶矣此不可解者二也且既謂之偶差則必待其既差而後可見而今日之或差或否其差分止或多或少將必理難預知數難預定矣何以冬至日躔仍有差分乎此不可解者三也凡立法必久行無斃而
