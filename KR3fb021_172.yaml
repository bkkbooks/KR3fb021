body:
  text: 周髀云夏至景一尺六寸冬至景一丈三尺五寸書考靈曜云日永景尺有五寸日短景一丈三尺易通卦驗云夏至景一尺四寸八分冬至景一丈三尺劉向洪範論云夏至景一尺五寸八分冬至景一丈三尺一寸會要云唐儀鳳四年於陽城測夏至日景與古法同調露元年於陽城測冬至日景一丈二尺七寸而計其里之多寡亦異古説日異於地千里而差一寸用擅鄭康成注書考靈曜周詳襄術靈憲王舊渾天説皆同隨志曰宋元嘉中遣使往交州度日景夏至景在表南三寸二分何承天計交州至陽城萬八千里而差尺有八寸二分是六百里而差一寸也後魏信都芳謂千里景差四寸唐史南宮説於河南平地候景謂大率五百六十里晷景差二寸餘管窺輯要云陽城去衡山約二千五百里夏至日
