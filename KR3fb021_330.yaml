body:
  text: 古今二十八宿距星去極不同表舊經大衍暦授時暦角九十一度九十三度半距南星九十七度半亢八十九度九十一度半距南第二星九十五度氐九十四度九十八度距西南星九十八度半房一百度一百一十度半距南第二星一百十四度半心一百度一百一十度距西前星一百十四度尾一百二十度一百二十四度距西第二星一百二十七度半箕一百度一百二十度距西北星一百二十一度半斗一百一十六度一百一十九度距西第三星一百一十九度牛一百六度一百四度距中大星一百八度半女一百度一百一度距西南星一百四度半虗一百四度一百一度距南星一百三度半危九十七度九十七度距南星九十六度室八十五度八十三度距南星八十五度壁八十六度八十四度距南星八十五度半奎七十六度七十三度距西南大星七十二度婁八十度七十七度距中星七十五度半
