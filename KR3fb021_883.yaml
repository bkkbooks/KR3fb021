body:
  text: 秀水張雍敬著定氣辨莭氣者祭于日者也日躔盈縮者擊于經星者也古法平分莭氣以授壬時而盈縮星度以定日躔蓋維以右轉立法而明知其理實為左旋故但盈縮其度而不盈縮其氣也日躔之用盈縮本為交食起法原與節氣無干今西術以周天平分宿度而即取中曆之盈縮限以定節氣是以經星之行率而施之于日猶丹行而謂山之移也夫經星每日多過一度而盈縮不等一日有一日之差分一氣有一氣之積差西術雖巧必不能因一日之差分而變其百刻為長短則奈何因一氣之積差而變其莭氣為長短乎如知度可盈縮而刻不可盈縮則盈縮之法但可施之日躔而不可施之節氣也審矣若謂氣無可見必當係于星度則分之而為莭氣者合之即為歲實莭氣既星度則歲周當即同天周而無歲差之分矣於是盈縮不淂不變而為朓胸歲差不淂不指為偶差良由定氣之術一悮百悮也
