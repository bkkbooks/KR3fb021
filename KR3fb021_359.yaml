body:
  text: 周天定法天周策三百六十五度二五六七三二二一此即經星周率也但在彼為日率而在此則為度率耳消策三百六十五度二五六五九一一二二一長策三百六十五度二五六八六八九二二一消長法詳上篇半周策一百八十二度六二八四三四四六一以下俱就長分算象限九十一度三一四二一七二三五辰次分三十度四三八七二四一二凡考古自元恭定甲子前距漢元狩甲子用消策自元狩以上用長策當分別用之始密餘詳消長定法
