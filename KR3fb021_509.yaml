body:
  text: 求上元日躔平初甲子天正冬至太陽躔留六度古赤道昴五度六二五上距上元甲子七百二十歲以歲差法七十歲九六六五一二六三入引而退之差一十度一四五六二八八五得參旗二度古赤道畢四度二八一為上元冬至太陽所躔度求上元月離上元日月合朔在冬至前三日從參旗二度反減得濁二度古赤道畢一度九為合朔度距三日昏時凡二日七十二刻半以月平行度策十三度三六八二七九四九八三三秉之得三十六度四二從濁二度順推得狼二度古赤道井十度五一為上元冬至太陰所躔度求上元五緯所躔歲星置今康熙庚午天正冬至上距上元甲子一萬一千一百六十六歲歲積四百七萬八千二百九十九日三五六減去庚午木合應三百一十九日以新定木周率三百九十八日八六一九纍除之餘一十六日二四得小寒節為合伏日太陽入盈曆應加七千八七分從上元日躔參旗二度詳上順推一十七度二得罰四度古赤
