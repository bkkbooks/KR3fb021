body:
  text: 一元分為三統天統甲子人統甲戍地統甲申年數堯前三才之義天位乎止人位乎中地位于下大易三才之序本如是陽生於子故子為天統而曰上元物成于戍生於寅而成于戍故戍為人統而曰甲元坤位乎申故申為地統而曰下元三正之建從象以中星為主而取天開地闢人生之義故其序為天地人三統之法從炁以幹枝為用而取三才定位之義故其序為天人地二者不同世因混三正三統為一遂皆以天地人為序柳知大易之理固自不可易邪漢志載劉歆三統暦譜曰黃鐘為天統始施于子半為天正林鐘為地統受于丑初而畢于辰天地生物自十二月至三月畢為地正太簇為人統受于寅初而成于申人功自正月至七月畢為人正故暦數三統天以甲子地以甲辰人以甲申孟仲季迭用事為統首夫黃鐘為子月之律太簇為寅月之律是矣而丑月獨用林鐘則未之律也而曰丑取未之衡不牽強乎且既以甲子甲辰甲申為天地人之序而暦譜孟
