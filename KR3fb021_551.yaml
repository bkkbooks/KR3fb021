body:
  text: 餘七十八度四七八三八七查步斗表得黃道斗十度新法與舊測微差二分餘蓋大術所謂在斗九度半者亦袛舉其大略也宋慶曆甲申慶天曆冬至日躔在古黃道斗五度平初甲子至宋仁宗慶曆五年甲申天正冬至凡千八百歲應差一百三十八度九三二八一置步斗虛度如前法減去象限及上歲差數餘七十四度九六九二一九得黃道斗五度亦是古黃道非宋法也按紀元曆謂是赤道斗五度者因其年限多七十八年而演紀又起虛一度距堯時積差四十二度餘則為赤道之斗五矣今考自元嘉以後諸曆凡當日之所考中星驗交蝕而得日躔之真度者本係黃道之度而曆謬指為赤道在已之所測猶且黃赤莫辨其能辨舊曆之孰為黃道執為赤道哉餘如六朝唐宋諸曆所測日躔查歲差年表一一可得其詳無不久合茲不多贅元授時曆冬至日躔在授時黃道箕十度九度二十二分一十八秒
