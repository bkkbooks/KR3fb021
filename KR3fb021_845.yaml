body:
  text: 授時交分十四日三千六百八十二分入食限定法已酉歲天正朔甲寅六六五二定氣甲寅六九一二申月經朔庚戍九一定朔在書合交食限酉月經朔庚辰四四六法無兩月連食之限二十三年辛亥春王二月癸酉朔日有食之授時交分二十六日五千七百三分入食限定法辛亥歲天正朔癸卯三九九五定氣乙丑一七六八丑月經朔壬申九三一定朔癸酉加時在書合交食限經又三月已已八月已卯冬十月乙亥二十四年壬子秋七月甲子朔日有食之既八月癸已朔日有食之按授時七月甲子朔加時在書日食九分六秒典經所書阮省合曆指交食考云七月乃夏正五五月今以法考之是月甲子未正二刻定朔申初初刻八分食甚交周密三度二十二分二十秒實距度一十七分三十二妙因在黃道北減氣差一十六分一十二秒淂視距一分二十秒應見全食且本月徑大于日太陽邊周有奇經稱食既政典法家合定法壬子歲天正朔丁卯二九七二定氣庚午四乙九六午月經朔甲子四八八定朔在午後合交食限未月經朔甲午一一三定朔淂癸已法無連食之限
