body:
  text: 定朔法說考春秋日食皆為定朔如莊三十年申月銼朔得辛未而定朔光一日為庚午裹二十三年丑月銼朔得壬申而定朔遲一日為癸酉其銼朔在本日晨昏佷之前後而定朔在畫者又幾居其鑫馬漢人局于元法第用經朔而又後天以故日食多在晦至劉洪始創月行疾遲法劉焯始立日行盈縮法傳仁均乃以二法相權以求日月躔離之真度成定朔法而三年正月望及二月八月日月相食俱不效則其說未嘗不近而其數難得志協也後此曆家皆主其說而損益之亦先莫有精確畢驗者至授時曆承諸術大備之後參以近驗而考定之似乎得密而未及二十年日食又有不效者成宗大德三年巳亥入月朔日食不效則甚亥其理之微而數之頤也嘗取授時法驗之于今多患後天追考春秋又多先天蓋轉率太弱交率太強之過竊欲稍損其率而儀漏圭表等器凡測候所必需者無一具焉則九道之疾遲將何從而取驗哉是改率未易言也思古法多促蘭秋用定朔非如後人三差加減繁重之所為安得知天之君子能游心于法數之表者與共秋簡易之理哉
