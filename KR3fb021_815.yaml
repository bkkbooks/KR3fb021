body:
  text: 矣五星聚于營室明紀世宋嘉靖三年甲申歲正月五星聚于營室距第十紀之三十九章十八年借次章推之天正朔在丁卯冬至淂癸酉正月朔淂丙寅六日辛未為雨水二十一日丙戍為驚蟄歲差日躔在元黃道箕六度八淂步斗虗度六十七萬三三歲星置歲策減章首木應二百八十二日二三四七餘八十三日八加步斗虗度通一百五十萬三三查表淂室十三度七七於驚蟄十日合伏則前小寒十一日已在室也火星置歲策減章首火應二百六十四日五二四餘一百一日一九三加步斗虗度通一百六十八萬五二查表淂元黃道奎四度三於春分十三日合伏上距室未一十二度六四應反減一十七日強淂驚蟄十一日以前在室於雨水節日入室也土星置歲策減章首土應二百八十五日二四二二餘八十日五加步斗虗度通一百四十七萬三三查
