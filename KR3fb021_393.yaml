body:
  text: 步斗法说暦家推攷全憑實度乃古今黃赤道萬有不齊幾今人目眩而心不領將何術以齊之俾得攷古之益而無泥古之患乎今日心度已不合于舊法茍欲正暦必當改定黃赤道又何術以正之俾得天象之真而無乗遠之弊乎則有步斗分宮定宿之法在上古聖人既立周天之度恐其數之散𠃶而無紀象之移易而不定也於是乎立十二次以統之宮為之綱度為之紀以大攝小而無虞其散𠃶矣不定者自在宿一定者自在宮以常御變而無虞其移易矣然辰次雖定而過宮中次之宿又恐其遊移而不定則宮仍不足以統度於是乎立斗分法以為之元使斗杓所建角宿七度八度之交居辰宮三十度四三七五前後各半之中而十二宮三百六十五度有奇從此而順布焉則宮度皆得其一定之理矣故曰步斗必始龍角大辰也步斗之理乆矣失傳唯漢書幸存此一語而漢人於同天度數謂之斗分為可據耳或疑斗杓所指
