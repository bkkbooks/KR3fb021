body:
  text: 本之緑督趙氏而渾天家謂地平正當天半西術謂地球恰居天心謬四陳榮蓋天之謬舊術世咸能言之而至于測量之術必用圭表仍祖其故智謬五天地周徑法象可推古數可證證以淮南子張衡靈隱而術者蔽于天度地之殊盛隘而小之或誕而誣之謬六月食為暗虗古説顧名思義其理自見本之趙氏而指為地影謬七以上論天體七政皆為左旋本之朱子而敢于黃道一法執為右轉謬八日躔盈縮本在經星此驗諸中星之盈縮而可知者也是故日無盈縮本之朱子吳氏而世乃謂日有盈縮謬九經星盈縮生于黃赤二道之交本王堯旭而世咸執為定盤指為不動謬十經星左旋步之必起東壁本之律書右旋步之必起龍角本之漢書而或起元枵或起星紀或起冬至日躔謬
  hash: sha256:9725d34564d1948c236677cc6e4a5f3b23c28e1dd44961587db4c06decdf96ef
