body:
  text: 土生風風即氣也然其序又不始于木而始于金何也盖天元定象火躔于氐土躔于角金躔于井水躔于參木躔于昴火生土土生金金生水水生木自夘順而右河圓左旋之序也其起盈之處亦指上元而言金盈起昴火盈起井木盈起張水盈起氐初土盈起氐末金傳于火火傳于木木傳于水水傳于土自酉逆而左河圓右旋之序也經從左旋以交于緯緯從右轉以交于經主為象而為陽緯主乎氣而為陰是故金木同位木經躔于昴金緯盈于昴震兌之始交也水火同根火經躔于氐水緯盈于氐㺵离交之盛也陰陽交而道行乎其中矣其起盈之處或距冬至或距夏至何也在陰中者值陽生而哀地戶之右离坤元為陰中故金木火以距冬至之度為盈舊法黃道右轉其共所謂盈者實反是遲耳在陽中者值陰生而哀也天門之左乾坎艮震為陽中故水土以距夏至之度為盈其或從二至加或從二至減何也陽主進而加陰主退而減也木火為陽故加金水土為陰故減土為陽㬬而又屬于陰何也土與正位寄王四時在經則為陽土在緯則為陰土也金土之盈縮同起一霥何也右旋之序始于金而終于土始終若循環其交際處不容有毫髮
