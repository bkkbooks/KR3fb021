body:
  text: 對七年四千六百一十七歲蓋謂古元法皆止四千五百六十歲終則復始今其數過盈所以當復造曆非謂元法當為四千六百一十七歲也歆因過盈之五十七年適得三章之數每統為八十一章又適合黃鐘之數遂以前曆距丁丑之數為元法中統起丁丑則孟統淂戊戍季統淂丙辰與古法紀首之歲必取初盛終者如申子辰寅平戍之類不可淂合乃指統首之至朔日為言蓋統甲申日中統中子日季統甲辰日然以太初法推之每統一千五百三十九歲歲積淂五十六萬二千一百一十五日中統起甲子則蓋統當起已丑季統當起已亥又不可得合乃增其斗分比四分法猶強至一百三十餘年而盈一日朔三百一十餘年而盈一日故尚書今忠斥其增年杜征南謨其益日杜預曰凡歲須纍日為次而無故益之此不可之𠰥也者蓋彼於斯時道本屬茫然者也至於引易之參天兩地之數謂地數三十置一淂二以合林鐘之六十則天數二十五黃鐘捋僅為七寸五分矣於是又加二十五分止六此又成其為何數也邪
