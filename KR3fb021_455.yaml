body:
  text: 辰之號甲子為先乎南齊書祖沖之曰子為辰首位在正北爻應初九升氣之端虗為北方列宿之中元氣研初宜在此次前儒虞喜備論其義今歷上元日度發自虗一又曰日辰之號甲子為先歷法設元應在此歲考上元軋象午為火上當天中子為元枵下當地中即先天易之軋午坤子而沖之所謂交應初九升氣之端元氣研初宜在此次者也𠰥謂日度當癸自虛一則意拜矣乃舍其至當之論而取其意度之辭則牽于七曜同起自不得以甲子為元其違離固蔽殆甚于漢人矣七曜在營室辨一行引洪範傳至言曰歷始于顓帝上元太始開達攝提格之歲畢娵之月朔日已已立春七曜俱在營室五度夫顓帝在唐堯前百有餘年其時冬至日躔危初越四十五日而立春則日當在奎安得同在營室甲寅之歲正月為丙寅安得謂之畢娵夫畢娵則甲寅月也
