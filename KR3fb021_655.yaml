body:
  text: 歲差有象可憑其説已大著于六朝之間而李淳風王孝通軰猶謂無之説差無形而郭氏又未能大閳其理宜乎楊德芳元統之疑信莫決也今試取太初而下六十餘家之曆一一攷之其冬至加時皆遲先而歲餘皆遲減此所謂無定者也及攷其所差之分秒則又戚戚無差漸級不爽此所謂無定之中又有其一定者也故攷諸古曆則消長之定理可見而消長之定數亦可矣但郭氏之説猶有未盡善者則無有通復既有十而消亦必有時而長而其法曰上考往古百年長一下騐將来百年消一是天運有消無長一往而不復矣乃騐之扵今而又加長此後人之所由發疑也元至元辛已至今康熙庚午四百零九年以守時歲策三百六十五日二四二五乘之淂歲積一十四萬九千三百八十四日一八二五減去消法四百九分加辛巳無應五十九日六以旬周累除之餘三十九日二一六淂癸卯日寅正三刻四十九分為庚午天正冬至今時憲曆為癸夘日辰正四刻
