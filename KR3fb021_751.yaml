body:
  text: 也又即上二傳觀之則未年在降婁申年在大梁俱一一可證矣會而觀之則夘年之在析木無疑而析木之為越分甚確柰何以越淂歲為在星紀哉夫春秋為劉歆家學而以上諸傳似猶未之見者彼一行其何訾獨可嗤者即據其術推之辛夘之歲亦在析木而非星紀則歲星差合術豈非藝語也邪置漢太初丁丑上距鲁昭公三十二年辛夘四百六歲歲積十四萬八千二百八十八日五一一九加太初後合應三百九十五日七五六以古木周率見前累除之餘三百四十二日九四三九若辛夘冬小雪後十日合伏在斗四度則辛夘夏政在尾度析木之次改定歲星新率新定歲星周率三百九十八萬八六天象運行理之至信而數之一定者也理無今古之異則數豈有今古之珠故日月薄食為陰陽之大變而上下千百年無不可以宻率求者天道原至信而一定也寧獨歲星不可以宻率求哉乃歲星率策皆
