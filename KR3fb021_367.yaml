body:
  text: 分野分野說定曆玉衡秀水張秀水張羅敬著秀水十二次分野太古之道法也世第見十二國分配如秦如越皆春秋後之國遂謂始于甘石獨不思周禮保章氏以星土辨九州之地所封之域各有分星以觀妖樣則周初已有其法乎今推上元初昏之象鶉火在午元枵在子大火在邜大梁在酉天之十二次配地之十二辰四正八隅無不符協此天之應于方隅者也至于冬至加時始于子半上元日躔在畢五度其昏時在兑則夜半在坎矣大梁在坎則大火在離元枵在震鶉火在兌矣故大梁為趙應翔易也大火為宋當南服也元枵為齊處東隅也鶉火為周協西土也天之辰次配地之對城東西南北亦無不符協此天之應于州國者也故左氏傳曰古之火正或食于心或食于味食于味者以初昏之象鶉火在南也食于心者以夜半之象大火在南也南為火位故邜午二次皆以火名可見分野之法乃上元天地相應自然之理非太古聖人莫能窮其源而立之法也夫豈甘石之及哉然古聖遺法久矣失傳而說著多
