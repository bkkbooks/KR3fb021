body:
  text: 十五年癸卯秋八月丁已日有食之薑岌云七月丁已朔食失閏也大衍同授時七月丁已朔加時在書去交分二十六日三千三百九十四分入食限定法癸卯歲天正朔乙未八七七定氣癸未二三四六午月經朔丁已五四二定朔在書合交食限杜氏云丁已七月一日是也經又書二月乙亥十一月癸亥定法丑朔已丑有已亥戍朔乙卯有癸亥閏應二十三日三六應閏午月魯麗置在次年之終也午月于子正當為七月而史書八月故經不書朔明其有悮也以前後月考之自見二十年戊申冬十月丙辰朔日有食之授時交分十三日七千六百分入食限定法戊申歲天正朔庚寅七六七五定氣已酉四四八五酉月經朔丙辰五四二八定朔在午後合交食限經又正月辛亥六月庚申二十一年已酉九月庚戍朔日有食之冬十月庚辰朔日有食之
