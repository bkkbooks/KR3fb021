body:
  text: 左旋定率言曆必先辨左旋者以七政高下遲速之理唯左旋不明也今取先儒之說參以九重天象七政行率而發明之經緯皆采氣左旋而各有疾遲欲較其疾遲必以太陽為凖蓋周天之度由太陽而立畫夜之限因太陽而定也太陽每日左旋而周三百六十五度有奇不疾不遲無餘無缺恰成一畫夜積一歲凡周三百六十五次有奇自太陽遞上而遞加疾者為火為木為土為經星火亦左旋而稍疾一日一周而比太陽多過四千六百八十三分太二四二積七百七十九日九十二刻九十分而多周一次木亦左旋較火更疾一日一周二比太陽多過九千一百五十七分太一六三八積三百九十八日八十六刻而多周一次土亦左旋較木又疾一日一周二比太陽多遏九千六百六十分太一六二七積三百七十八日九刻一十六分而多周一次經星之左旋為最疾一日一周二比太陽多遏一度積一歲而多周一次自太陽遞降而遞遲者為金為水為月金遲於太陽亦每日左旋而常或不及一周然又疾時疾遲想準則與太陽同積五百八十
