body:
  text: 六八一七定朔在午前合交食限十五年甲戍六月丁已朔日有食之大衍推五月丁已朔食失一閏授時五月丁已朔加時左盡交分十三日九千五百六十七分入食限定法甲戍歲天正朔已未六一八七定炁乙丑七六七辰月經朔丁已七四一一定朔在午合交食限經又書二月癸酉定法丑朔得乙丑無癸酉而以辰為六月亦差一月非有悮文必前年應閏不閏也十七年丙子夏六月甲戍朔日有食之姜岌曰六月乙已朔交分不叶不應食當悮大衍云當在九月朔授時九月甲戍朔加時在盡交分二十六日七千六百五十分入食限古今推者皆謂申月朔淂甲戍合交限六月乃市月之悮其傳文謂正陽之月乃十五年六月只傳錯簡於此今以定法攷之進九朔淂甲戍一二八三入交二十六日七六合交限然其定朔乃在癸酉實與經書甲戍不合夫月之先後或有悮文而日食必在定朔乃天之明騐則此條斷難取合矣而從
