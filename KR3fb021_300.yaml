body:
  text: 北二皆在平地畧無高低道轉而南過大浪山已見南極出地三十二度則大浪山與中國上下相為對待矣又曰凡同緯之地其極出地數同則四季寒暑同態馬若兩處離中線度數相同但一離南一離北其四季畫夜刻數均同惟時相反耳此之夏為彼之冬矣又曰若北極出地九十度則此地以北極為天頂以赤道為地平赤道北諸莭氣全在地平上赤道南諸莭氣全在地平下而半年為畫半年為夜矣或曰一年半為畫半為夜何以証之曰吾西人親所經歷其愈近北者夏至日愈長夜愈短夏至日有全十二時為畫有全三十日為畫全六十日為畫全六月為畫歷歷身涉不可疑也試于中國亦可見焉京師北土之夏至日長於廣東南土之夏至以此推之以至半年為盡半年為夜足微矣上下四方畫夜寒暑理之一定者也自有盖天釋氏之説而四方無定形畫夜無定候矣今有西説則併
