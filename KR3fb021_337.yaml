body:
  text: 星張或異其名注伐濁𤲢或更其宿張弧參其餘則皆同蓋上元之初中星起午五帝之世中星在酉中星所以著歲差之理包天地始終之數太古聖人特重其法而正名之故得有古宿異名以傳于世而世所得習之名則五帝時所易也不然則自胃至翼何以皆同自張至昴何以各異哉由此觀之上元中星必起鶁火太古之世已創曆法詳三正說俱可知矣獨情僅得其名而分度不詳於以考上古之中星日躔猶不能無遺憾焉今即古赤道而復其名雖未必盡符古象而諒其大槩或應如是云爾古宿分度角十二度元元度氐十五度房五度心五度尾十八度箕十五度建星二十二度起斗五度復易以南斗牽牛八度須女十二度虗十度危十七度營室十六度東壁九度奎十六度婁十二度胃十四度眢十一度即昴濁三度即畢參旗十五度起畢四度後易以觜臨罰一作伐十八度起參初度即參狼五度起井十度後易以東井
  hash: sha256:b3929184076c29d29a0704717c5ef3b79b9bfb27d169a7c39134af444ad3a5c8
