body:
  text: 曆原改本原本一作曆理道溯厥初溟滓無名真體渾然是曰太一道包宇宙徹始終道之上加不得一箇名目著不得一熙想識是以從古聖賢只説一箇道字若於道宇外更尋雲處進一層便是有物渾成先天地生教旨宮一分便是萬法歸一一歸何處宗門為釋為老只爭些子耳太一是不二對面不但對二五説其動也陽其靜也陰動便是陽靜便是陰非是動而後有陽靜而後有陰也一動一靜機之不容已也一陰一陽道之所以行也道體不可見只當從流行中勘出離却流行道體更於何處著落識其所當然則所以然自在其中淺求之不得深求之亦不得也各其體用陰陽又各自有體用靜者陰之性肅殺閉藏其情也動書陽之性發生長養其情也
  hash: sha256:6d861a910936a954407c59888ee8a0448f5f88777c05a5d7530f441caa79edbd
