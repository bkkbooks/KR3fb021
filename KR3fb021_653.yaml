body:
  text: 秀水張雍敬著歲實消長説日月星辰有象而遲扵上春秋寒暑無形而遲而下皆有終始推移往来通復之理故積以歲月則不能魚差中星日躔象之差也歲餘長短無之差也象之有差顯而易見無之有差隱而難知故自漢太初而下治曆者凡六十餘家其所以測晷景候中星騐交食而求定夫歲餘之分秒者未甞不精且宻而改旋差究無定法可以久行而無弊者何哉能為一定而不能知其無定也即知其無定而又不能于無定之中求其一定也夫天地之機妙扵不測一定之中無定出馬天地之運信而可微無定之中又一定在焉惟立法于此既有以經其常復有以道其變使天一定即興為一定天無定即與為無定則雖上下千萬年而我之數自無往不合乎天矣此郭氏消長之説為能獨窺其微也而世又未之能信則歲實將何從而淂其一定之法哉
