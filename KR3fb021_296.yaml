body:
  text: 西法地球辨古之言天者三家而蓋天為𡪯古故傳播及遠西域之法皆其遺也如釋氏謂日繞須彌山照四大天下長阿舍經曰須彌山北有天下名鬱軍趙棟有天下名弗于遠西有天下名俱邪尼南有天下名間浮提法死珠林云佛告諸比立若浮洲日正中將弗婆從洲日則始汲瞿即尼洲日則初出鬱單趙測正當夜半若瞿即尼洲甘正中時此浮洲日則始沒鬱單越測日則初出第婆提洲正當夜半若鬱單趙洲日正中時瞿即尼洲日則始沒弗算從側日則初出此浮洲正當夜半若弗婆提洲日正中時鬱單越測日則始沒此間浮洲日則初出瞿即尼洲正當夜半即四盡四和日行平轉之說周髀家言天似蓋笠地法覆盤天地各中高外下北之下為天地之中其地最高而滂沱四隕三光隱映以為畫夜天地隆高相從日去地恆八萬里日麗天而平轉故日運行虗在極北北方日中南方夜半在極東東方日中西方夜半在極南南方日中北方夜半在極西西方日中東方夜半凡此四方天地四盡四和畫夜易廢驗諸象則不合揆諸理則無稽儒家曆家皆所弗道也此西說以蓋天移於渾天故取驗愈遠遞理愈甚乃斯道是非邪正之所關非獨曆術精粗暌合之所擊也故不得不起而辨之夫論難者相長之資或亦西士之所樂聞乎若疑雍敬之故為排斥也則彼說
