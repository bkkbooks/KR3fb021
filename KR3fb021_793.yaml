body:
  text: 為芒種淂庚戍十月朔淂丙戍歲差日躔在古黃道斗二十三度五八淂步斗虗度九十二萬五八歲星置二歲策減章首木應一百七十八日六三二六除一木率餘一百五十二日九八九一用加步斗虗度通二百四十五萬五六九一查表淂古黃道參六度五六合伏為小滿次日距井宿二度四三應行十日五六於小滿十一日丙午八十刻聚井合後距十月朔一百七十日強木率應進二十一度弱淂井十九度古黃道井十九準古赤道井二十一漢法所用黃帝分野首之次起井十六度故井二十一度政為首之六度也新率之符合漢書蓋若此火星置二歲策減章首火應五百二日一九八餘二百二十八日四六五四用加步斗虛度通三百二十一萬四五四查表淂古黃道翼二度初合伏為立秋後十九刻合前距井初七十三度應反減一百一日強淂殼雨六日入井芒種三日入鬼土星置二歲策減章首土應一百九十三日六九一六除一土率餘一百五十八日七二用加步斗虗度通二百
