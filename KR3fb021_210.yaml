body:
  text: 天地周徑里實天地周徑之數但當求其距度而不當求其里實以度法一定而里實之法無定也禮記正義曰王制以周尺六尺六寸為歲乃六十四寸鄭即以古周尺十寸為尺八尺為步則步八十寸又今以周尺八寸為尺八尺為步則今步皆少於古步一十六寸以此計之則古之四步剩出今之一步云云涷書謂周有十寸之天有八寸之尺考工記於葉言十有二寸於鎖圭言尺有二寸此十寸尺之證也説文曰咫八寸周尺也此人寸尺之證也隋書載歷代之尺十有五種周尺晉四父玉尺矮表尺漢官尺魏尺晉倭尺後魏前尺中尺後尺前後魏尺蔡雍銅尺宋氏尺隋開皇水尺雜尺梁朝俗間尺以上諸尺其之長短詳本書先儒又謂古有指尺此身為度之説恭尺此積恭之説之異夫積尺成步古今之尺既不一則步亦不同而里法又何從而定哉故前渾天真象正言度而不言里實然不秿著其大略則誕妄之説無由正也今為條分而縷析之庶知里實之測其法省如是之微馬者也
