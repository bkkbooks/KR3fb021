body:
  text: 丙有丁丑杜氏謂月二十九日是也公轂皆釋晦為冥轂梁曰晦冥也公羊曰晦者何冥也且為之説曰春秋不書晦朔有事則書晦雖有事不書故劉向以此條及成十六年甲子晦解為正書皆冥今以定法考之實為月之晦日非曆何以得經義之實哉十六年丁丑春王正月戊申朔傳冬十一年已卯戍朔淂甲辰省已乙卯定法丁丑歲定氣壬子三五五六天正經朔戊甲八四九三二十二年癸未冬十有一月已已朔定法癸未歲天正朔甲戍一一三二定氣癸未八一二四戍月經朔已已四一九二文元年乙未二月癸亥日有食之薑岌云三月癸亥朔大衍亦以為然授時云三月癸亥朔加時在書云交分二十六日五千九百十七分入食限失閏也按三月而為二月乃歲前多置一閏耳何及元失閏也邪定法乙未歲天正朔甲子六四一一定氣丙戍七二五六寅月經朔癸亥七二三定朔在午前合交食限乙未天正朔甲子六四
