body:
  text: 度六九一從合伏平宿尾十四度末順推淂古黃道壁六度之六一為轂雨三日所躔距奎初四度三九火率應行六日於轂雨九日入奎土星置前歲積加章首土應四十七日三一八纍除土率餘二百七十一日二二二反減原率淂一百七日九六九四用加步斗虗度通一百八十四萬二查表淂古黃道婁二度初於清明四日合伏過奎一度餘應反減八日強則春分十一日已去奎入婁矣合伏入曆分八千八百七十二日六五七八三入氣即後合日置合伏入曆日分以度率歸淂三百一度五二九五五五一減半用策餘一百一十八度九一一八六載去七限餘一十二度三六七四乘哉分淂五千二八二分減積淂五度五二一八為編差分用減平合入氣日為一百二日四四七六用減平合宿度婁二度初為奎十二度之四九八二于春分十四日合伏三月間皆在奎金星置前歲積加章首金應三十四日七六五纍除金率餘三百三十日三五三九用減步斗虗度加一周策減之存一百一十萬九四查表淂古黃道女十度九四為前合度距奎初越一周又五十五度強通四百二十度少金率合後應行四百五十四日於轂雨五日入查
