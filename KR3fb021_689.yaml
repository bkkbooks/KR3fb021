body:
  text: 舊朔先二十九分二九舊氣先四刻九十三分六以上五十四曆其氣朔可考者四十六若三統黃初泰始永初興和五曆皆仍前曆名異實同其經緝九執二曆為西法之祖調元曆得三統遺意雖朔莫考亦並到焉外加晉軋度曆武帝咸平中李修卜顯上通曆穆帝永初入年王朔之造宋甲寅元曆元嘉十四年河西牧遣使獻遊歐所曆梁大同曆大同十年武帝詒震劇史造北魏元始曆即趙歐曆五寅元曆崔浩上寭曆信都芳造北齊甲寅元曆劉孝孫張蓋賓同上磨光宅曆武氏命瞿曼羅造至德曆肅宗時韓穎上觀象曆寭宗元和二年徐昂造以上十一曆或未見施行或施行不久其法蓋莫淂而考也
