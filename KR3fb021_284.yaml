body:
  text: 朓胸辨日行每日必一周一日必百刻則無盈縮可知使行有盈縮則度有增減必不能每日定于百刻若必定于百刻則度有進退必不能每日適為一周此亦理之甚顯數之甚易知者而千古不悟則黃道之法蔽之也今西士亦能見日行之必無盈縮也故謂為人目之視行而名之眺胸大意謂日月常為平行而自人視之則有眺胸眺者日月在卑近人而視行大於實行胸者日月在高遠人而視行小於實行盖眺胸則占度潤有似乎盈而非盈胸則占度狹有似乎縮而非縮也是説也揆之理數俱有難通又不可以無辨夫有遠近而後形為大小有大小而後見有眺胸此三者必相因而生者也據其術天地之體皆圓當中線豦則日行南北道雖有高卑曾無遠近將大小眺胸何從而生乎此不可通者一其高遠卑近唯赤道以南乃見為然耳若中國在中線之北則高反近而卑反遠矣此不可通者二即曰此不計里實而但論高卑高即為遠卑即為近亦但可為出沒之於午
  hash: sha256:bdb4e0708d9bec5820d48a1fbf4c3b30b42ac0e7c2b6abd0a2e42543173fb604
