body:
  text: 五行惟火有光能炳日月所不及故曰日煜乎畫月煜乎夜燈光煜乎畫夜今推日後間木火二星為月月後間金土二星為火則三光代明之象也辰與地符宿與方合日月並明如合壁五星相生如連珠造化之奇陰陽之祕於昭于斯矣自是以後三辰交錯變化流行莫可名象逮夫攝提貞于月建開人統之天詳斗建說夜明麗于未坤著地統之理詳三統說此一定之分限而造化之所以為莭也至于三統數終積二萬七千三百九十餘年當甲午歲之夏至則天市在上太微在下元枵在午火在子火火在酉大梁在卯蒼龍在西朱鳥在北白虎在東元武在南日躔于卯月離于戍北辰指免斗杓建戍五星背馳不復相生日月星辰無不倒易其位而天運一終矣
