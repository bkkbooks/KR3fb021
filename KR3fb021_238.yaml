body:
  text: 江寧正當經線之下則東西之中從此可識矣又古法驗浔北海在艮丑之位盖嵩高在經線西五度許徒嵩高視北極則固應在艮丑矣其緯在衡山南度許正對夏至日道之下呂氏春秋曰白民之國建木之下日中無景呼而無響此天地之中也淮南子曰廣都衆帝之所上下日中無景盖天之中其經緯如十字相交處則在泉州南入海一二度許此天地之中也昆侖之山東南距中國西北距火州等國東極朝鮮西極西洋適居其中此陸地之中也而或指為天中者傳會扵盖天之说也按河圖水經皆正謂地中河圖曰崑侖者地之中也水經曰山在西北去嵩高五萬里地之中也高萬一千里河水出其東北而釋氏之所謂須彌詳地球辨與李淳風之說盖天則勦漢書之謬耳漢書曰昆侖山高二千五百餘里日月所相隱避為光明致昆侖在肅州西南土蕃朶思甘東北鄙其山雖高無所謂千里萬里距嵩高其經不過四五千里亦無五萬里之遠世因所見不符所聞又妥臆西北別有大昆侖山他若
