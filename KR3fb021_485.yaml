body:
  text: 上元軋象證一十六條三元一暦家甲子分上中下三元凡三甲子一周令從康熙二十三年復起上元推而上之六十二周凡一百八十六甲子得開闢之歲初起上元甲子步日今康熙二十九年庚午天正冬至經炁應三十九日三五六三四七二六上距上元甲子一萬一千一百六十六歲以炁策三百六十五日二四二六三八八七一一秉之得歲積四百七萬八千二百九十九日三五六三四七二六減去庚午經炁應以旬周累除之無餘分得甲子歲首天正甲子月甲子日旦子時正初刻初分為冬至步月三今康熙庚午歲天正朔旦經朔應三十日一三七二二七八三五置上元歲積減去庚午閏應九日一六八四一三九一九六以朔策二十九日五三五九三八八一二五歸之得一十三
