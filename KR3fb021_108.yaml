body:
  text: 十一經緯之度皆天頂狹而四垂澗本之趙氏而從来測者但以平分半周為法則測驗躔離必有所不合而積世不悟謬十二凡測經緯之度必當在春秋二分而從来測者絕不問其時候則前後两測盈縮難數殊而不得其密矣謬十三天周分秒增于歲周書法惟入算之時在所當用取其見歲差之數耳若夫經星行率實當减于歲周而莫知其故謬十四列宿運行積吆不無少變此古今黄赤道之所由屢更也必會而通之而後躔離實度可以上下古今推驗不爽則步斗之法不可不求也而曾無見及之者則攷古其奚據乎本之漢書謬十五辰次之分本于天元定象本之朱子元枵鶁火既有其名即實有其義必當以宫統宿以宿歸宫則其義始得而漢世瞢于歲差選隨節氣過宫致宫定而宿不定貽悮後世謬十六
  hash: sha256:b1f753beff3c9955391e8d9856d0e2fbe036294465a312373c15e58193a43f6d
