body:
  text: 夭乖不知太元之斗十七為赤道而今之斗十四為黃道原不甚蓋也所以不分則言之者蓋更曆法務取新異以馱世躔俗惟指為差三日餘則足以適舊曆之未而見新曆之吳此挾詐以患世俗耳何後之曆家皆為其所愚而不覺也喚按承天年限以百年差一度自堯甲辰至宋癸未距二千八百年自斗十四至女十差二十八度則猶皆用黃道年限雖疏而術未謬也南齊書祖沖之曰堯典云日短星昴以正仲冬以此推之唐世日在危宿左五度許茍如所言則宵中星虛又不合要漢代之初即秦曆也冬至日在牽牛六度嘉曆已在斗非在牽牛辨見上篇漢武改立太初曆冬至日在牛初太初在斗非牛初辨見亦上後漢四分法冬至日在斗二十一此係赤道晉世薑岌以月蝕檢日知冬至日在斗十七亦係赤道今參以中星課以蝕望冬至之日在斗十三此又是黃道宋大明間猶在斗十四而以為在斗十三者固其年限太少故政先天之謬通而計之未及百年已差二度按此引證多謬而以黃道承赤道尤謬之甚者歲差之理不明弊始此矣隋書宋祖沖之以四十六年每差一度至梁虞𠠎嫌所差太多以一百八十六年差一度張胄元以此
