body:
  text: 西法起帝嚳四十年甲子日在虛六度夏王不降三十五年乙未退入女宿商武乙四年丙寅退入牛宿周簡王丁亥十二年退入斗宿宋度宗戊辰退入箕宿度二分餘按所言退過宿度之年數遲速參差詳歲差精然通計之大約七十五年而差一度也自帝俈甲子至宋度宋戊辰凡三千六百六十四年而自虛六至箕末差西法度四十九度二十一分則當爲七十五年也盖西法起于唐初故其年限本諸劉焯而起度本諸傳仁均皆襲隋唐之謬也縂而論之自元以前其獘在于黃道承赤道自元以後其弊在以今度承古度也夫堯時虗九乃古赤道今之箕三乃元赤道𠰥謂堯時虛九即元赤道之虗九今之箕三即古赤道之箕三則鮮有不謬者矣故古今歲差以虛度紀之謂堯時至今應差𠰥干度可也謂堯時虗九至今箕三共差𠰥干度不可也昔人言歲差之理要在使天自為天歲自為歲今欲命歲差實度亦要在使古自為古今自為今以授時暦為眾然非步斗法則雖欲分別古今而不得也非周法則雖欲以虗度為紀而亦不能也
