body:
  text: 疾各異其行矣若謂遲疾之故即屬天體為之則九層相次無容此一層疾彼一層遲此一層順彼一層逆參差相間牴牾不合也二則陰陽五星雖本一氣而要必陰陽為幹五行為枝則其成象亦必日月為大五星為小今乃為土木火等星其大于月也或千百倍是猶人之指大于臂脛大于股也非奇疾則怪民矣遷就偏説而遺其本原幾不知陰陽五星為何物此古今術家之通病也三則今有一燈遠在里許外莫不見之者置立大一物於里許外則雖離婁不能察盖燈以光用與他物之僅有形質者不同也日月之體政以光用故南交視夏至之日朔方視冬至之日其遠近固甚殊矣而大小不異者則以光相及自不同於凡有質者稍有遠近即改觀也若夫出沒之於午中所以見為大小者以地面距天頂信遠于地中之距東西極也然雖以遠近之故形為大小而大小終不甚懸絕則日月之體原不甚大盖可知已今據西説日輪大於地球一百六十五倍餘則其大當為四百六十萬餘里去地一
