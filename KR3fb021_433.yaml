body:
  text: 書傳上元間或曰太素之年不可勝紀非獨曆家言之其見于載籍若盤古天皇地皇各一萬八千歲人皇四萬五千六百歲則有如河圖帝系譜真源賦三五曆紀之所云者其開闢至獲麟二百二十七萬六千歲則有如春秋命曆敘之所云者其開闢至獲麟二百七十六萬歲則有如易軋鑒度春秋元命苞之所云者漢嘉平中沛相計據陳晃上言曆元不正謂自開闢至獲麟二百七十五萬九千八百八十六歲乾鑒度天命苞蓋本此今推上元至今止一萬一千一百六十餘年曾不足當三皇一人之壽何以見子言之獨是而載籍之皆非邪曰文人之筆巧者鑒空庸者雷同固不可盡信也若執傳記之説則列子有云伏義至今三十餘萬歲子信之否乎曰否然則列子去義皇之世尚近其言且不無過實漢以下之士去洪益遠其言反足信邪夫善言天者必有驗于人善言古者必有見于今試由今遡而上之三千年而為三代四千年而為
