body:
  text: 弧二十三度起井十五度後易以與鬼注十五度即栁張七度星十八度二宿易位星張易位説斟酌元氣斡旋造化皆擊於斗故北斗主象七政以之齊詳乾象考證辰宿以之分詳步斗法説南斗主氣星躔之歲差以此著詳第五參氣策之消長以此始詳第卷所謂南斗者七星是也星張之星為數七其形與北斗相似故謂之南斗後人以斗牛之斗為南斗故但名之曰七星斗午本北方之宿按得謂焉南斗此後人之謬古名南斗者所以別于北斗鶁火正在午位又當北斗之南所以古名南斗後名七星者所以別于世之所謂南斗以斗牛之斗其數六二古南斗其數七也天官書言衡殷南斗政謂七星梁大通六年魏主修出奔長安先是熒惑入南斗亦是甲寅天正前入七星中非斗牛之斗也又道家亦以七星為南斗詳乾象考證上元開闢之初七星中午張宿居七星之西其後張宿差漸而東至天皇氏之世則星張易位猶令之觜參易位也詳下篇然則開闢後十二甲子經星或多差
