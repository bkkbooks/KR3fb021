body:
  text: 書以為建亥杜預曰周十一月今九月也斗建當戍而猶在申故知再失閏也至姜岌以定朔而考其交會應在此月不為再失閏後之曆家所考皆同夫日食于朔此乃證之于天理之至信而斷無可疑者也今以定法推之其交會亦政在戍月之朔且經又書七月辛已定法午朔淂丙子月內有辛已夫丙子既為七月朔則乙亥之比為十一月朔又可即經文而斷者也而經乃作十二月此必後人傳寫之悮併非當日史氏之悮也然則於周正非為失閏而左謂為再失閏者何哉以戍月為十一月較之夏正實差兩月至以建子為春則四時竄易名義俱矣然此乃時王之曆考竹書所紀平王五十一年春二月乙已日有食之與春考相合是知周魯之曆同也不可顯斥其非故但以再失閏為辭而歸其咎于司曆者與夫子論冬螽之意同蓋聖賢之徽辭也昭七年丙寅夏四月甲辰朔日有食之授時交分二十七日二百九十八分入食限定法丙寅歲天正朔丙子八九九定氣癸未八一八五卯月經朔甲辰
