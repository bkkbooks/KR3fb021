body:
  text: 宗堯典夫推歲差而必上窮天運一周之始此固非術士之所能知至帝堯之時歲差星躔適過四分之一考古者以此為演紀之端苟能得其真數亦政無異於源起平初之法矣粵稽唐世天象中於酉地氣中於卯正當卯運之中猶一歲之春分一日之既旦二氣得其中和萬象于焉昭朗故聖人生于其間開文明之運昭郅𨺚之治冠百王而邁千古也夫以放勳之聖在位百年功烈文章當不刻勝紀而史臣肚詳其斂若曆象一事此豈但以敬天勤民為帝王之首務哉亦以四正中星不僅定一時之象而實垂萬世之憲也今取周天之度四分之子午卯酉是為四正南正火星七為中北正元枵虗八為中東正大火房二為中西正大梁昴六為中中星與日躔近一而遠三上推帝堯即位之初日躔歲差在赤道虛九度則昴七為中故曰日短星昴考帝堯之八十一年甲子上距平初甲子凡一百有八甲子歲差星躔適過四分之一冬至中星為
  hash: sha256:5a1abfca1ea1f102b330e01b4b4699fa8a3c853bb6776c67fa5377e1cbf19396
