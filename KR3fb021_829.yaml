body:
  text: 為宿在東壁魯分以法布算三月不入食限夜亦不食乃五月壬子朔沈時食又宿在東壁典合子慶父逼夫人弒君何預定法乙巳歲天正朔甲寅七三四一定氣甲子五八六八辰月經朔壬子八五六四定朔在書合交食限日說俱不書者失之後而食在丑正三月之晦也其壬子日為丑正四月之朔二十五日淂丙子與經書四月丙子政合考自隱公三年至閡二年經之日紀甲子而繫於月者八十七條用丑正推之合者十九其間有似乎子正者六約文之有悮耳昔人但以子正推之則此條又似合夏正故算之不能應法也二十五年壬子六月辛未朔日有食之丑正六月朔大衍云是七月朔授時七月辛未朔加時在書交分二十七日四百八十九入食限頭閏也按失閏云者夏正言之也失閏則上寢故午月而為六月若謂之七月朔則又周正之月數也曆象論古之踈大抵如是定法壬子歲天正朔甲戍三六五二定氣辛丑二八六二午月經朔辛未六四四定朔在午後合交食限長曆曰辛未實七月朔作曆者置閏有差敬以為六月朔也杜氏此論蓋未知其時實為丑正也是年閏應二十六日九二應閏寅月魯曆置在入
