body:
  text: 歲星聚井考證五星聚井漢史係于乙未冬十月北魏崔浩推為甲午三月今以法推之實在庚午四月二十三日辛亥甲午歲天正朔淂辛酉七十一刻冬至得癸亥二十六刻四月朔淂已丑二十二日為𦬆種淂庚戍土家先入火次之金典水又次之木家後至金躔井三十度火躔井二十一度土與水躔井四度木躔井初度昔人謂從歲星而聚政以左旋言之也可見左之理漢時獨能明之置太初丁丑天正冬至上距漢元年前一歲甲午一百三歲歲積三萬七千六百一十九日九九一八加丁丑後合應二十四日二九一四以新定木周率纍除之餘一百五十一日四四三二淂小滿前四日為至後合伏日太陽入盈末六十二日有半應減二度一八從歲差日躔古黃道斗二十三度草二度五八三順推一百五十一度六六淂參七度為合伏度六度八距井宿尚有三度九二查木星行率三度九二應行十七日則𦬆種後一日躔井也
