body:
  text: 西士自為設難曰日月正對相遠必百八十度半周天也故月在地平上日必居其下日在地平上且必居其下然有月食而皆在地平上者則月食非由地景矣何也此見甚明何不因其明而轉思其理以悟地蔽之非而必又焉之由解也曰此海水或濕氣所影映也盖地平傍近恒有濕氣清微如煙或空中對月輪有輕薄白雲或值當海水皆能令月影映於其內而目力所成宛一月焉如水中錢景此視法之理也云云茍如所觧則是月本食在地下而人若見其食在地上也夫食之當在地上或當在地下加時當在晨昏限之或前或後夫豈無法可按無數可測者乎乃竟舍法數而歸于虛幻亦太欺人矣且月食之必非地景更為易辨凡人之視物遠則見小而物之有景遠則轉大試以日食騐之南方見陰曆微虧北方見陽曆微虧則里差相距三十度許是月體僅七百餘而其景至地以遠四十八萬里則大徑七八千里是景之遠則轉大為足微矣由此推之則地體往二萬八千里其星至月亦遠四十八萬里將大往三十餘萬里何以闇虛僅為五六寸乎
