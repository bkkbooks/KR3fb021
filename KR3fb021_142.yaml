body:
  text: 渾儀之制始自漢洛下關春秋文曜鈁謂曆堯即位義和立渾儀劉氏曆正謂類頊造渾儀然於經籍無考世因以尚書璇璣玉衡為即其矣亦未信然後賈達張衡吳陸績王蕃葛衡僞漢孔捉北魏朝崇斛蘭宋錢樂之唐李淳風梁令瓚一行宋張思訓韓類符沈括元郭守敬相繼增修法制漸修俱詳正史人矜其智代殫其巧而究不過為考象之用初無關於曆之疏密夫渾天之體仰觀斯得亦何籍于器且天運之星躔歲歲漸差則渾儀亦將歲歲改之乎不然則安能常通於用也漢以律造曆故有律琯候氣之說詳東漢志及晋志大抵雖有是法而未必確驗不然則何獨數於漢而不效于後哉隋志高祖令毛爽候氣律矢或三五夜而盡或一月纜飛少許牛弘謂厥飛半出為和氣其政平全出為猛氣其匪無不出為衷氣其君暴高祖駁之曰臣繼君暴其政不平非月別而日異今十二月律因應不同安得暴君從臣從臣若斯之盛也曰古尺不得也鐘禽不合也黍必用上黨之秬管必取金門之竹灰必得河內之葭也是皆甘為古人所欺者也用禮馮相氏冬夏致日春秋致月則土圭測景自
