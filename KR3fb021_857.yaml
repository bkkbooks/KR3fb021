body:
  text: 左傳至朔辨左傳僖五年丙寅冬十二月丙子朔僖二十四年乙酉三月已丑晦文元年乙未五月辛夘朔戍十七年丁亥十二月閏月乙卯晦歲十八年戊子正月甲申晦二月乙酉朔棄十八年丙午申月丙寅晦十一月丁夘朔十九年丁未五月壬辰晦二十七年乙夘六月丁未朔二十年丙辰十二月乙亥朔左傳僖五年正月辛亥朔日南至定法天正朔淂壬子六九差一日至淂甲寅六八差三日又昭二十年春王正月已丑日南至漢志亦以為至朔同日定法天正朔淂庚寅五一亦差一日至淂辛夘九七差二日攷經之晦朔書甲子者三十八條以定法推之合者淂三十七何傳之兩條俱不得合乎其昭二十年原無朔宇漢志固不足據𠰥僖五年則政有可辨矣是年經有申月戊申朔日食一條於法恰合逆推天正政當為壬子此以經証之而可疑者一也是年國語紀丙之辰龍尾伏辰為夏正十月之朔今定法淂丙子為亥月定朔逆推天正亦不當為辛亥此以傳証之而可疑者二也唐歷志傳仁均引春秋命歷敘謂魯僖五年壬子冬至則至朔同日亦當為壬子而不當為辛亥此以緯書証之而可疑者三也然猶可觧曰經之
