body:
  text: 古宿名説世所傳二十八宿分度出淮南子漢書班范二志東漢以前但用赤道至賈逵始用石氏黃道規測冬至日躔世皆謂義和舊法非也凡冬至日躔所在之次其分宮之度數必少蓋經星入盈曆其行疾也詳經星行率古黃道丑宮止有二十七度政以日躔其次故度少耳則石氏黃道規的為周末之法無疑周時日躔在丑其宮止有二十七度子宮則二十九度寅宮則三十度至宗元日躔在寅其宮則減為二十八度二九七丑宮則增為二十八度六六五三至于今入寅益深則其度益少矣古赤道未宮之宿為狼弧丑官之宿為牽牛建星其狼弧易以井鬼建星易以斗者以周世冬至日躔南極於斗夏至日北極於井魁故易之也據此則古赤道亦屬周世之遺法若周以前之法蓋已古矣而不可考矣僅有二十八宿古名出春秋甄曜度魯歷史律書與世所傳習者異張為星星為張栁為注鬼為弧井為狼參為伐觜為參畢為濁昴為𤲢或易其位
