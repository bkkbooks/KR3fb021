body:
  text: 露節二百九十五日八應進四度餘白露在尾七度寒露在尾十度金星置前歲積加章首金應一百九十日二八九六纍除金率餘四百八十三日四五四九反減原率淂一百日四四七七用加步斗虛度通一百七十九萬五八查表淂古黃道奎十四度半強為後合度合後距白露莭百六十日六四應進二百一度白露在元十度秋分八日入尾寒露在尾九度水星置前歲積加章首水應三十二日一六七八纍除水率餘一百二日六二六四反減原率淂一十三日二四九六又加二率策淂二百四十五日一六用加步斗虛度通三百二十四萬一一查表淂古黃道翼五度初於處暑莭前六十刻合伏下距白露莭一十六日八應進三十一度少弱白露在軫十七度秋分在亢六度太寒露在氐九度夕留至小雪九日始入尾水星之行不甚有盈縮故用舊率以考古驗今顧為淂天今推此條九月間水星尚未能及尾則唐
