body:
  text: 五十一萬二八八二查表淂古黃道井四度二八合伏為小滿七日前距井初三度二八應反減二十八日強是轂雨九日已入井也金星置二歲策減章首金應四十七日九二七一除一金率餘九十八萬六五五五用加步斗虛度通一百九十一萬二三五五查表得古黃道婁九度二三合伏為春分八日距井初五十六度七六應行四十四日七五于立夏七日入井芒種節前二十五刻入鬼水星置二歲策減章首水應一百日二八一纍除水率餘五十日八二四三用加步斗虛度通一百四十三萬四四二查表淂古黃道室六度四合伏為立春六日距井初一百四度六應行一百一十日四於小滿後九日四刻入井五星聚于尾箕唐書元宗天寶九年庚寅歲八月五星聚于尾箕熒惑先至而又先去距第九紀之五十九章四年歲積一千四百六十日九七五天正朔淂辛卯冬至淂乙未
