body:
  text: 以日法刻法為而授時以日法刻法為一也今以萬分之法而施之干西曆一千四百四十分之日法六十分之度法自必不淂其合猶之以一千四百四十分之法而施于中曆萬分之日法度法亦必不適于用此立術各有不同不淂執彼以律此也夫大統仍授時之舊本非無斃之法而行之踰六甲子年遠則所差愈著施之明季可議正多𠰥刻法則無庸相議者也至于九十六刻之合於理數較前諸術為獨勝者非但用之者未必知即立術如虞𠠎者亦僅為偶合而未必知之也
  hash: sha256:adb49b916311f03dd030e00233f6ce2856ea65625bd6b050ca71a90ba7dfe74f
