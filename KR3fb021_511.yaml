body:
  text: 道參三度二一為合伏度查木星行率合伏前一十六日強應行三度四從罰四度反減得參旗十五度古赤道申宮訾一度八一為上元冬至歲星所躔度置前歲積減去庚午前合應三百二十一日九五四此係舊法又除太初丁丑前積三百四十二萬三千四百一十九日二五四一以舊術今木周率三百九十八日八八累除之餘不滿周者三百九十五日七五五九併入太初前積再以古木周率三百九十八日七六七累除之餘一日五四八一太陽入盈曆應加七百七十分從上元日躔畢五度順推一度六二得畢六度五度八二為合伏度即為上元冬至歲星所躔度木星周率既已改定而復用舊術推之併載于此者以明上元乾象五星之順序相生即用舊術亦相吻合木星亦在太陽之後辰星之前其所以更定新法者本為舊術謬妄故務求宻率以合天行非欲傳會上元乾象而改法以就我之説也熒惑置前歲積減去庚午火合應四百七十四日五五四七以火周率七百七十九日九二九累除之餘三百五十五日九三八八得甲子歲大雪後六日合伏太陽入縮末八十
  hash: sha256:74fa0110e37dbb5f0e00e59faa926555a7fbe1f0bf4986da858718dde7c84750
