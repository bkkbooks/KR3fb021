body:
  text: 秀水張雍敬著歲差總說日行信天行健故經星比太陽日進一度凡一歲必太陽多一周然有不及之分秒故經星漸差而東蓋日計之而見為有餘歲計之而及若不足也是名歲差此本經星之不及日耳而曆家及謂日不及天則不知經緯同為左旋而誤以經星作硬盤看也歲差之法原于三正而月令中星不宗堯典則周秦以前定法固在也蓋唯以日自為日經星自為經星故歲差之名不立而其理自著至漢人執牽牛為冬至常宿以天周為歲終其理始晦晋虞喜始以天自為天歲自為歲使見其不及之數謂之歲差承漢法之謬以立名也自是曆家咸宗其說而所定年限或多或少莫有得其真數者歲差之日躔不真則氣朔交轉俱無由正而考步天路多不合矣是以曆法重之欲求真數是有五要立周法以總其數推三正以
  hash: sha256:7bbd66847d97cc5e2fe5dc3f9a8fd63fe75fc73a89beed4e87f2c552c42a10f6
