body:
  text: 節氣然二至為日行極至之豦二分為日行析中之豦則必當求合者也故餘氣可以弗拘而分至則在所當究古人致日不以春秋焉知非因其違失而故諱之乎子抑何好是古而非今也曰以交于赤道之日為二分理數本非有診而定氣之在不知赤道之豦從來測者皆未淂其真也蓋天體高遠而卑近故天頂之度必狹而漸卑則漸潤此以列宿距度及星座疏密驗之舉目即見有不待繁辭而始悟者由此觀之則子北道至於赤道二十四度就整其勢必當稍狹自赤道至於南道雖亦為二十四度其勢必當稍潤𠰥舉光道四十八度統觀之則折中之豦必偏近乎此此乃真赤道之豦也而從來赤道但以平分半周法測之則其所指為赤道者實侵入于南而非天象之真矣赤道既不淂其真而欲求合之是謬上加謬矣𠰥知遠近高卑潤狹之理則古人雖不致日於春秋而二分之日又何嘗不正當赤道之上乎師心自智而反議古法之非此所以後世之術愈密而愈疏也
