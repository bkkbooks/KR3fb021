body:
  text: 火定盈距冬至加四十七度八一八一七定縮距夏至加同上比曆元多一千二百分木定盈距冬至加九十五度六二一六三五定縮距夏至加同上比曆元多一度三八水定盈距夏至減二十三度九五四八定縮距冬至減同上比曆元多一度土定盈距夏至減一十一度九五二七四定縮距冬至減同上比曆元少七百分右五星盈縮起處皆從二至日躔加減其進退多寡之數悉本于況道二至日行黃道所距赤道內外度也於緯度也歲星塵氣氣無形而旋運之量家大故得一歲光道往復之數其經度除去合伏飯前後日分齊見于天者恰得三百六十五日有竒為歲周之數而盈縮距至之靈亦適得一歲日行光道往復一周之數是也故名歲星也可見日人命名的推之妙火有行無質其量次之故減歲星之半而得光道內外相距之數水有質而無體其量又次之故滅火星之半而得黃赤二道相距之數金土則形體結實其量最次故又減水星之半而得黃赤相距折半之數蓋其進退多寡即釋氏地水火風之序耳
