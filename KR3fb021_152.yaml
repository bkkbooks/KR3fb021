body:
  text: 成光者曰太陽第七重曰素氣天圜周之氣皆屬於金其精之結而成光者曰太白第八重曰元氣天圜周之氣皆屬於水其精之結而成光者曰辰星第九重曰陰氣天圜周之氣亦屬於水其精之結而成光者曰太陰星羅萬象著天體也故經星𡪯上土長五行曜地德也故填星次之木火通明而太陽則火之盛者也金水相涵而太陰則水之精者也上下相生五行之定理也高卑有等四時之定序也土木火為陽故附于日而晨明金水為陰故附于月而夕見此言五緯舍伏之後分則九重通為一氣運行不息所秉者機也繞地左旋所性者順也其氣甚急急則剛矣是曰風輪亦曰剛風天運甚急急則生氣風道家所謂剛風世界釋氏所謂日月皆有五風攝持而行者是也見起世經長阿舍經氏之不同于儒以立教有異耳至於所言天象頗
