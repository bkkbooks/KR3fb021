body:
  text: 差二度冬至日當在斗二十二度故月令云日在斗是也自秦莊襄元年推而上之至堯之甲子凡二千二十一年日差二十六度冬至日當在虗一度日沒而昴中故堯典曰日短星昴是也按此全寫大衍舊術故其謬亦同若年限之減為七十九年則亦不安于舊說矣郭守敬授時曆議曰以堯典中星考之其時冬至日在女虛之交及考之前史漢元和二年冬至日在斗二十一度晋太元九年退在斗十七度以上係古赤道宋元嘉二十年在斗十四度末梁大同十年在斗十二度隋開皇十八年猶在斗十二度唐開元十二年在斗九度半以上係古黃道今退在箕十度此係授時黃道度較之多者七十餘年少者不下五十年輒差一度豈歲差有遲速不同邪何言之要也宋慶元間改統天曆取大衍歲差率八十二年及開元所距之差五十五年折取其中得六十七年為日却行一度之差施之今日質諸天道實為密近按此以古今黃道赤道並引混承尤為疏謬
