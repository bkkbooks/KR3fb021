body:
  text: 形隔是故銅山西崩洛鐘東應慈母指孝子痛心一氣故也嘗見一地師出磷石及鐵為戲置鐵於案以磁石于案下運之則其鐵旋轉不已失磁之與鐵徵物耳而理有感通則他物不能隔況日月乃陰陽一氣乎彼地鳥能隔之而煩多方測算為也一則天以內皆積氣氣即是天日月星宿記體於中各桑其陰陽五行之氣自為旋運無界限而自有界限無根繁而自有根擊者也且三光之精無非積氣故其質亦本輕清而天之運也又甚急而剛是故載之以旋而不虞其墜古今之言日月星宿者雖未嘗明言其何以擊屬於天而凡于積氣之説多在所不信豈非虞其或墜乎則古今之人皆杞人類也利氏因古今之皆杞人也於是謂天體硬堅而日月星宿定在天內如木莭在板因天而動是則可無虞其墜矣今試驗之惟太陽隨氣順旋有一定之度若月無五星則各有疾遲者也使定在天內則九層相包動則俱動順則俱順即因氣之緩急而有疾遲之分亦當疾者常疾遲者常遲必不能因太陽之感台而或遲或
