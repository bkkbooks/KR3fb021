body:
  text: 歆曆既不足信則傳之獨合於歆曆者又足信邪夫三統之疏謬何承天已明之承天曰三統方於四分三百年執盈一日經傳之抵牾姜岌已知之岌曰經率多一日傳率少一日而後之曆家獨欲據三統之譜左氏之文以驗其法之違合不亦惑乎考春秋經傳原各自為書以傳附經始于漢世大約二傳本為別公別年之傳而歆欲誣其診術周而竄附于二公之下耳否則辛亥朔一讀日南至一讀猶言是月朔內之冬至云爾
  hash: sha256:aecbd4c04544d46e5cf11dfd10edbeccb27e3850dbd2e5cb1289ab509d6b9db0
