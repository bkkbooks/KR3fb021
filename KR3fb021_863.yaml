body:
  text: 歆曆既不足信則傳之獨合於歆曆者又足信邪夫三統之疎謬何承天已明之承天曰三統方於四分三百年執盈一日經傳之抵牾姜岌已知之岌曰經率多一日傳率少一日而後之曆家獨欲據三統之譜左氏之文以騐其法之違合不亦惑乎攷春秋經傳原各自為書以傳附經始于漢世大約二傳本為別公別年之傳而歆欲誣其診術周而竄附于二公之下耳否則辛亥朔一讀日南至一讀猶言是月朔內之冬至云爾
  hash: sha256:f6e874e7792d9a2d8d26f79146c9f50e0589c8ec02ec0e10ee1d27a4101cd72d
