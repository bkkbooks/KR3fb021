body:
  text: 十八卷既擇馬而精語焉而詳矣始稽之吳江王寅旭氏繼又往證之宣城梅定九氏凡西洋之言溺于數之中出于理之外傲人以所不知者弗受其惑馬班孟堅曰歷譜者聖人知命之術蓋昧者視為器數之學明者知為性命之原自昔習天文有禁而言歷者無禁也是書傳足以仲儒者之氣折泰西之口而王氏梅氏為不孤矣簡菴名雍敬王氏名錫闈梅氏名文鼎皆有歷書秀水朱彝尊序
