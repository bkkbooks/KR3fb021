body:
  text: 度一百零五日方躔井宿為種前二日置前歲積減去庚午木合應見前又除去太初丁丑前距甲午歲積三萬七千六百一十九日九九一八一百零三歲以令木周率三九八八八纍除之餘不滿周者三百九十五日七五六併入太初前積以古木周率三九八七六七纍除之餘一百三十二日八八二八為甲午至後合伏日太陽入盈末四十四日少弱應減一度六九二二從古黃道斗二十三度順數一百三十三度半強淂畢六度初為至後合伏度查木星行率順行二十二度合伏後三百四十五日方躔井宿為乙未清明後日則甲午之歲固未嘗及井也以上入氣用漢法蓋漢世未有盈縮法者也五星聚井漢史係于乙未冬十月蓋以此為高祖入閞之應故係于乙未歲首秦正建亥故以甲午之冬十月係于乙未也其實非十月也北魏高允謂金水二星日而行十月日躔箕尾金水何得背日而馳於是崔浩推之謂在前三月聚井實在四月因書時五步尚踈疏又失先一月今推土火金水四星實皆以立夏前後至𦬆種聚干束井四星之聚
