body:
  text: 戴銂曰先生謂曆率當即日為度而推算又常用天周何也曰此所以求日率之真非所以求五步之真如甲戍歲火前應三百七十五日六六七二徐歲策得一十日四二四六即為癸酉前應因日行却有歲差故不從癸酉歲差度加天周而減前應然後可合於壬申之後合度又如甲戍歲金後應三百九十七日八三三三除歲策得三十二日五九七即為乙亥後應因日行却有歲差故其後合伏度必加天周而反減原率然後可合于甲戍之前合伏度此專為歲差之故務使日與天合而用之者也日既與天相合則五星但合于日即所以合于天矣此所謂周天之法已寓于日行之中周率之中已寓有歲差之數者也昔人曆率以天周立法政如子之所見因人算時常用天周故政悮耳五星入曆捷法金定盈距冬至歲差度分下同減一十一度九五二七四定縮距夏至減同上比搜時曆元少一百分
  hash: sha256:3f1f8aba4b9a02692848de09c32aeff137c1734d02ff0577a8be939b29fd10f5
