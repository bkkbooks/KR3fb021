body:
  text: 炁差定法炁運一周四百三十二甲子即星躔歲差一周之數盖象差炁差同為始終也二十四甲子為消二十四甲子為長迭消迭長凡十有八變其長也加至二十刻有竒二一七六其消也滅至二十刻有竒二一七六一長一消而炁策復平七十二歲差一刻每歲差一分三九四天皇氏初元正甲子歲起消地皇氏前十二甲子起長地皇氏後十二甲子起消人皇氏太平元正甲子歲起長黄帝前五甲子起消殷仲丁六年甲子起長漢武帝元狩六年甲子起消元泰定帝元年甲子起長
