body:
  text: 伏自合伏後至甲午夏至有三百二十八日五一三五查金星行率應行二百八十八度二八從尾十七度順推得已宮赤道軫三度二度三九為終元夏至太白所躔度辰星置前歲積加庚午水合應八十日五九一三以水周率一百一十五日八七六累除之餘一百一十日二七六三置原策反減得五日五九九七又加一率策共一百二十一日四七五七為甲午轂雨後二日合伏太陽入盈末三十二日五六六五應減一度三四一四從古赤道歲差日躔胃九度順推一百二十二度五三六得翼三度二度一合伏自合伏後至夏至有六十一日一八一三查水星行率應行五十五度六從翼三度順推得夘宮赤道氐二度一度五一為終元夏至辰星所躔度
