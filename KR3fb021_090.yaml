body:
  text: 求一定之法必盡復古法而後可非反取其疏也正將以精求其密耳但古法自甲子節候壺漏圭表而外概為術士紛雯不得盡傳于後惟西京而上去古未遠經籍所載間或軼見一二足為好學者所深求然大約有其說而數或不詳傳其略而理猶未著且以散寄諸書有若為曆道言有若不為曆道言者是以世鮮得而從事焉雍敬信古情殷凡於載籍之有關曆道者即雙字片言亦必赴以旬月研窮之力或顧名而思其義或因端以竟其委無是法者為之數以實之舉其略者廣其義而疏之精而檡馬會而通焉則古人一定之法未始不全留于天地間也是知古今奇祕之理造物者恆存之于若見若隱之間而示當豫人以易窺亦未當絶人以雖知也爰敢不揣愚陋力為闡楊語語皆由心得法法各有從來然未免迹類好奇言鄰附會矣要以象緯可瞻載籍可案券證昭然有可共信而已一課曆之法有二一驗諸交食一驗諸往古古今曆
  hash: sha256:2448124b973e4dedba5d24028a017064cbe3e1ca1bd270f9abcd61f87b98787c
