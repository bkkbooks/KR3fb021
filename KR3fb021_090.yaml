body:
  text: 求一定之法必盡復古法而後可非反取其疎也正將以精求其密耳但古法自甲子節候壺漏圭表而外概為術士紛雯不得盡傳于後惟西京而上去古未遠經籍所載間或軼見一二足為好學者所深求然大約有其説而數或不詳傳其畧而理猶未著且以散寄諸書有若為暦道言有若不為暦道言者是以世尠得而從事焉雍敬信古情殷凡於載籍之有關暦道者即雙字片言亦必赴以旬月研窮之力或顧名而思其義或因端以竟其委無是法者為之數以實之舉其畧者廣其義而疏之精而檡馬會而通焉則古人一定之法未始不全留于天地間也是知古今奇秘之理造物者恒存之于若見若隱之間而示當予人以易窺亦未當絕人以雖知也爰敢不揣愚陋力為闡楊語語皆由心得法法各有從来然未免迹類好奇言隣附會矣要以象緯可瞻載籍可案券証昭然有可共信而已一課暦之法有二一騐諸交食一騐諸往古古今暦
