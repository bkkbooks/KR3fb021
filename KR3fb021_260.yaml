body:
  text: 月光古人言月本無光以日之映照為光遡日之靣其光本圓特以望之者有正有側故有晦朔弦望之異蓋月之體常盈而人之目有所不見也大意謂朔後月生于西日于西照其底人從旁視之僅見其偏故如鉤漸過而東則于人盈近故光漸見為滿而為上弦至望則日月相對人從中間視之見其正面故光滿望後漸東日于東照其底人從旁視之又僅見其偏故為下弦至晦則日月同升日高而在上月低而在下光照其上人從下視之而不見故光盡大抵如一彈丸以粉塗其半側視之則粉豦如鉤對視之則正圓也近徐子圃臣謂月自有一半光非借于日但其光則常遡日耳天元曆理曰昔人謂月無光借日之光以為光非也日月皆為天之精氣何一有光而一無光乎特陰光不勝陽光故日出而暗日入而明若曰借光則畫當並明何以晦暗蓋陽精積火故內朗陰精
