body:
  text: 七月二十七日為白露淂癸丑八月朔得丁已十三日為秋分淂已已二十八日為寒露淂甲申九月朔淂丙戍歲差日躔在古黃道斗十度一一淂步斗虗度七十八萬一一木星置前歲積加章首木應一百四十七日八九四五纍除木率餘一十三日四一一用減步斗積度存六十五萬六九查表淂古黃道箕六度太強為前合度合後距白露節二百七十四日半弱應進一十二度強白露在斗八度寒露在斗十度火星置前歲積加章首火應四百一十四日一二一七纍除火率餘三百一十五日二三四二用減步斗虗度加一周策減之存一百二十九萬一二查表淂古黃道危八度初為前合度合後距白露節五百七十六日二七應進二百七十一度半弱白露在房四度後十一日入尾寒露在尾十三度土星前歲積加章首土應八十六日一九七纍除土率餘三十四日七一三八用減步斗虗度存四十四萬三九查表淂古黃道尾三度少強為前合度合後距白
