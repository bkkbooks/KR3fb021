body:
  text: 矣靈憲曰其動也者七日月五星是也周旋右回天道貴順也夫自東而西方為順若自西而東則是逆矣而曰右回貴順直是順逆莫辨自宋以來諸大儒迹其象而探其理明經緯皆為左旋已不啻揭日月於中天而無如人之好居幽室也朱子語録或問天通左旋自西而東日月右行則如何曰橫渠說日月皆是左旋說得好蓋天行甚健一日一夜周三百六十五度四分度之一又進過一度日行速健次於天一日一夜周三百六十五度四分度之一正恰好比天進一度則日為退一度二日天進二度則日為退二度積至三百六十五日四分日之一則天所進過之度又恰周得本數而日所退之度亦恰退書本數逐與天會而成一年月行遲一日一夜三百六十五度四分度之一行不盡比天為退了十三度有奇進數為順天而左退數為逆天而右曆家以進數難算只以退數算之故謂之右行且曰日行遲月行速然則
