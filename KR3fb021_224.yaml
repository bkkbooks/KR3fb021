body:
  text: 此意者惟恁人于天地之外別尋去虜故也天理無外所以其形有涯而其氣無涯也為其氣極檗故能抗淂地住不然則墜矣氣外更須有軀殼甚厚昕以固此氣也又曰自古無人窮至北海想北海只挨著天殼邊過緣北邊地長其勢北海不甚澗地之下與地之四邊皆海水周流地浮在水上與天接天包水與地邵子曰天何依依乎地地和附附乎天天地何依何附曰天地自相依附蓋地之際于天者為有質之水大海天之際于者為氣化之水太陰天辰星天氣昏屬水天地交際虜水與水相接也是曰水樞子華子曰混薘之中是名太初實生三氣上氣曰始中氣曰元下氣曰玄是以棲三陰之正氣于風輪其專精之名曰太玄棲三陽之正氣于水樞其專精之名曰太一風輪者所以狀天之旋水樞者所以著天之靜二義甚精輝氏亦謂天之中有須
