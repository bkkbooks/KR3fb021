body:
  text: 乃反譏中暦莭氣差至三日凡暦之所由差者必其理有未明法有未立也若夫春分前三日已交赤道秋分前三日才交赤道無論昔人多曾論列即使五凡之童精能握筭亦必知之何待西士而後明邪況入炁差法原為中暦之所故有而天竺法特祖述之其法始自北齊張子信唐宋皆因之天竺法亦不過勒中暦之舊而西暦又動槩天竺之舊耳本非西士之所特剏而復阮矜為獨淂之秘世亦鷺為未有之奇背未親暦法之源流也至授時暦但用以步日躔求虧食而不用以定莭氣者盖二分為春秋平氣之中二正為周天象限之度氣自為氣星自為星即欲一之而不可也夫以星度擊于節氣則不合于天此漢世之法星氣皆平分者也以節氣擊于星度則不符于星此天竺也法平分星度而盈縮莭氣者也皆混而一之之過也兩士不能審所從違而悮宗天竺之法理一悖謬弊必業生畧舉其槩不可者三古法每月莭氣凡三十日有餘故謂之氣盈朔法凡三十日不足故謂之朔虗唯氣盈于朔故每月皆淂二氣一為初氣一為中氣十有二月則淂二十四氣而成一歲此自然之數非意計所能安排也今盈縮其氣則冬至前後二氣止
