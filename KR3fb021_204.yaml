body:
  text: 算其周度畫夜長度則有二百四十一度畫夜短度止有一百二十四度則其所言算法雖是而實與儀象不合也史言吳時陸績亦造渾象形如易卵而黄道赤道短長相害不能應法則舊儀之與法不合昔人已有知之者而耫世不悟則昩手舊儀之爲虗象而非真象也日月之徑皆占半度徐整長曆云日徑千里按漢法以二千里爲一度千里則半度也靈憲云日月徑當天周七百三十六分之一亦是半度也时後神摳云日徑四寸周一尺二寸日周圍約一千二百里管窥輯要云日圓二千三百六十二里半徑七百五十里月圓一千八百九十里徑六百里月道下於日道萬有一千五百二十里鲁勝正天論曰以冬至之後立晷測景準度日月星大星裁徑百里小星裁徑十里
