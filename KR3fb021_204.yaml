body:
  text: 算其周度畫夜長度則有二百四十一度畫夜短度止有一百二十四度則其所言算法雖是而實與儀象不合也史言吳時陸績亦造渾象形如易卵而黃道赤道短長相害不能應法則舊儀之與法不合昔人已有知之者而耫世不悟則昧手舊儀之為虗象而非真象也日月之徑皆占半度徐整長曆云日徑千里按漢法以二千里為一度千里則半度也靈憲云日月徑當天周七百三十六分之一亦是半度也時後神摳云日徑四寸周一尺二寸日周圍約一千二百里管窺輯要云日圓二千三百六十二里半徑七百五十里月圓一千八百九十里徑六百里月道下於日道萬有一千五百二十里魯勝正天論曰以冬至之後立晷測景準度日月星大星裁徑百里小星裁徑十里
