body:
  text: 統乃起甲申仲統乃起甲子季統又起甲辰其序不合注家又謂甲子為周正朔日甲辰為商正朔日甲申為夏正朔日總之混三正三統為一則義必有所不同故其説多支離而背乃曰三五相包王者必貴三五多見其為自文而已矣上元甲子氣首始于子半氣從乎日也天為陽而主日故曰日合天統中元甲戍搖元貞子月建氣從乎斗也詳斗建䛃天地合天之斗應地址辰陰陽和分於前後陰陽之間而萬物之命皆繫於斗故曰斗合人統下元甲申一陽復於望夕氣從乎月也地為陰而主月故曰月合地統自開闢至地統甲申凡一萬八千二百六十歲歲積六百六十六萬二千百二十五日七三三太以旬周纍除之得已酉為冬至日朔積六百六十六萬二千一百一日九七九三太減三朔以旬周纍除之得甲午三八七五太為天正朔加望策一十四日七六五二九六九四得已酉一五二八太為天正望日蓋至望同日也是為氣從乎月於時歲陰在申而一元十二運又在申運之中時為月合地統
