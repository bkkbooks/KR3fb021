body:
  text: 二術年限懸隅遂折中兩家以為差法古今曆術修改增損從無確見但知以新中調停為良法此數之所以難真也八十三年却行一度則正合堯時日永星火次符漢曆宿起牛初唐書曆志傳仁均造戊寅元曆冬至六十餘年輒差一度命辰起子革命度起虗六符陰陽之始日短星昴合于堯典按帝王年世若從竹書堯時固應在虗六然以六十餘年差一度計之自堯元年丙子從竹書至唐戊寅凡二千七百六十二年應差四十六度而自斗十一唐初日躔初交斗十一至虗六僅有四十一度𠰥黃道則僅有三十七度故其命度雖偶合而年限實非也𠰥從世紀年數則愈加乖舛矣唐一行日度議曰古曆日有常度天周為歲終故係星度于節氣其說似是而非故久而益差虞喜覺之使天為天歲為歲乃立差法追其變使五十年退一度何承天以為太過乃倍其年而反不及皇極取二家中數為七十五年蓋近之矣考古史及日官候薄以通法之三十九分太為一歲之差三千四十分之三十九分太自帝堯演紀之端在虛一度及今
