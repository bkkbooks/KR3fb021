body:
  text: 推得定只是旋將曆去合那天之行不及則添些過則減些以合之所以一二年又差季通說當初造曆便合併天運所躔之度都算在衷幾年後蹉幾分幾年後蹉幾度將這蹉數都算做正數直雅到盡頭如此則庶幾曆可以正而不差獨是天地之化至神而不測天地之量至大而無窮而欲究其始終亦幾於無所庸其推度而陰陽五行之理來始盡祕者也理有定則數亦有定天地不能外乎理即不能出乎數其始其終固可得而究言之有太極之終始有一元之終始有一周之終始三者不同而數則一貫也太極始終五萬四千七百八十歲天地之道陰陽盡之矣陰陽之道畫夜盡之矣蓋畫夜者陰陽消息之暫焉者也開聞混沌者陰陽消息之久焉者也時有久暫理無二致欲窮天地之以畫夜之運觀之斯得矣是以太極之數半為開闢半為混沌開闢者造化之大畫也混沌者造化之大夜也陽生于子中極于午中故開闢始于甲子冬至歲月
