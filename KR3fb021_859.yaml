body:
  text: 朔日亦有或失之先或失之後者固不必其悉協於法也𠰥夫冬至之先後則更在所必辨矣魯曆冬至經雖不書然以定法長曆考之大約後天如文公六年經書冬閏月定法閏應一十七日二七法不應閏而有閏者冬至後天故閏應多也未元年定法應閏未月二十年獨從定閏之法作閏三月亦以冬至後天而閏應多故置閏先五月也又以交食月日考之襄二十一年法淂至朔同日故申朔淂庚戍酉朔淂庚辰𠰥冬至果先三日則庚戍當為酉朔庚辰當為戍朔矣定十五年亦淂至朔同日故未朔得庚辰𠰥至果先天則庚辰又當為申朔矣故知魯曆冬至决為後天無疑而二傳之不足取徵也明甚𠰥謂二傳獨有合于曆譜則劉歆之術又何足據乎昔杜征南嘗以古今諸術追考春秋三十六食而歆曆僅淂其一則已不合于經矣而獨合于傳其足信邪太初以律造曆故用黃鐘之數八十一分為日法至劉歆作三統曆則又以八十一章為統法蓋因悮解漢史之文年壺遂等言前曆上元太初至元
