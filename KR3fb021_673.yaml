body:
  text: 起元宗開元十二年甲子天正朔壬戍六十刻一十四分冬至已夘初分定法經朔壬戍六十刻一十五分四一經無戊寅九十一刻六十四分八五舊朔元一分四一舊無遲八刻三十五分一五九執曆来自西城開元開詔太史監瞿蕓志達之用天三百六十庚無餘分二月為時六時成歲法數不同校靈臺餘大衍十得七八麟德纔三四九執一二馬故用大衍而九執不行五紀曆郭獻之造法同麟德起齊宗賓應元年壬寅天正朔辛已九十八刻六分冬至戊戍二十一刻五十分定法經朔辛巳九十八刻六分六四經無戊戍一十三刻六十七分六二舊朔先分六四舊炁遲七刻八十二分三七正元曆徐承嗣造以一千九十五為日法二百六十八為歲餘五百八十一為朔餘起德宗建中五年甲子天正朔甲戍三十刻二十二分冬至癸巳五十五刻定法經朔甲戍三十刻二十二分經炁癸已四十七刻四十八分一七舊朔同舊炁遲七刻五十一分八三宣明曆徐昂造以八千四百為日法二千五十歲餘四千四百五十七為朔餘起穆宗長慶二年
