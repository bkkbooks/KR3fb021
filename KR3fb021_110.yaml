body:
  text: 分野之法初昏夜丰蓋有二象本之左氏參以舊法法可參驗而不可混淆世多以方隅竊入州國謬十七州國相配乃子半之象上下相應四正八隅無不符協本之徐圖臣而世昧其原紛錯乃多謬十八斗建為人統一時之象本之漢書初非古今不變而昧者猶守故常巧者妄思變亂謬十九以上論象緯治曆大要在于求元古法自唐以前多據近驗以立法法既定而後追遡上元故無補于彼曆之疏密後人因其不放逐為截元之法而莫探其源謬二十天地之壽無窮而天地之數有限故太素之年止萬有餘歲本之未子而推者恆越其定界動以百千萬億年計謬二十一上元氣始必當子半本之漢書及古來曆法聖人甲曆必起天元本之虞書而昔人所推恆不能書一如漢説上元起庚戍大衍上元起癸已且在孟春之類謬二十二天地開闢始于三日出庚本之漢書證以周書而從來推者必求至朔同日謬二十三
