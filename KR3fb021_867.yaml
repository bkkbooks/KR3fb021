body:
  text: 傳之説則周亦未甞改正而孔子特以夏正建寅之月為歲首月下所書之事却是周王建子月事自是之後月與事常差兩月懸聖人之意不如是之紛更煩擾其所制作亦不如是錯𠃶而無章也今攷周先王之制則但改正而不改時周禮幽風班班可考而周書周月觧尤明白曉暢而可徵者也周月觧惟一月仲冬之月但謂之一月初未嘗謂為正月既南至徐國臣謂武王元商壬辰歲申冬十一月甲申朔甲午冬至也盖從行書推之日短極基踐長徵暢動于黃泉陰修于萬物是月斗柄建子始昏北指建斗之說始岐正合其時之象陽氣虧草木萌蕩日月俱起牽牛之初此言合朔之度甲申朔下距甲午九日七三從歲差古黃道女三度三反減淂牛初度五七為天正合朔度漢人悮認此為至朔同日故執牽牛為冬至常星也右回而行欲明合朔次宿必從若轉觀之始見此曆家五筭所以都從右轉也月周天起一次而與日合宿月行每月一周天而每進一次與日合宿日行月一次日行每月應一次周天歷合于十有二辰一歲一周天終則復始是謂日月權與周正歲道權與始也朔曰年中數曰歲周禮有正歲正月正歲者建子之月正月者建寅之月也次言作曆之法必當始于冬至而取一歲之全氣也數起于時一而成于十次一為首其義則然成楊終也
