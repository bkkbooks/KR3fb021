body:
  text: 窮其源宗堯典以為演紀之端考舊曆以著合符之理臚羣説以辨踈謬之術五要得而歲差之法定矣立周法試問曆家能舍氣策而定歲法乎則必謝曰不能能舍朔策而定月法乎則亦必謝曰不能蓋氣朔之策所以為周也舍周法則歲月無由定矣今欲定歲差而不知周法可乎且歲月既有周法而自漢以至今經營者幾二千載修改者凡六十家而氣朔之策猶未真也況不知周法而欲定歲差乎古今之立術者不過考太初以降諸曆之日躔以為證據夫侖侖而量之至于菳必有餘禽銖銖而衡之至于鎾必有餘銖天運始終有一元之久而所據近在漢魏以來幾何其不差也則先儒周法之説所當亟為講求矣朱子曰曆法要常凶論太虛以見三百六十五度四分度之一一一定位然後論天行以見天度加損虗度歲分歲分既定然後七政乃可齊耳黃道之差始自春分秋分赤道所交月道之差始自交初交中黃道所交日出入赤道二十四度月出入
