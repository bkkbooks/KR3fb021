body:
  text: 後應行九十六日弱始抵營室為清明十五日則是年夏五月周秋七月為夏正五月政在𡜯訾之口也歲在析木考證昭八年昭八年丁卯歲差日躔在牛四度一九得步斗虗度九十七萬一九置上戊午前應加九歲積纍除合率餘七十一萬七一七七用減步斗虗度餘二十五萬四七查表淂氐十二度四七為前合度距析木古赤道尾七度六五過宮凡二十度一八水率合後應行一百九日強於大寒七日入析木之次則是年之秋周冬十月為夏正八月政在析木後五十七年歲在火楚卒滅陳為獲麟後三年事亦驗歲在顓頊之墟昭十年已已歲差日躔在牛四度一六淂步斗虗度九十七萬一六置上丁卯前應加二歲策除二率策餘四萬四七五九用減步斗虗度存九十二萬六八查表淂古赤道斗二十五度六八為前合度距元枵女五度五三過宮凡
