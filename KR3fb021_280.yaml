body:
  text: 千六百五萬餘里以遠極而小故所見僅如盤孟是遠十萬里而見小一倍也地徑二萬八千六百餘里以遠十萬里而小一倍是遠三里半而見小一里也則近三里半亦當見大一里如信然也則泰山之高四十里登其絶頂仰望午日當大徑十餘里乎二至黃道之度以每度二百五十里計之進退差一萬二千里則冬至之日當如何小夏至之日當如何大哉四則日月之體大小不同而以遠近之故視徑若一則遠近大小宜為相似之例日大于地球一百六十五倍凡遠十萬里而見一小倍則月遠四十八萬里當大於地球四倍又十分之八何以反小於地球三十八倍餘乎若以月之遠近大小為例則日遠一千六百五萬餘里比月遠三十三倍半亦僅當大於月三十三倍半則日徑僅淂地球十分之九何能大於地球一百六十五倍餘乎五則又據地靣距日一千六百五萬餘里則日輪天徑當加地下一倍為三千二百十萬餘里略以往一圍三
