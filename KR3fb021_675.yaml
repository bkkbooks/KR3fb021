body:
  text: 壬寅天正朔癸已六十八刻一十三分冬至壬子七十六刻五十分定法經朔癸已六十八刻一十三分二三經氣壬子六十九刻五十分九四舊朔先分二三舊氣遲六刻九十九分分崇元曆邊罔造以一萬三千五百為日法三千三百一為歲餘七千一百六十三為朔餘起昭宗景福元年壬子天正朔丁未一十七刻五十七分冬至已未七十六刻二十九分定法經朔丁未一十七刻五十六分二四經氣已未六十七刻六十八分一五舊朔遲分七六舊氣遲八刻六十分八五調元曆石晉時馬重績因民間所困符天曆為法以雨水為氣首周斂天曆王朴造以七千二百為日法一千七百六十分四十秒為歲餘三千八百二十分二十八秒為朔餘起世宗嗣德三年丙辰天正朔乙未四十刻六十一分冬至乙未二十刻八十七分三定法經朔乙未四十刻五十九分七七經氣乙未二十刻八十七分三舊朔遲一分二三舊氣遲五刻一十二分九七宋應天曆三處病造以萬二千為日法二千四百四十五為歲餘五千三百七為朔餘起太祖建三年壬戍天正朔庚申六十七刻一分冬至丙寅七十一刻五十分定法經朔庚申六十六刻九十九分二四經氣丙寅六十六刻四十五分三六
