body:
  text: 五行以方言則各有其位以氣言則各有其時布散流行乃其本然河洛圖書何當聚于一虞而謂上元必七曜同起謬二十四古三統法古法寓歲差之理于氣運之中理之最徵者也而暦家率皆惘然則一元終姑之數何從可知而又何所據以為求元之要乎謬二十五甲之干支古法范圍天地搏捖陰陽暦精微憲蘊于此精求其理則天地始終之運可知矣而世但目為鈴記歲月日時之用謬二十六三垣四象五宮十二次分野雲漢皆古法古聖立法命名悉本上元天象而不知即此以求元何也謬二十七以上論求元古今象差歲差有三一日象差指日躔而言即世之所謂成差者也一曰氣差即消長法也一日暦差乃經星盛縮古今起虛有不同之數也昔人但知有象差而未知有氣差暦差故以歲差之名專屬之今歲差既有三項自應分別名之而編中或仍賺歲差取其習知乎確有一定之數上下古今四千餘年分秒不爽而推者謂古今有多寡不同謬二十八象差必立周法本之朱子周法立則其間過宮中次界
  hash: sha256:e7984f32e71fd9015855fb05f43009480dce686efd51d12512c0d5eed5eaed0c
