body:
  text: 惟此三者可以無書蓋其所以致悮之由自其師而巳然自其書而巳然也然則既無師矣阮無書矣孰為傳之孰為證之而自信硜硜若是曰亦仍以古人為師以古人之書為據而搜其殘潘餘瀝於渣滓之中浸而潤之釀而和之則其真味自出是直可以救秦火之劫熄煽亂之威而況異學之灰爐俗儒之餘焰哉吾友張子簡庵以二十餘年之閉戶專精竭神於歷數之學乃著定歷玉衡一書破諸家之謬訂先聖之同以經證經而不參以私臆以理度理而弗狃於禧聞拾古人之一言一字為之濯塵磨垢表著晶瑩以辨正百嗥之異同昭然如獨日月而照暗室也燦然如羅星斗而焕文明也超然如立雲漢之表通呼吸於帝座而俯瞰八荒盡在我闥也以一人之獨信釋千古之大疑豈不暢然快事哉豫閲之而有感於讀書之難也笈為之道其所欲言如是有識者誠能𠝥心刮目掃胃中之成見折衷而厭餘馬當必有以味其真而信其說之不誣也乾隆巳卯立秋日梅涇敬弟楊變最亭氏拜書
