body:
  text: 限分明而後度可紀以空盤即天周虛度年可紀以甲子自無悮執實度與帝王年世之弊矣而暦家昧之謬二十九三正之建政為象差而改古法後人但知商周改正之文而不知皇古改正之實此歲差之數與太素之年皆莫得其真也謬三十演紀之端暦家皆宗堯典舊法及至攷具演紀之度與經之星昂星虗全不符合謬三十一交食為天道至信之理故攷古者必以此為徵舊皆而六經所載惟夏書嗣征獨詳躔度此歲差實度之冣確者也而未當即此以求演紀年限之真謬三十二古今黄赤道不同故實度不可為據若全實度則亦無以為據但其要在于步斗之法而古今莫知推求此所以不可為據也而考古者第據實度謬三十三史籍之帝王年世春秋而上殆非實錄此本夏書也食日以天道斷之而暦家但依鏗紀等書此年限之所以不真也謬三十四
