body:
  text: 加日差八分到為亥正初刻八分奇也西法較後天五十四分三二夫自泰定以來三百餘年悮用消法至聖朝而始得合天之妙西法之為功於曆道夫宣淺哉但日法租而歲餘稍強行久必㢭後天自丁亥至今庚午才四十三年已差一刻八十分弱矣司曆忍于所當急為考驗而消息以求其真者也庚午天正冬至癸卯辰正三刻十四分以萬分法準之為三十七刻四十三分三三新法經氣為三十刻五十六分三三上距泰定甲子三百六十五年應加長分五刻七分四九併入經氣淂三十五刻六十三分八二相懸一刻七十九分半強推甲戍年天正冬至年根五四三四七反減平行為四分三七三三高術六度四九二九并淂引數六度五四六得加均一五五共淂定冬至一十九分四二三三變時淂七小時四十二分四四一三為辰初二刻十二分四四一三通中法為三千二一三分四五一一原法定冬至須知日差八分則為辰初三刻五分四四一三通中法為三千二六九分六五五七按年根高衡俱為乙丑子正之數冬至既在于正前五十四分則高衡日亦當減去五十四分始淂為平冬至加時之高衡實數法當以年根減高衡不當以冬至小餘併入高衡也表中高衡之數為冬至次日子正後之數故以冬至加時後分并入高衡為引數其法不悮蓋年根為冬至下至次日子正後至第七日之數也丁亥起甲戍五十七年以丁亥後天五十四分
