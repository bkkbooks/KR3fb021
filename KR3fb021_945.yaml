body:
  text: 五行之序戴銂曰先儒言五行有生之序質之序其先後舉孰是即曰五行吳德而一理理也者其體至方一定不易其用至圓神妙不測故就其用而言之則或順或逆或生或剋縱橫顛倒莫非神妙其序凡八併不但生質二端已也禮記月令為木火土金水即生之序此四時代禪義取相生氣屬於地故舉成數言之春其數八夏其數七季夏其數五秋其數九冬其數六河圖左旋之序也洪範為水火木金土即質之序此本其聲始言之故舉其生數一日水二曰火三曰木四曰金五曰土河圖對待之象也大禹謨為水火金木土此義取相剋從上治下洛書右旋之序也太元為木金火水土此義取相制從下剋上一德而作五生一刑而作五剋五生不相殄五剋不相逆不相殄乃能相繞父子之道也不相逆乃能相治君臣之道也兼生數成數言之三八為木四九為全二七為火一六為水五為土洛書左旋之序也甲子紬音為金火木水土其法同類要妻陽八生子則律呂相生之數也先仲次孟次季則遁甲三元至紀也始于金而左行傳于火火傳于木木傳于水水傳於土又河圖右旋之序也氣以舜而生故始于東方而右行音以感而應故始于西方而
