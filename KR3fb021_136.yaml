body:
  text: 譬之於水熱則為湯寒則為水其為水一也五行者一氣而異性譬之於木枝葉花實形色臭味種種各別其為木一也氣以成形天地位焉在天為象在地為物四序迭運萬有羣生故曰道原於一立於兩備於三周於四行於五該於萬其變化流行始終合散莫非氣之所為即莫非理之所在也氣之所以然處人從而名之曰理氣宇實理字虛理只當從氣中看出若於氣字外更尋去處進一層便是有物混成先天地生教旨細一分便是萬法歸一一歸何處宗門為釋為老只爭些子不可不審也理不可見而假之於數由是易與曆作焉易其神曆肖其形也二者為數不同而為理則一其於察天道前民用詔吉凶示修悖亦一也聖人因理以立數學者因數以悟理其歸亦一也易理即是曆理先天易軋為天天位乎上故乾正
