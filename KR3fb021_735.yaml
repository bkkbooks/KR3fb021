body:
  text: 既皆不爽而歲星躔井在一歲之後可知其術之踈矣乃固蔽于超行失次之說竟諉為天象之變不思漢史但言其聚初未嘗言其變行有如春秋襄二十八年之有傳可據也幸而漢史之謬昔人已曾辨明不然則必將執為十月即金水二星幾何不疑其亦有變行也邪太初合應辨歲星率策分為今古之異且無論考之春秋其術之難嬌合也即據所定今率起于太初其合應已先差矣太初丁丑之歲太歲在子漢書自有明文詳漢書辨載考漢初甲午四月聚于實沈之次至丁丑一百有三歲除八十三年為超一次餘二十年從親首順推應在元枵則甲午聚井丁丑在子其行率本自吻合而舊術太初合應乃在星紀據舊術推今庚午上距太初丁丑得三百九十五日七六三詳上篇聚井孝為至後合應置原率反減之得丁丑冬至前三日合伏歲差日躔在斗二十二度古黃道反減三度淂斗十九度為丁丑至前合伏度
