body:
  text: 中錢恰當一寸而大錢則左餘五釐所謂眺也小錢則左虧五釐所謂胸也再左移一寸則中錢仍為恰好而大錢仍左餘五釐小錢仍在虧五釐如是漸進以至移盡十寸其中錢仍為恰好而大錢之左仍止餘五釐小錢之左仍止虧五釐何甞有漸積之分乎故若從眺胸之説則春分止應微先五刻而不得先三日秋分止應稍後五刻而不得後三日若從定氣之術則冬至至春分有積盈之數而不得謂之眺夏至至秋分有積縮之數而不得謂之胸矣夫西士之所以聳動聽聞而譏中曆之差者全在定氣一端其無所動襲而特剏者止此眺胸一説而孰知此二説者已自為矛盾不可相通乎
