body:
  text: 不能像為故曰方皆與易義同陸地之體其形如半壁然觀前圖可見天地虗東南而實西北故土石凝焉詳上篇海有尾閭所以判其半也陸地虗西北而實東南故人物蕃焉朔有沙漠又所以判其半之半也陸地之西北為隂中之隂東南為隂中之陽故西北部毛而東南則人物繁盛也各半虛半實而又虛中有實實中有虛其宛然太極之圖與極南大暑極北大寒俱非人物所居故尾閭以南沙漠以北人跡少大地之東南雖虛而近緯線處有海國焉此虛中有實也大地中線其經在燕齊浙閩之閒元即律楚材剙交食里差法郭守敬從而修之天下置測候之旴凡三十有七處以騐交食其法叢密令改浙閩加二十八分是在經線左一度也燕京減二十分是在經線右一度也維楊登洲遼陽朝鮮俱用加豫楚山陝川廣雲貴俱用減惟青州
