body:
  text: 來曆家未嘗拈破者蓋追考春秋以合多者為密為淂交分甲子可合即自欺以欺人此天道經義之所以常晦也二十一年庚辰秋七月壬子朔日有食之授時交分二十六日八千七百九十四分定法庚辰歲天正朔甲申八八二七定氣丁酉二一七四午月經朔壬午六六三定朔在書合交食限二十二年辛已十有二月癸酉朔日有食之授時云是月癸酉朔交分十四日一千八百入食限杜預長曆推為癸卯非是定法辛已歲天正朔已卯二四九八定氣壬寅四六一亥月經朔癸酉六一七定朔在午前合交食限二十四年癸未夏五月乙未朔日有食之授時交分二十六日三千八百三十九分入食限定法癸未歲天正朔丁酉五一四七定氣壬子九四五七辰月經朔乙未六三七一定朔在午前合交食限三十一年庚寅十有二月辛亥朔日有食之授時交分二十六日六千一百二十八分入食限定法庚寅歲天正朔丙戍六七六三定氣已丑六四五一亥月經朔辛亥
