body:
  text: 春分日躔昴九古末有盈縮法但平分二十四炁故應進二度餘則軒轅為中故曰日中星鳥鄭康成謂南方七宿總為朱鳥取畢見之義孟漢儒未知歲差欲牽合于月令仲春昏弧中之文故作此解懸聖人言曆不若是之踈也攷天官書蒼龍為房心白虎為五車朱鳥為權術元武為虗危皆指四正中一二宿為言可見古之所謂四象者如是按春分中星當為張三度而軒轅為衡其中間大星又名權政入張二度則所謂朱鳥者指軒轅而言也夏至日躔張初則火星為中故曰日永星火火心星也夏至日躔張初則中星房三而云星火差二度餘或書永而昏候稍遠或赤道之古今異術世所傳古赤道躺是周時之法詳古宿名說未易強為之說也孫顥云星火非謂心星夘之三十度總為大火之次説雖可通然未免猶存鄭氏之見秋分日躔房三則虗九為中故曰宵中星虗而説者謂或言星或言象或言次為錯舉成文以此釋經猶
