body:
  text: 秀水張雍敬著歲星定法天象運行理之至信而數之一定者也理無今古之異則數又豈有今古之殊故日月薄食為陰陽之大變而上下數千年無不可以密率求者天道原至信而一定也寧獨歲星古今迵別而不以密率求哉乃晋人定其率出於舛謬而不自覺後人驗諸象見為差訛而不敢非者變行失次之說淂以自飾其疏而凡於考驗遲失者即指為天象之變故任其術之疏謬而不知務求精密也今據舊術遠考漢前幾差一次近驗天象亦差數辰則甚疏可知於是驗者近象考諸經史上溯開闢下究終元以觀其始終之理
  hash: sha256:ec57b165e9c8a4a35304c86690be0403583c6330fac24791808914154fb27a15
