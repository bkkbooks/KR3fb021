body:
  text: 旦立春五星會于天歷營室也水涷始泮蟄蟲始發雞始三號天曰作時地曰作昌人曰作樂鳥獸萬物莫不應和故顓頊聖人為暦宗也湯作殷暦弗復以正月朔旦立春為莭更以十一月朔旦冬至為元首正既改寅為丑自不得仍用立春為元在殷因應爾爾若微世既定寅為正矣則炁首何以必用冬至亥冬至為炁首于理未為不是而三紀之法則已微矣下至周魯及漢皆從其莭據正四時夏為得天以承堯舜從顓頊故也自周顯王二十二年甲戍以至于今則在三陽初運故昔之暦家亦有以雨水為炁首者其殆得三統之遺意乎宋何承天元嘉暦以雨水為炁首石晋時馬重績造暦名調元以天寶十四載為上元以正月雨水為炁首先唐建中時術者曹士蔫始變古法以顯慶五年為上元以雨水為歲首號符天曆行于民間重績用以為法而世多不能原其意則古聖精微之蘊原無望于庸夫術士盡人而知之也
