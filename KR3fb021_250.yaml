body:
  text: 桓君山言繇闇視明望之若大天地同明望之若小小大不繇遠近也此説即可通于日必不可通扵月若望時初出則猶天地同明何以亦見為大而子夜中天則小乎即是大小而非涼熱者亦未能灼其所以然若併二説而非之則尤無所據矣束皙謂上下四旁均等而人目之惑有異世頗有主其説者盖以翻案見奇而不知大小之必一定也餘詳地球辨日無盈縮説太陽但有南北進退而無東西進退所謂誠出誠入南北有極是也而世謂其有疾遲盈縮者為算法所蔽也算法冬至後入盈曆其行疾日增五百一十分夏至後入縮曆其行遲日滅四百八十四分一行曰劉焯立盈縮躔衰術李湻風更名曰躔差凡隂阳往来馴積而變日冬至其行最急急而漸遲夏至其行漸舒舒而漸急急極而寒舒極而煥得其中則雨陽之氣也
