body:
  text: 日時皆為甲子而終于甲午夏至歲月日時皆在于午陰生于午中極于子中故混沌始于甲午夏至而終于冬至甲子畫夜無窮若循環造化亦然故曰天地之壽無窮而天地之數有盡也一元始終二萬七千三百九十有半歲天地之理體陰而用陽象昭于天陽中之陰也故為數四七九象有形故為陽中之陰天度四九三百六十有奇四偶數為陰數運于天陰中之陽也故為數三其九盖一元之數即周天四分之三也數無形故為陰中之陽一元三九二萬七千有奇三奇數為陽是分三統天統甲子地統甲戍人統甲申統各九千一百三十歲有一二月自上元甲子天正冬至起天統至周顯王二十二年甲戍雨水起地統今康熙庚午在地統之內下距七千九十四歲甲申穀雨起人統至甲午夏至三統畢而一元之數終矣詳三統說
