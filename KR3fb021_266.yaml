body:
  text: 秀水張雍敬著西洋辨小序曆之為道有所當然有所以然所當然者數是也此曆家之能事所以然者理是也此道之大原三皇五帝堯舜周孔之所妙契無間傳以心而不傳以言者也是唯好學精思之士相求乎性命之原庶有以見其流行之妙敲化之機而後天地之情狀陰陽之變通可以不傳傳之要非術士之所得而與言者也故古今曆家其推步之法未始不可徵效于當時傳述于後世而一出議論即或矯誣求一語之幾于是而不可得習于數而昧于原也今西洋歷術用以推步雖未悉協而較諸舊法稍為近密其七政有緯度交道有盈縮即天體九重高下之序尤得曆家所未曾有是以朝廷有取焉獨其特論意欲推明所以然而溺于數之中出于理之外泥迹而意為推離真而歸之幻甚至謂四方無定上下無分畫夜易豦寒暑異態舉天地
