body:
  text: 則七㬬同起牽牛之妄說有以深中乎其心故從星紀起率也起慶既差一次則上推甲午亦差一次矣𠰥以丁丑在子亦屬超次為變時何超次之多乎抑自甲午超次復至丁丑百有三歲而尚未復本率乎夫史記漢書此近代之顯證也乃不據之以定率而四取證于春秋吾見有能合于近而不能合于違者矣未見又不求合于近而反能合于遠者也太初合應考證漢書云元封七年太歲在子詳上元漢書辨今以新定木周率推之正在元枵之次元封七年即太初元年置庚午天正冬至上距漢武帝太初元年丁丑一千七百九十三歲歲積六五萬四千八百八十日五一四減去庚午前合應三百二十六日有半以新定木周率纍除之餘二十四日二九一四為至後合伏太陽入盈曆應加一度八五九從歲差日躔古黃道斗二十二度二十一度一三順推二十五度三七得虗七度中為至後合伏度查木星行率合伏前二十四日有竒應行五度四九從虛七度及減淂子宮黃道虛二度初分為丁丑
  hash: sha256:fd2f22d0ffb36f1973102b902482d6b20cf6210e1ccd853a7a1244bdecf34a83
