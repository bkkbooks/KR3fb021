body:
  text: 之至要省莫孟子若也先儒謂孟子不言易而最善于用易子亦知孟子不言曆而最善于治曆也乎曰孔孟之聖于曆也敬得聞命矣若夫朱子則銂又有疑焉世之論曆者曰自宋以後曆分兩途有儒家之曆有曆家之曆曆家言數多不原于理儒家言理又不符于數夫理者數之原數者理之寄蓋相因而不可岐者也茍不符于數則其理亦似乎難憑矣曰為此説者渄特不知曆道何不知何者為儒家之理何者為曆家之數也夫不原于理尚足以為數乎此術士之所謂數併非曆家之真數也不符于數尚足以為理乎此馳説家之所謂理原非儒家之真理也若夫儒者言曆有理數不底于一者乎如朱子之言曆也在度則論太虛歲差則計周法七政則為左旋上元則曰未滿萬載渾象則曰其旋有九地靠著天皆發千古所未發曆道大綱畢盡于此間嘗因其理而立之數用以驗天則天弗違用以考古則古不倍其理數相符而密于古今諸曆也不啻倍蓯蓋其于天道流行處見之最真故言之最確雖未當立法倚
