body:
  text: 之至要省莫孟子若也先儒謂孟子不言易而最善于用易子亦知孟子不言暦而冣善于治暦也乎曰孔孟之聖于暦也敬得聞命矣若夫朱子則銂又有疑焉世之論暦者曰自宋以後暦分两途有儒家之暦有暦家之暦暦家言數多不原于理儒家言理又不符于數夫理者數之原數者理之寄盖相因而不可岐者也茍不符于數則其理亦似乎難憑矣曰為此説者渄特不知暦道何不知何者為儒家之理何者為暦家之數也夫不原于理尚足以為數乎此術士之所謂數併非暦家之真數也不符于數尚足以為理乎此馳説家之所謂理原非儒家之真理也若夫儒者言暦有理數不底于一者乎如朱子之言暦也在度則論太虛歲差則計周法七政則為左旋上元則曰未滿萬載渾象則曰其旋有九地靠著天皆發千古所未發暦道大綱畢盡于此閒甞因其理而立之數用以驗天則天弗違用以攷古則古不倍其理數相符而密于古今諸暦也不啻倍蓯盖其于天道流行處見之冣真故言之冣確雖未當立法倚
