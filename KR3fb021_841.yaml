body:
  text: 寅八八五定朔癸卯加時在書合交食限成十年丙戍六月丙寅朔日有食之甲午晦授時交分二十六日九千八百三十五分入食限定法丙戍歲天正朔戊戍四四五九定氣甲寅一七四已月經朔丙寅九八九定朔在書合交食限晦日淂甲午傳有四月戊寅卯朔淂丁卯有戊寅十七年丁亥十有二月丁已朔日有食之姜岌大衍授時皆云十一月戊已朔由不知當時閔之在歲終也授時交分十四日二千八百九十七分入食限定法丁亥歲天正朔壬辰八一三一定氣已未三五一亥月經朔丁已六四九六定朔在午前合交日限閏應二十六日五三應閏寅月魯曆置在入交後也傳有六月戊辰秋七月壬寅十月庚午十二月壬午閏月乙卯晦今推已朔淂庚申有戊辰午朔淂已丑有壬寅酉朔淂戊午有庚午閏月朔淂丁亥一八二晦淂乙卯襄十四年壬寅二月乙未朔日有食之授時交分十四日一千三百九十三分入食限定法壬寅歲天正朔乙丑五三五定氣丁丑九九一八丑月經朔乙未三四一定朔在書合交食限
