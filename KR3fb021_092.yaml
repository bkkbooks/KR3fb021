body:
  text: 術于交食一法未始不可取騐于當時而要皆不可施行于久遠則以專求近騐僅得偶合之端而法數究渄其真也故欲暦之萬世無弊非求其故不可盖暦之為數逆數也而欲知捋来必觀已往是故治暦之要在求其故必今日之法能上通乎前此千百年之暦而后可下合于後此千百年之天乃元人之暦已不可通於宋暦宋又不可通于唐暦唐又不可通于六朝魏漢諸暦夫既不能合于前即可決其必不效于後暦無定法識此之由乃為之説曰暦道貴革久則必當修政謬已惟授時暦推自春秋獻公以来二千一百六十餘年凡四十九事而不合者僅十事此亦可謂能求其故者已故授時獨為古今諸暦之㝡然以今考之其歲差但能求合于度氣朔但能求合于日而已今雍敬所修天周歲朔等策歲差實度必求合于分氣朔加時必求合于秒通計經史所載歲差氣逆交食等事目唐堯至今四千餘歲凡一百五十三事歲象差自堯典中星夏書及春秋傳合辰度秦暦至今時寇暦凡十七事歲策自太初暦
