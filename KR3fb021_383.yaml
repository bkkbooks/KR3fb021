body:
  text: 宋慶曆間改氐為十六度心六度尾十九度箕十度斗二十五度牛七度女十一度危十六度室十七度胃十五度畢十八度井三十四度鬼二度栁十四度餘同唐法元豐間又改房為六度箕十一度虗九度畢十七度井三十三度張十七度翼十九度洎乎南渡之後自紹熙至實祐僅六十年而統天開禧會天三曆其赤道仍舊而黃道之分秒顯增損不用及元之至元辛已距南宋實祐僅二十年而舊法盡變較諸古度幾無一宿相同焉者自元以迄明季皆沿授時之舊蓋天文有禁學者無從討究是故三百六十餘年間曆學廢絶至于今日驗諸天象與授時法又多不合矣是則宿度之變蓋戚異而時新也而世之言歲差者後古證今則況古時之宿強合此日之象由今推古則執此日之法槩律古時之天是何異刻舟而求劍也哉
