body:
  text: 毫之差乎使歲差一毫則百萬年而差一日千萬年而差一旬吾見其元愈遠而差分愈多耳且天地開闢之年其數必有一定乃曆家所推或以為近或以為遠豈開闢之始有幾多邪抑亦可隨人遊移邪至問其何所見而云然則曰氣朔分齊也七曜同起也夫天運參差氣朔必不可強之使齊七曜必能不強之使聚即氣朔齊矣而七曜未必聚七曜聚矣而氣朔又未必齊氣朔齊七曜聚矣而又未必適為甲子冬至適為同起牽牛是以轉轉推求至于千百萬年而上若涉大海其無津涘而於所謂甲子冬至朔旦夜半日月如合璧五星如連珠同起于牽牛之初者亦究竟不可得也則奈何執無稽之説多為推算至于智盡能索而草為漢人所愚哉漢書辨漢書哉帝時公孫鄉一逐司馬遷等議造漢曆乃以前曆太初上元四千六百一十七歲至元封七年復得闕逢攝提格之歲十一月甲子朔旦冬至日月在建星太歲在子已得太歲初本星度新正
