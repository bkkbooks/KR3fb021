body:
  text: 夫二分既定于南北二道之中各離距二十四度就整則四立之日不當定于黃赤道之中各離距十二度乎將春分後三十一日便當立夏夏至後六十日方為立秋而其餘諸莭氣皆當二分後縮六日即為清明為寒露二至後盈二十四日方為小寒為小暑可乎不可乎西士謂中曆節氣差至三日今若據平分緯度言之則西曆莭氣其差之多者至十五日立夏遲十五日立秋先十五日此又將何以為解也如曰分至當然餘氣可以弗論則歲有四時時分八節分至啓閉其理一也茲何獨明于分至而不明于啓閉乎是以聖人立法冬夏致日春秋致月周禮為相氏蓋日躔經度有盈縮而唯二至適平緯度有遲疾而唯二至一定故致日必以冬夏而不以春秋月有九道四遊而唯二分歸于中赤故致月必以春秋而不以冬夏理有各當法無混施蓋見二分之即可盈縮而四立之志不可通也不然則緯度之進退中曆何嘗不著其理不立其法乎中曆故有黃道出入赤道去極度表使定氣而可通別中曆蚤已行矣或曰緯道之進退固漸為遲疾不可通于諸餘
