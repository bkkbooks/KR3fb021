body:
  text: 自月至日相距三重而遠三十六度三三二八五以三歸之得每重厚一十二度一一六九五以八系之得九十六度八八五五六是為第九重至第二重天之數若第一重天其形質之厚無可推測故闕之倍期所乘之數併第九重內之髀徑共得三百一十度有奇是為周天全徑之數上下皆為八重故用倍數併髀徑共三百一十度三三七七而天之九重相次內外層之度漸為廣狹俱可推矣天之九重其周皆為三百六十五度其徑皆為一百一十六度自太陰天至經星天其每重周徑之度但以漸而廣初非有所增也而上文言全徑三百一十度者因欲測其高下遠近之數故以此紀其算法耳
