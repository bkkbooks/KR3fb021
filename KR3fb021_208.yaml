body:
  text: 自月至日相距三重而遠三十六度三三二八五以三歸之得每重厚一十二度一一六九五以八系之得九十六度八八五五六是爲第九重至第二重天之数若第一重天其形質之厚無可推測故闕之倍期所乗之数併第九重内之髀径共得三百一十度有奇是爲周天全徑之数上下皆爲八重故用倍数併髀径共三百一十度三三七七而天之九重相次内外層之度漸爲廣狹俱可推矣天之九重其周皆爲三百六十五度其徑皆爲一百一十六度自太陰天至經星天其每重周徑之度但以漸而廣初非有所增也而上文言全徑三百一十度者因欲測其高下遠近之数故以此紀其算法耳
  hash: sha256:25996acf53643390a6100e0e0465e44649fc685c04c1202cd6c723cbc23eb8b7
