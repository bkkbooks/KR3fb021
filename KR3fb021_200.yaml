body:
  text: 歸之數得一千度七三四三一三加黃道半往見上共得六十四度二一三七是為夏至交線上之徑數又置黃道全徑而減去上數恰餘四十二度五五二七四九是為夏至交線下之徑數其興前所算以徑準刻之數稍差零七分六十九秒者蓋夏至畫永六十刻夜短四十刻亦祇其天略而未是真正刻數也其冬至黃道反是而算之即得若據渾儀舊說夏至黃道之徑出拾地者乃有七十度強入於地者止有三十六度強則畫永當極於六十六刻夜短止應三十四刻矣冬至黃道之徑出入於地與之相反則畫短止應三十四刻夜永當於極六十六刻矣幫渾儀舊象乃是據陽城所見而言為視差之虗象而非天地之真象也王蕃渾天說天之形狀似鳥卵地居其中天包地外猶殼之褁黃圓如彈丸故曰渾天言其形體渾然也天半覆地上半在地下其天居地上免者一百八十二度半強地下亦然北極出地上三十六度南極入地下亦三十六度而嵩高正當天之中
  hash: sha256:a164ea516c3b99471d165b437535ad943c41e07c28de118609f2ffde66b68456
