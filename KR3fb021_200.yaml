body:
  text: 歸之數得一千度七三四三一三加黄道半往見上共得六十四度二一三七是爲夏至交線上之徑數又置黄道全徑而減去上數恰餘四十二度五五二七四九是爲夏至交線下之徑數其興前所算以徑準刻之數稍差零七分六十九秒者盖夏至畫永六十刻夜短四十刻亦祇其天畧而未是真正刻數也其冬至黄道反是而算之即得若據渾儀舊説夏至黄道之徑出拾地者乃有七十度強入於地者止有三十六度強則畫永當極於六十六刻夜短止應三十四刻矣冬至黄道之徑出入於地與之相反則畫短止應三十四刻夜永當於極六十六刻矣帮渾儀舊象乃是據陽城所見而言爲視差之虗象而非天地之真象也王蕃渾天説天之形状似鳥卵地居其中天包地外猶殻之褁黄圆如弹丸故曰渾天言其形體渾然也天半覆地上半在地下其天居地上免者一百八十二度半強地下亦然北極出地上三十六度南極入地下亦三十六度而嵩高正當天之中
  hash: sha256:81b3ed8d4e10a7a4548d43324bd85b50b66314f107a4aa78c32325c75a8ba44f
