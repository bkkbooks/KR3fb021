body:
  text: 夫陰陽五行其理一也日月土火金水之行古今未甞或變何獨歲星乃變其行哉此與日蝕議謂五星變行潛在日下以救日同一矯誣己耳後之曆家多仍其術以太初前用古率太初後用今率今即以其率攷漢太初以上及春秋內外傳以著其謬如左五星率木周率太初以前三百九八萬七六七太初以後三百九八萬八八度率太初以前一十一萬八九四七六太初以後一十一萬八五八二曆率太初以前四千三四四萬六六二六四六太初以後四千三三一萬三年八八三五三火周率七百七九萬九二九度率一萬八八七五曆率六百八六萬九五八四三一二五土周率三百七八萬九一六度率二十九萬四二五五曆率一億七四七萬八八四五一六金周率五百八三萬九二六度率月日曆率同周天水周率一百一五萬八七六度率同日曆率同周天康熙庚午天正冬至五緯前合應
