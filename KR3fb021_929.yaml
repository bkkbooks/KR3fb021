body:
  text: 焉邊兒寬也為相生之説則不淂不置秦于閏而漢以火承周主相生者劉向父子也且一漢之與耳見神母之祥則以為火德驗黃龍之見則以為土德考河袂之符則以為水德三者宜何從乎夫漢世去古未遠已無定論況後世哉宜其闕而不講也夫改正朔易服色後世視為具文而不知古昔威王之必斤斤於此者乃新以法其自然之運昭天人合一之道也夫順天者昌逆天者亡天子上承乎天猶諸候上稟乎天子也如天道方為大運而世主曰我自水德猶王者方乘火行而諸侯曰吾其水瑞將以為順命而延賞之乎抑以為姦命而極罰之乎三代享代長久秦二世而亡雖仁暴之殊亦未必不由于順逆之異也是則五德終始固有天下者所當亟為講求矣然而有難言者古推五德能協于天以後聖承前聖也自漢以後治日少亂日多一統之業少瓜分竊據之世多雖歷代亦各有所尚而要未必能睹其真蓋已絶而弗序矣自非與天地合其德日月合其明鬼神合其吉凶者未足以知德運之當然而後瑞曆符本天出治追三
