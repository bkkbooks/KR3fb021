body:
  text: 二十八日戊午度蓋津距戊子三十一日二十九日已未晦冬至辰星在須女獻天之首然武王伐于征在壬辰會師在戊午變伐在甲子而所言天象不於此三日而指十月之戊子其為謬群可見矣況周初雖改正實未嘗改時與月今泰誓顯有十有三年春之文則一月之必為夏正而非周正又可知也用初雖改正而時與月則不改周禮幽鳳其明證也以建子之月為春正月此後王所變之制於天道人事兩無臥義故聖人論為邦首曰行夏之時實不安於時王之制也世儒但據春秋春王正月之文執其一見謂周初已然甚至詆周禮為爛瀆不難以求申其説是必使六經皆為一時之事亦皆出一人之乎而後可也即使周初改時與月亦當在一戎大定之後而必不在于征伐商之前𠰥謂一月為周正則是先改正朔而後伐殷也其誣聖人也甚矣此等議論有聞於世造人心尤不可不辨書又曰惟一月壬辰旁北魏是為寅月二日曰戊午是為寅月二十八日曰甲子昧爽是為二月五日皆
