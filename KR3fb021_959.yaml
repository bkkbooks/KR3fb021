body:
  text: 之行跡長圖如鵝卵蓋因水星之見恆在地平旁近其占度潤故成此象也曆書言彼中曆家亦謂有天行長圖如卯者夫天體不圓不運以為長圃固非然其於潤狹之象則見之甚明矣是可見天頂度狹近地度潤乃中西所共見而近大違小尤中西之公論彼特地圖之說者即欲抹殺之而不淂也
