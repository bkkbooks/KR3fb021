body:
  text: 論嵗實消長勿菴曰余覩七政曆于康熙庚申年移政最高半度弱而其年歲實驟增一刻半強𠰥係實測修故亦應具題聲明而永年曆又不著其説未審何故曰曆之為道首重在氣西人步歲但見授時氣策用消長之法可合于古故襲用之而驗之于今乃不惟不當消而反當長此實測可憂不可謂非所見之卓然竟從實測則考古難諧遵用授時則驗今不合於是以最高之度移于夏至後六日以均數加之又求日差分以足之補直楱合偶中一時蓋其於步氣之理模糊景響未覩具真也使其術果真必將久行無斃而施用謂幾忽然又加良由輳合非真為法以驗天故也先生尊著論歲實消長之所以然固曾澗燭其非矣彼又謂冬至夏至絶非平行以此為最高移度之證則其悮彌甚夫日躔盈縮凡諸節氣前後原不平行試觀月與五星其北弧必皆大於南弧而五星兩留之際前後亦非相準蓋天運日是不齊也所貴治曆者順之以求合耳其可以偶合之端遂為定法哉夫
