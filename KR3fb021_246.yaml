body:
  text: 絶豦至鐵勒則又北矣極北之地人甚少所傳有二千里松木禁人砍伐此外龍蛇交雜不可去按唐書言骨利幹高車部落名居瀚海北其地書長夜短日方沒後天色正曛煮羊脾適熟日復出矣攎此則渾儀真象圖夏至黃道之徑不入地中益信而有徵矣此外則不可窮夫其不可窮處即其窮處也獻則大地南北之垠堮亦約略可見矣惟西域人迹稍遠要之亦為地有限蓋天體渾淪南北既有可窮則東西不當獨遠其動稱去中國幾萬里者或以水陸紆回之故或故為夸誕之辭殆未足信也
  hash: sha256:892f4ddd1fe491e7da54a6071faffec9e2a5c14383e5680278d62287a86acd21
