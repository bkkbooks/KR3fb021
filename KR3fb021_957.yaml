body:
  text: 辨大小潤狹雍敬曰西人映小為大之説最難曲通夫日月星宿有光有體猶可云映之使大𠰥夫虛空無象之處豈亦能映之使潤乎故觀星座近天頂則密近地平則疏是可見虗空之度有潤狹矣此遠近之明驗也假如兩星或日月其體相距十度使映而為大必十度圖不足不應反見為瀾也如上度甲乙二體制邊其空豦相距凡十度而乙庚二體之邊其空處相距則不足十度而見為狹矣今乃反見為瀾故斷其説之難通也勿庵曰潤狹之象乃人目所見則然而在天則潤處通為一度狹處亦適為一度故入算必不論也曰潤狹鈞為一度入算誠不必論今所辨者乃辨其潤狹大小為天體遠近之故非由映之使大耳茍知潤狹大小之見由于遠近然則可知地為平面而渟下非如球而居中矣朱素臣言西術者也乃言水星
