body:
  text: 夫以寅為二卯為三辰為四之以次年天正為十二月可確見其失一閏而以丑月為正矣不書朔者失之先而食在二日且著其失閏之始也按竹書紀日食凡三條其仲康幽王二食皆書朔唯此亦不書朔則失之先也信先桓王三年壬申秋七月壬辰朔日有食之既丑正七月朔姜岌亦謂失閏而定交分為八月則有悮執子正數與經文不合殺時八月壬辰朔加時在盡食六分一十四妙與經所書既者稍遠定法壬申歲天正朔丙寅二五一七定氣辛未五七五一未月經朔壬辰九六五九定朔在書合交食限亦丑正也十七年丙戍冬十月朔日有食之丑正十月朔大衍授時並悮推為十一月授時交分二十六日八千五百六十八食限那氏曰轂謂食二日法算十月不食乃十一月庚午朔未時食按那氏此說亦悮執子正而不知為丑正也定法丙戍歲天正朔乙亥四四五定氣甲申九七四戍月經朔庚午三五四定朔在午後合交食限按傳者三月丙午杜氏謂三月四日是也按經前書正月丙辰定法且朔淂甲辰月內省丙辰則以丑月為正愈可信矣不書日者官失之也莊十八年乙巳春王三月日有食之丑正三月朔大衍授時皆推在五月且謂悮五為三非也那氏云數某日夜食公羊曰食晦董仲舒劉歆皆以
  hash: sha256:73ed4a5c4756a899c05646a21a0fafd56595bf02fe1bad93e824c7890a4c4c03
