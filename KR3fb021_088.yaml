body:
  text: 處全在盡捐法数悉屏涷言而獨以體認天行為主每有未洽輒忘寢食沈思之至若或唘之心目之閒遂彷佛若有所見而猶悲其入於意智也乃復轉而求之騐以古聖遺法參以經史徽言而一皆折衷于朱子一言一法必宪觀全體統會古今務使無一毫之窒碍一毫之疑似也然後著之于編初未甞自用其聪明亦未甞存先入之見而有心于附會古人也茗夫交食五步等法剏自後人探索之父雖亦或有所得而古聖既無其法經史不𡸁其文則無徵不信未敢自堅即實測可凴尚猶有待故姑闕之間有論及亦衹就法言法已耳如知其所闕之不敢自欺也則知其所信者亦誠可自信矣一暦以疎密課而其故有難言者古人之法雖有小殊無傷大合雖有近異無乖遠同故疎而實密後人之法增損酌中初無定見希合一時行久則窒故密而實疎世但知取後人之密而輕變古人之疎此所以一定之理數無從可得也故今日而欲
