body:
  text: 一曆道有理有數知曆數易知曆理難蓋理有在數中者有在數先者數中之理可因法而得其意而世之術士猶未免有穿鑿悖謬之端況乎數先之理立于法外絶無可循可測者乎此知之所以難也自法以來曆代增修法漸趨密今日之弊不患數之不精而患理之不明苟昧理而循數則私心自智穿鑒必滋其弊不至于矯誣術擾不止明者覩未然況今日流弊已極乎此學者之深憂也敢不竭其所見以質諸斯世乎顧曆之為道淺之為器數之學深之即性命之原雍敬未竟其淺惡覩其深所賴知天之君子節其一得相為闡明使至理昭然異端掃迹則是編其前驅已一學問之道自信為難人信為後所謂得失寸心知也漢後曆學代有作者聰明之質淵博之才正自不乏今且盡舉而議之謂其言言皆舛法法俱疏而獨吾之所見為是此固世之所不易信者矣而有可以自信者雍敬一生精力畢粹此中得力之
