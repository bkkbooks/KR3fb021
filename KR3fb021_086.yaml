body:
  text: 一暦道有理有数知暦数易知暦理難葢理有在数中者有在数先者数中之理可因法而得其意而世之術士猶未免有穿鑿悖謬之端況乎数先之理立于法外絕無可循可測者乎此知之所以難也自法以来暦代增修法漸趨密今日之弊不患數之不精而患理之不明苟昧理而循數則私心自智穿鑒必滋其弊不至于矯誣術擾不止明者覩未然況今日流弊已極乎此學者之深憂也敢不竭其所見以質諸斯世乎顧暦之為道淺之為器数之學深之即性命之原雍敬未竟其淺惡覩其深所賴知天之君子節其一得相為闡明使至理昭然異端埽迹則是編其前驅已一學問之道自信為難人信為後所謂得失寸心知也漢後暦學代有作者聰明之質淵博之才正自不乏今且盡舉而議之謂其言言皆舛法法俱疎而獨吾之所見為是此固世之所不易信者矣而有可以自信者雍敬一生精力畢粹此中得力之
