body:
  text: 定歷玉衡者何新塍張簡菴氏歷書也歷無定也星有淩犯掩合勾巳月有朓側匿日有盈縮歲有差然數主於單而理存乎故求其故則百世可知千歲之日至可致理與數皆有定也其云玉衡何玉衡者正天之器也周官正歲年序事掌之太史馮相氏觀妖祥辨吉凶則保章氏眂祲司之故歷代之史律歷天文五行各有其志自漢哀平之後緯候雜出于是歷術妖占混而為一稽歷序者自詡前知受命之符為世主所忌七緯既棼遂致私習天文有禁迷宋太平興國中詔天下知星者詣京師至者百餘人或誅或配海島由是言星占者絶朝之大夫士並諱歷法不學矣古之人龍見而雩駟見而隕霜火見而戒寒日北陸而藏水冀不有候繁星之麗天武夫憚人以及東抱衾之女子皆能悉其形象今也居軫蓋之中三垣列宿躔次之不分天位淹速之莫辨未通乎天地人而自名儒其亦小人儒也巳簡菴氏耻之博綜歷法五十有六家正古今歷術之謬四十有四成書一
