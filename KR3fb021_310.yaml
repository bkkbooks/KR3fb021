body:
  text: 如所言則中夜之煙氣甚於旦暮將月之當午晃漾蓬勃亦必更甚而旦暮見小中夜見大乎六則據地球正圓人災上面則極立於四旁則橫立於下面則倒立以為氣之所載如蟲𥪪之可以緑壁緑梁云夫蟲𥪪即在一靣觀之既能橫緣于壁又能倒緣于梁皆與平行無異此出于性能有莫如其所以然者與人之但能植立平行者不同非可為喻也且蟲𥪪之能緑行亦非由氣之所載試使以其背著於梁壁則斷無不墜焉矣然則其焉緣也纍載于氣乎抑自有所以為緣者乎七則克塞兩間者氣也而氣有剛柔之分近天者剛近地者柔今地面之氣塵埃野馬其柔實甚若地下之氣亦然將不足以載鴻毛能載大地乎彼亦知柔氣之不足以載也則又為之説曰人物即足之所𨀉為下而其重心亦皆在下上面之人物其重心入于地心下面之人物其重心亦入于地心以至四面亦復如是上下四旁人物相等其勢之足以相拒也又適均故地球得居于空中而不編不墜云嘗觀西士於數
