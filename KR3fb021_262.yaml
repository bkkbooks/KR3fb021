body:
  text: 積水故外瑩內朗故通體皆明外瑩故半明半魄水火陰陽相滕而相濟故明則相向魄則相背月明與日相對而轉故圓缺從遠近而異在畫則晦在夜則明猶之朔夜星多望夜星少蓋星月皆自有光而精氣厚薄不同有勝有不勝非借之謂也是以月食雖盡而紅光隱隱在上必不盡光自在體轉而向上也若借日為光食盡則掩盡內映之光何從而得又曰日為至尊雖太陰亦不敢與相對敵體故當同道同度正照之際月乃轉而避之以魄相向正照豦一分則魄轉一分正照處九分則魄轉九分正照處過則魄亦漸轉而復至於月食則暗虗之説為得之朱子曰月蝕曆家謂之暗虛蓋火日外景其中實暗日為離象外陽而內陰故中暗到望時却當著其中暗豦故蝕
