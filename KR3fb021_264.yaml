body:
  text: 星宿光魄說日月星漢皆為積氣其魄亦本輕清春秋言星隕為石蓋曰星隕而後化為石非在天之已堅重如石也虎夜行以一目放光一目視物人伺而射殺之其光墜地則化為石同一理耳元史冬十月有星如火東南流芒尾如曳彗墜地有聲火焰蓬孛久之乃息化為石青黑光瑩形如狗頭命藏于庫樵書言應天府有落星石凡三段色青好事者擊取之試投洪爐中則鎔而流如金鐵焉蓋似石而實非石也凡星宿不離于五行故其色各異星經但分黃赤白黑而無青色者夜間青黑相亂人目不能別也若五星則形體特大故歲星之青獨可明辨夫星體既有五行之別則亦當因其五行所屬而分類占之從來星家未曾有言及者
