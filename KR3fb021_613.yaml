body:
  text: 夏世世紀云起丁已終甲午凡四百五十八年竹書云有夏十七王起壬子終壬戍用歲四百三十一年漢志積年相近但甲子不同耳路史云四百八十三年商世世紀云二十七王起乙未終戍寅凡六百四十四年鬻子云二十七王積歲五百七十六至紂國語云商之享世三十一王竹書云自湯至受三十王用歲四百九十六年漢志三十一王六百二十九年周世世紀云起武王乙夘終幽王五年甲子三百四十六年竹書云起武王辛夘至幽王五年甲子二百七十三年三五之世其遠近固難攷據至唐虞以後宜若可憑矣而互異如此則甚矣書傳年世之難適從而演紀實度之難真確也而今而後言歲差者可以知所返矣
  hash: sha256:61528cbdbeb6dc95fd1e0ba4c65b5e12ce23917b4a934fb771bcb87903844174
