body:
  text: 嘴即古嘴字以營室東壁四星方似口也爾雅郭璞注故左傳曰娵訾之口是矣茍如其術則壁入於戍不成聚口之形而亥不淂為娵訾矣卯之所以大丈者以心星而名之也茍如其術則心入於寅而卯不淂為大火矣南方朱鳥之象兔為鳥目柳為鳥咮而在未故曰鶉首軫為鳥尾而在已故曰鶕尾苟如其術則鬼柳皆入于午而未不淂為鶉首軫入于辰而已不淂為鶉尾矣乃猶以亥為娵訾卯為大火未為鶉首已為鶉尾顧名思義難可相通其謬一也十二肖屬取之禽星七宿之偶數如東方七宿則取第二元金龍第四房日兔第六尾火虎故辰為龍卯為兔寅為虎也此方七宿則取第二牛金牛第四虛日竄第六室火豬故丑為牛子為鼠亥為豬也餘放此如丑宮有牛金牛故丑年屬牛赤宮有鬼金羊故未年屬羊茍如其術則牛宿已入于子而子年當屬牛鬼宿已入于午而午年當屬羊矣乃其紀六十年肖屬則丑年仍為牛未年仍為羊彼亦思十二生肖之何以分屬乎其謬二也術家剋擇最重太陽過宮如箕三為丑則幾差半合與指羅監法不相應若必以其術為是則必併羅盤而考之然後可而羅盤必
