body:
  text: 十三度二八七五九黃赤道因園中難作圓圈故止盡其徑以見大意園中既盡作徑則算法亦即就徑算之故分長短多寡若論圓圈則雖有寬窄之殊初無增減之數詳日無盈縮説蓋一畫夜而日行周三百六十五度黃道與赤道一也以赤道之徑準書夜百刻其距南北二極適等距東西二極亦適等半在交線之上半在交線之下故書夜半以黃道之徑準書夜百刻得六十四度弱為夏至交線之上徑冬至交線下之徑故夏書冬夜俱六十刻得四十六度半強為夏至交線下之往冬至交線上之徑故夏夜冬書俱四十刻以黃道經歸一百刻先以五歸之得二一三一四八二三倍之為四十二度六二九六四七當四十刻三之為六十三度九四四四七一當六十刻置北極去交線之數二十四度以髀徑之半歸之得四一二八五八二為實黃道之交於北極徑處去天心二十四度其交於交線處去天心二十八度此用勾股法詳下並而折算之得二十六度用乘上所
