body:
  text: 是何獨至于天地之始終而遠之萬載而下所推或驗吾猶旦暮見之矣曆家上元問或曰上元之數曆家推之雖各不同而其為數則皆甚遠其多者至千百萬餘年最少者亦不下八九萬餘年漢劉歆三統曆上元十四萬三千一百二十七年典律曆上元至伐之歲十四萬一千四百八十年同晋王朔之通曆甲子元法九萬七千年典劉智正層元法同姚秦姜岌三紀甲子元曆元法八萬三千八百四十一年隋張賓甲子元法四百萬餘年劉焯甲子元法一百萬餘算唐李淳風推自麟德元甲子上距上元甲子二十六萬九千八百八十年僧一行以大衍數推上元甲子積距開元十二年甲子得九千六百九十六萬一千七百有四十日金楊級大明曆上元至金太宗天會丁未歲積距
  hash: sha256:edd518703933bc48523b3e0e3ba3ca52a14b2053ec9b55a0834d1927387ea1c7
