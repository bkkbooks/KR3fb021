body:
  text: 按此傳之時于正月者以妖星出于婺女為正月事非歲星正月已在虗也法推淂是年天正冬至為壬午日春分淂癸丑後六日戊午歲星在虗初度後二十三日庚辰齊有樂高之舜天人之應有如桴鼓吁可畏哉歲在析木考證昭八年置上庚午合應加三歲策除二率策餘三百二十六日一四六為昭八年丁卯至後合應太陽入縮末曆五十日弱應加一度八四四從歲差日躔牛四度初順數三百二十五庚八八九淂尾十六度末於丁卯立冬後五日合伏則是年之秋周正冬十月為夏正秋八月政在析木後五十九年歲在火楚卒滅涷為獲麟後三年事其言亦驗歲在娵訾之口考證襄三十年置昭公丁卯上距襄公三十年戊午九歲歲積三千二百八十七日一八三七加丁卯後合應見上以新定木周率纍除之餘二十三日五八九七為至後合應太陽入盈曆二十三日半強應加一度六七一從歲
