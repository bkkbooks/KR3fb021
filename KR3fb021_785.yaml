body:
  text: 也越得歲昭三十二年辛卯距第八紀之五十二章十八年借次章推之歲差日躔在牛三度八五得步斗虗度九十六萬八五五十三章章首合應二十八萬九二三三用減步斗虗度存六十七萬九二六七查表淂古赤道箕十一度九二為壬辰至前合伏度則辛卯之夏政回留于危宿度上也太歲在子詳上㬬起牽牛辨漢書武帝太初元年丁丑距第九紀之十四章六年歲積二千一百九十一日四五五八歲差日躔在古黃道斗二十二度一三得步斗虗度九十一萬一三若用古赤道則為斗二十四度置前歲積加章首木應一百七十五日五五八八纍除合率餘三百七十二日六九七一置步斗虗度加一周策減之存八十三萬六七查表淂古黃道斗十四度六八為至前合伏度本率合後應行二十七度七用加合
  hash: sha256:af80748e4acd8c88e8812c9c164b8b473280ff1370ce1fe1eef525b2ce27e7d9
