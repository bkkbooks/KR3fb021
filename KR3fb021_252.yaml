body:
  text: 授時曆曰日月盈縮損益四序不同北齊張子信積候合蝕加時覺日行有入氣差然損益未得其正趟道嚴復準晷景短長定日行進退更造盈縮以求虧食至劉焯立躔度與四序升降雖損孟不同後代祖述用之又曰隂陽往來馴積而變冬至日行一度強出赤道二十四度弱自此日軌漸北積八十八日九十一分當春分前三日交在赤道實行九十一度三十一分而適平自後其行日損後行九十三日七十一分當夏至之日入赤道內二十四度弱實行九十一度三十一分日行一度弱向之盈分盡損而無餘自此日軌漸南積九十三日七十一分當秋分後三日交在赤道實行九十一度三十一分而復平自後其縮日損行八十八日九十一分出赤道外二十四度弱實行九十一度三十一分夫行有疾遲則晷利亦當有長短之異矣乃二至書夜雖有長短之不同而通計一日則鈞為百刻無不同也若果有疾遲則冬至後一書夜當有一百零五
