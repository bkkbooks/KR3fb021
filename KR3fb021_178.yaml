body:
  text: 東西二萬八千里南北二萬六千里外如山海經詩舍神霧管子廣雅等書各不同以張曆家之吉設不之辨取而較之惟開元所測為稍密然地有遠近則景之短長亦從而變故曰從景以計里必漸遠而漸增若從里以計景又必漸遠而漸減即則其術而論之已有難盡之要妙矣而謂天有五寸之圭果是以窮天地之高深乎唐志及西法又以北極出地之高低計度里之若干唐志曰地三百五十一里八十步而極差一度林邑極高十七度四分周圍三十五度常見鐵勒極高五十二度周圍四百度常見利瑪實曰且行北方者每路二百五十里覺北極出高一度南極入低一度直行南方者每路二百五十里覺北極入低一度南極出高一度則不特審地形果圓而並徽地每度廣二百五十里夫天之度園而為弧地之度徑而為弦圖經弧弦等義並詳後周詳四圖又天頂之弧度高以平列而寬北極之弧度遠以側立而窄故弧度與弦度異
