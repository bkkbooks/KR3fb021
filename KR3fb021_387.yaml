  text: 胃十四度十五度十五度六十五度十五度一八十五度八一昴十一度同十一度三十二度十一度九十一度八畢十六度十七度十七度四十六度十六度二十六度半觜二度一度度五三度度四六度五參九度十度十一度一八度九度半十度二八井三十三三十四度三十三度三三十度二十九度九六三十一度三鬼四度二度二度二四度二度三七二度一一栁十三度十四度十三度三十四度十三度二五十二度星七度同六度三七度六度七五六度三一張十八度十七度十七度二五十七度十七度八六十七度七九翼十八度十九度十八度七五十九度二十度三九二十度九軫十七度同十七度三十八度十九度十八度七五按東漢永元鉰儀所載古黃道昴少一度作十一度軫多一度作十九度為古石氏遺法用以考宋唐而上歲差日躔無不允合較漢志所載實為密近故是編凡用古黃道俱從之古今黃道宮度多寡深淺不同表古黃道授時曆黃道
