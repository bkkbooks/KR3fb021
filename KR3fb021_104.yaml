body:
  text: 是非也邪若果騐之于天衷之于理揆之于數而有以洞燭其渄則雲醫埽而日月自明沙石汰而魚金自出將其所謂真是者見矣於以步暦又何難之有故將欲定暦必先辨暦而古今暦術之舛悮不可勝舉今姑舉大謬凡四十餘條畧為拈破如左其詳則或有專論或目附見或互相發明各具以後諸篇中天者一氣之積而其旋有九又各為一重本于朱子此經星七政高下疾運之本然本之草盧吳氏而經度緯道參差不齊之所由生也乃昧者不知其原椎者又流于荒誕謬一天之真象天中地中正下相應自有一定之體本之于天參之于易而証以呂氏春秋淮南子此易道暦道之所由出也此真易暦之本源非此則無以知易無以知暦矣中體有定則上下斯必有定矣而異端恣為矯誣謬二嵩高為地中本之朱子參以易象此天之虛象而中之妙用也世乃指為天中執為定體謬三天包地地附天地雖居渾體之中而勢必渟于下以秉于天之剛氣本之邵子朱子故天頂為逮四旁為近
  hash: sha256:cc5e4adf6791011628fcb1a6f36ef2a2098781696095727b8a9f4a5951977fb6
