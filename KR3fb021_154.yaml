body:
  text: 有精確近理者来可以異説棄之若夫九天之下大地之上則皆太和之氣野馬氤氳而萬物於是乎生焉者也朱子語錄或問天有形質否曰只是箇旋風下輭上聖道家謂之剛風人常説天有九重分九處為號非也只是旋有九耳但下面氣較濁而暗上面至高處則至清至明耳淮南子曰天有九野中央曰鈞天其星角尢氐東方曰蒼天其星房心尾東北曰變天其星箕斗牽牛北方曰玄天其星須女虛危營室西北曰方幽天其星東鋅奎妻西方曰皓天其星胃昂畢西南方曰朱天其星觜舊參東井南方曰炎天其星輿鬼椏七星東南方曰陽天其星張翼軫按此以二十八宿分九處為號既非九重之謂而以角尢氐屬中央尤為無義故朱子言其非太元經九天一中天二羨天三從天四更天五晬天六廓天七咸天八沈天九成天按此僅異其名實無義旨
  hash: sha256:5f0ac62296f4e82fb10ac88bf1da7bfed5eef40ea99ce3f8361f064f77fb1467
