body:
  text: 義造甲子者盖古法歲陽首焉遠爾雅作園選歲陰首攝提格而月陽月名又與歲之干支不同文煩義難於是易焉逢為甲困敲為子歲月日時一以是紀月之畢亦為甲月之畢亦為子義困乎舊文從其簡乃改而非剏也世又謂宓義以前未有甲子但以易草木為一歲此本于古三墳乃宋人所造之偽書其山墳氣憤形墳如世俗筊笞之所謂聖陰陽全無意㫖其姓紀策辟政與諸篇詞語鄙俚讀之欲嘔盖偽書中之最下者地皇氏爰定三辰是分宵畫三辰宵畫乃天道自然何待聖人定之分之盖定三辰者即步日步月步斗之法分宵畫者即昏旦晷刻之法也又云以三十日為一月十一月為冬至則歲法朔法無不備矣今皆採入通鑑世固童而習之矣安得謂義軒以前未有曆法也邪今以法推天皇氏平初元年甲子天正冬至日躔在𤲢六度中星為七星七度乃歲差一周之始也
