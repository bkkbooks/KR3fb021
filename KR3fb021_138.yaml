body:
  text: 乎南坤為地地位乎下故坤正乎北离為日日生乎東故离正乎東坎為月月生乎西故坎正乎西艮為山地勢高於西北故艮位之兌為澤西責輳於東南故兌位之震為雷雷出於地故附于坤之右㢲為風風薄于天故附于乾之左此即暦之渾象也後天易震㢲屬木木生火故离次之火生土故坤次之土生金故兑乾次之金生水故坎次之水非土不能生木故艮次之此即暦之炁序也盖易與暦皆原於天故其理相同而其為數不同者易之數虗而暦之數實也暦要治暦之要不外三辰欲定三辰必審歲差求上元而明造化始終之理夫治暦而必明造化之始終豈易方哉然星躔之垂示常昭氣運之升降可攷三正三統遺説猶存宮度干支古法具在以至經史微言先儒要論班班可證而人自昧之者以終日言天而不知天之所以為天也夫陰陽五行有形氣有性情有功效必灼其形氣而後性情可得必悉其性情而後
