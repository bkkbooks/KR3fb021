body:
  text: 之則天之虗象而地之形實以虗準實必不相符而乃執天之虗度計地之里實即地之里實計周天之里實非愚則誣今西説謂地形亦圓人隨地球之上下四旁而立皆以足所𨀉為下首所向為上蓋見天體處豦皆圓而不得其故因疑人立之有縱橫顛倒而然此等見解真是非桑所思其蔽全在執虗象為實象也虗實之象既已不明則其所測之九重高下遠近里數為是為非可不待辨而決矣詳九重辨及北球辨圖
