body:
  text: 有立數脫化巧妙而出于理之外者黃道是也有改制而無閞于曆象之實者商周改正是也其法之創自後人者凡二十有二有合于理者歲餘朔餘虗分周天零分定朔古蓋有之但後人復立耳消長法萬分法閏應交食法里差法五步盈縮法渾蓋通憲是也有僅合于數者盈縮曆疾遲曆是也有為古之所有而流為謬妄者求上元測量法是也有於曆非要而歷代致詳者渾天儀是也有理可相通而傳會無益者鐘律著策是也有流為術數而時俗遵用不可盡者年月日時方神奇門紫白禽星四餘法是也
  hash: sha256:14c0d37b1cc6eb5351a730a7d7e22aef4c75cf1c6b4edb2594b5d72fd9689ba5
