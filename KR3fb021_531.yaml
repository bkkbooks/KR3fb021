body:
  text: 萬五千九百二十歲之間必且茫無畔則周法亦僅為虛該而年限終雖為據矣故欲明周法必考三正蓋天運之周始于是曆法之作亦始是也彼漢儒之言三正者第曰周正建子商正建丑夏正建寅不過改移一月以易民視聽一𠰥上無關于天道下無切于民事者則古聖人亦何必規規焉以此為一代之巨典乎且怠棄三正語見甘誓豈當夏之世蚤已逆知商周之事乎故鄭康成謂改正為三代以上之法不焉無所見矣鄭氏所見自遠勝孔安國王肅輩然謂唐建丑虞建子與宋志謂黃帝高辛夏后氏以十三月少吳唐商以十二月高陽虞周以十一月論語疏謂宓義黑女媧白神農赤黃帝黑少吳白高陽赤高辛黑磨白虞赤夏黑殷白周赤此即三正所尚則又不然蓋三正之政因乎天象天象歲差不可後返則人皇以降建寅之法為不可易矣詳三統說故顓帝作曆攝提首紀堯命義氏鳥正仲春虞帝巡方必按四仲則三正自為太古遺法而五帝之世皆建寅無疑
