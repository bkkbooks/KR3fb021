body:
  text: 一元閏法古聖作曆要在正時而正時在于置閏以氣盈朔虗之數非閏不齊也置閏而不為之程限則數𠃶無紀不可以經遠故立章法凡十有九年七閏而氣朔略齊然非真齊也蓋以歲計之則氣之數贏而朔之數畸以章計之則又氣之數畸而朔之數贏天道固以不齊為㢭者也但因其不齊而立法以經紀之可矣政不必強求其齊漢承古法一元統三紀紀統二十蔀蔀統四章綱舉目張井然不紊未始不善而必謂氣朔分齊故不能與天合於是破章截元之術起而古聖之遺法蕩然矣今仍以十九年為一章以齊閏法六十章為一紀以修章法其閏法之必不可以章法齊者則積章朔餘以減之而一元之正閏可淂矣閏法策數閏策一十日八七五五一一三七九閏限一十八日六五五八二六五五七章朔餘七百九十四分四二八九五一第三百七十二章內當減一朔一元當減四積八萬七千三百五十四月減一閏
