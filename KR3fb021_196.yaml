body:
  text: 府北極高二十一度至海中南望老人星下眾星燦然皆古所未名元時于交海之濱測算南極入地僅十五度又于北海之北測算北極出地六十五度利瑪竇余曰自大西洋海入中國至盡夜平線已見南北二極皆在平地畧無高㑀道轉而南過大浪山已見南極出地三十二度按利氏意在形容地球之圓所言不無過實然南極之出于地上其理固有可信者也夏至黃道上當天中陽極於午乾之象也冬至黃道下潛地中陽生於子復之義也二分日行赤道斜絡天腹其經長即天之髀徑也一百一十六度有奇二至日行黃道各距赤道二十四度歛於兩旁其徑短為一百有六度強赤道徑一百一十六度二六二六七六黃道距赤道二十四度即以二歸四除其徑得四度八四四二七八倍除之往有兩端故用倍除得一百有六度五七四一一九其交於南北極經線如一字處折半得五
