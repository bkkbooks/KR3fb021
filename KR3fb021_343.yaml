body:
  text: 過度許其後為參之左肩衡石三星伐三星皆為參宿全體而盡屬觜度於義未安然二宿既相併疊則法亦不容不變自當從太古遺法以參旗為參宿而參星則仍正其名曰罰既合天象且復古法為兩得之經星辨天之為象分而言之則日月星宿各為一天合而觀之則日月星宿共成一天何得獨指經星為天乎左旋之象不明歲差之理不著黃赤道之度多寡不同而莫知其所以然皆由誤以經星為天而謂天體不動耳夫日所以紀日也月所以紀月也經星所以紀歲時也使果不動則昏旦中星何以更易黃道日躔何以有歲差乎解之者曰所謂不動者非全不動也但謂其行列不變左旋一定耳然而度有增減象有移換則未始不變也旋有盈縮歲有差分則未始一定也今特正其名曰經星使與日月五星等則日有南北進退月有九行遲疾五星有遲𤲢伏逆而經星亦有變移盈縮可不煩言解矣
