body:
  text: 隨鬱林王二年丁丑古黃道斗十一度九八六一唐中宗景龍二年丁亥古黃道斗十度九九九七肅宗乾元元年戊戍古黃道斗九度九九九二文宗太和二年已酉古黃道斗八度九九八八昭宗光化三年庚申古黃道斗七度九九八三宋太祖開寶五年辛未古黃道斗六度九九七八仁宗慶曆二年壬午古黃道斗五度九九七四徽宗政和三年癸已古黃道斗四度之九九六九南渡紹興十四年甲子宋赤道斗二度之五六一孝宗淳熙十一年甲辰宋赤道斗一度九九六四理宗寶祐三年乙卯宋赤道箕十一度之九九五元世祖至元十七年辛已元黃道箕十度之二二一八成宗大德元年丁酉元黃道箕九度九九六三明太祖洪武元年戊申元黃道箕八度九九五八英宗正統四年已未元黃道箕七度九九五三武宗正德五年庚午元黃道箕六度九九四九神宗萬曆九年辛已元黃道箕五度九九四四大清世祖順治九年壬辰元黃道箕四度九九三九歲差最徽之豦在古今黃赤道改換斷續之間而世多不能察此年限所以不真也
