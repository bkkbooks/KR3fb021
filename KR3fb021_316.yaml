body:
  text: 地球果圓而又恰居天心則人目所見豦豦當僅得半周然高山絶頂恆于雞鳴時即見日出如岱之日觀峯嵩之雞鳴峯嵋峨羅浮寮駐等豦皆顯然足證則地平之上有不止于半周矣凡差一時則日行差三十餘度東西加倍則凡差一時地平上當多六十餘度將地不得恰居天心而亦不得渾圓如球矣若曰此亦視法之一理一如水中錢景則月食視法乃差在地平上而日出視法又差在平下彼此相反政不得而相通也近有一山其高十里使遠數十里則高僅七八里矣更遠數十里則高僅五六里矣至數百里而外則全不可得而見非其山低而不見以遠不可窮故也又如占運氣者平望在桑榆上五百里升高而望之一千五百里外此則不可見豈非以遠而不能窮乎然則人之目力政有限矣是故地上天多地下天少而天之高遠無窮人之目力有限所以豦豦皆僅見其半周此乃天之虗象由人目而成者也信如地球之説則豦豦所見皆為實象而人之目力乃能窮千
