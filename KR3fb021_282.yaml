body:
  text: 計之約每度止得二十七萬里日往不過準一度鳥得大於地球一百六十五倍哉月輪天徑亦加地下一倍當為九十六萬五千餘里亦畧以往一圍三計之約每度當為八千里月徑亦準一度何以小於地球三十八倍哉六則天本積氣急則剛矣謂之硬堅則否使果硬堅如琉璃之類則奔星何以能流隕星何以能墜乎七則星亦借光先儒雖有是説炁未有實証也今西士從而申之夫諸天在日天之上故其光恒圓滿似矣而金水在下何以觧焉則曰金星亦有消長無異於月若然則過午之時猶月之晦朔也其光當全在上面而或遇經天則下面亦見有光又何以觧焉竊謂此當以靈憲開虛在星星微之言騐之取與日相對同度同道之星測其遇闇虗而果一如月之蝕也則借光之說信矣不然則未足據也八則
  hash: sha256:c090a803410f87e006d303fe07bc3ee4f6fba70985287018581a1fdbbc9b9745
