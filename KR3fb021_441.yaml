body:
  text: 上元辨曆家所謂元者有三曰曆元也元法也上元也曆元又有三其一則用元法而推治曆以前之年以為始也其年視元法何如以為遠近舌之六曆其遠近不可知太初而下乃可得而考大約遠不過數千年近不過百十年如黃帝調曆元用辛邜顓帝曆用乙卯或曰甲寅虞用戊午夏用丙寅殷用甲寅周用丁已魯用庚子太初用甲寅三統用戊戌四分用庚辰乾象用已丑景初用壬辰者是其一則即用治曆之年以為始也如唐之戊寅曆近起丙戌宋之紀元曆即用庚辰元之授時曆即用辛己省是其一則遠宗古曆以為始也如秦用顓帝曆東漢用甲寅曆明大統用授時曆者是諸曆所用之元雖各不同然或用元法或憑新象或宗曆術於義猶可得而言也元法者定氣朔之法以置閏成歲而要其始終一周之數也太初以四千五百六十年三統以四千六百
