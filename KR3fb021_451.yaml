body:
  text: 步月必始三日出庚諱上元軋象證此古來神聖相傳之定法而即上元開聞之真數要未聞步日當始朔旦步月當始冬至也原其謬起于西漢所立元法謂至朔分齊故雖有神聖遺法而不知推求無足怪者考漢法三統曆譜申統起太初丁丑天正至朔同為甲子日其季統之第二終第四章天正至朔同為辛丑日乃今康熙三年甲辰歲也而甲辰天正朔為乙丑冬至為丙戍朔差二十五日至差十五日可見至朔分齊之説疏謬實甚也東漢以來至朔分齊至朔已不行矣而古今之推上元者猶必求至朔同起甲子古法莫信異説是崇吾不知其識見居何等矣若謂上元之理比從其初朔為一月之首故當始于此則春為一歲之首何以不始于甲子之春而始于癸亥之冬乎且氣本于天朔命于人冬至起于子半此數之本乎天者也𠰥夫朔則西方之國且有以白半為月初黑半為月中者矣白半者望後半月黑半者朔後半月則朔望亦隨人所命耳豈可以是而求天之真數哉
