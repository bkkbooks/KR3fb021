body:
  text: 至比在十一月獨不知大寒當在十二月乎大寒既竄入仲冬則兩水將攙入歸𦡔月於是不淂已而退朔一日以掩盖之辛丑冬十二月應大晦日乙亥當為兩水次日丙子乃為壬寅正月朔旦彼亦知兩水為正月中不可竄入上年之十二月也於是退朔一日以十二月為小而以乙亥日為正月朔使其術誠有是而無非有淂而無失也則確然信之斷然行之可矣何為曲變朔法有事彌縫則定氣之不可通彼亦自知之矣固不待雍敬為之辨也或曰以左旋觀天則經度之盈縮固係于經星而定氣之術誠有所不可然緯度之進退則係于日者也赤道為南北二道之中二分為陰陽二氣之中則以交于赤道之日以定二分正合左旋之理西術或以未可全非乎曰理也者圓通無破縱橫皆是者也𠰥夫知其一而不知其二通乎此而不通乎彼即不足以為理而據其偏見以立法則間議必滋矣按西術春秋二分正當赤道無距度清明寒露各離距六度少弱穀雨霜降十一度半立夏立冬十六度太小滿小雪二十度五分度之一芒種大雪二十二度四分度之三二至二十三度半二至以後諸氣遞復如前
