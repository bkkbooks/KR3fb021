body:
  text: 經緯皆左旋説舊説天左旋日月星辰右轉者此暦家測算之超徑法非天象之真也盖七政之行無可記而所可記者惟經星於是分二十八宿為三百六十五度以記七政之躔離而經星之旋𡪯速七政皆不逮焉若俱以左旋算之勢必取經星與七政一一較其遲疾而道計其全數則於法為煩惟以經星為主而以七政之退度零數反作進度算之則超徑而簡㨗也舍煩就簡自是暦家活法即如雍敬言天象則曰經緯皆左旋若布算則亦仍以退度為進度也自有盖天蟻磨之喻而箕法之當然者遂目為天象之實然矣論衡曰日月本東行而大牽之西沒譬之蟻行磨上磨左旋蟻右轉蟻行遲磨行疾內雖異行外猶俱轉按王充作方天論所言天象多本諸盖天其立見最淺陋其引喻皆不倫乃四家六術中之最無足道者自張衡著之於雲憲而古今之宗渾天者堅持其説
