body:
  text: 秀水張雍敬著歲差定法歲差一周四百三十二甲子為歲二萬五千九百二十歲分十二會會三十六甲子為歲二千一百六十歲每會中星日躔差一次為度三十度四三六八八六五七二五九每七十歲九六六五二二六三八五二差一度每歲差一百四十分九一一五一起天皇氏平初元年甲子天正冬至距上元十二甲子是為子會之中中星起古赤道午正七星七度六度三七五日躔起古赤道酉正𤲢六度昴五度六二五地皇氏太始元年甲子天正冬至當丑會之中上距平初三十六甲子星躔俱差過一宮中星為古赤道未正弧十四度井二十七度九三七五日躔在古赤道戍正婁一度初度六二五六一四三四二七人皇氏太平元年甲子天正冬至當寅會之中上距平初七十二甲子星躔俱差過二宮
