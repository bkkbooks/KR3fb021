body:
  text: 秀水張雍敬著考春秋晦朔交食説魏晉以來曆家多追考春秋三十六食以驗其法之疏密杜元凱曰食于朔此乃天驗經傳又明書其朔日可謂得天矣故欲求其故者比在所當考古來曆之最密者所合不過二十七條唐麟德曆淂二十六大衍曆淂二十七而王應麟謂衡朴淂三十五唯莊十八古今皆算不入限夫襄公時丙月連食法之所無必當除去則其餘悉合亦僅淂三十三而謂淂三十五術者妄言文人信耳大率然也今按經文書曰書朔者二十六不書朔者七不書曰者一日朔俱不書者二三傳之解不同左氏曰官失之也公羊曰或曰或不曰或失之前或失之後也轂梁曰言曰言朔食珍朔也不言朔食晦日也言朔不言日食既朔也不言曰不言朔夜食也日食于夜人所不見亦法所不推此説是各有所見亦互有淂失然推聖人篷削之義政不僅若此也今以定法追考之其書日書朔者多與法合其不日不朔與日朔俱
