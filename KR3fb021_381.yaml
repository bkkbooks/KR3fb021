body:
  text: 度之潤者或狹狹者或潤其距極之度遠者或近近者或遠蓋鋭為動物自是不能無差地為至靜而山移河徙時或有之況星宿邪分野不同已詳前表星度多寡不同詳後表蓋測驗之疏與所用距星之異二者皆有之非盡由天象變移也黃道所以古今不同者其變移因于赤道而盈縮又因于歲差也經星之盈縮因乎氣冬至日躔既因歲差而移則經星亦與之俱移故古黃道日躔在丑則盈于丑而縮于辰戍在曆家則謂丑未度少辰戍度多宋元黃道日躔在寅則盈于寅而縮于已亥在曆家則謂寅申度少已亥度多是以自漢而後屢修屢變兩漢魏晋六朝俱用古度至唐大衍曆始改虛為十度二五畢十七度參十度觜一度鬼三度自漢至唐其間天象必有差移特互相沿襲未之改正耳非八百餘年無少變至唐而始變也
