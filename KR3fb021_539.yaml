body:
  text: 昴六度日躔在莊八度其即位之初尚在虗九度按竹書紀年堯於丙子即位故隨袁先云四十九年得上元第一紀路史以為戊寅即位故曰四十七年得天正甲子皇甫𧭗世紀邵子經世書皆云甲辰即位二十一年得甲子通鑑及曆家積年甲子俱從之其自堯元年至今康熙二十九年庚午從世紀等書則為四千零四十七年日躔歲差當在虗九度從竹畫則為三千八百三十五年日躔歲差當在虛六度書傳年數既相懸二百一十二年則歲差度之為虛九虗六將安所定邪曰此固無碍于定法也世惟不知定法故年世不真則年限亦從之而謬是以難得其合耳若周法既正源流既清則帝王年世譬如傳之過客任其或先或後而天運自是一定從竹書則算其虗六從世紀則筭起虗九俱無不可矣至于甲子之為二十一年為四十七年為四十九年命義和之為元年為甲子年事亦皆在所不必拘詳帝王年世是以歲差定法莫要乎立周法推三正也
