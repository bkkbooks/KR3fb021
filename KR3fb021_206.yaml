body:
  text: 鬼科竅云木金水三星俱徑百里火星徑七十里土星徑五十里上二條因日月徑而類及之西說日月五星之大小詳九重辨日在外層其度廣月在內層其度狹故日大而月小以交食法測之月食十五分為既甚若其徑相等則必十分為既今又多既內五分則知日大於月半倍也日月之大小不同而視之適等者以日遠而月近也日大半倍而視之適興月等則其遠亦當有半倍天心距太陰天五十八度一三一三三八折取其半日當遠於月二十九度六五六六八然既以遠近而適等則日食但當以千分為既今八分以上便為食既則月之掩日又覺差大矣是知日月相距凡三十六度有奇也以二十九度六五六六八為實以八歸之得三十六度三三二八五繇日月之相距而推九重之遠近則天每重厚一十二度
