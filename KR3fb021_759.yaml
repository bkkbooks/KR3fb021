body:
  text: 過元枵之次為丁己驚蟄後六日而宗鄭之饑亦政在丁己春夏之交也歲在家韋考證昭十一年置昭公辛卯上距十一年庚午二十一歲歲積七千六百七十日九五四加辛後卯合應見上以新定木周率纍除之餘二十八日六三八一為庚午至後合應太陽入盈曆二十八日半強應減一度二六從歲差日躔古黃道牛四度三度一二順數二十九度九淂危六度初為合伏度則庚午夏四月政在豕韋之次後二歲壬申春分後躔大梁之次是年夏楚弒其君䖍秋蔡候盧歸國所謂蔡復楚凶又無不畢慮也歲在顓頊之墟考證昭十年置上庚午合應加二歲策除一率策餘三百六十日二六三三又置歲策反減之淂四日九七九三為昭十年已已至前合應從牛四度初反減淂斗二十三度初為至前合伏度距元枵虗宿二十度許查水星行率合伏後一百二日行二十度始及虗宿是謂顓頊之墟爾雅云顓頊之虗虗也蓋春分後六日也
