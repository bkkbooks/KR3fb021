body:
  text: 春秋正月辨春秋正月古今聚訟主夏正者則以夏取麥秋取禾周禮詩經為證然春無水冬大雪九月大雩十月傊霜春王正月日南至將何解乎主周正者詆周官為瀆不經日周書為後人偽筆七月流火為火既高而流于中六月徂暑為自此而至于暑然春月采九月肅霜桃夭水津為仲春之候又何解乎有謂春秋本周正而夫子特冠以夏時為見諸行事者夫子學禮而曰吾淂夏時焉論為邦則曰行夏之時將徒取其名乎抑實取其義乎夫春夏秋冬者四時之名也春生夏長秋收冬藏者四時之義也夫子若以夏淂天而實取其義則必以栁梯魚癸未均田為春而非以陳筋革隕麋角為春可知也使用月而冠以夏時則是子月而強名之以春矣十一月可以為生乎午月而強名之以秋矣五月可以為收乎上不合于天時下部切于民事聖人何取焉未子曰以程子假天立義之云考之則是夫子作春秋特加此四字以擊年見行夏時之意若如胡
