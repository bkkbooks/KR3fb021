body:
  text: 十三萬五查表淂女十二度初為前合度木率合後距至應行九度六五用加合伏度通一百二十二萬七查表淂古赤道虗九度七為前曆太初庚辰歲天正冬至歲星所躔度歲在火國語僖十六年晉文公過五鹿子犯曰十省二年歲在火必復此土至僖公二十八年已丑春取五鹿距第八紀之四十六章一十歲歲積三千六百五十二日四二六三歲差日躔在古赤道牛五度五七淂步斗積度九十八萬五七置前歲積加章首木應一百一十二日九九九三纍除合率餘一百七十五日六五四一置步斗積度加一周策減之存二百八十八萬一六八九查表得柳六度初為前合度合後距至木率應行二十度三七用加合伏度通三百八度五四查表淂古赤道張四度五四為已丑歲天正冬至歲星所躔度春秋內外傳俱以次舍言歲星所在故用赤道推之下倣此
