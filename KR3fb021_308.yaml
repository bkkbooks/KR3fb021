body:
  text: 則又小者近而大者遠立一説而自有三變使能舍割園之法而別有所以為推則各為一理者亦各有一法庶可以無議乃其所藉以為推者斷不能出於弦弧勾股之外則何其彼此矛盾乎今據其術言之人在地上面之中望日出沒恰各距天徑之半仰望午中當減去地心至地画之數則東西為遠而上下近一萬四千三百餘里以遠近三里半而差一里計之則午中視徑當大四千餘里乃何以日出沒遠而宜小者反大午中近而絕大者反小乎若謂大小不係于遠近則其所推之日月星宿以遠近為大小者亦俱不足憑矣是則自立説而自為破也西士自為觧曰此非由于地之遠近也濕氣便然也盖夜中水氣恒上騰氣行空中悉成濕性濕以太陽自下而上映帶而来冕濾焉蓬勃焉人望之以為如是其大耳若太陽當空浮翳盡歸無所映隔真體明淨較之旦暮為小云云此亦僅可為遠近不甚多大小不甚懸者觧耳今大小差四千餘里豈一濕氣所能觧乎且其朔更不可通于月茍
  hash: sha256:dafa69f063a03fa3ef43a4226fbff56d22d71429899e3271759306d9e55abb6a
