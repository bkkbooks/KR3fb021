body:
  text: 自然之理非太古聖人莫能窮其源而立之法也夫豈甘石之及哉然古聖遺法乆矣失傳而説者多不能原其理贾公彥謂古者受封之日歲星所在之辰其國屬焉鄭夾漈謂此則主祀之意非因封國始有分星蘓平仲又謂省分星而無分地盖分野之理乆矣不明于世矣術士又從而增竄之周初配以九州戰國配以十二國漢初配以十二州漢季又配以郡國入度及李淳風一行之徒又以唐時之郡邑配之夫天星一定而郡國之名常變則古今隨時更配於理未為不可然地名錐有更易而山川疆域必無更改則東西南北上下相應自當省一定之理乃臆為增竄非所謂不知而作者與竊為今日分野當舉海內省郡計以道里亦分為三百六十五度以嵩高當紫宮大火為南服大梁為北塞其餘諸次各桉其方隅従大火大梁左右以序而分配焉復古聖之法従天象之真因以占驗必有竒中此司曆君子之任也改後表吳越趙魏倒易韓鄭配兖趙魏配益即漢說已多乖舛況後人郡邑入度之說祁
