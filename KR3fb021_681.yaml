body:
  text: 占天曆亦姚舜輔造以二萬八千八十為日法六千八百四十為歲餘一萬四千八百九十九為朔餘起徽宗崇寧二年癸未天正朔壬午二刻五十九分冬至乙酉九十刻七十五分定法經朔壬午二刻五十六分五一經氣乙酉八十七刻六十六分一七舊朔遲二分四九舊氣遲三刻八分八三金大明曆楊級造以五千二百三十為日法一千二百七十四為歲餘二千七百七十五為朔餘起太宗天會四年丁未天正朔癸亥八刻一十八分冬至辛卯七十二刻七十五分定法經朔癸亥八刻一十四分三九經氣辛卯六十九刻九十九分五舊朔遲三分六一舊氣遲二刻七十五分五南宋統元曆陳德一造以六千九百三十為日法一千六百八十八為歲餘三千六百七十七為朔餘起紹興五年乙卯天正朔丙午六十一刻六分冬至癸酉六十六刻七十五分定法經朔丙午六十一刻二分三三經氣癸酉六十四刻一十分六二舊朔遲三分六七舊氣遲二刻六十四分三九乾道曆劉孝榮造以三萬為日法七千三百八為歲餘一萬五千九百一十七分七十六秒為朔餘起孝宗乾道三年丁亥天正朔庚子七十二刻五十八分冬至辛酉四十二刻七十五分
