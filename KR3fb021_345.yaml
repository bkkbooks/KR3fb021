body:
  text: 經星定法說經星有周率猶五星之周率也有歲行率猶五星之曆率也歲行有盈縮猶五星之有疾遲假目也其周率但用虗度專明歲差之理其歲行率則用實度以正歲時蓋考驗氣序全在中星故堯典特詳四仲月令備紀昏旦誠以歲時氣序非是無由正也古法以星度係于節氣每歲平分二十四氣至北齊張子信謂日躔有盈縮於是定入氣差法斯中星之度數真而時令正矣然沿習左旋右轉之術而不知太陽之盈縮實為經星之盈縮太陽之入氣差實為經星之入氣差也今即舊術而改正之斯法一立則太陽但每日行一度此乃虗度非謂實度凡算朔望交食止用太陰遲疾曆使合於太陽即是而三差加減之法可以不設曆家定朔望交食因牽入實度在內必使天與日月三者會而為一故有三差加減之法令經星既別為行率而太陽但日行一度無有盈縮則俱不必置算彽以太陰之行算之使與太陽相會而即是矣但遲疾曆當更為詳定耳
