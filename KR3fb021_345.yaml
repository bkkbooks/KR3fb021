body:
  text: 經星定法説經星有周率猶五星之周率也有歲行率猶五星之暦率也歲行有盈縮猶五星之有疾遲叚目也其周率但用虗度專明歲差之理其歲行率則用實度以正歲時盖攷騐炁序全在中星故堯典特詳四仲月令備紀昏旦誠以歲時炁序非是無由正也古法以星度係于節炁每歲平分二十四炁至北齊張子信謂日躔有盈縮於是定入炁差法斯中星之度數真而時令正矣然沿習左旋右轉之術而不知太陽之盈縮實為經星之盈縮太陽之入炁差實為經星之入炁差也今即舊術而改正之斯法一立則太陽但每日行一度此乃虗度非謂實度凡算朔望交食止用太陰遲疾暦使合於太陽即是而三差加減之法可以不設暦家定朔望交食因牽入實度在內必使天與日月三者會而為一故有三差加減之法令經星既別為行率而太陽但日行一度無有盈縮則俱不必置筭彽以太陰之行筭之使與太陽相會而即是矣但遲疾暦當更為詳定耳
