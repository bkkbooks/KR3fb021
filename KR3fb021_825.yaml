body:
  text: 餘三十一秒刻淂食分止三十秒耳披時推交泛十日等數欲以正交起筭則與日月不合𠰥從中交起算則淂平交周典新法所淂去正交畧遠維能入食限亦不道跌食分矣學齊佔云朔日而乃謂朔月盖月朔之及稱書之月正元日也今本皆作朔日辛夘悮也定法乙丑歲天正朔乙丑三八九三定炁庚辰二八酉月經朔辛夘一六四七定朔在書合交食限經不詳年虞𠠎推為幽王六年乙丑歲亦本諸竹書也大衍定交分一十四日三千四百二十九分入食限授時定交分一十四日五千七百九分亦合食限春秋鲁隱公三年辛酉春王二月已已日有食之丑正二月二月姜及亦似失一閏者謂夏正失一閏也六衍與姜合較時三月已已朔去交分二十六日六千六百三十一入食限推作三月者悮執子正也定法辛酉歲天正朔庚午九一二封開定炁癸酉九四六寅月經朔已已一五二二定朔在書合交食限按經又書三月庚戍四月辛夘八月庚辰十二月癸未以定法攷之夘朔戊戍有庚戍辰朔戊辰有辛夘申朔丙寅有庚辰次年天正朔甲子有癸未
