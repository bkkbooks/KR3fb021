body:
  text: 度有真象虔象之分里亦有真象虔象之別天之虛象差一度則於地差二百八十里每度里實必測候校量以求真數非可懸斷而開元中南宮説於河南平地所測較古今諸術為近茲姑用其里法即有盈縮要亦不甚相遠矣大地之徑約六萬里弱周約一十八萬里強周徑之數未易得實而詳及尺寸似可不必故以下但里數而已天之出於地上者二百七十八度強二五夏至日道正當天中其南至冬至日道四十八度弱此至中台二星之間亦四十八度北無緯度可記而中台北星距極四十二度入張三度正當子午經線之中故取以為記共九十五度半強六二一六為平列之度上下相應其間亦微省盈縮茲不道言其大署耳以里法二百八十乘之得二萬六千七百七十四里五七八一其自冬至日道南下至地自中台之間北下至地合九十一度強三一四一合之為半周之數乃循弧之度正當髀徑一百一十八度強見前以里治乘之得三萬三千一百二十九里王二合共虛象之度徑度也二百一十三度九三九六太為地五萬九千九百
