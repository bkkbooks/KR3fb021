body:
  text: 之於理合乎否乎原其立術之意止取便於測園之法已耳間當取其術而試之鍥度布筭其就整果為便㨗𠰥用零數則鍥度既難淂整而入算亦頗齟齬誠有不若用整者然步曆所以求合乎天也茍不合于天道之本然即便易何取乎乃安于茍簡不思變法以合天而竟嬌天以從法使不知五度有奇之不可減則是循數而昧理也知其不可減而減之則是嬌數以誣天也西士必居一於此矣西法通憲簡平等儀以園剩園其法最巧而切于用但入算時不能變通救遂致理數之俱謬耳九執宮度説我曰西曆源本九執其宮度之謬誤但習于舊術初非特剏今歸其過於西士空彼所不受乎曰西曆宮度雖仍九執之舊然九執之分宮非謬而誤在西曆即西曆之初用整度猶未為謬而誤在後人之用西曆者安淂諉其過于九執之法剏自唐初其元起自開皇其時冬至日在古黃道斗十二度從日躔而右旋一象則為冬至中星戍宮奎宿故以戍宮白羊為首古聖部斗分宮與三正之建皆取冬至中星以立法九執盖亦能隱合其理者西說乃牽步戍
