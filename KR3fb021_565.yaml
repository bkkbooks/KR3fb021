body:
  text: 開元甲子却三十六度而乾策復初矣日在虗一則鳥火昴虗皆以仲月昏中合于堯典劉炫依大明暦四十五年差一度則冬至在虛危而夏至火已過中梁武帝據虞𠠎暦百八十六年差一度則唐虞之際日在斗牛間而冬至昴尚未中以為皆承閏後莭前月却使然而此經終始一歲之事不容頊有四閏按開元所測冬至在斗十度者係是黃道而自斗十至虗一為數三十六度者則赤道之度也若黃道止有三十四度黃赤二道混併莫辨自祖沖之而後靡不坐此弊矣統元暦曰崇天曆慶暦甲申冬至日在斗五度以歲差之法推而上之距開元甲子凡三百二十一年日差五度故唐志云開元甲子日在赤道斗十度是也是黃道非赤道又推而上之自開元至漢太初丁丑凡八百二十七年日差十度唐志云以開元大術暦歲差引而退之則太初丁丑日在斗二十度是也其太初云日在牽牛初為術疎矣自太初丁丑推而上之去秦莊襄王元年一百四十五年日
