body:
  text: 步五緯但用周率段目而暦率可以無庸五星之策除木星新定外其四星皆仍舊術大約周率雖不甚相遠而攷其遲疾廻留之間多者至差十餘度此則段目之法猶未宻也理應再候務求真數凡算七政皆用周天虗度如欲命以實度使便于測騐則查經星盈縮實度一覽可得無勞布筭欲得經星盈縮實度法當作一表上列周歲平積日下列經星盈縮度用歲起冬至實度其箕宿一查即得然有歲差分當每年遞退其法不可以謬柱故不著之為暦但于後表中載實度積倒以見其大畧治暦者當歲一備之可也理至當而法至簡也説謂左旋之筭煩於籌策哉今光定入炁盈縮大畧如左其盈縮細暦則須將赤道黃道太陰遲疾暦五星段目一一攷正而後可定耳經星定法經星周率三百六十五日二五六七三二二一
  hash: sha256:33b9a41dec889de0ad3d823ba78fbf23273b11c7d15838787d4e3e9a4d492ad8
