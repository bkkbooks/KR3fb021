body:
  text: 步五緯但用周率段目而曆率可以無庸五星之策除木星新定外其四星皆仍舊術大約周率雖不甚相遠而考其遲疾回留之間多者至差十餘度此則段目之法猶未密也理應再候務求真數凡算七政皆用周天虗度如欲命以實度使便于測驗則查經星盈縮實度一覽可得無勞布算欲得經星盈縮實度法當作一表上列周歲平積日下列經星盈縮度用歲起冬至實度其箕宿一查即得然有歲差分當每年遞退其法不可以謬柱故不著之為曆但于後表中載實度積倒以見其大略治曆者當歲一備之可也理至當而法至簡也說謂左旋之算煩於籌策哉今光定入氣盈縮大略如左其盈縮細曆則須將赤道黃道太陰遲疾曆五星段目一一考正而後可定耳經星定法經星周率三百六十五日二五六七三二二一
