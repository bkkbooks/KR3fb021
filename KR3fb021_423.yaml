body:
  text: 法而此云開闢以來未滿萬年來紹具甲子上距平初甲子實得九千九百歲政是以歲差周數為開闢一元之數也夫邵自皇極經世一書朱子嘗血稱之而至于言天地之數則又不主其説蓋自由灼見無取附和也然而猶亟稱之者則以經世假數明理其所契不在象數之間而在意言之表耳令世方沈蔽于荒誕之説開闢至今動稱千百萬年即邵子一元十二萬九千六百年猶疑其為數太少況朱子之説即是以五百餘年來學者莫為闡明曆家莫能宗信策誕者則以奇而好之確實者反以常而易之人情大抵如是天道將何由而明良足慨已天地始終問或曰天地之數昔人但言已往不言將來惟河圖從佐輔略言之亦未嘗紀之以數也河圖佐輔云百世而後地高天下不風不雨不寒不暑民復食土皆知其母不知其父如此千歲之後而天可倚杵洵洵莫知所終至邵子作皇極經世以元會運世窮天地之數謂十
