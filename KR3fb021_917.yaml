body:
  text: 刻法說曆術有必不可慶而最無閞于曆之疏密不妨隨人立法者刻鈐是也古法俱用百刻而平分十二時則必有不盡之數故每時為大制八總淂九十六刻而以所餘四刻每刻為六十分共二百四十分為二十四小刻每時加小刻二以分於時之上下或用于大刻之前或用于大刻之後用于後者稍便又或以子午卯酉四時各多一刻者而要不若平分為近是平分之法每時淂八百分少每刻為一百四分一太用以鈴記時刻自分以下儘可棄去蓋曆之為道唯患立法未密嘗失以刻計耳其刻鈐之釐毫不盡何害焉然或嫵其刻有大小與夫數有不盡也於是增損其刻漢哀帝時政用一百二十刻梁天監六年改用九十六刻大同十年又改用一百八十刻皆不過取其便於籌策正如昔人之日法分母多寡任意各從其便也西士乃謂中曆百刻不適于用則未晰中曆立法意矣夫授時之曆日法度法鈞為萬分無分母拆併之勞而亦無度日參差之患其法最為簡便蓋古人
