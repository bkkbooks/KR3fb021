body:
  text: 學問大經濟也古人之學問經濟惟易曆農醫四者而已農醫自失黃而外不聞有繼之者惟易曆則千聖相傳誠以知天之學不出乎此也此殆與天地同其始而斯道之統所由起與其來益已遠矣曰敢問道統曰先君子有言曰古聖作易時所見無非曆理作曆時所見無非易理蓋道之大原出于天而易曆皆原于天也由此觀之則古之聖人斷無知曆而不知易知易而不知曆者今考易之作也始于太昊則曆亦必始于太昊為可知矣嗣扣聖聖相傳以為知天之學故曆數在躬鄭重丁寧于授受之際蓋曆數之所歸即道統所由屬是故作曆者聖人在上之事也如炎黃小皓顓頊高辛堯舜禹湯文武周公是已三代而降聖人在下不得操制作之權則曆有所不必事然知下之學帝王師儒初無二致則道統之所在即曆理所由傳矣如孔子孟子朱子是已是為曆道正統其間見知之佐聞知之賢或任創改盛事闡明而羽翼斯道之統者則代有其人未易悉數也曰三五聖五為曆道之正統稽諸載籍固可徵矣若
