body:
  text: 之間也金土之起霥雖同而于金為盈者土則為縮于金為縮者土則為盈何也五行迭王物與兩大此盈彼縮遞為盛衰亦即其相為終始耳經史歲星新率攷證前曆上元太初歲星在子詳七㬬起牽牛辨漢太初丁丑前距四千六百一十七年為庚辰歲在第五紀中距紀首一百九十六歲歲積七萬一千五百八十七日五五七二歲差日躔在室十六度之五太平甲子在室十二庚一八八七前距三百一十六年應進四度三一一八淂室十五度五查步斗表淂虗度積一百五十六萬五置前歲積加第五紀首木應合二百五十一日三二七累除合率餘四十三日四四七九用減步斗積度存一百一
