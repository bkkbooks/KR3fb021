body:
  text: 西法天象辨利西江云余嘗𤲢心量天地法最述名數以便覽地球每度二百五十里則知三百六十度為地一周九萬里計地面至中心隔一萬四千三百一十八里零十八丈地心至第九重月輪天四十八萬二千五百二十餘里至第八重天九十一萬八千七百五十餘里至第七重天二百四十萬零六百八十一餘里至第六重日輪天一千六百零五萬五千六百九十餘里至第五重天二千七百四十一萬二千一百餘里至第四重天一萬二千六百七十六萬九千五百八十四餘里至第三重天二萬五百七十七萬零五百六十四餘里至第二重天三萬二千二百七十六萬九千八百四十五餘里至第一重天謂宗動天六萬四千七百三十三萬八千六百九十餘里此九層相包如蒽頭皮皆硬堅而日月星辰定在其體內如木節在板因天而動第天體明無色則能通透光如琉璃之類若二十八宿星之上等每各大於地球一百零六倍
