body:
  text: 求終元五緯所躔歲星置庚午下距終元甲午天正冬至一萬六千二百二十四歲歲積五百九十二萬五千六百九十六日五七三加庚午前合應三百一十九日以新定太周率三百九十八日八六一九纍除之餘一百二十四日二二四七置歲策反減之得二百四十一日一七九為癸已處暑前四日六合伏太陽入縮曆五十八日三九六六應減二度零從古赤道歲差日躔胃九度八度四八順推二百三十八度九八得斗九度八度二三為至前合伏度自合伏後至甲午夏至有三百六日八四六查木星行率應行一十五度六七從斗九度順推得丑宮赤道斗二十四度二十三度二三為終元夏至歲星所躔度熒惑置前歲積加庚午火合應四百七十四日五五四七以火周率七百七十九日九二九纍除之餘二百七十日五八五七置歲策反減之得九十四日六五六九為癸已春分後六日合伏太陽入盈末五日七四七七應減度二七二六從古赤道歲差日躔胃九度順推九十六度七八得星二度一度二六為至前合伏度自合伏後至
