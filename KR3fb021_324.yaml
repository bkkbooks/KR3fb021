body:
  text: 有三百六十五道其數甚繁不可施于法象故渾儀黃道止用一圈以斜交于赤道而日行之以漸進退恰當其宿度是法最為簡要然非真象也故是圖改書三圖一為南道一為北道中為赤道欲騐赤道北諸宿則用前圖欲攷赤道南諸宿則用後圖其距極入度之數潤狹疎宻之象俱按圖可得至於今日天象攷諸漢唐宋元舊法已多不符竊欲攷正而不敢以偏方目力據為定象故分度猶仍授時赤道之舊以較諸古度為稍近也垣宿圖中第一層北極圖第二層日北道第三層未道第四層日南道第五層同天分度每格為五度第六層十二辰次圖
