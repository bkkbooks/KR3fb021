body:
  text: 上元軋象圖序天之所以示人者象與氣焉年矣人之所以占天者理無數焉耳矣然數行下而易測理行上而難知故必推數以明理不可執理以造數也昔人治曆亦曷嘗不兼言理數哉患在先執一理而為數以傳合之如至朔分齊七曜同元等說故欲定天地之運而天地不為所定今推即天地自然之運求天地自然之數數與天合而理著焉則天地之運自定于理矣盛問于蔡西山曰邵子一元之數何以知之答曰大抵以日月五星之運行求之夫所謂求之于日月五星者經世書未嘗明言之西山又不為推明之豈姑為是言以釋或人之疑邪然欲窮天地始終之數則要不外于斯言矣於是即今日之運行推而上之至于開闢之始凡日月星辰一一見其定象復自開闢推而下之至于三五以降而日月星辰又一一見其足徵則造化之理著而上元之數自得其真矣既得其所以為始自斷其所以為終合天地之始終以為數究始終之全數以觀理則曆中條緒一以貫之而皆無過不及之
