body:
  text: 交後也二十六年癸丑冬十有二月癸亥朔日有食之定法癸丑歲天正朔戊戍二六二九定氣丙午五二九亥月經朔癸亥九九四定朔在書合交食限此合子正盛文之有悮歷書經傳凡書十一月十二月往往多悮或上年應閏不閏也是失閏也隱三乃寅正失一閏此又丑正失一閏也三十年丁已九月庚午朔日有食之丑正九月朔授時十月庚午朔加時在書去交分十四日四千六百九十六入食限失閏也大衍同定法丁已歲天正朔乙已二六二定氣丁卯六二一三酉月經朔辛未三七三定朔庚午加時在書合交食限閏應二十三日三五應閏未月魯曆置在入交後也僖五年丙寅九月戊甲朔日有食之一下多合子正定法丙寅歲天正朔壬子六八八五定氣甲寅六八五一申月經朔戊申九三三三定朔在書合交食限傳有八月甲午未朔淂已卯有甲午十二月丙子朔係定朔十二年癸酉春王三月庚午日有食之
  hash: sha256:76f74e747218942cd2c2a954725f20a38649b73eed7be7e2b77c02e155b1fc73
