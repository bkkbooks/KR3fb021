body:
  text: 不可改則民間剋擇自遵古法而其術必不入用矣夫治曆明時所以前民用也今立術而不為民所遵用將一統正朔之典由茲而既矣是誰之過與其謬三也乃援合神以堅其説夫合神之名不過日者家之猥言明理者所不道欽若軋象知天者聖此何等學問而以鄙猥之見參之乎歲差合神兩不相應宋沈曾有是論其所見家淺西士何亦為其所惑乎即曰日家發課重在合神亦有不可慶者則矣知合神之起例乎月有合神猶歲有歲合也歲合取千月合取支如甲與已合則甲年以已為歲合寅與亥合則寅月以亥為合神之類例取干支非由天象凡術家歲月曰時方位神殺多至四百餘位皆從干支起例唯古法減浸日乃取之日度然今亦但取干支耳亦何闢于辰次之義乎即曰合神獨取之天象則試問先有合神而後天象從之那抑亦先有天象而合神之名其後起也則豈不當改合神以從天而改天以從合神乎即曰當改天以從合神則亦當于火雪起丑初否則于冬至起丑中庶無遺議耳𠰥箕三起丑初則幾差半舍而合神猶遲半月仍無解于其術之疏也其謬四也
