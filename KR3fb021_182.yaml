body:
  text: 之弧度便當地之弦度則其失豈直毫釐之差哉虗象説天有真象有虛象北道之下正當天地之中仰而觀之圓如覆釜上穹而四垂者此天之真象也餘處仰觀亦無不圓如覆釜上穹而四垂者此天之虛象也假令有人在冬至日道之下則南望南極出地二十四度而北望緯線當中台二星之豦則低𡸁天末矣又令有人在中台之下則北望北極出地七十二度而南望冬至日道則低𡸁天末矣是為虗象其東西二極遠近異視理亦如是但無定體可指爾若夫天之出于地上者二百七十八度而人止見其半周則趙氏所謂地平與之相妨人目不可盡見也今試觀半周天之大而其小若可以丈尺量黃赤道相距各二十四度而其近若只在尋丈間此非獨遠使然也天之大無窮而人之目有限遠望不百里已眼督精絕矣其能極天體之高遠哉故隨在仰視無不正圓即窮至四表而終不見天之偏于大小者天
