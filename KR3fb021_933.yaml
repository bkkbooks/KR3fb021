body:
  text: 渾儀渾天之理始明于黃帝素問黃帝問于岐伯曰地之為下否乎對曰此為人之下太虛之中者也帝曰免于岐伯曰大氣舉之此蓋明乎其為渾也而渾儀之制則始自洛下閡名之曰璇璣玉衡蓋取舜與之語以美其名耳而馬鄭諸儒反取以釋經謂舜寅之璇璣玉衡為即其器今雍敏所編亦以玉衡名之姜母舜之所在者即是編邪春秋文耀鈎謂唐堯即位義和立渾儀劉氏歷正謂顓頊立渾儀考之經籍皆無所據唐書曰詩人記昏禮土功必候天星春秋言日食星變傳載諸國所占次舍伏見逆順至於周禮測景求分星辨國妖樣察候皆可推考而獨無所謂璇璣玉衡者豈其不用於三代邪抑法制遂亡而不可復淂邪史氏之言蓋先我而疑之矣後漢賈逵張衡美陸績王蕃葛衡僞漢孔擾此魏朝崇斛蘭宋錢樂之磨李淳風梁令瓚一行宋張思訓韓顯符況適元郭守敬相繼增修法制漸備人鄲其智代殫其巧而究於推步測驗兩俱無籍視圭表壺漏等法為治曆之所必需者違矣斷非古人之遺制也然於指示天象最為明白所以歷代用之
