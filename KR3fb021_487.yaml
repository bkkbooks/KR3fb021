body:
  text: 萬八千一百有四月內少三日即加之得朔積四百七萬八千二百九十三日一三七二三七八三五減去庚午經朔應以旬周累除之餘三日整得辛酉日旦子時正初刻初分為上元天正朔旦漢志曰日合于天統月合于地統斗合于人統日合天統者步日必始冬至子半也月合地統者步月必始三日出庚也斗合人統者步斗必始龍角大辰也按漢志所載實上元真數即治暦定法盖去古未遠古聖遺言猶有存者雍敬初于天地始終之數彷佛若有所見因以炁策求之果得四子真元繼以朔策求之乃得辛酉為天正朔而冬至在初三夜子此時胃中未免有至朔分齊之見不勝自疑忽憶步月必始三日出康之語乃遂豁然夫三統之理為劉歆所改竄幾於澌減矣而猶幸此語獨不抹殺于至朔分齊之日殆天之暗為呵獲為今日之左券也或曰開闢既始于冬至甲子而朔在辛酉則朔又出開闢之前而日月不同元矣曰惟開闢始于三
