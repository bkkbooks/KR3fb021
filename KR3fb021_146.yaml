body:
  text: 沒後二刻半為昏則書有短長而昏省蚤晏不復以戌時為定候而星躔相距或推而進之或引而退之亦不復適凖四分之一失古人之遺意矣或有改候于夜半以取日衡者亦難以淂密一行曰漢世課昏明中星為法已變今候夜半中星以求日衡近於淂審以水省清濁壺有增減或積塵所塵而漏有遲疾臣等頻夜候中星而前後之相差或至三度要之候中圭等制皆法之大槩古人用之者以自有一定之法而又借此以騐這非專恃此以定找之法也先至一日懸土炭于衡兩端輕重適均冬至日陽氣至則炭重夏至日陰氣至則土重此亦漢法尤疎而不足言者晋世姜岌以月蝕之衡知日躔所在此法𡪯的魏黄初以後始課日食疎密至張子信劉焯賈鲁元之徒謂日食可以密率求於是自唐而来皆以新率推考古今日食如春秋所載之三十六食以合多者見為精密盖暦之為數在于知来而欲取騐於将来必先攷信於往昔也古来暦法無一語不謬無一術不疎惟此二者用以求日衡定朔策為無遺議耳
