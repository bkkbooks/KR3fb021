body:
  text: 半之之語而致誤耳孔穎達疏天地升降不過三萬里自地以至日不遏一萬五千里圭景茍差一寸則地差千里宜矣唐史開元十二年命太史南宮説等馳傳往安南蔡蔚等州測候日景林邑冬至晷六尺九寸夏至在表南五寸七分北候鐵勤夏至晷四尺二寸三分冬至二丈九尺二寸六分計陽城南距林邑徑六千一百十二里五月日在天項北六度景在表南五寸七分是景九分半而當一度也北距鐵勒與林邑正等五月日在天頂南二十七度四分景四尺二寸三分是景一寸五分半而當一度也一行以南北日景校量大約南北極相去才八萬餘里管窺輯要云依日月交食算天之圖經十一萬五千二百里西澤法詳九重天辨淮南子曰禹使大章步自東極至于西極二憶三萬三千五百里七十五步使監亥步自北極至于南極二憶三萬三千五百里七十五步四海之內
